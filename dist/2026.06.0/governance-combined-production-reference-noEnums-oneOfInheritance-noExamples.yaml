      x-okta-known-values:
        - GROUP
    auto-remediation-settings:
      type: object
      description: |-
        When a group is selected to be automatically remediated, if a user is assigned to an app through this group,
        the user is automatically removed from the group if their access to the app is revoked in the Access Certification Campaign.
        `Group` is currently the only supported type of resource that can be automatically remediated.
      properties:
        includeOnly:
          type: array
          description: An array of resources to be automatically remediated
          minItems: 0
          items:
            type: object
            description: Represents a list of resources that are automatically remediated
            properties:
              resourceType:
                $ref: '#/components/schemas/auto-remediation-resource-type'
              resourceId:
                type: string
                description: |-
