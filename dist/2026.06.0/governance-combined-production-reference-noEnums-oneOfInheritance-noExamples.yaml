        GROUP: All the members of an Okta group specified in `reviewerSettings.reviewerGroupId` are the reviewers for the campaign. The `reviewerSettings.reviewerGroupId` property is required for this reviewer type. If the group specified in `reviewerSettings.reviewerGroupId` contains only one member, then that member is assigned as the reviewer for all reviews, and the `reviewerType` is set to `USER` for those reviews. When the campaign launches, if the group has more than 10 members, 10 members from the group are randomly set as reviewers for the campaign.
