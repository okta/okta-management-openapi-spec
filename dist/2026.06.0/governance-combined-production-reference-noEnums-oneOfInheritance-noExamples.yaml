                  When `resourceType = GROUP`, it points to the group `id`.
                minLength: 1
                maxLength: 20
        includeAllIndirectAssignments:
          type: boolean
          description: |-
            If `includeAllIndirectAssignments` is set to `true`, the user's access to all groups that can assign the user to the app(s) is removed during remediation. Only app assignments through groups can be automatically remediated.
            > **Note:** You can specify only `includeAllIndirectAssignments` or `includeOnly`.
    remediation-settings:
      type: object
      description: Specifies the action to be taken after a reviewer makes a decision to `APPROVE` or `REVOKE` the access, or if the campaign was `CLOSED` and there was no response from the reviewer
