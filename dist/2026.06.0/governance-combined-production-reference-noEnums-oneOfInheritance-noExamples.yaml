        - type
        - resources
        - conflictCriteria
      allOf:
        - $ref: '#/components/schemas/rule-conflict-creatable'
    conflict-criteria-updatable:
      type: object
      description: Conflict criteria for the risk rule
      nullable: true
      properties:
        and:
          type: array
          description: |-
            A conflict occurs when two criteria evaluate to true in a logical `AND` evaluation.
            The criteria are evaluated in order, and the first criterion that evaluates to false causes the entire `AND` evaluation to be false.
            If both criteria evaluate to true, then a conflict is detected.
          items:
            $ref: '#/components/schemas/criteria-creatable'
          minItems: 2
          maxItems: 2
