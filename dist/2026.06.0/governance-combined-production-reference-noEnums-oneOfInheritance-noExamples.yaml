    rcar-entries-list-filter-v2:
      name: filter
      description: |
        A required [filter](https://developer.okta.com/docs/api/#filter) expression that returns entries based on the [`parent`](https://developer.okta.com/docs/api/iga/openapi/governance.requests.admin.v2/tag/Catalogs/#tag/Catalogs/operation/listAllDefaultEntriesV2!c=200&path=data/parent&t=response) property:
        * This filter expression only supports the `parent` property and the `eq` and `pr` [operators](https://developer.okta.com/docs/api/#operators).
        * If you want the query to return child entries, then you must specify the `parent` ID with the `eq` operator.

        > **Notes:**
        > * If you don't use the `parent` property in the filter expression, undesireable results are returned.
        > * Query parameter percent encoding is required. See [Special characters]( https://developer.okta.com/docs/api/#special-characters ).
      in: query
      required: true
      schema:
        type: string
        format: scim-filter
        example: not(parent pr)
      x-scim-filter:
        parent:
          operators:
            - eq
          schema:
            $ref: '#/components/schemas/catalog-entry-id'
    rcar-entries-list-after:
      name: after
      description: |-
        The [pagination](https://developer.okta.com/docs/api/#pagination) cursor that points to the last record of the previous response.

        The maximum number of entries returned in a response is determined by the [`limit`](https://developer.okta.com/docs/api/iga/openapi/governance.requests.admin.v2/tag/Catalogs/#tag/Catalogs/operation/listAllDefaultEntriesV2!in=query&path=limit&t=request) query parameter.
        If there are more entries to return, the `_links.next.href` link contains the `after` cursor for the next page of results.
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/catalog-entry-id'
    rcar-entries-list-match:
      name: match
      description: Return catalog entries that match a substring value in the [`name`](https://developer.okta.com/docs/api/iga/openapi/governance.requests.enduser.v2/tag/My-Catalogs/#tag/My-Catalogs/operation/listMyDefaultEntriesV2!c=200&path=data/name&t=response) or [`description`](https://developer.okta.com/docs/api/iga/openapi/governance.requests.enduser.v2/tag/My-Catalogs/#tag/My-Catalogs/operation/listMyDefaultEntriesV2!c=200&path=data/description&t=response) properties. At least three characters are required for fuzzy search.
      in: query
      required: false
      schema:
        type: string
        minLength: 3
        maxLength: 50
        example: figma
    rcar-entries-list-limit:
      name: limit
