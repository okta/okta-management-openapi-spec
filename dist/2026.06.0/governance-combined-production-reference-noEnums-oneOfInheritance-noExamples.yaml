        FilterByNameContains:
          summary: Filter by the entitlement value name that contains the provided substring for a specific resource
          value: parent.externalId eq "0oafxqCAJWWGELFTYASJ" AND parent.type eq "APPLICATION" AND name co "License"
        FilterId:
          summary: Filter by a specific resource and entitlement IDs
          value: parent.externalId eq "0oafxqCAJWWGELFTYASJ" AND parent.type eq "APPLICATION" AND (entitlementId eq "espfxqCAJWWGELFTYASJ" OR entitlementId eq "espfxqCAJWWGELFTYASI")
        FilterByExternalValue:
          summary: Filter by external value
          value: parent.externalId eq "0oafxqCAJWWGELFTYASJ" AND parent.type eq "APPLICATION" AND externalValue eq "corporate"
        FilterByCreatedAfter:
          summary: Filter by entitlement values created after a specific date
          value: parent.externalId eq "0oafxqCAJWWGELFTYASJ" AND parent.type eq "APPLICATION" AND created gt "2026-01-30T10:00:00.000Z"
        FilterByCreatedBefore:
          summary: Filter by entitlement values created before a specific date
          value: parent.externalId eq "0oafxqCAJWWGELFTYASJ" AND parent.type eq "APPLICATION" AND created lt "2026-01-30T10:00:00.000Z"
