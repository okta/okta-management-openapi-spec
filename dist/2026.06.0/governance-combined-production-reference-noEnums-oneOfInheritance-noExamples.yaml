    grants-list-filter:
      name: filter
      description: |
        A [filter](https://developer.okta.com/docs/api/#filter) expression that returns entries based on the following properties:
        * `targetResourceOrn` (alternatively, you can use `target.externalId` and `target.type` for a specific resource )
        * `targetPrincipalOrn` (alternatively, you can use `targetPrincipal.externalId` and `targetPrincipal.type` for a specific principal)
        * `entitlementBundleId`
        * `entitlements.id`
        * `entitlements.values.id`
        * `action`

        The `eq` operator is supported for these properties. The `AND` and `OR` logical operators are supported for combining multiple expressions.

        > **Note:** Query parameter percent encoding is required. See [Special characters](https://developer.okta.com/docs/api/#special-characters).
      in: query
      required: true
      schema:
        type: string
        format: scim-filter
        example: target.externalId eq "0oafxqCAJWWGELFTYASJ" AND target.type eq "APPLICATION" AND targetPrincipal.externalId eq "00ub0oNGTSWTBKOLGLNR" AND targetPrincipal.type eq "OKTA_USER"
      x-scim-filter:
        target.externalId:
          operators:
            - eq
          schema:
            $ref: '#/components/schemas/resource-id'
        target.type:
          operators:
            - eq
          schema:
            $ref: '#/components/schemas/resource-type'
        targetPrincipal.externalId:
          operators:
            - eq
          schema:
            $ref: '#/components/schemas/user-id'
        targetPrincipal.type:
          operators:
            - eq
          schema:
            $ref: '#/components/schemas/principal-type'
        targetPrincipalOrn:
          operators:
            - eq
          schema:
            $ref: '#/components/schemas/user-orn'
        targetResourceOrn:
          operators:
            - eq
          schema:
            $ref: '#/components/schemas/resource-orn'
        entitlementBundleId:
          operator:
            - eq
          schema:
            $ref: '#/components/schemas/entitlement-bundle-id'
        entitlements.id:
          operator:
            - eq
          schema:
            $ref: '#/components/schemas/entitlement-property-id'
        entitlements.values.id:
          operator:
            - eq
          schema:
            $ref: '#/components/schemas/entitlement-value-id'
        action:
          operator:
            - eq
          schema:
            $ref: '#/components/schemas/grant-action'
      examples:
        filterActiveGrants:
          summary: Filter grants for a resource and user
          value: target.externalId eq "0oafxqCAJWWGELFTYASJ" AND target.type eq "APPLICATION" AND targetPrincipal.externalId eq "00ub0oNGTSWTBKOLGLNR" AND targetPrincipal.type eq "OKTA_USER"
        filterActiveGrantsWithORN:
          summary: Filter grants for a resource and user using ORNs
          value: targetResourceOrn eq "orn:okta:idp:00o11edPwGqbUrsDm0g4:apps:oidc:0oafxqCAJWWGELFTYASJ" AND targetPrincipalOrn eq "orn:okta:directory:00o11edPwGqbUrsDm0g4:users:00ub0oNGTSWTBKOLGLNR"
        filterActiveGrantsWithOnlyResource:
          summary: Filter all grants for a resource using target resource ORN
          value: targetResourceOrn eq "orn:okta:idp:00o11edPwGqbUrsDm0g4:apps:oidc:0oafxqCAJWWGELFTYASJ"
        filterGrantsWithEntitlementBundleId:
          summary: Filter grants with resource and entitlement bundle
          value: targetResourceOrn eq "orn:okta:idp:00o11edPwGqbUrsDm0g4:apps:oidc:0oafxqCAJWWGELFTYASJ" AND entitlementBundleId eq "enbllojq9J9J105DL1d6"
        filterGrantsWithEntitlementValueId:
          summary: Filter grants with resource and entitlement value ID
          value: target.externalId eq "0oafxqCAJWWGELFTYASJ" AND target.type eq "APPLICATION" AND entitlements.values.id eq "entfxqCAJWWFTFUUYBBB"
        filterGrantsWithEntitlementId:
          summary: Filter grants with resource and entitlement ID
          value: target.externalId eq "0oafxqCAJWWGELFTYASJ" AND target.type eq "APPLICATION" AND entitlements.id eq "espfxqCAJWWFTFUUYKKK"
        filterGrantsWithMultipleBundleAndEntitlementValue:
          summary: Filter grants with multiple entitlement value IDs and entitlment bundle ID
          value: target.externalId eq "0oafxqCAJWWGELFTYASJ" AND target.type eq "APPLICATION" AND (entitlements.values.id eq "entfxqCAJWWFTFUUYBBB" OR entitlements.values.id eq "entfxqCAJWWFTFUUYXXX" OR entitlementBundleId eq "enbllojq9J9J105DL1d6")
        filterGrantsWithAction:
          summary: Filter grants with resource and action
          value: target.externalId eq "0oafxqCAJWWGELFTYASJ" AND target.type eq "APPLICATION" AND action eq "ALLOW"
