        FilterWithOptionalEndDate:
          summary: Filter by a principal user, an app, and an end date
          value: resource.externalId eq "0oafxqCAJWWGELFTYASJ" AND resource.type eq "APPLICATION" AND principal.externalId eq "00ub0oNGTSWTBKOLGLNR" AND principal.type eq "OKTA_USER" AND endDate eq "2024-12-31T23:59:59Z"
        FilterWithDateRange:
          summary: Filter by a principal user, an app, and a date range
          value: resource.externalId eq "0oafxqCAJWWGELFTYASJ" AND resource.type eq "APPLICATION" AND principal.externalId eq "00ub0oNGTSWTBKOLGLNR" AND principal.type eq "OKTA_USER" AND startDate eq "2024-01-01T00:00:00Z" AND endDate eq "2024-12-31T23:59:59Z"
        FilterUsingOrnsWithDates:
          summary: Filter by a principal user and an app ORNs with a date range
          value: resourceOrn eq "orn:okta:idp:00o11edPwGqbUrsDm0g4:apps:oidc:0oafxqCAJWWGELFTYASJ" AND principalOrn eq "orn:okta:directory:00o11edPwGqbUrsDm0g4:users:00ub0oNGTSWTBKOLGLNR" AND startDate eq "2024-01-01T00:00:00Z" AND endDate eq "2024-12-31T23:59:59Z"
