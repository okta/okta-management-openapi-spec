          type: array
          description: |-
            Only applicable if `campaignType` is `USER`.

            A list of resources that are excluded from the review.
          items:
            type: object
            description: A resource that's excluded from the user campaign
            properties:
              resourceId:
                type: string
                description: Okta specific resource ID
                minLength: 1
                maxLength: 20
              resourceType:
                $ref: '#/components/schemas/resource-type-exclude'
        individuallyAssignedAppsOnly:
          description: |-
            Only applicable if `campaignType` is `USER`.

            If `true`, only include individually assigned apps.
          type: boolean
        individuallyAssignedGroupsOnly:
          description: |-
            Only applicable if `campaignType` is `USER`.

            If `true`, only include individually assigned groups.
          type: boolean
        includeEntitlements:
          type: boolean
          description: |-
            Only applicable if `resourceSettings.targetResources.resourceType` is `APPLICATION` and entitlement management is enabled.

            If `true`, include entitlements for the app.
          default: false
        onlyIncludeOutOfPolicyEntitlements:
          type: boolean
          description: |-
            Only applicable if `campaignType` is `USER`, `resourceSettings.targetResources.resourceType` is `APPLICATION`, and entitlement management is enabled:

            If `true`, only include out-of-policy entitlements.
        includeAdminRoles:
          type: boolean
          description: |-
            Only applicable if `campaignType` is `USER`.

            If `true`, include users assigned to admin roles in the campaign.
        includeAllOktaServiceAccounts:
          type: boolean
          description: |-
            <x-lifecycle class="ea"></x-lifecycle><br>
            Only applicable when `resourceSettings.type` is `OKTA_SERVICE_ACCOUNT`:
            * If `true`, all Okta service accounts in the org are included as target resources in the campaign.
            * If `false`, only the Okta service accounts IDs specified in `resourceSettings.targetResources.resourceId` are included in the campaign.
    principal-scope-type:
      type: string
      x-okta-known-values:
        - USERS
    predefined-inactive-users-scope-settings:
      type: object
      additionalProperties: false
      properties:
        inactiveDays:
          description: The duration the users have not used single sign on (SSO) to access their account within the specific time frame. Minimum 30 days and maximum 365 days are supported.
          type: integer
          minimum: 30
          maximum: 365
    principal-scope-settings-mutable:
      type: object
      description: User scope specific settings. If all the users of a resource under review are not part of the scope of certification, provide the scope of the user by means of a user expression.
      required:
        - type
      properties:
        type:
          description: Identifies the kind of principal that is in scope for access certification. An example is the scoped principal can be a user
          $ref: '#/components/schemas/principal-scope-type'
        userScopeExpression:
          description: The Okta expression language user expression on the `resourceSettings` to include users in the campaign.
          type: string
          minLength: 1
          maxLength: 7000
        excludedUserIds:
          type: array
          description: An array of Okta user IDs excluded from access certification or the campaign. This field is optional. A maximum of 50 users can be specified in the array.
          items:
            type: string
            format: okta-user-id
            minLength: 1
            maxLength: 20
        userIds:
          type: array
          description: An array of Okta user IDs included from access certification or the campaign. `userIds`, `groupIds` or `userScopeExpression` is required if campaign type is `USER`. A maximum of 100 users can be specified in the array.
          nullable: true
          items:
            type: string
            format: okta-user-id
            minLength: 1
            maxLength: 20
        groupIds:
          type: array
          description: An array of Okta group IDs included from access certification or the campaign. `userIds`, `groupIds` or `userScopeExpression` is required if campaign type is `USER`. A maximum of 5 groups can be specified in the array.
          nullable: true
          items:
            type: string
            format: okta-group-id
            minLength: 1
            maxLength: 20
        includeOnlyActiveUsers:
          type: boolean
          description: If set to `true`, only active Okta users are included in the campaign
        predefinedInactiveUsersScope:
          description: Identifies the duration the users have not used single sign on (SSO) to access their account within the specific time frame. Minimum 30 days and maximum 365 days are supported.
          $ref: '#/components/schemas/predefined-inactive-users-scope-settings'
        onlyIncludeUsersWithSODConflicts:
          type: boolean
          description: If set to `true`, only includes users that have at least one SOD conflict that was caused due to entitlement(s) within Campaign scope
    reviewer-type:
      type: string
      description: Identifies the type of reviewer at this level for the campaign
      x-enumDescriptions:
        USER: A single reviewer reviews the campaign. The `reviewerSettings.reviewerLevels.reviewerId` property is required for this reviewer type.
        REVIEWER_EXPRESSION: Specifies an expression to derive a reviewer for the campaign. This reviewer type is typically used for the manager reviewer use case (`reviewerSettings.reviewerLevels.reviewerScopeExpression` indicates the user's manager). The `reviewerSettings.reviewerLevels.fallBackReviewerId` property is required, and is used if Okta can't determine the reviewer based on the required `reviewerSettings.reviewerLevels.reviewerScopeExpression` property.
        GROUP: All the members of an Okta group specified in `reviewerSettings.reviewerLevels.reviewerGroupId` are the reviewers for the campaign. The `reviewerSettings.reviewerLevels.reviewerGroupId` property is required for this reviewer type. If the group specified in `reviewerSettings.reviewerLevels.reviewerGroupId` contains only one member, then that member is assigned as the reviewer for all reviews, and the `reviewerType` is set to `USER` for those reviews. When the campaign launches, if the group has more than 10 members, 10 members from the group are randomly set as reviewers for the campaign.
        RESOURCE_OWNER: The resource owners are the reviewers for the campaign. The `reviewerSettings.reviewerLevels.fallBackReviewerId` property is required and is set as the reviewer if resource owners aren't found or are unsupported for the resource. If resource owners are configured, the reviewers are derived from owners of the resources specified in `resourceSettings.targetResources`.
      x-okta-known-values:
        - USER
        - REVIEWER_EXPRESSION
        - GROUP
        - RESOURCE_OWNER
    reviewer-lower-level-condition:
      description: |
        The condition for reviews to move from the first to the second level reviewer.

        Don't set a condition for the first level. A condition is only appropriate for the second level.
      type: string
      x-enumDescriptions:
        LOWER_LEVEL_APPROVES: Only approved reviews from the lower level moves to this level.
        LOWER_LEVEL_APPROVES_OR_REJECTS: Both approved and revoked reviews from the lower level moves to this level.
      x-okta-known-values:
        - LOWER_LEVEL_APPROVES
        - LOWER_LEVEL_APPROVES_OR_REJECTS
    reviewer-level-start-review:
      type: object
      description: |
        Indicates rules for starting reviews at this level
      required:
        - onDay
      properties:
        onDay:
          description: |-
            The day when reviewer level starts:
            1. For the first level, this value is always `0` since the first level starts when the campaign starts.
            2. For the second level, specify a value that's greater than `0`. This indicates the day when the reviews move to the second level.
          type: integer
          default: 0
        when:
          $ref: '#/components/schemas/reviewer-lower-level-condition'
    reviewer-level-settings-mutable:
      type: object
      required:
        - type
        - startReview
      properties:
        type:
          $ref: '#/components/schemas/reviewer-type'
        startReview:
          $ref: '#/components/schemas/reviewer-level-start-review'
        reviewerId:
          description: |
            This property is required when `reviewerSettings.reviewerLevels.type` is `USER`

            The `id` of an Okta user to assign all reviews. Use this reviewer type when you can't specify `reviewerScopeExpression`.
          type: string
          minLength: 1
          maxLength: 20
          format: okta-user-id
        reviewerScopeExpression:
          type: string
          description: |-
            Required when `reviewerSettings.reviewerLevels.type` is `REVIEWER_EXPRESSION`.

            The Okta-specific user expression to fetch the reviewers from a connected identity source:

            * If a user is found with the provided expression, that user is assigned as the reviewer.
            * If a user isn't found with the provided expression, the `fallBackReviewerId` user is assigned as the reviewer.
            * See [Okta Expression Language (EL)](https://developer.okta.com/docs/reference/okta-expression-language/#okta-user-profile) to build the expression based on user profile attributes.
          minLength: 1
          maxLength: 2000
        fallBackReviewerId:
          type: string
          description: |
            Required when reviewer setting `type` is `REVIEWER_EXPRESSION` or `RESOURCE_OWNER`. The fallback reviewer is assigned as the reviewer if:

            * reviewer setting `reviewerScopeExpression` fails to identify reviewers, or
            * reviewers aren't identified through resource owners
          minLength: 1
          maxLength: 20
          format: okta-user-id
        reviewerGroupId:
          description: |
            Required when `reviewerSettings.reviewerLevels.type` is `GROUP`.

            The `id` of the Okta group:
            * All members of the specified group are assigned as reviewers.
            * Use this reviewer group assignment to assign more than one reviewer if you can't use `reviewerId` or `reviewerScopeExpression`.
            * If the Okta group has more than 10 members when the campaign launches, only 10 members are randomly selected as reviewers.
            * If the Okta group has only one member, then that member is assigned as the reviewer for all reviews, and `reviewerType` is set to `USER` for those reviews.
          type: string
          minLength: 1
          maxLength: 20
          format: okta-user-id
        isSelfReviewDisabled:
          deprecated: true
          description: |
            If `true`, users can't review their own review items.

            > **Note:** This field is deprecated. Use `selfReviewDisabled`.
          type: boolean
        selfReviewDisabled:
          description: |
            If `true`, users can't review their own review items.

            > **Note:** If you don't have the **Self-review for Okta admin roles** feature enabled, this property is required to be `true` for campaigns when the Okta Admin Console is one of the resources.
          type: boolean
    justification-requirement:
      type: string
      description: |
        <x-lifecycle class="ea"></x-lifecycle><br>
        Controls when justification is required for review decisions.

        This property must be either `REQUIRED_FOR_ALL` or `REQUIRED_FOR_REVOKE` for resource campaigns that have the Okta Admin Console as one of the resources.
      x-enumDescriptions:
        OPTIONAL: Justification dialog appears for both approve and revoke decisions, but it isn't a mandatory field.
        REQUIRED_FOR_REVOKE: Justification is required only for revoke decisions. No justification dialog appears for an approve decision.
        REQUIRED_FOR_ALL: Justification is required for both approve and revoke decisions.
        DISABLED: Justification dialog isn't shown for any decision.
      x-okta-known-values:
        - OPTIONAL
        - REQUIRED_FOR_REVOKE
        - REQUIRED_FOR_ALL
        - DISABLED
    reviewer-settings-mutable:
      type: object
      description: |
        Reviewer settings for the access certification campaign
      required:
        - type
      properties:
        type:
          $ref: '#/components/schemas/campaign-reviewer-type'
        reviewerId:
          description: |-
            Required if `reviewerSettings.type` is `USER`.

            The ID of an Okta user to assign all reviews.
          type: string
          minLength: 1
          maxLength: 20
          format: okta-user-id
        reviewerScopeExpression:
          type: string
          description: |
            Required when `reviewerSettings.type` is `REVIEWER_EXPRESSION`.

            The Okta-specific user expression to fetch the reviewers from a connected identity source:

            * If a user is found with the provided expression, that user is assigned as the reviewer.
            * If a user isn't found with the provided expression, the `reviewerSettings.fallBackReviewerId` user is assigned as the reviewer.
            * See [Okta Expression Language (EL)](https://developer.okta.com/docs/reference/okta-expression-language/#okta-user-profile) to build the expression base on user profile attributes.
          minLength: 1
          maxLength: 2000
          example: user.profile.managerId
        fallBackReviewerId:
          type: string
          description: |
            Required when reviewer setting `type` is `REVIEWER_EXPRESSION` or `RESOURCE_OWNER`. The fallback reviewer is assigned as the reviewer if:

            * reviewer setting `reviewerScopeExpression` fails to identify reviewers, or
            * reviewers aren't identified through resource owners
          minLength: 1
          maxLength: 20
          format: okta-user-id
        reviewerGroupId:
          description: |
            Required when `reviewerSettings.type` is `GROUP`.

            The `id` of the Okta group:
            * All members of the specified group are assigned as reviewers.
            * Use this reviewer group assignment if you can't use `reviewerId` or `reviewerScopeExpression`.
            * If the Okta group has more than 10 members when the campaign launches, only 10 members are randomly selected as reviewers.
            * If the Okta group has only one member, then that member is assigned as the reviewer for all reviews, and `reviewerType` is set to `USER` for those reviews.
          type: string
          minLength: 1
          maxLength: 20
          format: okta-user-id
        isSelfReviewDisabled:
          deprecated: true
          description: |
            If `true`, users can't review their own review items.

            > **Note:** This field is deprecated. Use ['selfReviewDisabled'](/iga/openapi/governance-production-reference/campaigns/createcampaign#campaigns/createcampaign/t=request&path=reviewersettings/selfreviewdisabled)
          type: boolean
        selfReviewDisabled:
          description: |
            If true, users won't be able to review their own review items.

            > **Note:** If you don't have the **Self-review for Okta admin roles** feature enabled, this property is required to be `true` for campaigns when the Okta Admin Console is one of the resources.
          type: boolean
        justificationRequired:
          type: boolean
          description: |-
            If true, a justification is required when review items are approved or revoked.

            This property must be `true` for resource campaigns that have the Okta Admin Console as one of the resources.
            > **Note:** If you have the **Access Certifications - Customize Justification Requirements** feature enabled in your org, use the `justificationRequirement` property to control review justification for all new campaigns instead of `justificationRequired`. This feature provides you with more control over your review justification settings.
        bulkDecisionDisabled:
          description: |
            If true, bulk actions are disabled for approving or revoking review items.
          type: boolean
        reassignmentDisabled:
          description: |
            If true, reassignment is disabled for reviewers.
          type: boolean
        reviewerLevels:
          description: |
            Defines the reviewer level in a campaign. A campaign can have a maximum of two reviewer levels.
          type: array
          items:
            $ref: '#/components/schemas/reviewer-level-settings-mutable'
          minItems: 2
          maxItems: 2
        justificationRequirement:
          $ref: '#/components/schemas/justification-requirement'
    notification-settings:
      type: object
      description: Settings for email notifications to be sent to the reviewers at different stages of a campaign. All properties are optional.
      properties:
        notifyReviewerWhenReviewAssigned:
          description: A Boolean value to indicate whether a notification should be sent to the reviewer when actionable reviews are assigned
          type: boolean
          default: false
        notifyReviewerAtCampaignEnd:
          type: boolean
          description: A Boolean value to indicate whether a notification should be sent to the reviewers when the campaign has come to an end
          default: false
        remindersReviewerBeforeCampaignCloseInSecs:
          type: array
          description: |-
            Specifies, in seconds, the time a reminder is sent to reviewers before the campaign closes. You can send up to three notifications
            For example, this array `[86400, 172800, 604800]` sends reminder notifications seven days, two days, and one day before the campaign closes.
            By default, reminders are sent two days and one day before the campaign closes.
          minItems: 1
          maxItems: 3
          items:
            type: integer
          default:
            - 86400
            - 172800
        notifyReviewerWhenOverdue:
          description: A Boolean value to indicate whether a notification is sent to the reviewer when reviews are overdue
          type: boolean
          nullable: true
          default: false
        notifyReviewerDuringMidpointOfReview:
          description: A Boolean value to indicate whether a notification should be sent to the reviewer during the midpoint of the review process
          type: boolean
          nullable: true
          default: false
        notifyReviewPeriodEnd:
          description: Applicable for multi-level campaigns. A Boolean value to indicate whether a notification is sent to the reviewer when a given reviewer level period is about to end
          type: boolean
          nullable: true
          default: false
    approved-remediation-action:
      type: string
      description: Specifies the action by default if the reviewer approves access. `NO_ACTION` indicates that there's no remediation action and the user retains access.
      default: NO_ACTION
      x-okta-known-values:
        - NO_ACTION
    revoked-remediation-action:
      type: string
      description: |-
        Specifies the action if the reviewer revokes access. `NO_ACTION` indicates that the user retains the same access. `DENY` indicates that the user's access is revoked as long as they aren't assigned to a group through Group Rules.
        >**Note:** If a user is assigned to a resource by way of a group and the campaign is targeted to users assigned directly to the app, the user's access isn't revoked and the review is flagged as `Manual Intervention required`. If the same campaign is configured to use the Enhanced Group Remediation, and the group the user is assigned to is included in the campaign, the user's access is revoked.
        If the user is assigned through Group Rules and a campaign attempts to remove the user from the group, the user's access isn't revoked and the review is flagged as `Manual Intervention required`.
      default: NO_ACTION
      x-okta-known-values:
        - NO_ACTION
        - DENY
    no-response-remediation-action:
      type: string
      description: |-
        Specifies the action if the reviewer doesn't respond to the request or if the campaign is closed before an action is taken. `NO_ACTION` indicates that there's no remediation action taken, and the user retains the same access. `DENY` indicates that the user's access is revoked when the campaign ends as long as they're not assigned to a group through Group Rules.
        > **Note:** If a user is assigned to a resource by way of a group, and the campaign is targeted to users assigned directly to the app, the user isn't revoked and the review is flagged as “Manual Intervention required”. If the same campaign is configured to use the Enhanced Group Remediation, and the group the user is assigned to is included in the campaign, the user is revoked.
        If the user is assigned through Group Rules and a campaign attempts to remove the user from the group, the user isn't removed and the review is flagged as “Manual Intervention required”.
      default: NO_ACTION
      x-okta-known-values:
        - NO_ACTION
        - DENY
