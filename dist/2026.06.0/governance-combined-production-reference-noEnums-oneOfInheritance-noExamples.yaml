      type: object
      description: |-
        Specify one of the following `type` of approval settings:
          | Type | Description |
          |------|-------------|
          | NONE | This request type doesn't need any approval. |
          | SERIAL | This request type needs at least one approval. |
      oneOf:
        - $ref: '#/components/schemas/request-type-approval-settings-serial-writable'
        - $ref: '#/components/schemas/request-type-approval-settings-none'
      discriminator:
        propertyName: type
        mapping:
          SERIAL: '#/components/schemas/request-type-approval-settings-serial-writable'
          NONE: '#/components/schemas/request-type-approval-settings-none'
    request-duration:
      description: |
        How long the requester retains access after their request is approved and fulfilled.

        Specified in [ISO 8601 duration format](https://en.wikipedia.org/wiki/ISO_8601#Durations).

        #### Known limitation

        Only single time unit ISO 8601 duration formats (D, H, M) are supported for units (days, hours, minutes).

        ##### Supported

        | Unit       | Example |
        | ---------- | ------- |
        | D, days    | P40D    |
        | H, hours   | PT65H   |
        | M, minutes | PT90M   |

        > **Note:** Mixes of units, as well as month/year/week designations, aren't supported. For example, `P40DT65H`, `P40M`, `P1W`, and `P1Y` aren't supported.
      type: string
      example: P40D
      format: iso-duration
      nullable: true
      default: null
