  /governance/api/v2/tasks/{taskId}:
    get:
      x-okta-lifecycle:
        lifecycle: BETA
      x-okta-iam-admin-roles:
        - ACCESS_REQUESTS_ADMIN
      tags:
        - Tasks
      operationId: getTaskV2
      summary: Retrieve a task
      description: |
        Retrieves all the details of a specific task.

        Use this operation to retrieve a task from access requests managed by access request conditions. More information is returned than the shortened task details in the [List all tasks](/iga/openapi/governance-production-requests-admin-v2-reference/tasks/listalltasksv2) operation.
      parameters:
        - $ref: '#/components/parameters/task-id-parameter'
      security:
        - ApiKey:
            - admin
        - OAuth2:
            - okta.accessRequests.tasks.read
      responses:
        '200':
          $ref: '#/components/responses/task-get-success'
        '401':
          $ref: '#/components/responses/authentication-error-response'
        '403':
          $ref: '#/components/responses/authorization-error-response'
        '404':
          $ref: '#/components/responses/resource-not-found-response'
        '429':
          $ref: '#/components/responses/rate-limit-exceeded-response'
        '500':
          $ref: '#/components/responses/unexpected-error-response'
    patch:
      x-okta-lifecycle:
        lifecycle: BETA
      x-okta-iam-admin-roles:
        - ACCESS_REQUESTS_ADMIN
      tags:
        - Tasks
      operationId: updateTaskV2
      summary: Update a task
      description: |
        Updates a task by performing actions such as assigning the task to a new set of task assignees.

        When task assignment is made via this endpoint, the task will be unassigned from any previous task assignees and assigned to the new set of task assignees.
      parameters:
        - $ref: '#/components/parameters/task-id-parameter'
      security:
        - ApiKey:
            - admin
        - OAuth2:
            - okta.accessRequests.tasks.manage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                assignees:
                  type: array
                  minItems: 1
                  items:
                    $ref: '#/components/schemas/task-assignees'
      responses:
        '200':
          $ref: '#/components/responses/task-update-success'
        '400':
          $ref: '#/components/responses/task-update-failed'
        '401':
          $ref: '#/components/responses/authentication-error-response'
        '429':
          $ref: '#/components/responses/rate-limit-exceeded-response'
        '500':
          $ref: '#/components/responses/unexpected-error-response'
  /governance/api/v2/tasks/{taskId}/resolve:
    post:
      x-okta-lifecycle:
        lifecycle: BETA
      x-okta-iam-admin-roles:
        - ACCESS_REQUESTS_ADMIN
      tags:
        - Tasks
      operationId: resolveTaskV2
      summary: Resolve a task
      description: |
        Resolves a task for an assignee by providing the value of the task resolution
      parameters:
        - $ref: '#/components/parameters/task-id-parameter'
      security:
        - ApiKey:
            - admin
        - OAuth2:
            - okta.accessRequests.tasks.manage
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                value:
                  type: string
                  description: |
                    The value of the task resolution. Required for `APPROVAL` and `QUESTION` type tasks.
                      * For `APPROVAL` type tasks, the only supported values are `APPROVED` or `DENIED`.
                      * For `QUESTION` type tasks, the value is the answer to the question, and can be any string.
                      * For custom `TODO` type tasks, a value string isn't required.
      responses:
        '200':
          $ref: '#/components/responses/task-resolve-success'
        '400':
          $ref: '#/components/responses/task-resolve-failed'
        '401':
          $ref: '#/components/responses/authentication-error-response'
        '429':
          $ref: '#/components/responses/rate-limit-exceeded-response'
        '500':
          $ref: '#/components/responses/unexpected-error-response'
