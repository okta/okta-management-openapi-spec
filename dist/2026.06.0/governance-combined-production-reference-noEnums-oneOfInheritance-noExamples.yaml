          operators:
            - eq
          schema:
            $ref: '#/components/schemas/okta-id'
        principalId:
          operators:
            - eq
          schema:
            $ref: '#/components/schemas/okta-id'
      examples:
        FilterByUserAndResource:
          summary: Filter by a principal user and an app resource
          value: resource.externalId eq "0oafxqCAJWWGELFTYASJ" AND resource.type eq "APPLICATION" AND principal.externalId eq "00ub0oNGTSWTBKOLGLNR" AND principal.type eq "OKTA_USER"
