          description: Unique identifier for the object
          type: string
          minLength: 1
        name:
          type: string
          nullable: true
          description: Name of the resource risk rule
          maxLength: 255
          minLength: 1
        notes:
          type: string
          nullable: true
          description: Additional information about the rule
          maxLength: 1000
        description:
          type: string
          nullable: true
          description: Description of the risk rule
          maxLength: 1000
        conflictCriteria:
          $ref: '#/components/schemas/conflict-criteria-updatable'
