          type: object
          properties:
            id:
              $ref: '#/components/schemas/AccessReportTargetID'
            resource_type_filter:
              $ref: '#/components/schemas/AccessReportTargetResourceType'
    AccessRequestCreateRequest:
      type: object
      properties:
        identity:
          type: string
          description: The name of the server account in the access request. Set this parameter if `resource_type` is `server_account_password_login`.
        project_id:
          description: The UUID of the project
          type: string
        request_type_id:
          description: Request type ID
          type: string
        resource_group_id:
          description: The UUID of a resource group
          type: string
        resource_id:
          type: string
          description: The resource ID that's set from the security policy rule. For servers, `resource_id` is the server account ID. For secrets, `resource_id` is the ID from the closest policy for a secret.
        resource_type:
          description: Type of the resource access request is created for
          type: string
          enum:
            - server
            - server_account_password_login
            - secret
            - service_account
            - active_directory_account
        rule_ids:
          description: A list of rule IDs
          type: array
          items:
            type: string
      required:
        - resource_type
        - resource_id
    AccessRequestCreateResponse:
      type: object
      properties:
        access_request_id:
          description: The UUID of the access request
          type: string
    AccountPasswordChangeDetails:
      description: Common struct that contains all password change metadata fields including number of rotations and rotation reason
      type: object
      properties:
        last_password_change_error_metadata:
          description: The error message metadata reported during the most recent failure to change the account password
          type: string
        last_password_change_error_report_timestamp:
          description: A timestamp indicating when the remote system last reported a failure to change to the account password
          type: string
          format: date-time
        last_password_change_error_system_timestamp:
          description: A timestamp reported from the remote system indicating when the remote system last failed to change the account password
          type: string
          format: date-time
        last_password_change_error_type:
          description: The type of error message reported during the most recent failure to change the account password
          type: string
        last_password_change_success_report_timestamp:
          description: A timestamp indicating when OPA last reported a change to the account password
          type: string
          format: date-time
        last_password_change_system_timestamp:
          description: A timestamp reported from the remote system indicating when the remote system last changed the account password
          type: string
          format: date-time
        password_change_error_count:
          description: The number of times an account's password change resulted in failure
          type: integer
          format: int32
        password_change_error_count_since_last_success:
          description: The number of times an account's password change failed after the last successful attempt
          type: integer
          format: int32
        password_change_success_count:
          description: The number of times an account's password was successfully changed
          type: integer
          format: int32
    AccountSelectorMode:
      description: Controls how accounts are selected
      type: string
      enum:
        - ALL
        - EXCLUDE
        - INCLUDE
      x-enumDescriptions:
        ALL: Select all accounts
        INCLUDE: Only select accounts in the relevant include list
        EXCLUDE: Only select accounts in the relevant exclude list
    AccountSetting:
