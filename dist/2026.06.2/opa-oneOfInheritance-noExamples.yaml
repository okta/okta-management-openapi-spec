    ActiveDirectoryAccountMatchRequest:
      description: |-
        Details about how the resource administrator would like to update the match between an Active Directory account
        and an Okta Privileged Access user
      type: object
      properties:
        force_no_match:
          type: boolean
          description: |-
            If true, don't match an OPA user to this Active Directory account. If
            `match_override_user_id` is set, this property must be unset or false.
        match_override_user_id:
          type: string
          description: |-
            The resource admin OPA user ID that you want to match to the specified AD account.
            If this property is null, empty, or unset, any existing override on the AD account is removed. You can only set one of
            `match_override_user_id` or `force_no_match`.
    ActiveDirectoryAccountMatchResponse:
      description: Details about the mapping between an Active Directory account and an Okta Privileged Access user
      type: object
      properties:
        ad_account_id:
          description: The UUID of the Active Directory account
          allOf:
            - $ref: '#/components/schemas/UUID'
          readOnly: true
        force_no_match:
          type: boolean
          description: |-
            If true, a resource admin has configured this AD account to not match with any
            OPA user. This overrides any automatic match from an AD account rule. Only
            one of `match_override_user_id` or `force_no_match` can be set.
        match_override_user_id:
          type: string
          description: |-
            The OPA user ID to match this AD account that's specified by a resource admin, overriding the automatic match.
            If set, this takes precedence over the
            `rule_match_user_id`. You can only set one of `match_override_user_id` or `force_no_match`.
          readOnly: true
        rule_match_user_id:
          type: string
          description: |-
            The OPA user ID that's automatically matched to this AD
