        - name: alt_names_contains
          description: Only return servers that contain the specified alternate name
          in: query
          schema:
            type: string
        - name: bastion
          description: Only return servers associated with the specified bastion
          in: query
          schema:
            type: string
        - name: canonical_name
          description: A canonical name
          in: query
          schema:
            type: string
        - name: cloud_account
          description: Only return servers associated with the specified cloud account
          in: query
          schema:
            type: string
        - name: cloud_provider
          description: 'Only return servers associated with the specified cloud provider. Possible values: `aws` or `gce`.'
          in: query
          schema:
            type: string
        - $ref: '#/components/parameters/count'
        - name: credentialed
          description: If `true`, only return unmanaged servers with credential issuance enabled. If `false`, only return unmanaged servers with credential issuance disabled.
          in: query
          schema:
            type: boolean
        - $ref: '#/components/parameters/descending'
        - name: hostname
          description: Only return servers that contain the specified hostname
          in: query
          schema:
            type: string
        - name: id
          description: Only return servers with the specified IDs. Only usable for PAM administrative views of servers, not end-user server views.
          explode: true
          in: query
          schema:
            type: string
        - name: instance_id
          description: Only return servers that contain the specified instance ID
          explode: true
          in: query
          schema:
            type: string
        - name: managed
          description: If `true`, only return managed servers. If `false`, only return unmanaged servers.
          in: query
          schema:
            type: boolean
        - $ref: '#/components/parameters/offset'
        - $ref: '#/components/parameters/prev'
        - name: project_name
          description: Only return servers that belong to the specified project
          explode: true
          in: query
          schema:
            type: string
        - name: state
          description: 'Include servers with the specified state. Valid statuses: `ACTIVE` or `INACTIVE`.'
          in: query
          schema:
            type: string
        - name: selector
          description: Only return servers that contain the specified server selectors.
          example: selector=key1=value1,key2=value2
          in: query
          schema:
            type: string
        - name: include_labels
          description: If `true`, includes server labels in the results.
          example: true
          in: query
          schema:
            type: boolean
