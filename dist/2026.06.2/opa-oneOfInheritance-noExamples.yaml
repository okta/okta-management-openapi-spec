    RawJSONWebKey:
      description: A JSON Web Key formatted in accordance with [RFC 7517](https://datatracker.ietf.org/doc/html/rfc7517).
      type: object
      properties:
        alg:
          $ref: '#/components/schemas/alg'
        crv:
          $ref: '#/components/schemas/curve'
        d:
          description: The exponent of the private key
          type: string
          format: byte
        dp:
          description: The first factor CRT exponent of the private key
          type: string
          format: byte
        dq:
          description: The second factor CRT exponent of the private key
          type: string
          format: byte
        e:
          description: The exponent of the public key
          type: string
          format: byte
        k:
          description: The key
          type: string
          format: byte
        kid:
          description: The key ID
          format: regex
          pattern: ^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-5][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}$
          type: string
        kty:
          $ref: '#/components/schemas/kty'
        'n':
          description: The modulus of the public key
          type: string
          format: byte
        p:
          description: The first prime factor of the private key
          type: string
          format: byte
        q:
          description: The second prime factor of the private key
          type: string
          format: byte
        qi:
          description: The first CRT coefficient of the private key
          type: string
          format: byte
        use:
          description: The intended use of the key
          type: string
        x:
          description: The x coordinate of the key
          type: string
          format: byte
        x5c:
          description: A list of X.509 certificates
          items:
            type: string
          type: array
        x5t:
          description: The SHA-1 thumbprint of the X.509 certificate
          type: string
        x5t#S256:
          description: The SHA-256 thumbprint of the X.509 certificate
          type: string
        x5u:
          description: The URL of the X.509 certificates
          type: string
        'y':
          description: The y coordinate of the key
          type: string
          format: byte
    ReorderActiveDirectoryAccountRuleRequest:
