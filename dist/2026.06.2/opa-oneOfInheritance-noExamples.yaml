          description: If `true`, indicates that the security policy is active
          type: boolean
        description:
          description: The description of the security policy
          type: string
        id:
          description: The UUID of the security policy
          type: string
          readOnly: true
        name:
          description: The name of the security policy
          type: string
          example: Prod Servers - EU West
        principals:
          description: The user groups and workload roles associated with the security policy. The combined total of user groups and workload roles can't exceed 40 items.
          type: object
          properties:
            user_groups:
              type: array
              maxItems: 40
              description: The user groups associated with the security policy. Each user group is defined in a separate object.
              items:
                $ref: '#/components/schemas/NamedObject'
              example:
                - id: 6c88b11b-b4ad-436b-a69a-c11dy08q7155
                  name: OPAUserGroup
                  type: user_group
            workload_roles:
              type: array
              maxItems: 40
              description: The workload roles associated with the security policy. Each workload role is defined in a separate object.
              items:
                $ref: '#/components/schemas/NamedObject'
              example:
                - id: 5f6a4b8f-344f-472e-aeca-9035a81ae61c
                  name: deployment_workload
                  type: workload_role
        resource_group:
          allOf:
            - $ref: '#/components/schemas/NamedObject'
          description: The resource group that this security policy applies to. This property is required when the user who creates the security policy is a delegated security admin.
        rules:
          description: The rules associated with the security policy. A security policy can set multiple rules that define privileges available for matching resources.
          type: array
          maxItems: 30
          items:
            $ref: '#/components/schemas/SecurityPolicyRule'
        type:
          $ref: '#/components/schemas/SecurityPolicyType'
      required:
