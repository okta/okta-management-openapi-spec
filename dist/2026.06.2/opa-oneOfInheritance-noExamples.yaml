          format: regex
          pattern: ^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-5][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}$
          readOnly: true
          type: string
        labels:
          additionalProperties:
            type: string
          description: 'The labels for this server. Used by the PolicySync feature, see [PolicySync: Attribute-Based Access Control](https://help.okta.com/okta_help.htm?type=asa&id=ext-asa-policysync).'
          type: object
        last_seen:
          description: A timestamp indicating when the server was last seen
          format: date-time
          readOnly: true
          type: string
        managed:
          description: If `true`, the server is managed by the OPA server agent (`sftd`)
          readOnly: true
          type: boolean
        os:
          description: The OS version of the server, such as CentOS 6 or Debian 9.13
          maxLength: 255
          minLength: 1
          readOnly: true
          type: string
        os_type:
          description: 'The OS family of the server. Possible values: `linux` or `windows`.'
          maxLength: 255
          minLength: 1
          readOnly: true
          type: string
        project_id:
          description: The UUID of the project where the server is enrolled
          pattern: ^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-5][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}$
          readOnly: true
          type: string
        project_name:
          description: The name of the project where the server is enrolled
          maxLength: 255
          minLength: 1
          readOnly: true
          type: string
        registered_at:
          description: The timestamp when the server was enrolled in the project
          format: date-time
          readOnly: true
          type: string
        services:
          description: 'The service that clients use to connect to the server. Possible values: `ssh` or `rdp`.'
          items:
            maxLength: 64
            minLength: 1
            type: string
          readOnly: true
          type: array
        sftd_version:
          description: The OPA server agent (`sftd`) version on the server
          maxLength: 255
          minLength: 1
          readOnly: true
          type: string
        ssh_host_keys:
          description: The host keys used to authenticate the server
          items:
            maxLength: 2147483647
            minLength: 1
            type: string
          readOnly: true
          type: array
        state:
          description: 'The state of the server. Possible values: `ACTIVE` or `INACTIVE`.'
          maxLength: 255
          minLength: 1
          readOnly: true
          type: string
        team_name:
          description: The name of the associated team
          format: regex
          maxLength: 255
          minLength: 1
          pattern: ^[\w\-_.]+$
          readOnly: true
          type: string
      required:
        - team_name
        - id
        - project_name
        - hostname
        - alt_names
        - bastion
        - canonical_name
        - access_address
        - os
        - os_type
        - services
        - registered_at
        - last_seen
        - sftd_version
        - ssh_host_keys
        - state
        - managed
        - deleted_at
        - labels
