      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SudoCommandBundle'
            example:
              name: create_directories
              description: can be empty
              structured_commands:
                - command_type: executable
                  command: /bin/mkdir
                  args_type: any
              no_passwd: true
              no_exec: false
              set_env: false
              add_env: null
              sub_env: null
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SudoCommandBundle'
              example:
