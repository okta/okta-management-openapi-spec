          type: string
          format: date-time
          readOnly: true
          example: '2022-08-25T00:00:00Z'
        created_by:
          description: The username of the user who created the sudo command bundle
          type: string
          readOnly: true
        description:
          description: A description of the sudo command bundle
          maxLength: 255
          minLength: 1
          type: string
        id:
          description: The UUID of the sudo command bundle
          format: regex
          pattern: ^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-5][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}$
          readOnly: true
          type: string
        name:
          description: The name of the sudo command bundle. This controls the ordering of all bundles within your team. See [Sudo Command Bundle](https://help.okta.com/oie/en-us/okta_help.htm#cshid=csh-pam-sudo-commands).
          format: regex
          maxLength: 255
          minLength: 1
          pattern: ^[\w\-_.]+$
          type: string
        no_exec:
          description: Whether to allow commands to execute child processes
          nullable: true
          type: boolean
        no_passwd:
          description: Whether to require a password when sudo is run. This should generally not be used as users don't require a password.
          nullable: true
          type: boolean
          default: true
        run_as:
          description: A non-root user account used to run the command
          format: regex
          maxLength: 64
          minLength: 1
          nullable: true
          pattern: ^([%]{0,1})((([#])(\d+))|([\w\-_.]+)|((?i)[A-Z0-9._%+-^]+@[A-Z0-9.-]+\.[A-Z]{2,}))$
          type: string
        set_env:
          description: Whether to allow overriding environment variables to commands
          nullable: true
          type: boolean
        structured_commands:
          description: A list of commands to allow
          minItems: 0
          maxItems: 64
          items:
            type: object
            properties:
              args:
                type: string
                description: The args are only allowed for 'executable' command type
              args_type:
                $ref: '#/components/schemas/args_type'
              command_type:
                $ref: '#/components/schemas/command_type'
              command:
                type: string
              rendered_command:
                maxLength: 1024
                readOnly: true
                type: string
            required:
              - command
              - command_type
          nullable: true
          type: array
        sub_env:
          description: A list of environment variables to ignore when running the commands. See the [sudo documentation](https://www.sudo.ws/man/1.8.13/sudoers.man.html#Command_environment).
          items:
            format: regex
            maxLength: 128
            minLength: 1
            pattern: ^[\w]+$
            type: string
          maxItems: 32
          nullable: true
          type: array
        updated_at:
          description: A timestamp indicating when the sudo command bundle was last updated
          type: string
          format: date-time
          readOnly: true
          example: '2022-08-25T00:00:00Z'
        updated_by:
          description: The username of the user who last updated the sudo command bundle
          type: string
          readOnly: true
      required:
        - name
