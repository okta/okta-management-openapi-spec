      type: object
      properties:
        _type:
          type: string
          readOnly: true
          enum:
            - none
    SecurityPolicyPasswordCheckoutRDPPrivilege:
      description: |-
        `SecurityPolicyPasswordCheckoutRDPPrivilege` indicates that the principal will be allowed to check out passwords
        for RDPing to servers for accounts specified through `ServerBasedResourceSelector`
      allOf:
        - $ref: '#/components/schemas/SecurityPolicyPrivilege'
        - type: object
          properties:
            admin_level_permissions:
              x-okta-lifecycle:
                lifecycle: GA
                isGenerallyAvailable: false
                SKUs: []
              type: boolean
              description: |
                If enabled, AD accounts are added to the local administrators group when you connect using RDP to the target server
            password_checkout_rdp:
              type: boolean
            remote_access_permissions:
              x-okta-lifecycle:
                lifecycle: GA
                isGenerallyAvailable: false
                SKUs: []
              type: boolean
              description: |
                If enabled, AD accounts are added to the remote desktop group when you connect using RDP to the target server
          required:
            - password_checkout_rdp
    SecurityPolicyPasswordCheckoutSSHPrivilege:
      description: |
        `SecurityPolicyPasswordCheckoutSSHPrivilege` indicates that the principal has the ability to check out vaulted passwords to sign in with SSH to servers for accounts specified through `ServerBasedResourceSelector`
      allOf:
        - $ref: '#/components/schemas/SecurityPolicyPrivilege'
        - type: object
          properties:
            password_checkout_ssh:
              type: boolean
          required:
            - password_checkout_ssh
    SecurityPolicyPrincipalAccountRDPPrivilege:
      description: |
        `SecurityPolicyPrincipalAccountRDPPrivilege` indicates that the principal has the ability to RDP as the principal user on the specified targets. The principal account is the account that is created and managed by the server agent.
      allOf:
        - $ref: '#/components/schemas/SecurityPolicyPrivilege'
        - type: object
          properties:
            admin_level_permissions:
              description: |
                If enabled, the user can run any command as root using Sudo
              type: boolean
            principal_account_rdp:
              x-go-name: PrivilegePrincipalAccountRDP
              type: boolean
          required:
            - principal_account_rdp
    SecurityPolicyPrincipalAccountSSHPrivilege:
      description: |
        `SecurityPolicyPrincipalAccountSSHPrivilege` indicates that the principal has the ability to SSH as the principal user on the specified targets. The principal account is the account that is created and managed by the server agent.
      allOf:
        - $ref: '#/components/schemas/SecurityPolicyPrivilege'
        - type: object
          properties:
            admin_level_permissions:
              type: boolean
            principal_account_ssh:
              x-go-name: PrivilegePrincipalAccountSSH
              type: boolean
            sudo_command_bundles:
              items:
                $ref: '#/components/schemas/NamedObject'
              type: array
              minItems: 0
              maxItems: 10
            sudo_display_name:
              type: string
              minLength: 1
              maxLength: 64
              pattern: ^[a-zA-Z0-9-_. ]+$
          required:
            - principal_account_ssh
    SecurityPolicyPrivilege:
      type: object
