  schemas:
    ADAccountSyncStatus:
      description: The AD account sync status
      type: string
      enum:
        - NOT_SYNCED
        - SYNC_COMPLETED
        - SYNC_FAILED
        - SYNC_IN_PROGRESS
      x-enumDescriptions:
        NOT_SYNCED: Indicates that there is no sync of AD accounts in progress
        SYNC_IN_PROGRESS: Indicates that there is a sync of AD accounts in progress
        SYNC_FAILED: Indicates that a sync of AD accounts has failed
        SYNC_COMPLETED: Indicates that a sync of AD accounts has successfully completed
    ADConnectionStatus:
      description: All possible statuses of a connection.
      type: string
      enum:
        - connected
        - disconnected
        - inactive
      x-enumDescriptions:
        connected: Indicates that the connection is in use and can be used to define account assignment rules
        disconnected: Indicates that the connection is not in use and cannot be used to define account assignment rules
        inactive: Indicates that the connection is deactivated in the Okta Admin Console. Regardless of its previous connection state within OPA, it remains `inactive` as per the source system.
    APIServiceAccountCheckoutSettings:
      type: object
      properties:
        checkout_duration_in_seconds:
          description: The duration in seconds for the checkout. If the checkout is enabled, the duration is the maximum time a user can access the resource before the checkout expires.
          type: integer
          maximum: 604800
          minimum: 900
          format: int32
        checkout_required:
          description: Indicates whether a checkout is mandatory for accessing resources within the project. If `true`, checkout is enforced by default for all applicable resources. If `false`, checkout isn't required, and resources are accessible without it.
          type: boolean
        exclude_list:
          description: If provided, only the account identifiers listed are excluded from the checkout requirement. This list is only considered if `checkout_required` is set to `true`. Only one of `include_list` and `exclude_list` can be specified in a request since they are mutually exclusive.
          type: array
          items:
            $ref: '#/components/schemas/ServiceAccountSettingNameObject'
        include_list:
          description: If provided, only the account identifiers listed are required to perform a checkout to access the resource. This list is only considered if `checkout_required` is set to `true`. Only one of `include_list` and `exclude_list` can be specified in a request since they are mutually exclusive.
          type: array
          items:
            $ref: '#/components/schemas/ServiceAccountSettingNameObject'
      required:
        - checkout_required
        - checkout_duration_in_seconds
    AccessCredentialType:
      description: The type of credential used to access the resource
      type: string
      enum:
        - encrypted-ad-rdp-password
        - encrypted-ad-rdp-password-with-admin
        - encrypted-ad-rdp-password-with-remote-access
        - encrypted-ad-ssh-password
        - encrypted-rdp-password
        - encrypted-ssh-password
        - managed
        - password
        - rdp-broker-certificate
        - rdp-broker-certificate-admin
        - ssh-certificate
        - ssh-certificate-admin
        - ssh-certificate-sudo
    AccessReport:
      type: object
      properties:
        created_at:
          description: A timestamp indicating when the access report was created
          type: string
          format: date-time
          readOnly: true
          example: '2023-08-25T12:00:00.000000Z'
        details:
          oneOf:
            - $ref: '#/components/schemas/AccessReportTargetUser'
            - $ref: '#/components/schemas/AccessReportTargetResource'
        id:
          $ref: '#/components/schemas/AccessReportID'
        status:
          $ref: '#/components/schemas/AccessReportJobStatus'
        updated_at:
          description: A timestamp indicating when the access report was last updated
          type: string
          format: date-time
          readOnly: true
          example: '2023-08-25T12:00:00.000000Z'
    AccessReportCreateTarget:
      oneOf:
        - $ref: '#/components/schemas/AccessReportTargetUser'
        - $ref: '#/components/schemas/AccessReportTargetResource'
      type: object
    AccessReportID:
      description: The UUID of an access report
      format: regex
      example: 5fdf5ae9-e71b-423e-8a87-c2ebffe407f6
      type: string
      pattern: ^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-5][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}$
      readOnly: true
    AccessReportJobStatus:
      description: The status of the job
      type: string
      enum:
        - COMPLETED
        - COMPLETED_BUT_EMPTY
        - CREATED
        - ERROR
        - IN PROGRESS
      readOnly: true
    AccessReportTargetID:
      description: The UUID of an existing Okta Privileged Access user or resource
      format: regex
      example: 5fdf5ae9-e4db-4aae-8127-c2ebffe747f6
      type: string
      pattern: ^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-5][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}$
    AccessReportTargetResource:
      title: Resource
      properties:
        resource:
          type: object
          properties:
            id:
              $ref: '#/components/schemas/AccessReportTargetID'
            resource_type:
              $ref: '#/components/schemas/AccessReportTargetResourceType'
    AccessReportTargetResourceType:
      description: The type of resource associated with the access report
      type: string
      enum:
        - server
    AccessReportTargetUser:
