            last_name:
              description: The last name of this Active Directory user
              type: string
            email:
              description: The email of this Active Directory user
              type: string
            display_name:
              description: The display name of this Active Directory user
              type: string
            sam_account_name:
              description: The `sAMAccountName` field for this Active Directory account
              type: string
            brought_under_management_at:
              description: Timestamp when the Active Directory account was managed by Okta Privileged Access
              type: string
              format: date-time
