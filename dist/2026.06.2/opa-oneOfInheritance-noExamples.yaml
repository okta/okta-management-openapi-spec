          maximum: 65535
          minimum: 100
          nullable: true
          type: integer
          format: int32
        next_unix_uid:
          description: The UID used when creating a server user
          maximum: 65535
          minimum: 100
          nullable: true
          type: integer
          format: int32
        persistent_server_user_accounts:
          description: If `true`, creates persistent user accounts and home folders on servers in this project for every user on your team. By default, on-demand accounts are only created when a user accesses a server.
          nullable: true
          default: null
          type: boolean
        require_preauth_for_creds:
          description: If `true`, the project requires preauthorization before a user can access a server. Default is `false`.
          nullable: true
          type: boolean
        resource_group_id:
          type: string
          description: The UUID of the resource group where the project is located
          example: 5f3159e9-e7ab-428e-8a87-c2ebffe407f6
        server_account_management:
          description: Whether to manage existing local accounts on the server
          type: boolean
        shared_admin_user_name:
          description: The shared username to use for root accounts
          type: string
          example: Server.Admin
        shared_standard_user_name:
          description: The shared username to use for non-root accounts
          type: string
          example: Server.User
        ssh_certificate_type:
          $ref: '#/components/schemas/SSHCertificateType'
        stale_resource_count:
          type: integer
          format: int32
          description: The number of stale resources within this project
