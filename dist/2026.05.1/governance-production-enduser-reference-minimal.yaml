        It holds the criteria for which campaign review items to target and the decision to apply to those items.
        The reviewer level and note are optional fields that can provide additional context for the bulk decision.
        The reviewer level comes into picture, when multi level campaign is in the picture.
      required:
        - criteria
        - reviewDecision
      properties:
        criteria:
          $ref: '#/components/schemas/bulk-review-submission-criteria-mutable'
        reviewDecision:
          $ref: '#/components/schemas/bulk-review-decision'
        reviewerLevel:
          $ref: '#/components/schemas/reviewer-level-type'
        notes:
          type: string
          description: The reviewer's note to include with the bulk decision. This note is added to all reviews that match the bulk-review criteria.
          minLength: 1
          maxLength: 300
    bulk-review-decision-status-type:
