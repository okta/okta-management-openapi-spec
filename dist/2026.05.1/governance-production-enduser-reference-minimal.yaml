      description: ID of the agent
      schema:
        type: string
        example: wlpkhjm0jnDp8RrUu0g4
    job-id:
      name: jobId
      description: Unique identifier for the job
      in: path
      required: true
      schema:
        type: string
    campaign-reviews-filter:
      name: filter
      description: |
        Apply various filters by using supported review filtering properties.

        **Note:** Query parameter percent encoding is required. See [Percent-encoding](https://developer.mozilla.org/en-US/docs/Glossary/Percent-encoding)

        Supported filters are:

        - `id`: string
        - `principalId`: string
        - `reviewerId`: string
        - `decision`: string (APPROVE, REVOKE, UNREVIEWED)
        - `resourceId`: string (`GroupId` or `AppId`)
        - `reviewerType`: string (`USER` or `GROUP` or `RESOURCE_OWNER`)
        - `reviewerLevel`: string (`FIRST` or `SECOND`)
        - `entitlementValueId`: string
        - `entitlementBundleId`: string
        - `govAnalyzerRecommendationContext.recommendedReviewDecision`: string (APPROVE, REVOKE, UNREVIEWED)
        - `govAnalyzerRecommendationContext.bulkReviewDecisionJobId`: string
      in: query
      required: false
      schema:
        type: string
      examples:
        FilterByReviewDecision:
          summary: Filter by review decisions
          value: decision eq "UNREVIEWED"
        FilterByReviewerId:
          summary: Filter by reviewerId
          value: reviewerId eq "00u5v5viPvg84h0W68g4"
        FilterByGroupResourceId:
          summary: Filter by group resourceId
          value: resourceId eq "00gyqjxNrsh764hjs784"
        FilterByAppResourceId:
          summary: Filter by app resourceId
          value: resourceId eq "00ayqjxNrZD11n4w40g3"
        FilterByPrincipalId:
          summary: Filter by principalId
          value: principalId eq "00u5v5viPvg84h0W68g4"
        FilterByReviewerType:
          summary: Filter by reviewerType
          value: reviewerType eq USER
        FilterByReviewerLevel:
          summary: Filter by reviewerLevel
          value: reviewerLevel eq FIRST
        FilterByEntitlementId:
          summary: Filter by entitlement value ID
          value: entitlementValueId eq "enthzzPJAXvaYQ71T0g3"
        FilterByEntitlementType:
          summary: Filter by entitlement bundle ID
          value: entitlementBundleId eq "enbisi7xt3iBd39Bn0g3"
        FilterByRecommendedReviewDecision:
          summary: Filter by entitlement bundle ID
          value: govAnalyzerRecommendationContext.recommendedReviewDecision eq "APPROVE"
        FilterByBulkReviewDecisionJobId:
          summary: Filter by entitlement bundle ID
          value: govAnalyzerRecommendationContext.bulkReviewDecisionJobId eq "aae3l2XZ300xRq1rV0g3"
        FilterByAppServiceAccountId:
          summary: Filter by SaaS app service account ID
          value: appServiceAccountId eq "00saqjxNrZD11n4w40g3"
        FilterByOktaServiceAccountId:
          summary: Filter by Okta service account ID
          value: oktaServiceAccountId eq "00sa5v5viPvg84h0W68g4"
    my-reviews-order-by:
      name: orderBy
      description: |
        Specifies a property to sort the results. The following properties are supported:
        - `decided`
        - `decision`
        - `remediationStatus`
        - `created`

        Append `desc` or `asc` to indicate the sorting direction.

        > **Note:** Query parameter percent encoding is required. See [Percent-encoding](https://developer.mozilla.org/en-US/docs/Glossary/Percent-encoding).
      in: query
      required: false
      style: form
      explode: false
      schema:
        type: array
        uniqueItems: false
        minItems: 1
        maxItems: 1
        items:
          type: string
          description: A property from the collection, optionally followed by an ` asc` or ` desc` suffix.
      examples:
        OrderByDecided:
          summary: Order by decided
          value: decided desc
        OrderByDecision:
          summary: Order by decision
          value: decision desc
        OrderByRemediationStatus:
          summary: Order by remediationStatus
          value: remediationStatus desc
        OrderByCreated:
          summary: Order by created
          value: created desc
  schemas:
    catalog-entry-id:
      type: string
      maxLength: 20
      minLength: 20
      description: Unique identifier of the resource catalog entry
      example: cenp2rjyxK1Js2Fc41d5
    rcar-entry-requestable:
      type: boolean
      nullable: false
      description: Is the resource requestable
    rcar-entry-counts:
      type: object
      description: Entry count metadata
      properties:
        resourceCounts:
          type: object
          description: Collection resource counts
          properties:
            applications:
              type: integer
              description: Number of app resources in a collection
              minimum: 0
              example: 3
    link:
      type: object
      x-okta-ignore-redocly-rules-for-sdk: true
      description: A link to a related RESTful resource
      required:
        - href
      properties:
        name:
          type: string
          description: Link name
        rel:
          type: string
          description: Link relation
        href:
          type: string
          minLength: 1
          description: Link URI
        type:
          type: string
          description: The media type of the link. If omitted, it's implicitly `application/json`.
        method:
          type: string
          deprecated: true
        templated:
          type: boolean
          description: Indicates whether the link object's `href` property is a URI template
        hints:
          type: object
          description: Link hints
          additionalProperties:
            type: array
            items:
              type: string
        title:
          type: string
          description: Link title or label
    rcar-entry-links:
      type: object
      description: |-
        Links available for a resource catalog entry.
        * `createRequest`: returns the link to create the request only if the entry is requestable
        * `parent`: returns the parent entry only if a parent exists
        * `submittedRequest`: returns the submitted request only if the authenticated user has a submitted request for the entry and it's not available for approval
        * `pendingRequest`: returns the pending request only if the authenticated user has a submitted request for the entry and the request is available for approval
        * `relatedEntity`: returns the resource that's requested
      required:
        - self
      properties:
        self:
          $ref: '#/components/schemas/link'
        logo:
          type: array
          description: Links to the catalog entry logo resources
          minItems: 0
          maxItems: 3
          items:
            $ref: '#/components/schemas/link'
        parent:
          $ref: '#/components/schemas/link'
        createRequest:
          $ref: '#/components/schemas/link'
        submittedRequest:
          $ref: '#/components/schemas/link'
        pendingRequest:
          $ref: '#/components/schemas/link'
        relatedEntity:
          $ref: '#/components/schemas/link'
    rcar-entry:
      type: object
      x-okta-ignore-redocly-rules-for-sdk: true
      description: Full representaion of a access request catalog entry
      properties:
        id:
          description: Unique identifier for the entry
          type: string
          minLength: 1
        name:
          type: string
          nullable: false
          description: Name of the entry
          maxLength: 255
          minLength: 1
        description:
          type: string
          description: Description of the entry
          maxLength: 2000
        label:
          type: string
          description: Label of the entry. Currently either `Application` or `Resource Collection`
        parent:
          type: string
          nullable: false
          description: Parent of the entry
        requestable:
          $ref: '#/components/schemas/rcar-entry-requestable'
        counts:
          $ref: '#/components/schemas/rcar-entry-counts'
        _links:
          $ref: '#/components/schemas/rcar-entry-links'
      required:
        - id
        - name
        - requestable
        - _links
    rcar-entries-links:
      type: object
      description: |-
        Links available for the list of catalog entries.
        * `atspoke`: returned only for top level entries and if request types is supported
        * `match`: returned only if match is supported
      required:
        - self
      properties:
        self:
          $ref: '#/components/schemas/link'
        next:
          $ref: '#/components/schemas/link'
        atspoke:
          $ref: '#/components/schemas/link'
        match:
          $ref: '#/components/schemas/link'
    rcar-entries-list-v2:
      type: object
      properties:
        data:
          description: Catalog entries list
          type: array
          items:
            $ref: '#/components/schemas/rcar-entry'
        _links:
          $ref: '#/components/schemas/rcar-entries-links'
    error-cause:
      type: object
      x-okta-ignore-redocly-rules-for-sdk: true
      description: A specific cause of an error
      required:
        - errorSummary
      properties:
        errorSummary:
          type: string
          description: A more specific summary for the error that contains the error cause
        reason:
          type: string
          description: An enumerated value to represent the reason why the error occurred. This enumeration allows codes to adapt to different conditions in which an error code can occur.
        location:
          type: string
          description: A value that represents the key where the error cause occurred. This is used with `locationType` to give a holistic view of where the error cause occurred. For example, if `locationType` is `body`, `location` is `username`, and the `reason` was `UNIQUE_CONSTRAINT`, you can derive that the username was already taken.
        locationType:
          type: string
          description: A value that represents where the error cause occurred. For example, in the body or header of the request. This value isn't required for cases where the request is correct, but there was another reason why the error occurred (server-side state conflict, rate limit violation, and so on).
        domain:
          type: string
          description: A value that represents the domain of the service in which the error occurs. This value is used to isolate the error cause reason.
    error:
      type: object
      description: An Error object
      required:
        - errorCode
        - errorId
        - errorSummary
      properties:
