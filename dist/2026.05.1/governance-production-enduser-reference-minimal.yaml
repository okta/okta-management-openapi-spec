        type: string
    delegates-user-list-filter:
      name: filter
      description: |
        An optional filter expression that returns users based on the `firstName` or `lastName` properties.
        This [filter](https://developer.okta.com/docs/api/#filter) expression supports the `sw` [operator](https://developer.okta.com/docs/api/#operators).

        When omitted, the endpoint returns all eligible delegates for the current user.
        However, if the org's delegate scope settings are unrestricted (the `onlyFor` list is empty),
        the filter parameter is required and omitting it returns a 400 error.

        **Note:** Query parameter percent encoding is required. See [Special characters](https://developer.okta.com/docs/api/#special-characters).
      in: query
      required: false
      schema:
        type: string
        format: scim-filter
        example: firstName sw "John" OR lastName sw "John"
      x-scim-filter:
        firstName:
          operators:
            - sw
          type: String
        lastName:
          operators:
            - sw
          type: String
    campaign-id:
      name: campaignId
