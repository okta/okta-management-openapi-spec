components:
  securitySchemes:
    OAuth2:
      type: oauth2
      description: 'Pass the `access_token` as the value of the Authorization header: `Authorization: Bearer {access_token}`. See [Make a request](https://developer.okta.com/docs/guides/implement-oauth-for-okta-serviceapp/main/#make-a-request).'
      flows:
        authorizationCode:
          authorizationUrl: /oauth2/v1/authorize
          tokenUrl: /oauth2/v1/token
          scopes:
            okta.governance.accessCertifications.manage: Allows the app to create and manage Access Certification Campaigns
            okta.governance.accessCertifications.read: Allows the app to read information about Access Certification Campaigns and Reviews in your Okta org
            okta.governance.accessRequests.manage: Allows the app to create and manage V1 Access Requests, Request Types, and Teams
            okta.governance.accessRequests.read: Allows the app to read information about V1 Access Requests, Request Types, and Teams in your Okta org
            okta.governance.entitlements.read: Allows the app to read information about Entitlements, Entitlement bundles, and Grants
            okta.governance.entitlements.manage: Allows the app to create and manage Entitlements, Entitlement bundles, and Grants
            okta.accessRequests.catalog.read: Allows the app to read information about Access Request Catalogs in your Okta org
            okta.accessRequests.condition.manage: Allows the app to create and manage Conditions for the Access Request Resource Catalog
            okta.accessRequests.condition.read: Allows the app to read information about Conditions for the Access Request Resource Catalog
            okta.accessRequests.request.manage: Allows the app to create and manage V2 Access Requests through the Access Request Resource Catalog
            okta.accessRequests.request.read: Allows the app to read information about V2 Access Requests created through the Access Requests Resource Catalog
            okta.governance.collections.manage: Allows the app to create and manage collections
            okta.governance.collections.read: Allows the app to read information about collections in your Okta org
            okta.governance.operations.read: Allows the app to read information about asynchronous operations in your Okta org
            okta.governance.riskRule.manage: Allows the app to create and manage rules
            okta.governance.riskRule.read: Allows the app to read information about rules in your Okta org
            okta.governance.resourceOwner.manage: Allows the app to create and manage resource owners
            okta.governance.resourceOwner.read: Allows the app to read information about resource owners in your Okta org
            okta.governance.labels.manage: Allows the user to create and manage labels
            okta.governance.labels.read: Allows the user to read information about labels in your Okta org
            okta.governance.securityAccessReviews.admin.manage: Allows the admin app to create and manage security access reviews
            okta.governance.securityAccessReviews.admin.read: Allows the admin app to read information about security access reviews
            okta.governance.securityAccessReviews.endUser.manage: Allows the end-user app to create and manage security access reviews
            okta.governance.securityAccessReviews.endUser.read: Allows the end-user app to read information about security access reviews
            okta.governance.principalSettings.manage: Allows the app to create and manage governance settings for any user in your Okta org
            okta.governance.principalSettings.read: Allows the app to read information about governance settings for any user in your Okta org
            okta.governance.settings.manage: Allows the app to create and manage governance settings for your Okta org
            okta.governance.settings.read: Allows the app to read information about governance settings for your Okta org
            okta.governance.delegates.read: Allows the app to read information about delegates in your Okta org
            okta.governance.reviewer.read: Allows the end user to read information about access certification reviews assigned to them
            okta.governance.reviewer.manage: Allows the end user to manage access certification reviews assigned to them
            okta.accessRequests.tasks.manage: Allows the user to manage tasks for access requests in your Okta org
            okta.accessRequests.tasks.read: Allows the user to read information about tasks for access requests in your Okta org
  parameters:
    rcar-entries-list-filter-v2:
      name: filter
      description: |
        A required [filter](https://developer.okta.com/docs/api/#filter) expression that returns entries based on the [`parent`](https://developer.okta.com/docs/api/iga/openapi/governance.requests.admin.v2/tag/Catalogs/#tag/Catalogs/operation/listAllDefaultEntriesV2!c=200&path=data/parent&t=response) property:
        * This filter expression only supports the `parent` property and the `eq` and `pr` [operators](https://developer.okta.com/docs/api/#operators).
        * If you want the query to return child entries, then you must specify the `parent` ID with the `eq` operator.

        > **Notes:**
        > * If you don't use the `parent` property in the filter expression, undesireable results are returned.
        > * Query parameter percent encoding is required. See [Special characters]( https://developer.okta.com/docs/api/#special-characters ).
      in: query
      required: true
      schema:
        type: string
        format: scim-filter
        example: not(parent pr)
      x-scim-filter:
        parent:
          operators:
            - eq
          schema:
            $ref: '#/components/schemas/catalog-entry-id'
    rcar-entries-list-after:
      name: after
      description: |-
        The [pagination](https://developer.okta.com/docs/api/#pagination) cursor that points to the last record of the previous response.

        The maximum number of entries returned in a response is determined by the [`limit`](https://developer.okta.com/docs/api/iga/openapi/governance.requests.admin.v2/tag/Catalogs/#tag/Catalogs/operation/listAllDefaultEntriesV2!in=query&path=limit&t=request) query parameter.
        If there are more entries to return, the `_links.next.href` link contains the `after` cursor for the next page of results.
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/catalog-entry-id'
    rcar-entries-list-match:
      name: match
      description: Return catalog entries that match a substring value in the [`name`](https://developer.okta.com/docs/api/iga/openapi/governance.requests.enduser.v2/tag/My-Catalogs/#tag/My-Catalogs/operation/listMyDefaultEntriesV2!c=200&path=data/name&t=response) or [`description`](https://developer.okta.com/docs/api/iga/openapi/governance.requests.enduser.v2/tag/My-Catalogs/#tag/My-Catalogs/operation/listMyDefaultEntriesV2!c=200&path=data/description&t=response) properties. At least three characters are required for fuzzy search.
      in: query
      required: false
      schema:
        type: string
        minLength: 3
        maxLength: 50
        example: figma
    rcar-entries-list-limit:
      name: limit
      description: The maximum number of records returned in a response
      in: query
      required: false
      schema:
        type: integer
        maximum: 200
        minimum: 1
        example: 20
    catalog-entry-id:
      name: entryId
      description: Unique identifier for the catalog entry
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/catalog-entry-id'
    rcar-request-id-parameter:
      name: requestId
      description: Unique identifier for the Resource-Centric Access Requests (RCAR) request
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/rcar-request-id'
    entry-user-list-filter:
      name: filter
      description: |
        A required filter expression that returns users based on the `firstName` or `lastName` properties.
        This [filter](https://developer.okta.com/docs/api/#filter) expression supports the `sw` [operator](https://developer.okta.com/docs/api/#operators).

        **Note:** Query parameter percent encoding is required. See [Special characters]( https://developer.okta.com/docs/api/#special-characters ).
      in: query
      required: true
      schema:
        type: string
        format: scim-filter
        example: firstName sw "John" OR lastName sw "John"
      x-scim-filter:
        firstName:
          operators:
            - sw
          type: String
        lastName:
          operators:
            - sw
          type: String
    after:
      name: after
      description: |-
        Specifies the pagination cursor for the next page of results.
        Treat this as an opaque value obtained through the standard link headers. See [pagination](https://developer.okta.com/docs/api/#pagination).
      in: query
      required: false
      schema:
        type: string
        example: 00u68w6vzKLultXS97g6
    limit:
      name: limit
      description: The maximum number of records returned in a response
      in: query
      required: false
      schema:
        type: integer
        default: 20
        maximum: 200
        minimum: 1
    user-id:
      name: userId
      description: Unique identifier for the user
      in: path
      required: true
      schema:
        type: string
        maxLength: 20
        minLength: 20
        example: 00ucvnr9rbONeZdRp1d7
    my-task-list-filter:
      name: filter
      description: |
        A [filter](https://developer.okta.com/docs/api/#filter) expression that filters a collection of tasks in the response.
        The filter expression supports the following properties and [operators](https://developer.okta.com/docs/api/#operators):

        - `status`: The status of the task. Possible values: `OPEN`, `COMPLETED`, `ASSIGNING`, and `LOCKED`. Supports the `eq` operator.
        - `type`: The type of the task. Possible values: `QUESTION`, `APPROVAL`, and `TODO`. Supports the `eq` operator.
        - `requestId`: The ID of the request for the task. Supports the `eq` operator.
        - `createdAt`: The task created time. Supports the `gt`, `ge`, `le`, and `lt` operators.
        - `updatedAt`: The latest task updated time. Supports the `gt`, `ge`, `le`, and `lt` operators.

        > **Note**: Query parameter percent encoding is required. See [Percent-encoding](https://developer.mozilla.org/en-US/docs/Glossary/Percent-encoding).
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/scim-filter'
      x-scim-filter:
        status:
          operators:
            - eq
          schema:
            $ref: '#/components/schemas/task-status'
        type:
          operators:
            - eq
          schema:
            $ref: '#/components/schemas/task-type'
        requestId:
          operators:
            - eq
          schema:
            $ref: '#/components/schemas/task-request-id'
        createdAt:
          operators:
            - gt
            - ge
            - le
            - lt
          schema:
            $ref: '#/components/schemas/task-created-at'
        updatedAt:
          operators:
            - gt
            - ge
            - le
            - lt
          schema:
            $ref: '#/components/schemas/task-updated-at'
      examples:
        FilterByStatus:
          summary: Filter by status
          value: status eq "OPEN"
        FilterByType:
          summary: Filter by type
          value: type eq "QUESTION"
        FilterByRequestId:
          summary: Filter by requestId
          value: requestId eq "0oafxqCAJWWGELFTYASJ"
        FilterByCreatedAt:
          summary: Filter by createdAt
          value: createdAt gt "2022-05-24T14:15:22Z"
        FilterByUpdatedAt:
          summary: Filter by updatedAt
          value: updatedAt gt "2022-05-24T14:15:22Z"
    task-list-after:
      name: after
      description: |
        Specifies the pagination cursor for the next page of results. Treat this as an opaque value obtained through the standard link headers. See [pagination](https://developer.okta.com/docs/api/#pagination).
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/task-id'
    task-list-order-by:
      name: orderBy
      description: |
        Specifies a property to sort the results. The following properties are supported:
        - `createdAt`
        - `updatedAt`

        Append `desc` or `asc` to indicate the sorting direction.
        > **Note:** Query parameter percent encoding is required. See [Percent-encoding](https://developer.mozilla.org/en-US/docs/Glossary/Percent-encoding).
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/order-by'
      x-order-by:
        attributes:
          - createdAt
          - updatedAt
      examples:
        OrderByCreated:
          summary: Order by created
          value: createdAt desc
        OrderByLastUpdated:
          summary: Order by updatedAt
          value: updatedAt desc
    task-id-parameter:
      name: taskId
      description: The `id` of the task
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/task-id'
    security-access-reviews-filter:
      name: filter
      in: query
      description: |-
        A [filter](https://developer.okta.com/docs/api/#filter) expression that filters security access reviews.
        The `eq` and `co` [operators](https://developer.okta.com/docs/api/#operators) are supported for string properties.
        The `gt` and `lt` operators are supported for date properties.

        > **Note:** Query parameter percent encoding is required. See [Percent-encoding](https://developer.mozilla.org/en-US/docs/Glossary/Percent-encoding).
      required: false
      allowEmptyValue: true
      schema:
        type: string
      examples:
        FilterByName:
          summary: Filter by name provided for the security access review
          value: name co "Git"
        FilterByStatus:
          summary: Filter by status of the security access review
          value: status eq "ACTIVE"
        FilterByReviewerName:
          summary: Filter by reviewer.name. Note that it compares against the first name and last name of the reviewer.
          value: reviewer.name co "John"
        FilterByCreated:
          summary: Filter by created
          value: created gt "2022-05-24T14:15:22Z"
    security-access-reviews-order-by:
      name: orderBy
      description: |
        The field to sort the results, in ascending (`asc`) or descending (`desc`) order.
        Sorting is applied to only one field.

        **Note:** Query parameter percent encoding is required. See [Percent-encoding](https://developer.mozilla.org/en-US/docs/Glossary/Percent-encoding)
      in: query
      required: false
      style: form
      explode: false
      schema:
        type: array
        uniqueItems: false
        minItems: 1
        maxItems: 1
        items:
          type: string
          description: A property of items within the collection, optionally followed by a ` asc` or ` desc` suffix.
        default:
          - created asc
      examples:
        OrderByName:
          summary: Order by name
          value: name desc
        OrderByCreated:
          summary: Order by created
          value: created desc
        OrderByEndTime:
          summary: Order by endTime
          value: endTime desc
        OrderByStatus:
          summary: Order by status
          value: status desc
        OrderById:
          summary: Order by id
          value: id desc
    security-access-review-id:
      name: securityAccessReviewId
      in: path
      description: The ID of the security access review
      required: true
      schema:
        type: string
    security-access-review-accesses-filter:
      name: filter
      description: |-
        A [filter](https://developer.okta.com/docs/api/#filter) expression that filters access items.

        > **Note:** Query parameter percent encoding is required. See [Percent-encoding](https://developer.mozilla.org/en-US/docs/Glossary/Percent-encoding).
      in: query
      required: false
      schema:
        type: string
      examples:
        FilterByName:
          summary: Filter by name
          value: name co "Git"
        FilterByPriority:
          summary: Filter by priority
          value: priority eq "HIGH"
        FilterBySODConflict:
          summary: Filter by sodConflictSeverity
          value: sodConflictSeverity eq "HIGH"
        FilterByAssignmentMethod:
          summary: Filter by assignmentMethodSeverity
          value: assignmentMethodSeverity eq "HIGH"
        FilterByPastGovernanceDecisions:
          summary: Filter by pastGovernanceDecisionsSeverity
          value: pastGovernanceDecisionsSeverity eq "HIGH"
        FilterByUsageHistory:
          summary: Filter by usageHistorySeverity
          value: usageHistorySeverity eq "HIGH"
        FilterByGovernanceLabel:
          summary: Filter by governanceLabel
          value: governanceLabel co "Crown Jewel"
    security-access-review-accesses-order-by:
      name: orderBy
      description: |-
        The field to sort the results, in ascending (asc) or descending (desc) order. Sorting is applied to only one field.

        > **Note:** Query parameter percent encoding is required. See [Percent-encoding](https://developer.mozilla.org/en-US/docs/Glossary/Percent-encoding)
      in: query
      required: false
      style: form
      explode: false
      schema:
        type: array
        uniqueItems: false
        minItems: 1
        maxItems: 1
        items:
          type: string
          description: A property of items within the collection, optionally followed by a ` asc` or ` desc` suffix.
        default:
          - priority desc
      examples:
        OrderByPriority:
          summary: Order by priority
          value: priority desc
        OrderByLastAccess:
          summary: Order by lastAccess
          value: lastAccess desc
        OrderByAccessFrequency:
          summary: Order by accessFrequency
          value: accessFrequency desc
    security-access-review-access-id:
      name: securityAccessReviewAccessId
      in: path
      description: The ID of the access item in a security access review
      required: true
      schema:
        type: string
    security-access-review-sub-accesses-filter:
      name: filter
      description: |
        A [filter](https://developer.okta.com/docs/api/#filter) expression that filters sub-access items.

        > **Note:** Query parameter percent encoding is required. See [Percent-encoding](https://developer.mozilla.org/en-US/docs/Glossary/Percent-encoding).
      in: query
      required: false
      schema:
        type: string
      examples:
        FilterByName:
          summary: Filter by name
          value: name co "Git"
        FilterByResourceType:
          summary: Filter by resourceType
