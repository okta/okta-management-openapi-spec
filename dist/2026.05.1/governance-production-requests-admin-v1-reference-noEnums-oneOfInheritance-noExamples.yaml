        requesterFields: []
      oneOf:
        - $ref: '#/components/schemas/request-type-requester-member-of'
        - $ref: '#/components/schemas/request-type-requester-everyone'
        - $ref: '#/components/schemas/request-type-requester-custom'
      discriminator:
        propertyName: type
        mapping:
          MEMBER_OF: '#/components/schemas/request-type-requester-member-of'
          EVERYONE: '#/components/schemas/request-type-requester-everyone'
          CUSTOM: '#/components/schemas/request-type-requester-custom'
    request-type-approver-fields:
      type: array
      description: |
        A list of fields with which to gather input.

        The order of field object controls the order with which the fields are presented to users.

        #### Known limitation

        Unlike requester fields, all approver fields are *required* and may not be set as optional.
      default: []
      maxItems: 5
      items:
        $ref: '#/components/schemas/field'
    request-type-approval-member-of:
      type: object
      description: An approval when the approver must be a member of a particular Okta Group.
      required:
        - approverType
        - approverMemberOf
      properties:
        approverType:
          type: string
          enum:
            - MEMBER_OF
        description:
          type: string
          minLength: 1
          maxLength: 250
        approverMemberOf:
          $ref: '#/components/schemas/member-of'
        approverFields:
          $ref: '#/components/schemas/request-type-approver-fields'
    request-type-approval-user:
      type: object
      description: An approval when the approver must be a particular user.
      required:
        - approverType
        - approverUserId
      properties:
        approverType:
          type: string
          enum:
            - USER
        description:
          type: string
          minLength: 1
          maxLength: 250
        approverUserId:
          $ref: '#/components/schemas/user-id'
        approverFields:
          $ref: '#/components/schemas/request-type-approver-fields'
    request-type-approval-manager:
      type: object
      description: Specifying the approver must be the requester's manager
      required:
        - approverType
      properties:
        approverType:
          type: string
          enum:
            - MANAGER
        description:
          type: string
          minLength: 1
          maxLength: 250
        approverFields:
          $ref: '#/components/schemas/request-type-approver-fields'
    request-type-approval-resource-owner:
      type: object
      description: Specifying the approver must be the resource owner
      required:
        - approverType
      properties:
        approverType:
          type: string
          enum:
            - RESOURCE_OWNER
        description:
          type: string
          minLength: 1
          maxLength: 250
    request-type-approval:
      type: object
      description: request-type-approval-description.md
      oneOf:
        - $ref: '#/components/schemas/request-type-approval-member-of'
        - $ref: '#/components/schemas/request-type-approval-user'
        - $ref: '#/components/schemas/request-type-approval-manager'
        - $ref: '#/components/schemas/request-type-approval-resource-owner'
      discriminator:
        propertyName: approverType
        mapping:
          MEMBER_OF: '#/components/schemas/request-type-approval-member-of'
          USER: '#/components/schemas/request-type-approval-user'
          MANAGER: '#/components/schemas/request-type-approval-manager'
          RESOURCE_OWNER: '#/components/schemas/request-type-approval-resource-owner'
    request-type-approvals:
      description: |
        The `SERIAL` approvals required to grant access:

        * All specified approvals are considered required in order to fulfill an access request.
        * At least one approval must be specified for a request type.
        * When a request type has two approvals:
          * Only the first approval is immediately actionable by an approver in the request.
          * After an approver has made a decision for the first approval, then the second approval is actionable.
        * The approval type of `RESOURCE_OWNER` is supported for apps, entitlement bundles, and associated groups from the resource requested.
      type: array
      minItems: 1
      maxItems: 5
      items:
        $ref: '#/components/schemas/request-type-approval'
    request-type-approval-settings-serial:
      type: object
      description: Settings for approval
      required:
        - type
        - approvals
      properties:
        type:
          type: string
          enum:
            - SERIAL
          description: |
            When there are multiple approvals, an approval is not actionable until the previous approval has been approved. A denial will terminate the request and no subsequent approvals will be made actionable.
        approvals:
          $ref: '#/components/schemas/request-type-approvals'
    request-type-approval-settings-custom:
      type: object
      description: Approval settings which are not represented in the API accurately. Often the case when lastUpdatedSource is 'WEB'.
      required:
        - type
      properties:
        type:
          type: string
          enum:
            - CUSTOM
          description: |
            `CUSTOM` is set for request types created through the Okta Access Requests app that aren't accurately represented by the `SERIAL` request type model.
    request-type-approval-settings-readable:
      type: object
      description: Approval settings for the request type
      oneOf:
        - $ref: '#/components/schemas/request-type-approval-settings-serial'
        - $ref: '#/components/schemas/request-type-approval-settings-custom'
        - $ref: '#/components/schemas/request-type-approval-settings-none'
      discriminator:
        propertyName: type
        mapping:
          SERIAL: '#/components/schemas/request-type-approval-settings-serial'
          CUSTOM: '#/components/schemas/request-type-approval-settings-custom'
          NONE: '#/components/schemas/request-type-approval-settings-none'
    request-type-last-update-source:
      type: string
      description: Whether the request type was last updated through the API or the user interface.
      x-okta-known-values:
        - API
        - WEB
    request-type-full:
      type: object
      description: Full representation of a request type resource
      allOf:
        - $ref: '#/components/schemas/writable-standard-properties'
        - $ref: '#/components/schemas/read-only-standard-properties'
      required:
        - id
        - name
        - description
        - lastUpdated
        - lastUpdatedBy
        - ownerId
        - resourceSettings
        - requestSettings
        - approvalSettings
        - accessDuration
        - status
        - lastUpdateSource
        - _links
      properties:
        ownerId:
          $ref: '#/components/schemas/request-type-owner-id'
        resourceSettings:
          $ref: '#/components/schemas/request-type-resource-settings-readable'
        requestSettings:
          $ref: '#/components/schemas/request-type-request-settings-readable'
        approvalSettings:
          $ref: '#/components/schemas/request-type-approval-settings-readable'
        accessDuration:
          $ref: '#/components/schemas/request-duration'
        status:
          $ref: '#/components/schemas/request-type-status'
        lastUpdateSource:
          $ref: '#/components/schemas/request-type-last-update-source'
        _links:
          $ref: '#/components/schemas/request-type-links'
      example:
        id: 61eb2db568c7c300079fefd0
        name: salesforce-01
        description: How users can request access to Salesforce 01
        lastUpdated: '2022-05-24T14:15:22Z'
        lastUpdatedBy: 00ub0oNGTSWTBKOLGLNR
        created: '2022-05-24T14:15:22Z'
        createdBy: 00ub0oNGTSWTBKOLGLNR
        ownerId: 61eb0f06c462d20007f051ac
        resourceSettings:
          type: GROUPS
          targetResources:
            - 00g1emaKYZTWRYYRRTSK
        requestSettings:
          type: EVERYONE
          requesterFields:
            - prompt: What is the business justification?
              required: true
              input:
                type: TEXT
        approvalSettings:
          type: SERIAL
          approvals:
            - approverType: MEMBER_OF
              approverMemberOf:
                - 00g1emaKYZTWRYYRRTSK
              approverFields:
                - prompt: What is the business justification?
                  required: true
                  input:
                    type: TEXT
        lastUpdateSource: API
        status: ACTIVE
        _links:
          createRequest:
            href: https://my-org.at.okta.com/next/new?q=Request%20access%20to%20Salesforce&request_type=0oa1gjh63g214q0Hq0g4
            type: text/html
          requests:
            href: https://myorg.okta.com/governance/api/v1/requests?filter=requestTypeId%20eq%20%2261eb2db568c7c300079fefd0%22
            type: application/json
          self:
            href: https://myorg.okta.com/governance/api/v1/requests/61eb2db568c7c300079fefd0
            type: application/json
    request-id:
      type: string
      maxLength: 24
      minLength: 24
      pattern: ^[a-fA-F\d]{24}$
      format: request-id
      description: |
        The request `id`
    request-subject:
      type: string
      description: The subject of the request
      maxLength: 250
      minLength: 1
    requester-user-id:
      type: string
      format: okta-user-id
      description: Okta User.id of the requesting user
      maxLength: 20
      minLength: 20
      pattern: 00u[0-9a-zA-Z]+
    requester-user-ids:
      type: array
      minItems: 1
      maxItems: 1
      description: A list of requester Okta user `id`s.
      items:
        $ref: '#/components/schemas/requester-user-id'
    request-mutable:
      type: object
      description: Properties which are mutable in mutation operations
      properties:
        requestTypeId:
          $ref: '#/components/schemas/request-type-id'
        subject:
          $ref: '#/components/schemas/request-subject'
        requesterUserIds:
          $ref: '#/components/schemas/requester-user-ids'
      example:
        subject: Can I have access to Salesforce?
        requestTypeId: 05ab2db568c7c300079fefd0
        requesterUserIds:
          - 00ub0oNGTSWTBKOLGLNR
    request-request-status:
      type: string
      description: |
        A request has a lifecycle. See our [request lifecycle documentation](/#request).

        A request progresses in its lifecycle state based on requester, approver, and administrator activities across a variety of channels, such as:

        - Access Request portal
        - Slack
        - Microsoft teams

        The following lifecycle operations are available on a single request.

        - [Add](/iga/openapi/governance-production-requests-admin-v1-reference/requests/createrequest)
      x-okta-known-values:
        - OPEN
        - PENDING
        - RESOLVED
        - LOCKED
    request-resolved-date-time:
      type: string
      format: date-time
      nullable: true
      description: The date the request was resolved. The property may transition from having a value to null if the request is reopened.
    request-permalink-id:
      type: integer
      description: The immutable, persistent identifier that always resolves to the request
    request-links:
      type: object
      description: Links available on a single request representation
      required:
        - requestType
        - self
      properties:
        requestType:
          $ref: '#/components/schemas/link'
        self:
          $ref: '#/components/schemas/link'
      additionalProperties:
        $ref: '#/components/schemas/link'
    request-sparse:
      type: object
      description: Sparse representation of a Request resource
      allOf:
        - $ref: '#/components/schemas/read-only-standard-properties'
        - $ref: '#/components/schemas/request-mutable'
      required:
        - id
        - createdBy
        - created
        - lastUpdated
        - lastUpdatedBy
        - subject
        - requestTypeId
        - type
        - resolved
        - requestStatus
        - requesterUserIds
        - permalinkId
        - _links
      properties:
        type:
          description: Whether the request's request type has CUSTOM settings or not.
          type: string
          enum:
            - ACCESS_REQUEST
            - CUSTOM
        requestStatus:
          $ref: '#/components/schemas/request-request-status'
        resolved:
          $ref: '#/components/schemas/request-resolved-date-time'
        permalinkId:
          $ref: '#/components/schemas/request-permalink-id'
        _links:
          $ref: '#/components/schemas/request-links'
      example:
        id: 61eb06a3c462d20007f0235c
        subject: request-from-service-now-xsd23432
        requestTypeId: 61eb2db568c7c300079fefd0
        requesterUserIds:
          - 00ub0oNGTSWTBKOLGLNR
        lastUpdated: '2022-05-05T14:15:22Z'
        lastUpdatedBy: 00ub0oNGTSWTBKOLGLNR
        resolved: 2022-05-05T14:15:22Z'
        requestStatus: RESOLVED
        type: ACCESS_REQUEST
        permalinkId: 1
        _links:
          requestType:
            href: https://myorg.okta.com/governance/api/v1/request-types/61eb2db568c7c300079fefd0
            type: application/json
          self:
            href: https://myorg.okta.com/governance/api/v1/requests/61eb06a3c462d20007f0235c
            type: application/json
    request-list-links:
      type: object
      description: Links available in request list response
      required:
        - self
      properties:
        self:
          $ref: '#/components/schemas/link'
        next:
          $ref: '#/components/schemas/link'
      additionalProperties:
        $ref: '#/components/schemas/link'
    request-list:
      type: object
      properties:
        data:
          description: All requests on the current page
          type: array
          items:
            $ref: '#/components/schemas/request-sparse'
        _links:
          $ref: '#/components/schemas/request-list-links'
    field-id-writable:
      type: string
      description: The `id` of a `requesterField` in the related request type's `requestSettings.requesterFields`
      format: uuid
      maxLength: 36
      minLength: 36
      example: 1b9d6bcd-bbfd-4b2d-9b5d-ab8dfbbd4bed
    field-date-time-value:
      type: string
      nullable: true
      maxLength: 1000
      format: date-time
      description: Value provided by a user in ISO 8601 string format
    field-select-value-writable:
      type: array
      nullable: true
      minItems: 1
      maxItems: 1
      description: Values provided by a user, only `1` is supported
      items:
        $ref: '#/components/schemas/field-option-value'
    field-text-value:
      type: string
      nullable: true
      minLength: 1
      maxLength: 1000
      description: Value provided by a user
    field-value-writable-allowed-values:
      anyOf:
        - $ref: '#/components/schemas/field-date-time-value'
        - $ref: '#/components/schemas/field-select-value-writable'
        - $ref: '#/components/schemas/field-text-value'
    field-value-writable:
      type: object
      description: |
        An `id` and `value` that corresponds to the `id` of a field in the request type's `requestSettings.requesterFields`.

        If the `id` corresponds to a `DATE-TIME` field, the value must be an `ISO-8601` date-time.
        If the `id` corresponds to a `SELECT` field, the value must be an array of strings where each string is a value from the select field's options.
        If the `id` corresponds to a `TEXT` field, the value must be a string.

        Only provide the field `id` once. Duplicates result in a `409 Conflict` response.

        A non-required field may be omitted from the list.
      required:
        - id
        - value
      properties:
        id:
          $ref: '#/components/schemas/field-id-writable'
        value:
          $ref: '#/components/schemas/field-value-writable-allowed-values'
    requester-field-values-writable:
      type: array
      description: |
        Field values provided when adding the request.

        If a request type has required `requesterFields`, they must be provided when the request is created.

        Non-required fields may be omitted when creating the request.
      items:
        $ref: '#/components/schemas/field-value-writable'
    request-creatable-only:
      type: object
      properties:
        requesterFieldValues:
          $ref: '#/components/schemas/requester-field-values-writable'
    request-creatable:
      type: object
      description: The properties expected in an initial create request
      required:
        - requestTypeId
        - subject
      allOf:
        - $ref: '#/components/schemas/request-mutable'
        - $ref: '#/components/schemas/request-creatable-only'
      example:
        subject: Requesting access to salesforce-01 for my team member
        requesterUserIds:
          - 00ub0oNGTSWTBKOLGLNR
    request-full-api-compatible:
      type: object
      description: Full representation of a Request resource.
      allOf:
        - $ref: '#/components/schemas/read-only-standard-properties'
        - $ref: '#/components/schemas/request-mutable'
        - $ref: '#/components/schemas/request-minimal-read-only-fields'
      required:
        - type
        - id
        - created
        - createdBy
        - subject
        - requestTypeId
        - lastUpdated
        - lastUpdatedBy
        - resolved
        - requestStatus
        - requesterUserIds
        - requesterFieldValues
        - approvals
        - actions
        - permalinkId
        - _links
      properties:
        approvals:
          type: array
          description: Request approvals
          items:
            $ref: '#/components/schemas/request-approval'
        actions:
          $ref: '#/components/schemas/request-actions'
        permalinkId:
          $ref: '#/components/schemas/request-permalink-id'
        type:
          description: This request is associated with a request type with no `CUSTOM` settings.
          type: string
          enum:
            - ACCESS_REQUEST
    request-full-api-incompatible:
      type: object
      description: A Request where the request type has a CUSTOM setting. This representation is limited and does not contain `actions` and `approvals`.
      allOf:
        - $ref: '#/components/schemas/read-only-standard-properties'
        - $ref: '#/components/schemas/request-mutable'
        - $ref: '#/components/schemas/request-minimal-read-only-fields'
      required:
        - type
        - id
        - created
        - createdBy
        - subject
        - requestTypeId
        - lastUpdated
        - lastUpdatedBy
        - resolved
        - requestStatus
        - requesterUserIds
        - requesterFieldValues
        - permalinkId
        - _links
      properties:
        permalinkId:
          $ref: '#/components/schemas/request-permalink-id'
        type:
          description: This request is associated with a request type with `CUSTOM` settings.
          type: string
          enum:
            - CUSTOM
    request-request-type-id:
      type: string
      description: The Request Type enabling this Request.
      maxLength: 24
      minLength: 24
      pattern: ^[a-fA-F\d]{24}$
      format: request-type-id
      example: 05ab2db568c7c300079fefd0
    base-field-value:
      type: object
      description: The field value provided by the user
      required:
        - required
        - prompt
        - id
      properties:
        id:
          $ref: '#/components/schemas/field-id'
        prompt:
          $ref: '#/components/schemas/field-prompt'
        required:
          $ref: '#/components/schemas/field-required'
    field-value-date:
      type: object
      allOf:
        - $ref: '#/components/schemas/base-field-value'
      required:
        - id
        - type
        - value
      properties:
        type:
          $ref: '#/components/schemas/field-date-time-type'
        value:
          $ref: '#/components/schemas/field-date-time-value'
    field-select-value:
      type: array
      nullable: true
      minItems: 1
      maxItems: 1
      description: Values provided by a user, only `1` is supported
      items:
        $ref: '#/components/schemas/field-option-value'
    field-value-select:
      type: object
      allOf:
        - $ref: '#/components/schemas/base-field-value'
      required:
        - id
        - type
        - value
      properties:
        type:
          $ref: '#/components/schemas/field-select-type'
        value:
          $ref: '#/components/schemas/field-select-value'
      example:
        type: SELECT
        prompt: Indicate business justification
        value:
          - REQUIRED for job duties
    field-value-text:
      type: object
      allOf:
        - $ref: '#/components/schemas/base-field-value'
      required:
        - id
        - type
        - value
      properties:
        type:
          $ref: '#/components/schemas/field-text-type'
        value:
          $ref: '#/components/schemas/field-text-value'
    field-value:
      description: The field value provided by the user
      oneOf:
        - $ref: '#/components/schemas/field-value-date'
        - $ref: '#/components/schemas/field-value-select'
        - $ref: '#/components/schemas/field-value-text'
      discriminator:
        propertyName: type
        mapping:
          DATE-TIME: '#/components/schemas/field-value-date'
          SELECT: '#/components/schemas/field-value-select'
          TEXT: '#/components/schemas/field-value-text'
    requester-field-values:
      type: array
      nullable: true
      description: |
        Field values provided when adding the request.

        If a request type has required `requesterFields`, they must be provided when the request is created.

        Non-required fields may be omitted when creating the request.
      items:
        $ref: '#/components/schemas/field-value'
    request-minimal-read-only-fields:
      type: object
      description: Properties contained by default in sparse representation
      properties:
        requestStatus:
          $ref: '#/components/schemas/request-request-status'
        requestTypeId:
          $ref: '#/components/schemas/request-request-type-id'
        resolved:
          $ref: '#/components/schemas/request-resolved-date-time'
        requesterFieldValues:
          $ref: '#/components/schemas/requester-field-values'
        _links:
          $ref: '#/components/schemas/request-links'
    request-approval-id:
      type: string
      maxLength: 24
      minLength: 24
      pattern: ^[a-fA-F\d]{24}$
      format: approval-id
      description: A unique identifier of the approval in the request
    request-approval-pending:
      type: object
      description: A pending access request approval
      required:
        - status
        - approvalId
      properties:
        status:
          type: string
          description: The status of a pending approval
          enum:
            - PENDING
        approvalId:
          $ref: '#/components/schemas/request-approval-id'
      example:
        requestStatus: OPEN
    approval-field-values:
      type: array
      description: |-
        Values to field prompts provided by the approver at the time of approval.

        All approval fields specified in the related request type are represented in the same order as defined in the request type.
      nullable: true
      items:
        $ref: '#/components/schemas/field-value'
    request-approval-completed:
      type: object
      description: A completed access request approval
      required:
        - status
        - approverName
        - approvalId
        - approverId
        - decision
        - decided
        - fieldValues
      properties:
        status:
          type: string
          description: The status of a completed approval
          enum:
            - COMPLETED
        approverName:
          type: string
          description: Okta username of the user which approved the request
          maxLength: 100
        approvalId:
          $ref: '#/components/schemas/request-approval-id'
        approverId:
          type: string
          format: okta-user-id
          description: Okta User.id of the user which approved the request
          maxLength: 20
          minLength: 20
          pattern: 00u[0-9a-zA-Z]+
        decision:
          type: string
          enum:
            - APPROVED
            - DENIED
        decided:
          type: string
          format: date-time
          description: The date the approver made their decision.
        originalDeciderId:
          $ref: '#/components/schemas/user-id'
        originalDeciderFullName:
          type: string
          description: Full name of the original decider
          maxLength: 100
        originalDeciderEmail:
          type: string
          description: Email of the original decider
          format: email
        deciderDelegated:
          type: boolean
          description: Indicates if the decision was made by a delegated decider
        deciderEscalated:
          type: boolean
          description: Indicates if the decision was made by an escalated decider
        fieldValues:
          $ref: '#/components/schemas/approval-field-values'
      example:
        status: COMPLETED
        approverId: 00ub0oNGTSWTBKOLGLNR
        decision: APPROVED
        decided: '2022-06-02T21:36:25.344Z'
        fieldValues:
          - type: SELECT
            value:
              - value: Curious
    request-approval:
      type: object
      description: An approval for this request. It may be in a PENDING or COMPLETED state.
      oneOf:
        - $ref: '#/components/schemas/request-approval-pending'
        - $ref: '#/components/schemas/request-approval-completed'
      discriminator:
        propertyName: status
        mapping:
          PENDING: '#/components/schemas/request-approval-pending'
          COMPLETED: '#/components/schemas/request-approval-completed'
    request-action-enum:
      type: string
      description: The type of action taken by the access request service to fulfill the request.
      x-okta-known-values:
        - ADD_USER_TO_GROUP
        - ASSIGN_APP_TO_USER
        - GRANT_ACCESS_TO_ENTITLEMENT_BUNDLE
    request-action-id:
      type: string
      maxLength: 24
      minLength: 24
      pattern: ^[a-fA-F\d]{24}$
      format: action-id
      description: A unique identifier of the action taken in the request
    request-action-pending:
      type: object
      description: A pending action, approvals still required
      required:
        - status
        - action
        - actionId
      properties:
        status:
          type: string
          description: The status of a pending action
          enum:
            - PENDING
        action:
          $ref: '#/components/schemas/request-action-enum'
        actionId:
          $ref: '#/components/schemas/request-action-id'
      example:
        status: PENDING
    resource-id:
      type: string
      format: okta-resource-id
      description: |
        The Okta `app.id` or `group.id` of the resource that can be requested with this request type.

        * See [List all applications](https://developer.okta.com/docs/api/openapi/okta-management/management/tags/application/other/listapplications) to retrieve app IDs.
        * See [List all groups](https://developer.okta.com/docs/api/openapi/okta-management/management/tags/group/other/listgroups) to retrieve group IDs.
      maxLength: 20
    okta-resource-readable:
      type: object
      description: Identifies a unique Okta resource
      properties:
        resourceName:
          type: string
          description: Human readable name of the resource
        resourceId:
          $ref: '#/components/schemas/resource-id'
        resourceType:
          type: string
          enum:
            - APP
            - GROUP
            - ENTITLEMENT_BUNDLE
          description: The type of resource
    request-action-completed:
      type: object
      description: A completed access request approval
      required:
        - status
        - action
        - actionId
        - actionStatus
        - actionAttempted
        - resourceId
        - resourceName
        - resourceType
      allOf:
        - $ref: '#/components/schemas/okta-resource-readable'
      properties:
        status:
          type: string
          description: The status of a completed approval
          enum:
            - COMPLETED
        action:
          $ref: '#/components/schemas/request-action-enum'
        actionId:
          $ref: '#/components/schemas/request-action-id'
        actionStatus:
          type: string
          enum:
            - SUCCEEDED
            - FAILED
          description: Whether the action was successful or not
        actionAttempted:
          type: string
          format: date-time
          description: When the action was attempted
        accessRemoved:
          nullable: true
          type: string
          format: date-time
          description: When access was removed if the associated Request Type has an `accessDuration`. null if the Request Type does not have an `accessDuration`, or the duration has not yet expired.
    request-action:
      type: object
      description: An action taken as part of this request, null if there will never be actions for this request.
      oneOf:
        - $ref: '#/components/schemas/request-action-pending'
        - $ref: '#/components/schemas/request-action-completed'
      discriminator:
        propertyName: status
        mapping:
          PENDING: '#/components/schemas/request-action-pending'
          COMPLETED: '#/components/schemas/request-action-completed'
    request-actions:
      type: array
      minItems: 1
      maxItems: 1
      description: A list of actions. Currently only supports one action per request.
      nullable: true
      items:
        $ref: '#/components/schemas/request-action'
    request-full:
      type: object
      description: A full representation of a request
      discriminator:
        propertyName: type
        mapping:
          ACCESS_REQUEST: '#/components/schemas/request-full-api-compatible'
          CUSTOM: '#/components/schemas/request-full-api-incompatible'
      oneOf:
        - $ref: '#/components/schemas/request-full-api-compatible'
        - $ref: '#/components/schemas/request-full-api-incompatible'
    request-message-message:
      type: string
      description: Message that will be created for the request. Newline can be specified by characters "\n". Message will be visible for all users who can view the request.
      minLength: 1
      maxLength: 5000
      nullable: false
    request-message-mutable:
      type: object
      required:
        - message
      properties:
        message:
          $ref: '#/components/schemas/request-message-message'
    request-message-creatable:
      type: object
      description: The properties expected in a request message create request
      allOf:
        - $ref: '#/components/schemas/request-message-mutable'
    team-id:
      type: string
      description: Team ID
      maxLength: 24
      minLength: 24
      pattern: ^[a-fA-F\d]{24}$
      format: owner-id
    team-name:
      type: string
      description: The name of the team
      maxLength: 40
      minLength: 1
    team:
      type: object
      required:
        - id
        - created
        - lastUpdated
        - name
      properties:
        id:
          $ref: '#/components/schemas/team-id'
        created:
          description: The ISO 8601 formatted date and time when the resource was created
          type: string
          format: date-time
          readOnly: true
        lastUpdated:
          $ref: '#/components/schemas/last-updated'
        name:
          $ref: '#/components/schemas/team-name'
    teams-list-links:
      type: object
      description: Links available in teams response
      required:
        - self
      properties:
        self:
          $ref: '#/components/schemas/link'
        next:
          $ref: '#/components/schemas/link'
      additionalProperties:
        $ref: '#/components/schemas/link'
    teams-list:
      type: object
      properties:
        data:
          description: All teams on the current page
          type: array
          items:
            $ref: '#/components/schemas/team'
        _links:
          $ref: '#/components/schemas/teams-list-links'
  parameters:
    request-types-list-filter:
      name: filter
      description: |
        Apply various filters by using supported request types filtering properties.

        **Note:** Query parameter percent encoding is required. See [Percent-encoding](https://developer.mozilla.org/en-US/docs/Glossary/Percent-encoding)
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/scim-filter'
      x-scim-filter:
        status:
          operators:
            - eq
          schema:
            $ref: '#/components/schemas/request-type-status'
        lastUpdated:
          operators:
            - gt
          schema:
            $ref: '#/components/schemas/last-updated'
      examples:
        FilterByStatus:
          summary: Filter by status
          value: status eq "ACTIVE"
        FilterByLastUpdated:
          summary: Filter by lastUpdated
          value: lastUpdated gt "2022-05-24T14:15:22Z"
        FilterByStatusAndLastUpdated:
          summary: Filter by status and lastUpdated
          value: status eq "ACTIVE" AND lastUpdated gt "2022-05-24T14:15:22Z"
    request-types-list-after:
      name: after
      description: The after cursor provided by a prior request.
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/request-type-id'
    limit:
      name: limit
      description: The maximum number of records returned in a response
      in: query
      required: false
      schema:
        type: integer
        default: 20
        maximum: 200
        minimum: 1
    request-types-list-order-by:
      name: orderBy
      description: |
        Apply an ordering of request types by specifying a supported request type property name with `%20asc` or `%20desc` suffix.

        **Note:** Query parameter percent encoding is required. See [Percent-encoding](https://developer.mozilla.org/en-US/docs/Glossary/Percent-encoding)
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/order-by'
      x-order-by:
        attributes:
          - created
          - lastUpdated
      examples:
        OrderByCreated:
          summary: Order by created
          value: created desc
        OrderByLastUpdated:
          summary: Order by lastUpdated
          value: lastUpdated desc
    request-type-id:
      name: requestTypeId
      description: Unique identifier for the request type
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/request-type-id'
    request-list-filter:
      name: filter
      description: |
        Apply various filters by using supported request filtering properties.

        **Note:** Query parameter percent encoding is required. See [Percent-encoding](https://developer.mozilla.org/en-US/docs/Glossary/Percent-encoding)
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/scim-filter'
      x-scim-filter:
        requestStatus:
          operators:
            - eq
          schema:
            $ref: '#/components/schemas/request-request-status'
        lastUpdated:
          operators:
            - gt
          schema:
            $ref: '#/components/schemas/last-updated'
      examples:
        FilterByRequestStatus:
          summary: Filter by requestStatus
          value: requestStatus eq "RESOLVED"
        FilterByLastUpdated:
          summary: Filter by lastUpdated
          value: lastUpdated gt "2022-05-24T14:15:22Z"
        FilterByRequestStatusAndLastUpdated:
          summary: Filter by requestStatus and lastUpdated
          value: requestStatus eq "RESOLVED" AND lastUpdated gt "2022-05-24T14:15:22Z"
    request-list-after:
      name: after
      description: The after cursor provided by a prior request.
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/request-id'
    request-list-order-by:
      name: orderBy
      description: |
        Apply an ordering of requests by specifying a supported request property name with `%20asc` or `%20desc` suffix.

        **Note:** Query parameter percent encoding is required. See [Percent-encoding](https://developer.mozilla.org/en-US/docs/Glossary/Percent-encoding)
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/order-by'
      x-order-by:
        attributes:
          - created
          - lastUpdated
      examples:
        OrderByCreated:
          summary: Order by created
          value: created desc
        OrderByLastUpdated:
          summary: Order by lastUpdated
          value: lastUpdated desc
    request-id:
      name: requestId
      description: Unique identifier for the request
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/request-id'
    teams-filter:
      name: filter
      description: |
        Apply various filters by using supported team filtering properties.

        **Note:** Query parameter percent encoding is required. See [Percent-encoding](https://developer.mozilla.org/en-US/docs/Glossary/Percent-encoding)
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/scim-filter'
      x-scim-filter:
        name:
          operators:
            - eq
          schema:
            $ref: '#/components/schemas/team-name'
      examples:
        FilterByName:
          summary: Filter by name
          value: name eq "Salesforce admins"
    teams-after:
      name: after
      description: The after cursor provided by a prior request.
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/team-id'
  headers:
    link:
      required: false
      description: |-
        A link to `self` and `next`.
        > **Note:** `next` is only present if there's another page of results.
      schema:
        type: string
    rate-limit-limit:
      required: true
      description: The rate-limit ceiling for the current request
      schema:
        type: integer
        minimum: 1
        example: 60
    rate-limit-remaining:
      required: true
      description: The number of requests left for the current rate-limit window
      schema:
        type: integer
        minimum: 0
        example: 60
    rate-limit-reset:
      required: true
      description: The time when the rate limit resets, specified in UTC epoch time (in seconds)
      schema:
        type: integer
        minimum: 0
        example: 1609459200
  responses:
    request-types-list-success:
      description: A successful request type list response
      headers:
        Link:
          $ref: '#/components/headers/link'
        X-Rate-Limit-Limit:
          $ref: '#/components/headers/rate-limit-limit'
        X-Rate-Limit-Remaining:
          $ref: '#/components/headers/rate-limit-remaining'
        X-Rate-Limit-Reset:
          $ref: '#/components/headers/rate-limit-reset'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/request-types-list'
    request-types-list-bad-request:
      description: An invalid request to list request types
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/error'
    authentication-error-response:
      description: Authentication fails error response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/error'
    authorization-error-response:
      description: Authorization fails error response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/error'
          example:
            errorCode: E0000004
            errorSummary: You don't have permission to perform the requested action.
            errorLink: E0000004
            errorId: oaeWCGz73hpRCG75VHP6-RRXw
            errorCauses: []
    resource-not-found-response:
      description: The requested resource wasn't found error response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/error'
          example:
            errorCode: E0000007
            errorSummary: Resource not found exception
            errorLink: E0000007
            errorId: oaeWCGz73hpRCG75VHP6-RRXw
            errorCauses: []
    rate-limit-exceeded-response:
      description: The rate limit has been exceeded error response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/error'
          example:
            errorCode: E0000047
            errorSummary: The API call exceeded the rate limit due to too many requests.
            errorLink: E0000047
            errorId: oaeWCGz73hpRCG75VHP6-RRXw
            errorCauses: []
    unexpected-error-response:
      description: Error response when a server fault occurs due to an unexpected error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/error'
          example:
            errorCode: E0000009
            errorSummary: Internal Server Error
            errorLink: E0000009
            errorId: oaeWCGz73hpRCG75VHP6-RRXw
            errorCauses: []
    request-types-create-success-response:
      description: A successful request type create response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/request-type-full'
      headers:
        X-Rate-Limit-Limit:
          $ref: '#/components/headers/rate-limit-limit'
        X-Rate-Limit-Remaining:
          $ref: '#/components/headers/rate-limit-remaining'
        X-Rate-Limit-Reset:
          $ref: '#/components/headers/rate-limit-reset'
    request-types-create-bad-request-response:
