      type: object
      description: Settings for approval
      required:
        - type
        - approvals
      properties:
        type:
          type: string
          enum:
            - SERIAL
          description: |-
            Multiple approvals defined in a serial sequence:
              * An approval isn't actionable until the previous approval is approved.
              * An approval denial terminates the request and no subsequent approvals are actionable.
        approvals:
          $ref: '#/components/schemas/request-type-approvals-writable'
