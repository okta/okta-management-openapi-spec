          type: string
          enum:
            - EVERYONE
        requesterFields:
          $ref: '#/components/schemas/fields-writable'
    request-type-request-settings-mutable:
      type: object
      description: |
        The `requestSettings` control:

        - Which users can request access using this request type.
        - What fields the user may or must fill out in order to request access.
      default:
        type: EVERYONE
        requesterFields: []
      oneOf:
        - $ref: '#/components/schemas/request-type-requester-member-of-writable'
        - $ref: '#/components/schemas/request-type-requester-everyone-writable'
      discriminator:
        propertyName: type
        mapping:
          MEMBER_OF: '#/components/schemas/request-type-requester-member-of-writable'
          EVERYONE: '#/components/schemas/request-type-requester-everyone-writable'
    request-type-approver-fields-writable:
