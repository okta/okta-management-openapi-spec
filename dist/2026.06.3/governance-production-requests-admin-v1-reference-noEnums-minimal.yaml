      properties:
        approverType:
          type: string
          enum:
            - MEMBER_OF
        description:
          type: string
          minLength: 1
          maxLength: 250
        approverMemberOf:
          $ref: '#/components/schemas/member-of'
        approverFields:
          $ref: '#/components/schemas/request-type-approver-fields-writable'
    user-id:
      type: string
      x-okta-ignore-redocly-rules-for-sdk: true
      format: okta-user-id
      description: The Okta user `id`
      maxLength: 20
      minLength: 20
      pattern: 00u[0-9a-zA-Z]+
      example: 00ub0oNGTSWTBKOLGLNR
    request-type-approval-user-writable:
      type: object
      description: An approval when the approver must be a particular user.
      required:
        - approverType
        - approverUserId
      properties:
        approverType:
          type: string
          enum:
            - USER
        description:
          type: string
          minLength: 1
          maxLength: 250
        approverUserId:
          $ref: '#/components/schemas/user-id'
        approverFields:
          $ref: '#/components/schemas/request-type-approver-fields-writable'
    request-type-approval-manager-writable:
      type: object
      description: Specifying the approver must be the requester's manager
      required:
        - approverType
      properties:
        approverType:
          type: string
          enum:
            - MANAGER
        description:
          type: string
          minLength: 1
          maxLength: 250
        approverFields:
          $ref: '#/components/schemas/request-type-approver-fields-writable'
    request-type-approval-resource-owner-writable:
      type: object
      description: Specifying the approver must be the resource owner
      required:
        - approverType
      properties:
        approverType:
          type: string
          enum:
            - RESOURCE_OWNER
        description:
          type: string
          minLength: 1
          maxLength: 250
    request-type-approval-writable:
      type: object
      description: request-type-approval-description.md
      oneOf:
        - $ref: '#/components/schemas/request-type-approval-member-of-writable'
        - $ref: '#/components/schemas/request-type-approval-user-writable'
        - $ref: '#/components/schemas/request-type-approval-manager-writable'
        - $ref: '#/components/schemas/request-type-approval-resource-owner-writable'
      discriminator:
        propertyName: approverType
        mapping:
          MEMBER_OF: '#/components/schemas/request-type-approval-member-of-writable'
          USER: '#/components/schemas/request-type-approval-user-writable'
          MANAGER: '#/components/schemas/request-type-approval-manager-writable'
          RESOURCE_OWNER: '#/components/schemas/request-type-approval-resource-owner-writable'
    request-type-approvals-writable:
      description: |
        The `SERIAL` approvals required to grant access:

        * All specified approvals are considered required in order to fulfill an access request.
        * At least one approval must be specified for a request type.
        * When a request type has two approvals:
          * Only the first approval is immediately actionable by an approver in the request.
          * After an approver has made a decision for the first approval, then the second approval is actionable.
        * The approval type of `RESOURCE_OWNER` is supported for apps, entitlement bundles, and associated groups from the resource requested.
      type: array
      minItems: 1
      maxItems: 5
      items:
        $ref: '#/components/schemas/request-type-approval-writable'
    request-type-approval-settings-serial-writable:
      type: object
      description: Settings for approval
      required:
        - type
        - approvals
      properties:
        type:
          type: string
          enum:
            - SERIAL
          description: |-
            Multiple approvals defined in a serial sequence:
              * An approval isn't actionable until the previous approval is approved.
              * An approval denial terminates the request and no subsequent approvals are actionable.
        approvals:
          $ref: '#/components/schemas/request-type-approvals-writable'
    request-type-approval-settings-none:
      type: object
      description: Settings for no approvals
      required:
        - type
      properties:
        type:
          type: string
          enum:
            - NONE
          description: No approvals are required for this request type.
    request-type-approval-settings-mutable:
      type: object
      description: |-
        Specify one of the following `type` of approval settings:
          | Type | Description |
          |------|-------------|
          | NONE | This request type doesn't need any approval. |
          | SERIAL | This request type needs at least one approval. |
      oneOf:
        - $ref: '#/components/schemas/request-type-approval-settings-serial-writable'
        - $ref: '#/components/schemas/request-type-approval-settings-none'
      discriminator:
        propertyName: type
        mapping:
          SERIAL: '#/components/schemas/request-type-approval-settings-serial-writable'
          NONE: '#/components/schemas/request-type-approval-settings-none'
    request-duration:
      description: |
        How long the requester retains access after their request is approved and fulfilled.

        Specified in [ISO 8601 duration format](https://en.wikipedia.org/wiki/ISO_8601#Durations).

        #### Known limitation

        Only single time unit ISO 8601 duration formats (D, H, M) are supported for units (days, hours, minutes).

        ##### Supported

        | Unit       | Example |
        | ---------- | ------- |
        | D, days    | P40D    |
        | H, hours   | PT65H   |
        | M, minutes | PT90M   |

        > **Note:** Mixes of units, as well as month/year/week designations, aren't supported. For example, `P40DT65H`, `P40M`, `P1W`, and `P1Y` aren't supported.
      type: string
      example: P40D
      format: iso-duration
      nullable: true
      default: null
    request-type-creatable:
      type: object
      description: The properties expected in an initial Add request
      required:
        - name
        - resourceSettings
        - approvalSettings
        - ownerId
      allOf:
        - $ref: '#/components/schemas/writable-standard-properties'
      properties:
        status:
          $ref: '#/components/schemas/request-type-creatable-status'
        ownerId:
          $ref: '#/components/schemas/request-type-owner-id'
        resourceSettings:
          $ref: '#/components/schemas/request-type-resource-settings-mutable'
        requestSettings:
          $ref: '#/components/schemas/request-type-request-settings-mutable'
        approvalSettings:
          $ref: '#/components/schemas/request-type-approval-settings-mutable'
        accessDuration:
          $ref: '#/components/schemas/request-duration'
      example:
        name: salesforce-01
        description: How users can request access to Salesforce 01
        ownerId: 61eb0f06c462d20007f051ac
        approvalSettings:
          type: SERIAL
          approvals:
            - approverType: MEMBER_OF
              approverMemberOf:
                - 00g1emaKYZTWRYYRRTSK
              approverFields:
                - prompt: What is the business justification?
                  required: true
                  input:
                    type: TEXT
        resourceSettings:
          type: GROUPS
          targetResources:
            - 00g1emaKYZTWRYYRRTSK
        requestSettings:
          type: EVERYONE
          requesterFields:
            - prompt: What is the business justification?
              required: true
              input:
                type: TEXT
    request-type-resource-settings-custom:
