        propertyName: type
        mapping:
          APPS: '#/components/schemas/request-type-resource-settings-apps'
          GROUPS: '#/components/schemas/request-type-resource-settings-groups'
          ENTITLEMENT_BUNDLES: '#/components/schemas/request-type-resource-settings-entitlement-bundles'
          CUSTOM: '#/components/schemas/request-type-resource-settings-custom'
    field-id:
      type: string
      description: |-
        A `read-only` field ID.

        This field is useful for specifying `requesterFieldValues` when adding a request.

        The generated value is a UUID v4 from [RFC4122](https://www.ietf.org/rfc/rfc4122.txt).
      format: uuid
      maxLength: 36
      minLength: 36
      readOnly: true
      example: 1b9d6bcd-bbfd-4b2d-9b5d-ab8dfbbd4bed
    base-field-readable:
      type: object
      required:
        - id
      properties:
        id:
          $ref: '#/components/schemas/field-id'
    base-field:
      type: object
      description: The field to use when prompting the user
      allOf:
        - $ref: '#/components/schemas/base-field-writable'
        - $ref: '#/components/schemas/base-field-readable'
    field-select:
      type: object
      allOf:
        - $ref: '#/components/schemas/base-field'
