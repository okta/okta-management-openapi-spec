        - value
      properties:
        type:
          $ref: '#/components/schemas/field-text-type'
        value:
          $ref: '#/components/schemas/field-text-value'
    field-value:
      description: The field value provided by the user
      oneOf:
        - $ref: '#/components/schemas/field-value-date'
        - $ref: '#/components/schemas/field-value-select'
        - $ref: '#/components/schemas/field-value-text'
