        Unlike requester fields, all approver fields are *required* and may not be set as optional.
      default: []
      maxItems: 5
      items:
        $ref: '#/components/schemas/field-writable'
    request-type-approval-member-of-writable:
      type: object
      description: An approval when the approver must be a member of a particular Okta Group.
      required:
        - approverType
