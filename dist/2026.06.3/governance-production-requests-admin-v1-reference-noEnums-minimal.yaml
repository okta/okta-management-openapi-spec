      description: A completed access request approval
      required:
        - status
        - action
        - actionId
        - actionStatus
        - actionAttempted
        - resourceId
        - resourceName
        - resourceType
      allOf:
        - $ref: '#/components/schemas/okta-resource-readable'
      properties:
