        - self
      properties:
        createRequest:
          description: Only available for request type with status of ACTIVE
          allOf:
            - $ref: '#/components/schemas/link'
        requests:
          $ref: '#/components/schemas/link'
        self:
          $ref: '#/components/schemas/link'
      additionalProperties:
        $ref: '#/components/schemas/link'
    request-type-sparse:
