          description: URL to a logo image. Only present for app filter options.
          example: https://example.okta.com/img/salesforce-logo.png
        metadata:
          type: object
          description: |
            Additional metadata properties for the filter option. Only present for certain filter types.

            For the `labels` filter type, metadata contains:
            * `values`: array of label values, each with `id`, `name`, and `backgroundColor`
              * `backgroundColor`: [`red`, `orange`, `yellow`, `green`, `blue`, `purple`, `teal`, `beige`, `gray`]
          additionalProperties: true
    resource-inventory-filter-options-list:
      type: object
      x-okta-ignore-redocly-rules-for-sdk: true
      required:
        - data
        - _links
        - metadata
      properties:
        data:
          type: array
          description: List of filtering options on the current page
          items:
            $ref: '#/components/schemas/resource-inventory-filter-option'
        _links:
          $ref: '#/components/schemas/list-links'
        metadata:
          $ref: '#/components/schemas/list-metadata'
  parameters:
    campaigns-filter:
      name: filter
      description: |
        Apply various filters by using supported campaign filtering properties.

        **Note:** Query parameter percent encoding is required. See [Percent-encoding](https://developer.mozilla.org/en-US/docs/Glossary/Percent-encoding)
      in: query
      required: false
      schema:
        type: string
      examples:
        FilterByCampaignName:
          summary: Filter by campaign name
          value: name eq "Sales Review"
        FilterByCampaignStatus:
          summary: Filter by campaign status
          value: status eq "SCHEDULED"
        FilterByMultipleCampaignStatus:
          summary: Filter by multiple campaign status
          value: status eq "COMPLETED" OR status eq "SCHEDULED"
        FilterByStartDate:
          summary: Filter by start date
          value: startDate gt "2022-05-24T14:15:22Z"
        FilterByEndDate:
          summary: Filter by end date
          value: endDate gt "2022-05-24T14:15:22Z"
        FilterByScheduleTypeOneOff:
          value: scheduleType eq ONE_OFF
        FilterByScheduleTypeRecurring:
          value: scheduleType eq RECURRING
        FilterByReviewerTypeUser:
          value: reviewerType eq USER
        FilterByReviewerTypeGroup:
          value: reviewerType eq GROUP
        FilterByReviewerTypeGroupOwner:
          value: reviewerType eq RESOURCE_OWNER
        FilterByReviewerTypeMultiLevel:
          value: reviewerType eq MULTI_LEVEL
        FilterByRecurringCampaignId:
          value: recurringCampaignId eq "icijNW29nev6qyksD0g1"
    after:
      name: after
      description: |-
        Specifies the pagination cursor for the next page of results.
        Treat this as an opaque value obtained through the standard link headers. See [pagination](https://developer.okta.com/docs/api/#pagination).
      in: query
      required: false
      schema:
        type: string
        example: 00u68w6vzKLultXS97g6
    limit:
      name: limit
      description: The maximum number of records returned in a response
      in: query
      required: false
      schema:
        type: integer
        default: 20
        maximum: 200
        minimum: 1
    campaigns-order-by:
      name: orderBy
      description: |
        Apply an ordering of campaigns by specifying a supported campaign property name with `%20asc` or `%20desc` suffix.

        **Note:** Query parameter percent encoding is required. See [Percent-encoding](https://developer.mozilla.org/en-US/docs/Glossary/Percent-encoding)
      in: query
      required: false
      style: form
      explode: false
      schema:
        type: array
        uniqueItems: false
        minItems: 1
        maxItems: 1
        items:
          type: string
          description: A property of items within the collection, optionally followed by a ` asc` or ` desc` suffix.
        default:
          - created asc
      examples:
        OrderByName:
          summary: Order by name
          value: name desc
        OrderByCreated:
          summary: Order by created
          value: created desc
        OrderByStartDate:
          summary: Order by startDate
          value: startDate desc
        OrderByEndDate:
          summary: Order by endDate
          value: endDate desc
        OrderByStatus:
          summary: Order by status
          value: status desc
    campaign-id:
      name: campaignId
      description: Unique identifier for the campaign
      in: path
      required: true
      schema:
        type: string
    reviews-filter:
      name: filter
      description: |
        A [filter](https://developer.okta.com/docs/api/#filter) expression that filters a collection of reviews in the response.
        The filter expression supports the `eq` [operator](https://developer.okta.com/docs/api/#operators) and the following properties:
        * `campaignId`
        * `principalId` (corresponds to `principalProfile.id`)
        * `reviewerId` (corresponds to `reviewerProfile.id`)
        * `decision`
        * `resourceId`
        * `reviewerType`
        * `reviewerLevel` (corresponds to `currentReviewerLevel`)
        * `entitlementValueId` (corresponds to `entitlementValue.id`)
        * `entitlementBundleId` (corresponds to `entitlementBundle.id`)

        > **Note:** Query parameter percent encoding is required. See [Percent-encoding](https://developer.mozilla.org/en-US/docs/Glossary/Percent-encoding).
      in: query
      required: false
      schema:
        type: string
      examples:
        FilterByCampaignId:
          summary: Filter by campaign ID
          value: campaignId eq "icitdyhndQ6qstyvR8g5"
        FilterByReviewDecision:
          summary: Filter by review decision
          value: decision eq "UNREVIEWED"
        FilterByReviewerId:
          summary: Filter by reviewer ID
          value: reviewerId eq "00u5v5viPvg84h0W68g4"
        FilterByGroupResourceId:
          summary: Filter by group resource ID
          value: resourceId eq "00gyqjxNrsh764hjs784"
        FilterByAppResourceId:
          summary: Filter by app resource ID
          value: resourceId eq "00ayqjxNrZD11n4w40g3"
        FilterByPrincipalId:
          summary: Filter by principal user ID
          value: principalId eq "00u5v5viPvg84h0W68g4"
        FilterByReviewerType:
          summary: Filter by reviewerType
          value: reviewerType eq "USER"
        FilterByReviewerLevel:
          summary: Filter by reviewer level
          value: reviewerLevel eq "FIRST"
        FilterByEntitlementId:
          summary: Filter by entitlement value ID
          value: entitlementValueId eq "enthzzPJAXvaYQ71T0g3"
        FilterByEntitlementType:
          summary: Filter by entitlement bundle ID
          value: entitlementBundleId eq "enbisi7xt3iBd39Bn0g3"
    reviews-order-by:
      name: orderBy
      description: |
        Specifies a property to sort the results. The following properties are supported:
        - `decided`
        - `decision`
        - `remediationStatus`
        - `created`

        Append `desc` or `asc` to indicate the sorting direction.

        By default, the results are sorted by `created` in ascending order (`created asc`).

        > **Note:** Query parameter percent encoding is required. See [Percent-encoding](https://developer.mozilla.org/en-US/docs/Glossary/Percent-encoding).
      in: query
      required: false
      style: form
      explode: false
      schema:
        type: array
        uniqueItems: false
        minItems: 1
        maxItems: 1
        items:
          type: string
          description: A property of items within the collection, optionally followed by a ` asc` or ` desc` suffix.
        default:
          - created asc
      examples:
        OrderByDecided:
          summary: Order by decided
          value: decided desc
        OrderByDecision:
          summary: Order by decision
          value: decision desc
        OrderByRemediationStatus:
          summary: Order by remediationStatus
          value: remediationStatus desc
        OrderByCreated:
          summary: Order by created
          value: created desc
    review-id:
      name: reviewId
      description: Unique identifier for the review
      in: path
      required: true
      schema:
        type: string
    entitlement-bundles-list-filter:
      name: filter
      description: |
        A [filter](https://developer.okta.com/docs/api/#filter) expression that returns entries based on the following properties and supported operators:
        * `id`: supports `eq`, `gt`
        * `lastUpdated`: supports `gt`, `ge`, `le`, and `lt`
        * `targetResourceOrn`: supports `eq`
        * `target.externalId`:  supports `eq`
        * `target.type`:  supports `eq`
        * `status`:  supports `eq`
        * `name`:  supports `eq` and `co`

        > **Note:** Query parameter percent encoding is required. See [Special characters](https://developer.okta.com/docs/api/#special-characters).
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/scim-filter'
      x-scim-filter:
        id:
          operators:
            - eq
            - gt
          schema:
            $ref: '#/components/schemas/entitlement-bundle-id'
        lastUpdated:
          operators:
            - gt
            - ge
            - le
            - lt
          schema:
            $ref: '#/components/schemas/last-updated'
        targetResourceOrn:
          operators:
            - eq
          schema:
            $ref: '#/components/schemas/resource-orn'
        target.externalId:
          operators:
            - eq
          schema:
            $ref: '#/components/schemas/resource-id'
        target.type:
          operators:
            - eq
          schema:
            $ref: '#/components/schemas/resource-type'
        status:
          operators:
            - eq
          schema:
            $ref: '#/components/schemas/entitlement-bundle-status'
        name:
          operators:
            - sw
            - co
          schema:
            $ref: '#/components/schemas/bundle-writable-standard-properties/properties/name'
      examples:
        FilterByLastUpdated:
          summary: Filter for results that were modified after a specific date
          value: lastUpdated gt "2022-05-24T14:15:22Z"
        FilterByLastUpdatedAndId:
          summary: Filter for results that were modified after lastUpdated and have object IDs greater than a specific value
          value: lastUpdated ge "2022-05-24T14:15:22Z" AND id gt "0bbfxqCAJWWGELFTYBBB"
        FilterByLastUpdatedOrLastUpdatedAndId:
          summary: Filter for results by the lastUpdated date or by the lastUpdated date and the object ID
          value: lastUpdated gt "2022-05-24T14:15:22Z" OR (lastUpdated ge "2022-05-24T14:15:22Z" AND id gt "0bbfxqCAJWWGELFTYBBB")
        FilterByTargetExternalIdAndTargetType:
          summary: Filter by target.externalId and target.type
          value: target.externalId eq "0oafxqCAJWWGELFTYASJ" AND target.type eq "APPLICATION"
        FilterByTargetResourceOrn:
          summary: Filter by resource ORN representing a single resource
          value: targetResourceOrn eq "orn:okta:idp:00o11edPwGqbUrsDm0g4:apps:oidc:0oafxqCAJWWGELFTYASJ"
        FilterByStatus:
          summary: Filter by status
          value: status eq "ACTIVE"
        FilterByNamePrefix:
          summary: Filter by a prefix in the name
          value: name sw "sales"
        FilterByNameContains:
          summary: Filter by a name substring
          value: name co "sales"
        FilterBySpecificBundleIds:
          summary: Filter by specific bundle IDs
          value: id eq "enbg0wqnRSOEiCqvE0g5" OR id eq "enb673d4pGgTpgmxz0g5"
    entitlement-bundles-list-after:
      name: after
      description: The after cursor provided by a prior request.
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/entitlement-bundle-id'
    entitlement-bundles-list-order-by:
      name: orderBy
      description: |
        Apply an ordering of entitlement-bundles by specifying a supported entitlement bundle property name with `%20asc` or `%20desc` suffix.

        **Note:** Query parameter percent encoding is required. See [Percent-encoding](https://developer.mozilla.org/en-US/docs/Glossary/Percent-encoding)
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/order-by'
      x-order-by:
        attributes:
          - created
          - lastUpdated
      examples:
        OrderByCreated:
          summary: Order by created
          value: created desc
        OrderByLastUpdated:
          summary: Order by lastUpdated
          value: lastUpdated desc
        OrderByLastUpdatedAndId:
          summary: Order by lastUpdated and id
          value: lastUpdated asc,id asc
    entitlement-bundles-include-param:
      name: include
      description: The `include` filter adds additional properties that are available in the retrieve an entitlement bundle operation, but are omitted from the list response normally.
      in: query
      required: false
      schema:
        type: array
        items:
          type: string
          enum:
            - full_entitlements
      examples:
        IncludeEntitlements:
          summary: Include entitlements in response
          description: 'Query param: ?include=full_entitlements'
          value: full_entitlements
    entitlement-bundle-id:
      name: entitlementBundleId
      description: Unique identifier for the entitlement bundle
      in: path
      required: true
      schema:
        type: string
    resource-assets-filter:
      name: filter
      description: |
        A [filter](https://developer.okta.com/docs/api/#filter) expression that returns assets for a resource.

        Required filtering properties:
        * `resource.orn`: Filter by resource orn (supports `eq`)

        Optional filtering properties:
        **Asset Properties:**
        * `asset.id`: Filter by resource asset ID (supports `eq`)
        * `asset.name`:  Filter by resource asset name (supports `eq`, `sw`, and `co`)
        * `asset.type.id`: Filter by resource asset type ID (supports `eq`)
        * `asset.externalId`: Filter by resource asset external ID (supports `eq`)
        * `asset.parentId`: Filter by resource asset parent ID (supports `eq`)

        **Owner Properties**:
        * `owner.id` - Filter by owner ID (supports `eq`)

        **Label Properties**:
        * `labelValue.id` - Filter by label value ID (supports `eq`)

        > **Note:** Query parameter percent encoding is required. See [Special characters](https://developer.okta.com/docs/api/#special-characters).
      in: query
      required: true
      schema:
        $ref: '#/components/schemas/scim-filter'
      x-scim-filter:
        resource.orn:
          operators:
            - eq
          type: string
        asset.id:
          operators:
            - eq
          type: string
        asset.name:
          operators:
            - eq
            - sw
            - co
          type: string
        asset.type.id:
          operators:
            - eq
          type: string
        asset.externalId:
          operators:
            - eq
          type: string
        asset.parentId:
          operators:
            - eq
          type: string
        owner.id:
          operators:
            - eq
          type: string
        labelValue.id:
          operators:
            - eq
          type: string
      examples:
        FilterByNameStartsWith:
          summary: Filter by the resource asset name, starting with the provided prefix
          value: asset.name sw "Proj" AND resource.orn eq "orn:okta:idp:00o11rndFqmZ5rNfs0g4:apps:my-app:0oafxqCAJWWGELFTYASJ"
        FilterByNameContainsOrExternalID:
          summary: Filter by the resource asset name that contains the provided substring or by external ID
          value: (asset.name co "123" OR asset.externalId eq "123456789012") AND resource.orn eq "orn:okta:idp:00o11rndFqmZ5rNfs0g4:apps:my-app:0oafxqCAJWWGELFTYASJ"
        FilterByTypeID:
          summary: Filter by the type ID of the resource asset
          value: asset.type.id eq "retabcdefgHIJKLMNOPQ" AND resource.orn eq "orn:okta:idp:00o11rndFqmZ5rNfs0g4:apps:my-app:0oafxqCAJWWGELFTYASJ"
        FilterByParentID:
          summary: Filter by the parent ID of the resource asset
          value: asset.parentId eq "reafxqCAJWWGELFTYASJ" AND resource.orn eq "orn:okta:idp:00o11rndFqmZ5rNfs0g4:apps:my-app:0oafxqCAJWWGELFTYASJ"
        FilterByOwnerID:
          summary: Filter by the resource asset owner ID
          value: owner.id eq "00ub0oNGTSWTBKOLGLNR" AND resource.orn eq "orn:okta:idp:00o11rndFqmZ5rNfs0g4:apps:my-app:0oafxqCAJWWGELFTYASJ"
        FilterByLabelValueId:
          summary: Filter by the ID of the label value assigned to the resource asset
          value: labelValue.id eq "lblo3v6xlwdtEX2il1d6" AND resource.orn eq "orn:okta:idp:00o11rndFqmZ5rNfs0g4:apps:my-app:0oafxqCAJWWGELFTYASJ"
    resource-assets-include:
      name: include
      description: The `include` filter adds additional properties that are normally omitted from the list response.
      in: query
      required: false
      schema:
        type: array
        items:
          type: string
          enum:
            - children_info
            - ancestors
      examples:
        IncludeChildrenInfo:
          summary: Include children hierarchy information in response
          description: 'Query param: ?include=children_info'
          value: children_info
        IncludeAncestors:
          summary: Include ancestor hierarchy information in response
          description: 'Query param: ?include=ancestors'
          value: ancestors
