      description: An entry in the access path that represents a node through which access is obtained indirectly
      required:
        - resourceOrn
        - name
      properties:
        resourceOrn:
          $ref: '#/components/schemas/resource-orn'
        name:
          type: string
          description: The display name of the access path node (for example, group name, resource asset name)
    scoped-entitlement-resource-asset:
      type: object
      description: A resource asset associated with a scoped entitlement
      required:
        - id
        - orn
        - type
        - name
      properties:
        id:
          type: string
          description: The identifier of the resource asset
          minLength: 1
          maxLength: 512
        orn:
          $ref: '#/components/schemas/resource-orn'
        type:
          $ref: '#/components/schemas/resource-asset-type-sparse'
        name:
          $ref: '#/components/schemas/resource-asset-name'
    scoped-entitlement-item:
      type: object
      description: A scoped entitlement grouping entitlements under a specific resource asset
      required:
        - resourceAssetId
        - resourceAsset
        - entitlements
      properties:
        resourceAssetId:
          type: string
          description: The identifier of the resource asset associated with this scoped entitlement
        resourceAsset:
          $ref: '#/components/schemas/scoped-entitlement-resource-asset'
        entitlements:
          type: array
          description: Entitlements associated with this resource asset
          items:
            $ref: '#/components/schemas/entitlement-full'
    indirect-access:
      type: object
      description: Access obtained indirectly through group membership or resource asset hierarchy, including the entitlements and access path
      required:
        - grant
        - scopedEntitlements
      properties:
        grant:
          $ref: '#/components/schemas/grant-details'
        accessPath:
          type: array
          description: The path through which access was obtained
          minItems: 1
          items:
            $ref: '#/components/schemas/access-path-entry'
        scopedEntitlements:
          type: array
          description: Entitlements obtained through this grant grouped by resource asset scope
          minItems: 1
          items:
            $ref: '#/components/schemas/scoped-entitlement-item'
    indirect-access-list:
      type: object
      description: Paginated list of indirect access
      properties:
        data:
          type: array
          description: Array of indirect access
          items:
            $ref: '#/components/schemas/indirect-access'
          minItems: 0
        _links:
          $ref: '#/components/schemas/list-links'
    merge-existing-entitlements:
      type: boolean
      description: If true, would skip removing bundle grant and create an entitlement grant with delta. By default it is false.
    principal-access-policy-enable-creatable:
      type: object
      required:
        - principalOrn
        - resourceOrn
      properties:
        principalOrn:
          $ref: '#/components/schemas/user-orn'
        resourceOrn:
          $ref: '#/components/schemas/resource-orn'
        mergeExistingEntitlements:
          $ref: '#/components/schemas/merge-existing-entitlements'
    assignment-properties:
      properties:
        expirationTime:
          type: string
          description: The date on which the principal's access expires. This property is specified in [ISO 8601 duration format](https://en.wikipedia.org/wiki/ISO_8601#Durations).
          format: date-time
        timeZone:
          type: string
          description: The time zone, in IANA format, for the end date of the user access
          minLength: 1
          maxLength: 64
    assignment-object-type:
      type: string
      description: Identifies assignment type. assignmentObject will be present when assignmentObjectType is Bundle or Collection.
      x-okta-known-values:
        - ENTITLEMENT_BUNDLE
        - COLLECTION
        - ENTITLEMENT
    assignment-object-id:
      description: Unique identifier of assignmentObject
      type: string
      minLength: 1
      maxLength: 20
    assignment-object-orn:
      type: string
      format: okta-resource-orn
      description: ORN of the assignmentObject
    assignment-object-name:
      type: string
      description: The name of the assignmentObject
      minLength: 1
      maxLength: 255
    assignment-object-description:
      type: string
      nullable: false
      description: The human-readable description of the assignmentObject
      maxLength: 1000
      minLength: 1
    assignment-object:
      type: object
      description: Assignment object
      properties:
        id:
          $ref: '#/components/schemas/assignment-object-id'
        orn:
          $ref: '#/components/schemas/assignment-object-orn'
        name:
          $ref: '#/components/schemas/assignment-object-name'
        description:
          $ref: '#/components/schemas/assignment-object-description'
    assignment-method:
      type: string
      description: Assignment method
      x-okta-known-values:
        - POLICY
        - ACCESS_REQUEST
        - ADMIN
        - API
    grant-object:
      type: object
      description: Unique identifier for the object
      properties:
        id:
          description: Unique identifier for the object
          type: string
          minLength: 1
    entitlement-access-details-object:
      type: object
      description: Entitlement access details
      required:
        - entitlements
        - assignmentObjectType
        - assignmentMethod
      properties:
        assignmentObjectType:
          $ref: '#/components/schemas/assignment-object-type'
        assignmentObject:
          $ref: '#/components/schemas/assignment-object'
        assignmentMethod:
          $ref: '#/components/schemas/assignment-method'
        entitlements:
          $ref: '#/components/schemas/entitlements-full'
        accessDuration:
          $ref: '#/components/schemas/assignment-properties'
        grant:
          $ref: '#/components/schemas/grant-object'
    entitlement-access-details-list:
      type: array
      description: Entitlement access details
      nullable: false
      items:
        $ref: '#/components/schemas/entitlement-access-details-object'
    principal-access-policy-enable-response:
      description: Principal access policy enable
      required:
        - principalOrn
        - resourceOrn
        - effectiveEntitlements
      properties:
        principalOrn:
          $ref: '#/components/schemas/user-orn'
        resourceOrn:
          $ref: '#/components/schemas/resource-orn'
        accessDuration:
          $ref: '#/components/schemas/assignment-properties'
        effectiveEntitlements:
          $ref: '#/components/schemas/entitlements-full'
        entitlementAccessDetails:
          $ref: '#/components/schemas/entitlement-access-details-list'
    entitlement-settings-response-status:
      type: string
      description: The status showing whether the resource is opted in to (enabled) or out of (disabled) entitlement management
      x-enumDescriptions:
        OPTING_IN: The resource is in the process of opting in to entitlement management
        OPTED_IN: The resource is opted in to entitlement management
        OPTING_OUT: The resource is in the process of opting out of entitlement management
        OPTED_OUT: The resource is opted out of the entitlement management
      x-okta-known-values:
        - OPTING_IN
        - OPTED_IN
        - OPTING_OUT
        - OPTED_OUT
    entitlement-settings-full:
      description: Entitlement settings for a resource
      required:
        - status
      properties:
        status:
          $ref: '#/components/schemas/entitlement-settings-response-status'
    entitlement-settings-request-status:
      type: string
      x-enum-varnames:
        - OPTED_IN
        - OPTED_OUT
      description: Specify to opt in (enable) or opt out of (disable) entitlement management for the resource
      x-okta-known-values:
        - OPTED_IN
        - OPTED_OUT
    entitlement-settings-updatable:
      type: object
      required:
        - status
      properties:
        status:
          $ref: '#/components/schemas/entitlement-settings-request-status'
    access-duration:
      type: object
      description: Specifies the duration of access with an expiration time and timezone
      required:
        - expirationTime
        - timezone
      properties:
        expirationTime:
          type: string
          format: date-time
          description: The date and time when access expires, in ISO 8601 format
          example: '2025-12-31T23:59:59Z'
        timezone:
          type: string
          description: The timezone for the expiration time, in IANA format
          minLength: 1
          maxLength: 64
          example: America/Los_Angeles
    grant-principal-entitlement-group:
      type: object
      description: |-
        A group of entitlement values optionally scoped to a resource asset.
        When `resourceAssetOrn` is omitted, the entitlements are at the app level.
        When `resourceAssetOrn` is present, the entitlements are scoped to that specific resource asset.
      required:
        - entitlementValueOrns
      properties:
        resourceAssetOrn:
          type: string
          x-okta-ignore-redocly-rules-for-sdk: true
          format: okta-resource-orn
          description: |-
            The ORN of the resource asset to scope the entitlements to.
            Omit this field for app-level entitlements that aren't tied to a specific resource asset.
          example: orn:okta:governance:00o11edPwGqbUrsDm0g4:resource-assets:reafxqCAJWWGELFTYASJ
        entitlementValueOrns:
          type: array
          description: List of entitlement value ORNs to grant within this scope
          minItems: 1
          maxItems: 50
          items:
            type: string
            format: okta-resource-orn
            description: The ORN of an entitlement value
            example: orn:okta:governance:00o11edPwGqbUrsDm0g4:entitlement-values:env1o5jo0bHpxiDVJ0g5
    grant-principal-entitlement-data-entitlement:
      type: object
      description: |-
        Entitlement data for direct entitlement assignment.
        Entitlements can be grouped by resource asset scope. Each group contains
        one or more entitlement values to grant.
      required:
        - type
        - entitlements
      properties:
        type:
          type: string
          enum:
            - ENTITLEMENT
          description: Indicates direct entitlement assignment
        entitlements:
          type: array
          description: |-
            List of entitlement data. Each entry optionally specifies a resource asset scope.
            Entry without `resourceAssetOrn` represent app-level entitlements.
          minItems: 1
          maxItems: 5
          items:
            $ref: '#/components/schemas/grant-principal-entitlement-group'
        accessDuration:
          description: Duration of access for the entitlements. Independent of the top-level `accessDuration` that controls the app assignment duration.
          $ref: '#/components/schemas/access-duration'
    grant-principal-entitlement-data-bundle:
      type: object
      description: |-
        Entitlement data for entitlement bundle assignment.
        The server resolves the bundle contents to determine the actual entitlements to grant.
      required:
        - type
        - entitlementBundleOrn
      properties:
        type:
          type: string
          enum:
            - ENTITLEMENT_BUNDLE
          description: Indicates entitlement bundle assignment
        entitlementBundleOrn:
          type: string
          x-okta-ignore-redocly-rules-for-sdk: true
          format: okta-resource-orn
          description: The ORN of the entitlement bundle to grant
          example: orn:okta:governance:00o11edPwGqbUrsDm0g4:entitlement-bundles:enb1o5jmfBTZUCzcW0g5
        accessDuration:
          description: Duration of access for the entitlement bundle. Independent of the top-level `accessDuration` that controls the app assignment duration.
          $ref: '#/components/schemas/access-duration'
    grant-principal-entitlement-data:
      description: |-
        Specifies the entitlements to grant to the principal. Discriminated by `type`:
        - `ENTITLEMENT`: Direct entitlement assignment with grouped entitlement values
        - `ENTITLEMENT_BUNDLE`: Entitlement bundle assignment
      oneOf:
        - $ref: '#/components/schemas/grant-principal-entitlement-data-entitlement'
        - $ref: '#/components/schemas/grant-principal-entitlement-data-bundle'
      discriminator:
        propertyName: type
        mapping:
          ENTITLEMENT: '#/components/schemas/grant-principal-entitlement-data-entitlement'
          ENTITLEMENT_BUNDLE: '#/components/schemas/grant-principal-entitlement-data-bundle'
    grant-principal-access-request:
      type: object
      description: |-
        Request body for granting a principal access to a resource.
        At minimum, `principalOrn` and `resourceOrn` are required to grant app-level access.
        Optionally, specify `entitlementData` to grant specific entitlements or bundles,
        and `accessDuration` to set an expiration on the app assignment.
      required:
        - principalOrn
        - resourceOrn
      properties:
        principalOrn:
          $ref: '#/components/schemas/user-orn'
        resourceOrn:
          type: string
          x-okta-ignore-redocly-rules-for-sdk: true
          format: okta-resource-orn
          description: The ORN of the app resource to grant access to
          example: orn:okta:idp:00o11edPwGqbUrsDm0g4:apps:salesforce:0oa251e7jQHXVgg5r0g4
        actor:
          $ref: '#/components/schemas/grant-actor'
        accessDuration:
          $ref: '#/components/schemas/access-duration'
        entitlementData:
          $ref: '#/components/schemas/grant-principal-entitlement-data'
    grant-principal-access-response:
      type: object
      description: Response for a successful grant principal access request
      properties:
        _links:
          type: object
          description: Links to related resources
          properties:
            principalAccess:
              type: object
              description: Link to retrieve the principal's access
              properties:
                href:
                  type: string
                  format: uri
                  description: The URL to the principal access GET endpoint
                  example: https://{myOktaDomain}/governance/api/v1/principal-access?filter=targetPrincipalOrn eq "orn:okta:directory:00o11edPwGqbUrsDm0g4:users:00um8cshZwJhHgpvV0g4" and parentResourceOrn eq "orn:okta:idp:00o11edPwGqbUrsDm0g4:apps:salesforce:0oa251e7jQHXVgg5r0g4"
              required:
                - href
          required:
            - principalAccess
      required:
        - _links
    revoke-principal-access-creatable:
      type: object
      required:
        - principalOrn
        - revokeOrns
      properties:
        principalOrn:
          $ref: '#/components/schemas/user-orn'
        actor:
          $ref: '#/components/schemas/grant-actor'
        revokeOrns:
          type: array
          description: |-
            List of resource [ORNs](https://developer.okta.com/docs/api/openapi/okta-management/guides/roles/#okta-resource-name-orn) to revoke access:
              * Entitlement value and entitlement bundle resources can be combined in a single request (with a maximum of five resources in a request).
              * App resources must be revoked separately (a request can only contain one app ORN).
          minItems: 1
          maxItems: 5
          items:
            type: string
            description: ORN of the resource to revoke access (entitlement value, entitlement bundle, or app)
            example: orn:okta:governance:00o11rndFqmZ5rNfs0g4:entitlement-values:ent65J1scEgrRZbjT0g2
    revoke-principal-access-resource-links:
      description: Links to related resources for a revoked resource
      type: object
      properties:
        _links:
          type: object
          description: Links to related resources for a revoked-access resource
          properties:
            principal-access:
              type: object
              description: Principal access resources
              properties:
                href:
                  type: string
                  description: Link to principal access resources
                  example: https://myorg.okta.com/governance/api/v1/principal-access?filter=parent.externalId eq "0oafxqCAJWWGELFTYASJ" AND parent.type eq "APPLICATION" AND targetPrincipal.externalId eq "00ub0oNGTSWTBKOLGLNR" AND targetPrincipal.type eq "OKTA_USER"
            principal-entitlements:
              type: object
              description: Principal entitlement resources
              properties:
                href:
                  type: string
                  description: Link to principal entitlements
                  example: https://myorg.okta.com/governance/api/v1/principal-entitlements?filter=parent.externalId eq "0oafxqCAJWWGELFTYASJ" AND parent.type eq "APPLICATION" AND targetPrincipal.externalId eq "00ub0oNGTSWTBKOLGLNR" AND targetPrincipal.type eq "OKTA_USER"
    revoke-principal-access-response:
      description: Revoke principal access response
      type: object
      properties:
        data:
          type: array
          description: List of related links for each revoked-access resource
          items:
            $ref: '#/components/schemas/revoke-principal-access-resource-links'
    revoke-external-user-entitlement-creatable:
      type: object
      required:
        - principal
        - revokeOrns
      properties:
        principal:
          type: string
          description: |-
            The external/source-system identifier of the unmanaged user whose
            entitlements are being revoked. Provided by the source app at import time.
          example: jdoe@example.com
        actor:
          $ref: '#/components/schemas/grant-actor'
        revokeOrns:
          type: array
          description: |-
            List of entitlement-value [ORNs](https://developer.okta.com/docs/api/openapi/okta-management/guides/roles/#okta-resource-name-orn)
            to revoke for this external user
          minItems: 1
          maxItems: 5
          items:
            type: string
            description: ORN of the entitlement value to revoke
            example: orn:okta:governance:00o11rndFqmZ5rNfs0g4:entitlement-values:ent65J1scEgrRZbjT0g2
    collection-properties-writable:
      type: object
      x-okta-ignore-redocly-rules-for-sdk: true
      properties:
        name:
          type: string
          nullable: false
          description: The name of a resource collection
          maxLength: 255
          minLength: 1
        description:
          type: string
          nullable: false
          description: The human-readable description
          maxLength: 1000
          minLength: 1
    okta-collection-orn:
      type: string
      format: okta-resource-orn
      description: The `id` of the collection in [ORN format](https://developer.okta.com/docs/api/openapi/okta-management/guides/roles/#okta-resource-name-orn).
    collection-counts:
      type: object
      description: Collection count metadata
      required:
        - principalAssignmentCount
        - resourceCounts
      properties:
        principalAssignmentCount:
          type: integer
          description: Number of principals assigned
          minimum: 0
          example: 28
        resourceCounts:
          type: object
          description: Collection resource counts
          required:
            - applications
          properties:
            applications:
              type: integer
              description: Number of app resources in a collection
              minimum: 0
              example: 3
    collection-links:
      type: object
      description: Links available on a resource collection
      required:
        - resources
      properties:
        resources:
          $ref: '#/components/schemas/link'
    collection-full:
      description: Full representation of a collection response
      allOf:
        - $ref: '#/components/schemas/collection-properties-writable'
        - $ref: '#/components/schemas/read-only-standard-properties'
      required:
        - id
        - name
        - orn
        - created
        - createdBy
        - lastUpdated
        - lastUpdatedBy
        - _links
      properties:
        orn:
          $ref: '#/components/schemas/okta-collection-orn'
        counts:
          $ref: '#/components/schemas/collection-counts'
        _links:
          $ref: '#/components/schemas/collection-links'
    collections-list:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/collection-full'
        _links:
          $ref: '#/components/schemas/list-links'
        metadata:
          $ref: '#/components/schemas/list-metadata'
    collection-creatable:
      description: The properties expected when creating a new empty collection
      x-okta-ignore-redocly-rules-for-sdk: true
      required:
        - name
      allOf:
        - $ref: '#/components/schemas/collection-properties-writable'
    collection-updatable:
      description: Full representation of a collection to be updated
      x-okta-ignore-redocly-rules-for-sdk: true
      allOf:
        - $ref: '#/components/schemas/collection-properties-writable'
      required:
        - name
    app-resource-orn:
      type: string
      format: okta-resource-orn
      description: |
        The ORN identifier for a specific app. Other resource types aren't supported.

        See the [supported-resources](https://developer.okta.com/docs/api/openapi/okta-management/guides/roles/#supported-resources) endpoint for reference.
    collection-resource-properties-writable:
      type: object
      properties:
        resourceOrn:
          $ref: '#/components/schemas/app-resource-orn'
    collection-resource-links:
      type: object
      description: Links available on a resource within a resource collection
      required:
        - entitlements
      properties:
        entitlements:
          $ref: '#/components/schemas/link'
    collection-resource-properties-read-only:
      type: object
      properties:
        resourceId:
          $ref: '#/components/schemas/resource-id'
        _links:
          $ref: '#/components/schemas/collection-resource-links'
    resource-profile:
      type: object
      description: A limited set of properties from the resource's profile
      properties:
        id:
          type: string
          description: Okta application instance `id`
          minLength: 20
          maxLength: 20
        name:
          type: string
          description: The name of the Okta app
          minLength: 1
          maxLength: 255
        label:
          type: string
          description: The label of the Okta app
          minLength: 1
          maxLength: 255
        logo:
          type: array
          description: List of app logo resources
          items:
            $ref: '#/components/schemas/link'
    collection-resource-entitlement-value-count:
      type: integer
      description: The number of entitlements associated with this resource in the collection. Use the `include` query parameter to return this count in the response.
      minimum: 0
    collection-resource-full:
      description: Full representation of a resource within a resource collection
      allOf:
        - $ref: '#/components/schemas/collection-resource-properties-writable'
        - $ref: '#/components/schemas/collection-resource-properties-read-only'
      required:
        - resourceOrn
        - _links
      properties:
        resourceProfile:
          $ref: '#/components/schemas/resource-profile'
        entitlements:
          description: The entitlements associated with the collection. Use the `include` query parameter to return entitlements for the collection.
          $ref: '#/components/schemas/entitlements-full'
        entitlementValueCount:
          $ref: '#/components/schemas/collection-resource-entitlement-value-count'
    collection-resources-list:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/collection-resource-full'
        _links:
          $ref: '#/components/schemas/list-links'
        metadata:
          $ref: '#/components/schemas/list-metadata'
    collection-resource-creatable:
      description: The properties expected when adding a new resource to a collection
      x-okta-ignore-redocly-rules-for-sdk: true
      allOf:
        - $ref: '#/components/schemas/collection-resource-properties-writable'
      required:
        - resourceOrn
      properties:
        entitlements:
          $ref: '#/components/schemas/entitlements-creatable'
    collection-resource-updatable:
      description: the updatable properties of a collection resource
      properties:
        entitlements:
          $ref: '#/components/schemas/entitlements-creatable'
    principal-profile:
      type: object
      x-okta-ignore-redocly-rules-for-sdk: true
      description: A limited set of properties from the principal's profile
      required:
        - id
        - email
        - status
      properties:
        id:
          type: string
          description: The Okta user `id`
          minLength: 1
          maxLength: 20
        email:
          type: string
          description: The Okta user's email address
          minLength: 1
          maxLength: 100
        firstName:
          type: string
          description: The Okta user's first name
          minLength: 0
          maxLength: 50
        lastName:
          type: string
          description: The Okta user's last name
          minLength: 0
          maxLength: 50
        login:
          type: string
          description: The Okta user's sign-in credentials, which is often their email address
          minLength: 1
          maxLength: 100
        status:
          $ref: '#/components/schemas/principal-profile-status'
    self-link:
      type: object
      description: Links available for an object
      required:
        - self
      properties:
        self:
          $ref: '#/components/schemas/link'
    list-catalog-users:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/principal-profile'
        _links:
          $ref: '#/components/schemas/self-link'
    assigned-principal:
      type: object
      x-okta-ignore-redocly-rules-for-sdk: true
      allOf:
        - $ref: '#/components/schemas/assignment-properties'
        - type: object
          properties:
            principal:
              $ref: '#/components/schemas/target-principal-full'
            actor:
              $ref: '#/components/schemas/grant-actor'
            collectionId:
              $ref: '#/components/schemas/collection-id'
    principal-assignment-type:
      type: string
      description: Collection assignment type or source
      default: INDIVIDUAL
      x-okta-known-values:
        - INDIVIDUAL
    assigned-principal-full:
      type: object
      x-okta-ignore-redocly-rules-for-sdk: true
      allOf:
        - $ref: '#/components/schemas/assigned-principal'
        - type: object
          properties:
            id:
              type: string
              description: The assignment `id`
              maxLength: 20
              minLength: 20
            assignmentType:
              $ref: '#/components/schemas/principal-assignment-type'
    assigned-principal-details:
      type: object
      x-okta-ignore-redocly-rules-for-sdk: true
      allOf:
        - $ref: '#/components/schemas/assigned-principal-full'
        - type: object
          properties:
            principalProfile:
              $ref: '#/components/schemas/principal-profile'
    pagination-links:
      type: object
      description: Links available in principal assignments list response
      required:
        - self
      properties:
