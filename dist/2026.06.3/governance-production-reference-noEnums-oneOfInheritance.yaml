      properties:
        id:
          description: ID of the operation
          type: string
          minLength: 1
        type:
          description: The operation type
          type: string
          minLength: 1
        status:
          $ref: '#/components/schemas/operation-status'
        created:
          $ref: '#/components/schemas/operation-created'
        completed:
          $ref: '#/components/schemas/operation-completed'
        timeElapsedInSeconds:
