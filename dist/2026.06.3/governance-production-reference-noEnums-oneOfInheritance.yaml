      x-scim-filter:
        name:
          operators:
            - sw
            - co
          type: String
        id:
          operators:
            - eq
          type: String
      examples:
        searchCollectionsByName:
          summary: Search for resource collections with a name that begins with "Sales"
          value: name sw "Sales"
        searchCollectionsByNameContains:
          summary: Search for resource collections with a name that contains "Sales"
          value: name co "Sales"
        searchCollectionsById:
          summary: Search for resource collections with specific IDs
          value: id eq "coljqM9a9xerZfRpp0g2" or id eq "coljrNAph4LiA2C1m0g2"
