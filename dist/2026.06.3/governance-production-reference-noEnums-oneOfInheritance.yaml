        type: string
    collections-list-filter-v2:
      name: filter
      description: |
        A [filter](https://developer.okta.com/docs/api/#filter) expression that filters data based on `id`, `name`, `resourceOrn`, or `principalOrn` resource collection properties.
        The `sw` and `co` [operators](https://developer.okta.com/docs/api/#operators) are supported for `name`, and the `eq` operator is supported for `id`, `resourceOrn`, and `principalOrn`.

        When filtering by `resourceOrn`, Okta returns only collections that contain the specified resource.
        Each collection in the response includes a `resourceRelationship` object with details about when the resource was added.

        When filtering by `principalOrn`, Okta returns only collections assigned to the specified principal.
        Each collection in the response includes a `principalAssignment` object with assignment details.

        > **Note:** Query parameter percent encoding is required. See [Percent-encoding](https://developer.mozilla.org/en-US/docs/Glossary/Percent-encoding).
      in: query
      required: false
      schema:
        type: string
        format: scim-filter
        maxLength: 255
        example: name sw "Sales"
      x-scim-filter:
        name:
          operators:
            - sw
            - co
          type: String
        id:
          operators:
            - eq
          type: String
        resourceOrn:
          operators:
            - eq
          type: String
        principalOrn:
          operators:
            - eq
          type: String
      examples:
        searchCollectionsByName:
          summary: Search for resource collections with a name that begins with "Sales"
          value: name sw "Sales"
        searchCollectionsByNameContains:
          summary: Search for resource collections with a name that contains "Sales"
          value: name co "Sales"
        searchCollectionsById:
          summary: Search for resource collections with specific IDs
          value: id eq "coljqM9a9xerZfRpp0g2" or id eq "coljrNAph4LiA2C1m0g2"
        filterByResourceOrn:
          summary: Find collections that contain a specific resource
          value: resourceOrn eq "orn:okta:idp:00o1234567890:apps:0oa1234567890"
        filterByPrincipalOrn:
          summary: Find collections assigned to a specific principal
          value: principalOrn eq "orn:okta:idp:00o1234567890:users:00u1234567890"
    collection-resources-include-param-v2:
      name: include
      description: The `include` query parameter returns additional properties in the response.
      in: query
      required: false
      schema:
        type: array
        items:
          type: string
          enum:
            - counts
          x-enumDescriptions:
            counts: Returns `resourceConfiguration.counts` in the response
      example: counts
    collection-resource-include-param:
      name: include
      description: The `include` query parameter returns additional properties in the response.
      in: query
      required: false
      schema:
        type: array
        items:
          type: string
          enum:
            - labels
            - relatedApps
            - resourceProfile
          x-enumDescriptions:
            labels: Returns governance labels associated with the resource
            relatedApps: Returns related apps for group and push group resources. Ignored for app resources.
            resourceProfile: Returns the resource profile details (name, label, logo) for the resource.
      example: labels
    risk-rules-filter:
      name: filter
      description: |-
        A filter expression that returns entries based on the `resourceOrn` and `name` properties and supports the following operators:
        *  `eq` operator for the `resourceOrn` property
        *  `sw` and `co` operator for the `name` property

        > **Note:** Query parameter percent encoding is required. See [Special characters](https://developer.okta.com/docs/api/#special-characters).
      in: query
      schema:
        type: string
        format: scim-filter
        example: name sw "Process"
      x-scim-filter:
        resourceOrn:
          operators:
            - eq
          schema:
            $ref: '#/components/schemas/resource-orn'
        name:
          operators:
            - sw
            - co
          type: string
      examples:
        searchRiskRuleByName:
          summary: Search for risk rules with a name that begins with "Process"
          value: name sw "Process"
        searchRiskRuleByNameContains:
          summary: Search for risk rules with a name that contains "Process"
          value: name co "Process"
        searchByResourceOrn:
          summary: Search for risk rules with a specific resource ORN
          value: resourceOrn eq "orn:okta:idp:00o11edPwGqbUrsDm0g4:apps:oidc:0oafxqCAJWWGELFTYASJ"
    risk-rule-id:
      name: ruleId
      description: Unique identifier for the risk rule
      in: path
      required: true
      schema:
        type: string
    resource-owners-filter:
      name: filter
      description: |
        A [filter](https://developer.okta.com/docs/api/#filter) expression that returns entries based on the following properties and supported operators:
        * `parentResourceOrn`: supports `eq`
        * `resource.orn`: supports `eq`
        * `resource.type`: supports `eq`
        * `resource.profile.name`:  supports `sw` and `co` (both `parentResourceOrn` and `resource.type` filters are required for `resource.profile.name` filtering)
        * `principal.orn`: supports `eq` (must be combined with `resource.type eq "ai-agents"`)

        > **Note:** Query parameter percent encoding is required. See [Special characters](https://developer.okta.com/docs/api/#special-characters).

        > **Note:** The principal referenced by `principal.orn` must already exist as a registered resource owner in the system. If the principal has never been assigned as an owner, the API returns a `400` error rather than an empty result set.
      in: query
      required: true
      schema:
        $ref: '#/components/schemas/scim-filter'
      x-scim-filter:
        parentResourceOrn:
          operators:
            - eq
          schema:
            $ref: '#/components/schemas/resource-orn'
        resource.orn:
          operators:
            - eq
          type: string
          format: okta-resource-orn
          description: |-
            The ID of the resource in [ORN](https://developer.okta.com/docs/api/openapi/okta-management/guides/roles/#okta-resource-name-orn) format. 
            The resource can be an app, an entitlement value, an entitlement bundle, or a collection.
            See [supported resources](https://developer.okta.com/docs/api/openapi/okta-management/guides/roles/#supported-resources).
        resource.type:
          operators:
            - eq
          type: string
          description: The resource type value from the orn. Examples:- apps, entitlement-bundles, ai-agents
          x-okta-feature-flag-amends:
            IGA_ADVANCED_ENTITLEMENT_MANAGEMENT:
              description: 'The resource type value from the orn. Examples: apps, entitlement-bundles, resource-assets'
        resource.profile.name:
          operators:
            - sw
            - co
          type: string
        principal.orn:
          operators:
            - eq
          type: string
          format: okta-principal-orn
          description: |-
            The Okta user or group `id` in [ORN](https://developer.okta.com/docs/api/openapi/okta-management/guides/roles/#okta-resource-name-orn) format.
            The resource can be an user id, or a group id.
            See [Supported resources](https://developer.okta.com/docs/api/openapi/okta-management/guides/roles/#supported-resources).
      examples:
        FilterByParentResourceOrn:
          summary: Filter by parentResourceOrn
          value: parentResourceOrn eq "orn:okta:idp:00o11edPwGqbUrsDm0g4:apps:salesforce:0oafxqCAJWWGELFTYASJ"
        FilterByResourceOrn:
          summary: Filter by resource orn, which can be an app or a bundle
          value: parentResourceOrn eq "orn:okta:idp:00o11edPwGqbUrsDm0g4:apps:salesforce:0oafxqCAJWWGELFTYASJ" AND resource.orn eq "orn:okta:governance:00o11edPwGqbUrsDm0g4:entitlement-bundles:enbogpaj3XUzcM62u1d6"
        FilterByResourceOrnCollections:
          summary: Filter by resource orn, which is a collection
          value: resource.orn eq "orn:okta:governance:00o11edPwGqbUrsDm0g4:collections:colvmzzTr4xO45Ujn0g4"
        FilterByResourceType:
          summary: Filter by resource type, which can be an app or a bundle
          value: parentResourceOrn eq "orn:okta:idp:00o11edPwGqbUrsDm0g4:apps:salesforce:0oafxqCAJWWGELFTYASJ" AND resource.type eq "entitlement-bundles"
        FilterByResourceNameStartsWith:
          summary: Filter by the resource name for a specified resource type, starting with the provided prefix
          value: parentResourceOrn eq "orn:okta:idp:00o11edPwGqbUrsDm0g4:apps:salesforce:0oafxqCAJWWGELFTYASJ" AND resource.type eq "entitlement-bundles" AND resource.profile.name sw "License"
        FilterByResourceNameContains:
          summary: Filter by the resource name for a specified resource type that contains the provided substring
          value: parentResourceOrn eq "orn:okta:idp:00o11edPwGqbUrsDm0g4:apps:salesforce:0oafxqCAJWWGELFTYASJ" AND resource.type eq "entitlement-bundles" AND resource.profile.name co "License"
        FilterByResourceTypeAIAgents:
          summary: Filter by resource type ai-agents (standalone, without parentResourceOrn)
          value: resource.type eq "ai-agents"
        FilterByPrincipalOrnAndResourceType:
          summary: Filter by principal orn combined with resource type
          value: resource.type eq "ai-agents" AND principal.orn eq "orn:okta:directory:00o11edPwGqbUrsDm0g4:users:00u1tgwssMI9jYizU0g5"
        FilterByPrincipalOrnAndParentResourceOrnAIAgent:
          summary: Filter by principal orn combined with an AI agent parent resource orn
          value: resource.type eq "ai-agents" AND parentResourceOrn eq "orn:okta:directory:00o11edPwGqbUrsDm0g4:workload-principals:ai-agents:wp1234567890" AND principal.orn eq "orn:okta:directory:00o11edPwGqbUrsDm0g4:groups:00g1tgwssMI9jYizU0g5"
    resource-owners-include-param:
      name: include
      description: Adds additional properties in the response
      in: query
      required: false
      schema:
        type: array
        items:
          type: string
          enum:
            - parent_resource_owner
          x-enumDescriptions:
            parent_resource_owner: If the parent resource has an owner assigned, then the parent resource is included in the `data` array response.
      examples:
        IncludeParentResourceOwners:
          summary: Include parent resource owners in the response
          description: 'Query param: ?include=parent_resource_owner'
          value: parent_resource_owner
    resource-owners-catalog-resources-filter:
      name: filter
      description: |
        A [filter](https://developer.okta.com/docs/api/#filter) expression that returns entries based on the following properties and supported operators:
        * `parentResourceOrn`: supports `eq` (required)
        * `resource.type`: supports `eq`
        * `resource.profile.*`:  supports `sw` and `co` (both `parentResourceOrn` and `resource.type` filters are required for `resource.profile.*` filtering)

        > **Note:** Query parameter percent encoding is required. See [Special characters](https://developer.okta.com/docs/api/#special-characters).
      in: query
      required: true
      schema:
        $ref: '#/components/schemas/scim-filter'
      x-scim-filter:
        parentResourceOrn:
          operators:
            - eq
          schema:
            $ref: '#/components/schemas/resource-orn'
        resource.type:
          operators:
            - eq
          type: string
          description: The resource type value from the orn. Examples:- entitlement-bundles, entitlement-values
        resource.profile.name:
          operators:
            - sw
            - co
          type: string
      examples:
