        * `resourceType`: supports `eq` (The `resourceType` value is taken from the `{objectType}` attribute in the resource [ORN](https://developer.okta.com/docs/api/openapi/okta-management/guides/roles/#okta-resource-name-orn). For example, `entitlement-values` for entitlement value resources.)

