    entitlement-drift-id:
      type: string
      description: The unique ID of the entitlement drift
      minLength: 1
      maxLength: 20
    entitlement-drift-import-job-id:
      type: string
      description: The `id` of the import job that surfaced this drift
      minLength: 1
      maxLength: 64
    entitlement-drift-type:
      type: string
      description: |
        Which way the entitlement drifted, compared to what Okta governed before this import.
         * `ADD`: The import has an entitlement that Okta wasn't governing.
         * `SUB`: Okta was governing an entitlement that's missing from the import.
      x-enumDescriptions:
        ADD: The import has an entitlement that Okta wasn't governing.
        SUB: Okta was governing an entitlement that's missing from the import.
      x-okta-known-values:
        - ADD
        - SUB
    entitlement-drift-status:
      type: string
      description: |
        Where the drift is in its lifecycle.

        Okta has decided how to resolve the drift and is still applying it:
          * `AUTO_ACCEPTED`: Okta accepted the change and is applying it.
          * `AUTO_REJECTED`: Okta rejected the change and is restoring the original assignment in the app.
          * `CONFLICT_REJECTED`: The change tried to remove a birthright entitlement (`POLICY` or `ENTITLEMENT-BUNDLE`), so Okta is restoring the original assignment.

        Finished:
          * `APPLIED`: The drift is resolved and any change to the app is complete.
          * `REVERTED`: An admin undid an `APPLIED` + `AUTO_ACCEPTED` drift. You can't revert rejected or conflict-rejected drifts.
          * `SUPERSEDED`: A later reconciliation cycle for the same resource, principal, and entitlement replaced this drift, so it no longer reflects the current state.

        Failed:
          * `ERROR`: Okta couldn't finish resolving the drift. This isn't final. The next reconciliation cycle for the same resource, principal, and entitlement supersedes it.
      x-enumDescriptions:
        AUTO_ACCEPTED: Okta accepted the change and is applying it.
        AUTO_REJECTED: Okta rejected the change and is restoring the original assignment.
        CONFLICT_REJECTED: The change tried to remove a birthright entitlement, so Okta is restoring the original assignment.
        APPLIED: Resolved. Any change to the app is complete.
        REVERTED: An admin undid an APPLIED, AUTO_ACCEPTED drift.
        SUPERSEDED: Replaced by a later reconciliation cycle for the same resource, principal, and entitlement.
        ERROR: Okta couldn't finish resolving the drift. The next cycle supersedes it.
      x-okta-known-values:
        - AUTO_ACCEPTED
        - AUTO_REJECTED
        - CONFLICT_REJECTED
        - APPLIED
        - REVERTED
        - SUPERSEDED
        - ERROR
    entitlement-drift-resolution:
      type: string
      description: |
        How Okta resolved the drift.
         * `AUTO_ACCEPTED`: Okta honored the change. An `ADD` becomes a new `IMPORT` grant. A `SUB` removes the entitlement from the grant that provided it.
         * `AUTO_REJECTED`: Okta rejected the change, based on the action that was configured for that direction, and pushed the original assignment back to the app.
         * `CONFLICT_REJECTED`: Okta rejected a `SUB` because the entitlement came from a birthright source (`POLICY` or `ENTITLEMENT-BUNDLE`), which it never removes, and pushed the original assignment back to the app.
      x-enumDescriptions:
        AUTO_ACCEPTED: Okta honored the change.
        AUTO_REJECTED: Okta rejected the change and pushed the original assignment back to the app.
        CONFLICT_REJECTED: Okta rejected a `SUB` on a birthright source and pushed the original assignment back to the app.
      x-okta-known-values:
        - AUTO_ACCEPTED
        - AUTO_REJECTED
        - CONFLICT_REJECTED
    entitlement-drift-entitlement-reference:
      type: object
      description: |
        Identifies the entitlement the drift is about. `schemaPropertyId` is always present and names the entitlement property the drift applies to. At least one of `id`, `value`, and `externalId` is also present.
      required:
        - schemaPropertyId
      properties:
        schemaPropertyId:
          type: string
          description: The `id` of the entitlement property the drift applies to
          minLength: 1
          maxLength: 20
        id:
          type: string
          description: The `id` of the entitlement value, after Okta has registered it
          maxLength: 20
        value:
          type: string
          description: The entitlement value as seen in the import, or as Okta governed it before this import
          maxLength: 1024
        externalId:
          type: string
          description: The entitlement value's ID in the source app
          maxLength: 1024
    entitlement-drift-affected-grant-source:
      type: string
      description: |
        Where the affected entitlement's grant came from when the drift was detected. `POLICY` and `ENTITLEMENT-BUNDLE` are birthright sources: a user gets them automatically, and reconciliation never removes them.

        Because Okta never removes a birthright entitlement, a `SUB` from a `POLICY` source is always `CONFLICT_REJECTED`. A `SUB` from an `ENTITLEMENT-BUNDLE` source is too, with one exception: if the import removes every entitlement the bundle granted, Okta accepts the removals and drops the whole bundle grant.
      x-enumDescriptions:
        POLICY: Birthright is granted automatically by an access policy.
        CUSTOM: Granted directly by an admin, the API, an app-level access request, or a legacy-mode import
        ENTITLEMENT-BUNDLE: Birthright is granted through an entitlement bundle.
        ENTITLEMENT: Granted by an admin or a collection assignment
        IMPORT: Created by an earlier reconciliation cycle
      x-okta-known-values:
        - POLICY
        - CUSTOM
        - ENTITLEMENT-BUNDLE
        - ENTITLEMENT
        - IMPORT
