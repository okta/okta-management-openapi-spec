        * The `data` property contains chunks of the AI-generated summary.
      required:
        - data
      properties:
        id:
          type: string
          description: The event ID
        event:
          type: string
          description: The event type
        data:
          type: string
          description: The event data in JSON string format
          example: '{"message": "A detailed message constructed so far", "deltaMessage": "constructed so far", "errors": []}'
    operation-status:
      type: string
