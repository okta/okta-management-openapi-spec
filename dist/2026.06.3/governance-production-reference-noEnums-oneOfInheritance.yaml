      type: string
      description: |
        The `id` of the grant that held the affected entitlement when the drift was detected.
      maxLength: 20
    entitlement-drift-resolved-grant-id:
      type: string
      description: |
        The `id` of the grant that resolution created or changed.
      maxLength: 20
    entitlement-drift-reverted-at:
      type: string
      format: date-time
      description: When the drift was reverted. Present only on a reverted drift.
    entitlement-drift-reverted-by:
      type: string
      description: The principal who reverted the drift. Present only on a reverted drift.
    entitlement-drift-error-message:
      type: string
      description: A message that explains why Okta couldn't resolve the drift. Present only when `status` is `ERROR`.
