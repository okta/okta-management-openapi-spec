        groups:
          type: integer
          description: The number of group resources matching the search query
          readOnly: true
        entitlementValues:
          type: integer
          description: The number of entitlement value resources matching the search query
          readOnly: true
        entitlementBundles:
          type: integer
          description: The number of entitlement bundle resources matching the search query
          readOnly: true
        collections:
          type: integer
          description: The number of collection resources matching the search query
          readOnly: true
    resource-type-enum:
      type: string
