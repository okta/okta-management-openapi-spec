      name: filter
      description: |
        A [filter](https://developer.okta.com/docs/api/#filter) expression that selects which drifts to return, using the properties and operators below.

        The filter is required and must scope the query to exactly one resource or principal, include `resourceId eq "..."` or `principalId eq "..."`, but not both. A filter with neither (`reason` `MISSING_ANCHOR_FILTER`) or both (`reason` `MULTIPLE_ANCHOR_FILTERS`) returns a `400`.

        Properties you can filter on:
        * `resourceId`: `eq` (scope)
        * `principalId`: `eq` (scope)
        * `importJobId`: `eq`
        * `status`: `eq`
        * `resolution`: `eq`
        * `driftType`: `eq`
        * `lastUpdated`: `gt`, `ge`, `le`, `lt`

        To page through results, use the `after` cursor and the `Link` header. Don't page by putting `id` in the filter.

        > **Note:** Query parameter percent encoding is required. See [Special characters](https://developer.okta.com/docs/api/#special-characters).
