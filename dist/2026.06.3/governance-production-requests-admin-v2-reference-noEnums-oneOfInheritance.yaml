          type: string
          description: |
            SCIM filter to narrow the returned choices. Supported attribute: `label`.
            Supported operators: `co` (contains), `sw` (starts with).
          example: label co "prod"
    request-field-choice:
      type: object
      description: A selectable choice for a request field
      properties:
        id:
          type: string
          description: Unique identifier for the choice. Stable across calls and used as the answer value.
        label:
          type: string
          description: Display label for the choice
        description:
          type: string
          description: Optional description providing additional context for the choice
        category:
          type: string
          description: Optional category label for the choice.
      required:
        - id
        - label
    request-field-choices-list:
      type: object
      description: Paginated list of choices for a request field
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/request-field-choice'
        _links:
          type: object
          required:
            - self
          properties:
            self:
              $ref: '#/components/schemas/link'
            next:
              $ref: '#/components/schemas/link'
      required:
        - data
        - _links
    requesters-member:
      type: object
      required:
        - type
        - externalId
      properties:
        type:
          type: string
          example: OKTA_USER
        externalId:
          type: string
          example: 00ub0oNGTSWTBKOLGLNR
    requesters-add-patch:
      type: object
      required:
        - op
        - path
        - value
      properties:
        op:
          type: string
          enum:
            - add
          description: Operation to add a new member to the existing requester set
        path:
          type: string
          pattern: ^/members/-$
          description: JSON Pointer path that specifies adding to the members array
        value:
          description: The member to add to the requester set
