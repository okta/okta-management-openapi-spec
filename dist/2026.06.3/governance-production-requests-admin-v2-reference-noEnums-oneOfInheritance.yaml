        A representation of a resource that can be requested for access. 

        **Note:** The resources available for the request are subject to their permission settings. For example, the Okta Admin App 
        can only be requested by Super Admin users. 
      discriminator:
        propertyName: type
        mapping:
          CATALOG_ENTRY: '#/components/schemas/request-resource-catalog-entry-creatable'
      oneOf:
        - $ref: '#/components/schemas/request-resource-catalog-entry-creatable'
    request-field-type:
      type: string
      description: Type of value for the requester field.
      x-okta-known-values:
        - TEXT
        - SELECT
        - MULTISELECT
        - ISO_DATE
        - DURATION
        - OKTA_USER_ID
    field-option-value:
      type: string
      description: The value of a select option
      maxLength: 280
      minLength: 1
    request-field-value:
      type: object
      required:
        - id
      properties:
        id:
          type: string
          description: |
            The ID of a `requesterField`.

            For `OKTA` request approval, this is typically the ID of an input field defined in an approval sequence.

            For `EXTERNAL` request approval, this is the ID of an input field relevant to the external approval system.

            The following are reserved identifiers:
            - `ACCESS_DURATION`: An identifier used to specify the duration of the access being requested. (**Note:**
              This identifier is to be grandfathered. The new name will be `OKTA_ACCESS_DURATION`.)
            - `OKTA_REQUESTED_FOR`: An identifier used to specify who the resource is being requested for
            - `OKTA_ACCESS_DURATION`: An identifier used to specify the duration of the requested access. If a request 
              field is included in this ID, the field value must be a `DURATION` expression in ISO format. The maximum 
              length of this value is 5 characters. For example, `P1D` represents a duration of one day.
            - Any identifiers with `OKTA_` prefix are reserved for future use.
        label:
          type: string
          description: A human-readable description of `requesterField`. It's used for display purposes and is optional
        type:
          $ref: '#/components/schemas/request-field-type'
        value:
          type: string
          minLength: 1
          maxLength: 1000
          description: |
            The value of `requesterField`, which depends on the type of the field:
            - `TEXT`: A multi-line string
            - `SELECT`: An option predefined by the approval system
            - `ISO_DATE`: An ISO formatted date string. for example, `2022-05-05T14:15:22Z`
            - `DURATION`: An ISO format duration expression with a maximum length of 5 characters. For example, 
              `P1D` indicates a duration of one day.
            - `OKTA_USER_ID`: Okta User ID

            If the field type is one of the previously listed, this property is required.
        values:
          type: array
          items:
            $ref: '#/components/schemas/field-option-value'
          description: |
            The values of `requesterField` with the type `MULTISELECT`.

            If the field type is `MULTISELECT`, this property is required.
    request-field-values:
      type: array
      description: |
        The requester input fields required by the approval system.

        **Note:** The fields required are determined by the approval system.

        For the Okta approval system, the required fields are defined in the approval sequence. Ensure that the requester
        input fields match up with this definition to avoid request approval flow failure.

        For external approval systems, the requester input fields are for recording purposes only and do not affect the approval
        process.
      items:
        $ref: '#/components/schemas/request-field-value'
    request-creatable:
      type: object
      description: Properties which are mutable in mutation operations
      required:
        - requested
        - requestedFor
      properties:
        requested:
          $ref: '#/components/schemas/request-resource-creatable'
        requestedBy:
          $ref: '#/components/schemas/target-principal'
        requestedFor:
          $ref: '#/components/schemas/target-principal'
        requesterFieldValues:
          $ref: '#/components/schemas/request-field-values'
    request-duration:
      description: |
        How long the requester retains access after their request is approved and fulfilled.

        Specified in [ISO 8601 duration format](https://en.wikipedia.org/wiki/ISO_8601#Durations).

        #### Known limitation

        Only single time unit ISO 8601 duration formats (D, H, M) are supported for units (days, hours, minutes).

        ##### Supported

        | Unit       | Example |
        | ---------- | ------- |
        | D, days    | P40D    |
        | H, hours   | PT65H   |
        | M, minutes | PT90M   |

        > **Note:** Mixes of units, as well as month/year/week designations, aren't supported. For example, `P40DT65H`, `P40M`, `P1W`, and `P1Y` aren't supported.
      type: string
      example: P40D
      format: iso-duration
      nullable: true
      default: null
    request-revocation-scheduled-date-time:
      type: string
      format: date-time
      nullable: true
      description: The date the granted access is scheduled for recovation. Only set if request.accessDuration exists, and request.grantStatus is GRANTED.
    request-submission-type:
      type: string
      description: Whether a request submission is allowed or restricted in the risk settings
      x-okta-known-values:
        - ALLOWED_WITH_NO_OVERRIDES
        - ALLOWED_WITH_OVERRIDES
        - RESTRICTED
    risk-rule:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: The name of a resource rule causing a conflict
          maxLength: 255
          minLength: 1
        description:
          type: string
          description: The human readable description
          maxLength: 1000
          minLength: 1
        resourceName:
          type: string
          description: Human readable name of the resource
    risk-rules:
      type: array
      items:
        $ref: '#/components/schemas/risk-rule'
      minItems: 0
      maxItems: 5
    risk-assessment:
      type: object
      description: A risk assessment that indicates whether request submission is allowed or restricted. It contains the risk rules that lead to possible conflicts for the requested resource.
      required:
        - requestSubmissionType
        - riskRules
      properties:
        requestSubmissionType:
          $ref: '#/components/schemas/request-submission-type'
        riskRules:
          $ref: '#/components/schemas/risk-rules'
    request-submission-full:
      type: object
      description: Full representation of a request submission
      allOf:
        - $ref: '#/components/schemas/read-only-standard-properties'
        - type: object
          properties:
            status:
              type: string
              enum:
                - SUBMITTED
              description: The status of the request
            resolved:
              $ref: '#/components/schemas/request-resolved-date-time'
            grantStatus:
              $ref: '#/components/schemas/request-grant-status'
            granted:
              $ref: '#/components/schemas/request-granted-date-time'
            revocationStatus:
              $ref: '#/components/schemas/request-revocation-status'
            revoked:
              $ref: '#/components/schemas/request-revoked-date-time'
            requestedBy:
              $ref: '#/components/schemas/client-credential-principal'
            requestedFor:
              $ref: '#/components/schemas/target-principal'
            requested:
              $ref: '#/components/schemas/requested'
            _links:
              $ref: '#/components/schemas/request-links'
            accessDuration:
              $ref: '#/components/schemas/request-duration'
            revocationScheduled:
              $ref: '#/components/schemas/request-revocation-scheduled-date-time'
            requesterFieldValues:
              $ref: '#/components/schemas/request-field-values'
            riskAssessment:
              $ref: '#/components/schemas/risk-assessment'
      required:
        - id
        - created
        - createdBy
        - lastUpdated
        - lastUpdatedBy
        - status
        - requestedBy
        - requestedFor
        - requested
        - _links
    approval-provider-type:
      type: string
      description: The approval system type
      x-okta-known-values:
        - OKTA
        - EXTERNAL
    approval-provider-name:
      type: string
      description: A human readable name of the request approval system, for example, Okta Access Requests or ServiceNow
      minLength: 1
      maxLength: 100
    approval-provider-description:
      type: string
      description: A description of the request approval system
      maxLength: 1000
    approval-external-request-id:
      type: string
      description: The external request `id` from a request approval system, for example, ServiceNow or JIRA
      minLength: 1
      maxLength: 200
    request-permalink-id:
      type: integer
      description: The immutable, persistent identifier that always resolves to the request
    request-approval-status:
      type: string
      description: The approver's decision.
      x-okta-known-values:
        - APPROVED
        - DENIED
    approval-decision-date:
      type: string
      format: date-time
      description: The date the approval decision is made.
    approval-decision-enum:
      type: string
      x-okta-known-values:
        - APPROVE
        - DENY
        - CANCEL
    request-approval-decision:
      type: object
      description: A completed access request approval decision
      required:
        - deciderId
        - decision
        - decided
      properties:
        deciderId:
          $ref: '#/components/schemas/user-id'
        deciderName:
          type: string
          description: Okta username of the decider
          maxLength: 100
        decision:
          $ref: '#/components/schemas/approval-decision-enum'
        decided:
          $ref: '#/components/schemas/approval-decision-date'
        originalDeciderId:
          $ref: '#/components/schemas/user-id'
        originalDeciderFullName:
          type: string
          description: Full name of the original decider
          maxLength: 100
        originalDeciderEmail:
          type: string
          description: Email of the original decider
          format: email
        deciderDelegated:
          type: boolean
          description: Indicates if the decision was made by a delegated decider
        deciderEscalated:
          type: boolean
          description: Indicates if the decision was made by an escalated decider
    request-approval:
      type: object
      description: A completed access request approval
      required:
        - type
        - providerName
      properties:
        type:
          $ref: '#/components/schemas/approval-provider-type'
        providerName:
          $ref: '#/components/schemas/approval-provider-name'
        providerDescription:
          $ref: '#/components/schemas/approval-provider-description'
        externalRequestId:
          $ref: '#/components/schemas/approval-external-request-id'
        permalinkId:
          $ref: '#/components/schemas/request-permalink-id'
        status:
          $ref: '#/components/schemas/request-approval-status'
        decided:
          $ref: '#/components/schemas/approval-decision-date'
        decisions:
          type: array
          description: The approval decisions
          minItems: 0
          maxItems: 10
          items:
            $ref: '#/components/schemas/request-approval-decision'
    request-full:
      type: object
      x-okta-ignore-redocly-rules-for-sdk: true
      description: Full representation of a Request.
      allOf:
        - $ref: '#/components/schemas/read-only-standard-properties'
        - $ref: '#/components/schemas/request-minimal-read-only-fields'
        - type: object
          properties:
            accessDuration:
              $ref: '#/components/schemas/request-duration'
            revocationScheduled:
              $ref: '#/components/schemas/request-revocation-scheduled-date-time'
            requesterFieldValues:
              $ref: '#/components/schemas/request-field-values'
            requestApproval:
              $ref: '#/components/schemas/request-approval'
            riskAssessment:
              $ref: '#/components/schemas/risk-assessment'
      required:
        - id
        - created
        - createdBy
        - lastUpdated
        - lastUpdatedBy
        - status
        - requestedBy
        - requestedFor
        - requested
        - _links
    request-status-patchable:
      type: string
      description: |-
        Specify the status of the request.

        Only `CANCELED` is supported. You can't cancel a request if any of its tasks have been resolved.
      x-okta-known-values:
        - CANCELED
    request-update:
      type: object
      properties:
        status:
          $ref: '#/components/schemas/request-status-patchable'
    request-message-message:
      type: string
      description: Message that will be created for the request. Newline can be specified by characters "\n". Message will be visible for all users who can view the request.
      minLength: 1
      maxLength: 5000
      nullable: false
    request-message-mutable:
      type: object
      required:
        - message
      properties:
        message:
          $ref: '#/components/schemas/request-message-message'
    request-message-creatable:
      type: object
      description: The properties expected in a request message create request
      allOf:
        - $ref: '#/components/schemas/request-message-mutable'
    request-resolution-terminal-state:
      type: string
      description: The terminal state for the access request in the request provider
      x-okta-known-values:
        - APPROVED
        - DENIED
        - CANCELED
        - EXPIRED
    user-email:
      type: string
      description: E-mail of the user
      format: email
    user-name:
      type: string
      description: Name of the user
    request-decision-creatable:
      type: object
      description: A completed access request approval decision
      required:
        - userId
        - decision
        - decided
        - userEmail
        - userName
      properties:
        userId:
          $ref: '#/components/schemas/user-id'
        userEmail:
          $ref: '#/components/schemas/user-email'
        userName:
          $ref: '#/components/schemas/user-name'
        decision:
          $ref: '#/components/schemas/approval-decision-enum'
        decided:
          $ref: '#/components/schemas/approval-decision-date'
        originalDeciderId:
          $ref: '#/components/schemas/user-id'
        originalDeciderFullName:
          $ref: '#/components/schemas/user-name'
        originalDeciderEmail:
          $ref: '#/components/schemas/user-email'
        deciderDelegated:
          type: boolean
          description: Indicates if the decision was made by a delegated decider
        deciderEscalated:
          type: boolean
          description: Indicates if the decision was made by an escalated decider
    request-resolution-creatable:
      type: object
      description: The properties expected in a request resolution create request
      properties:
        terminalState:
          $ref: '#/components/schemas/request-resolution-terminal-state'
        decisions:
          type: array
          minItems: 0
          maxItems: 10
          items:
            $ref: '#/components/schemas/request-decision-creatable'
    rcar-entry-requestable:
      type: boolean
      nullable: false
      description: Is the resource requestable
    rcar-entry-counts:
      type: object
      description: Entry count metadata
      properties:
        resourceCounts:
          type: object
          description: Collection resource counts
          properties:
            applications:
              type: integer
              description: Number of app resources in a collection
              minimum: 0
              example: 3
    rcar-entry-links:
      type: object
      description: |-
        Links available for a resource catalog entry.
        * `createRequest`: returns the link to create the request only if the entry is requestable
        * `parent`: returns the parent entry only if a parent exists
        * `submittedRequest`: returns the submitted request only if the authenticated user has a submitted request for the entry and it's not available for approval
        * `pendingRequest`: returns the pending request only if the authenticated user has a submitted request for the entry and the request is available for approval
        * `relatedEntity`: returns the resource that's requested
      required:
        - self
      properties:
        self:
          $ref: '#/components/schemas/link'
        logo:
          type: array
          description: Links to the catalog entry logo resources
          minItems: 0
          maxItems: 3
          items:
            $ref: '#/components/schemas/link'
        parent:
          $ref: '#/components/schemas/link'
        createRequest:
          $ref: '#/components/schemas/link'
        submittedRequest:
          $ref: '#/components/schemas/link'
        pendingRequest:
          $ref: '#/components/schemas/link'
        relatedEntity:
          $ref: '#/components/schemas/link'
    rcar-entry:
      type: object
      x-okta-ignore-redocly-rules-for-sdk: true
      description: Full representaion of a access request catalog entry
      properties:
        id:
          description: Unique identifier for the entry
          type: string
          minLength: 1
        name:
          type: string
          nullable: false
          description: Name of the entry
          maxLength: 255
          minLength: 1
        description:
          type: string
          description: Description of the entry
          maxLength: 2000
        label:
          type: string
          description: Label of the entry. Currently either `Application` or `Resource Collection`
        parent:
          type: string
          nullable: false
          description: Parent of the entry
        requestable:
          $ref: '#/components/schemas/rcar-entry-requestable'
        counts:
          $ref: '#/components/schemas/rcar-entry-counts'
        _links:
          $ref: '#/components/schemas/rcar-entry-links'
      required:
        - id
        - name
        - requestable
        - _links
    rcar-entries-links:
      type: object
      description: |-
        Links available for the list of catalog entries.
        * `atspoke`: returned only for top level entries and if request types is supported
        * `match`: returned only if match is supported
      required:
        - self
      properties:
        self:
          $ref: '#/components/schemas/link'
        next:
          $ref: '#/components/schemas/link'
        atspoke:
          $ref: '#/components/schemas/link'
        match:
          $ref: '#/components/schemas/link'
    rcar-entries-list-v2:
      type: object
      properties:
        data:
          description: Catalog entries list
          type: array
          items:
            $ref: '#/components/schemas/rcar-entry'
        _links:
          $ref: '#/components/schemas/rcar-entries-links'
    rcar-entry-get:
      type: object
      x-okta-ignore-redocly-rules-for-sdk: true
      allOf:
        - $ref: '#/components/schemas/rcar-entry'
    field-required:
