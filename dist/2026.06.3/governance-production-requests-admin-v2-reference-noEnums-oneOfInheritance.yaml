    task-request-id:
      type: string
      maxLength: 20
      minLength: 20
      description: The request ID associated with the task
    task-created-at:
      description: The ISO 8601 formatted date and time when the object was created
      type: string
      format: date-time
      readOnly: true
    task-updated-at:
      description: The ISO 8601 formatted date and time when the object was last updated
      type: string
      format: date-time
      readOnly: true
    task-type:
      type: string
      description: The type of the task
      x-okta-known-values:
        - QUESTION
        - APPROVAL
        - TODO
    task-sparse:
      type: object
      description: Sparse representation of a Task resource
      properties:
        id:
          $ref: '#/components/schemas/task-id'
        assignees:
          type: array
          description: List of task assignees that perform actions on the task
          items:
            $ref: '#/components/schemas/task-assignees'
        status:
          $ref: '#/components/schemas/task-status'
        label:
          type: string
          nullable: false
          description: Human readable label for the task
          minLength: 1
        requestId:
          $ref: '#/components/schemas/task-request-id'
        createdAt:
          $ref: '#/components/schemas/task-created-at'
        updatedAt:
