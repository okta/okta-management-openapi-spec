        '400':
          $ref: '#/components/responses/tasks-list-bad-request'
        '401':
          $ref: '#/components/responses/authentication-error-response'
        '403':
          $ref: '#/components/responses/authorization-error-response'
        '429':
          $ref: '#/components/responses/rate-limit-exceeded-response'
        '500':
          $ref: '#/components/responses/unexpected-error-response'
  /governance/api/v2/tasks/{taskId}:
    get:
      x-okta-lifecycle:
        lifecycle: BETA
      x-okta-iam-admin-roles:
        - ACCESS_REQUESTS_ADMIN
      tags:
        - Tasks
      operationId: getTaskV2
      summary: Retrieve a task
      description: |
        Retrieves all the details of a specific task.

        Use this operation to retrieve a task from access requests managed by access request conditions. More information is returned than the shortened task details in the [List all tasks](/iga/openapi/governance-production-requests-admin-v2-reference/tasks/listalltasksv2) operation.
      parameters:
        - $ref: '#/components/parameters/task-id-parameter'
      security:
        - ApiKey:
            - admin
        - OAuth2:
            - okta.accessRequests.tasks.read
      responses:
        '200':
          $ref: '#/components/responses/task-get-success'
        '401':
          $ref: '#/components/responses/authentication-error-response'
        '403':
          $ref: '#/components/responses/authorization-error-response'
        '404':
          $ref: '#/components/responses/resource-not-found-response'
        '429':
          $ref: '#/components/responses/rate-limit-exceeded-response'
        '500':
          $ref: '#/components/responses/unexpected-error-response'
    patch:
      x-okta-lifecycle:
        lifecycle: BETA
      x-okta-iam-admin-roles:
        - ACCESS_REQUESTS_ADMIN
      tags:
        - Tasks
      operationId: updateTaskV2
      summary: Update a task
      description: |
        Updates a task by performing actions such as assigning the task to a new set of task assignees.

        When task assignment is made via this endpoint, the task will be unassigned from any previous task assignees and assigned to the new set of task assignees.
      parameters:
        - $ref: '#/components/parameters/task-id-parameter'
      security:
        - ApiKey:
            - admin
        - OAuth2:
            - okta.accessRequests.tasks.manage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                assignees:
                  type: array
                  minItems: 1
                  items:
                    $ref: '#/components/schemas/task-assignees'
      responses:
        '200':
          $ref: '#/components/responses/task-update-success'
        '400':
          $ref: '#/components/responses/task-update-failed'
        '401':
          $ref: '#/components/responses/authentication-error-response'
        '429':
          $ref: '#/components/responses/rate-limit-exceeded-response'
        '500':
          $ref: '#/components/responses/unexpected-error-response'
  /governance/api/v2/tasks/{taskId}/resolve:
    post:
      x-okta-lifecycle:
        lifecycle: BETA
      x-okta-iam-admin-roles:
        - ACCESS_REQUESTS_ADMIN
      tags:
        - Tasks
      operationId: resolveTaskV2
      summary: Resolve a task
      description: |
        Resolves a task for an assignee by providing the value of the task resolution
      parameters:
        - $ref: '#/components/parameters/task-id-parameter'
      security:
        - ApiKey:
            - admin
        - OAuth2:
            - okta.accessRequests.tasks.manage
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                value:
                  type: string
                  description: |
                    The value of the task resolution. Required for `APPROVAL` and `QUESTION` type tasks.
                      * For `APPROVAL` type tasks, the only supported values are `APPROVED` or `DENIED`.
                      * For `QUESTION` type tasks, the value is the answer to the question, and can be any string.
                      * For custom `TODO` type tasks, a value string isn't required.
            examples:
              ApproveTaskResolution:
                summary: Approve the task
                description: Only applicable for `APPROVAL` type tasks
                value:
                  value: APPROVED
              DenyTaskResolution:
                summary: Deny the task
                description: Only applicable for `APPROVAL` type tasks
                value:
                  value: DENIED
              QuestionTaskResolution:
                summary: Answer the question
                description: Only applicable for `QUESTION` type tasks
                value:
                  value: Answer to the question
              CustomTaskResolution:
                summary: Mark custom task complete
                description: Request body not required for custom `TODO` type tasks
                value: {}
      responses:
        '200':
          $ref: '#/components/responses/task-resolve-success'
        '400':
          $ref: '#/components/responses/task-resolve-failed'
        '401':
          $ref: '#/components/responses/authentication-error-response'
        '429':
          $ref: '#/components/responses/rate-limit-exceeded-response'
        '500':
          $ref: '#/components/responses/unexpected-error-response'
components:
  securitySchemes:
    OAuth2:
      type: oauth2
      description: 'Pass the `access_token` as the value of the Authorization header: `Authorization: Bearer {access_token}`. See [Make a request](https://developer.okta.com/docs/guides/implement-oauth-for-okta-serviceapp/main/#make-a-request).'
      flows:
        authorizationCode:
          authorizationUrl: /oauth2/v1/authorize
          tokenUrl: /oauth2/v1/token
          scopes:
            okta.governance.accessCertifications.manage: Allows the app to create and manage Access Certification Campaigns
            okta.governance.accessCertifications.read: Allows the app to read information about Access Certification Campaigns and Reviews in your Okta org
            okta.governance.accessRequests.manage: Allows the app to create and manage V1 Access Requests, Request Types, and Teams
            okta.governance.accessRequests.read: Allows the app to read information about V1 Access Requests, Request Types, and Teams in your Okta org
            okta.governance.entitlements.read: Allows the app to read information about Entitlements, Entitlement bundles, and Grants
            okta.governance.entitlements.manage: Allows the app to create and manage Entitlements, Entitlement bundles, and Grants
            okta.accessRequests.catalog.read: Allows the app to read information about Access Request Catalogs in your Okta org
            okta.accessRequests.condition.manage: Allows the app to create and manage Conditions for the Access Request Resource Catalog
            okta.accessRequests.condition.read: Allows the app to read information about Conditions for the Access Request Resource Catalog
            okta.accessRequests.request.manage: Allows the app to create and manage V2 Access Requests through the Access Request Resource Catalog
            okta.accessRequests.request.read: Allows the app to read information about V2 Access Requests created through the Access Requests Resource Catalog
            okta.governance.collections.manage: Allows the app to create and manage collections
            okta.governance.collections.read: Allows the app to read information about collections in your Okta org
            okta.governance.operations.read: Allows the app to read information about asynchronous operations in your Okta org
            okta.governance.riskRule.manage: Allows the app to create and manage rules
            okta.governance.riskRule.read: Allows the app to read information about rules in your Okta org
            okta.governance.resourceOwner.manage: Allows the app to create and manage resource owners
            okta.governance.resourceOwner.read: Allows the app to read information about resource owners in your Okta org
            okta.governance.labels.manage: Allows the user to create and manage labels
            okta.governance.labels.read: Allows the user to read information about labels in your Okta org
            okta.governance.securityAccessReviews.admin.manage: Allows the admin app to create and manage security access reviews
            okta.governance.securityAccessReviews.admin.read: Allows the admin app to read information about security access reviews
            okta.governance.securityAccessReviews.endUser.manage: Allows the end-user app to create and manage security access reviews
            okta.governance.securityAccessReviews.endUser.read: Allows the end-user app to read information about security access reviews
            okta.governance.principalSettings.manage: Allows the app to create and manage governance settings for any user in your Okta org
            okta.governance.principalSettings.read: Allows the app to read information about governance settings for any user in your Okta org
            okta.governance.settings.manage: Allows the app to create and manage governance settings for your Okta org
            okta.governance.settings.read: Allows the app to read information about governance settings for your Okta org
            okta.governance.delegates.read: Allows the app to read information about delegates in your Okta org
            okta.governance.reviewer.read: Allows the end user to read information about access certification reviews assigned to them
            okta.governance.reviewer.manage: Allows the end user to manage access certification reviews assigned to them
            okta.accessRequests.tasks.manage: Allows the user to manage tasks for access requests in your Okta org
            okta.accessRequests.tasks.read: Allows the user to read information about tasks for access requests in your Okta org
    ApiKey:
      type: apiKey
      name: Authorization
      in: header
      description: 'Pass the API token as the Authorization header value prefixed with SSWS: `Authorization: SSWS {API Token}`.'
  schemas:
    scim-filter:
      type: string
      format: scim-filter
    writable-standard-properties-request-condition:
      type: object
      properties:
        name:
          type: string
          nullable: false
          description: Writable unique key on create. Modifiable on update.
          maxLength: 255
          minLength: 1
        description:
          type: string
          nullable: false
          description: Human readable description
          maxLength: 2000
          minLength: 1
    created-by:
      description: The `id` of the Okta user who created the resource
      type: string
      x-okta-ignore-redocly-rules-for-sdk: true
      readOnly: true
      minLength: 1
      maxLength: 20
      format: okta-user-id
    created:
      description: The ISO 8601 formatted date and time when the resource was created
      type: string
      x-okta-ignore-redocly-rules-for-sdk: true
      format: date-time
      readOnly: true
    last-updated:
      description: The ISO 8601 formatted date and time when the object was last updated
      type: string
      format: date-time
      readOnly: true
    last-updated-by:
      description: The `id` of the Okta user who last updated the object
      type: string
      x-okta-ignore-redocly-rules-for-sdk: true
      readOnly: true
      minLength: 1
      maxLength: 20
      format: okta-user-id
    link:
      type: object
      x-okta-ignore-redocly-rules-for-sdk: true
      description: A link to a related RESTful resource
      required:
        - href
      properties:
        name:
          type: string
          description: Link name
        rel:
          type: string
          description: Link relation
        href:
          type: string
          minLength: 1
          description: Link URI
        type:
          type: string
          description: The media type of the link. If omitted, it's implicitly `application/json`.
        method:
          type: string
          deprecated: true
        templated:
          type: boolean
          description: Indicates whether the link object's `href` property is a URI template
        hints:
          type: object
          description: Link hints
          additionalProperties:
            type: array
            items:
              type: string
        title:
          type: string
          description: Link title or label
    read-only-standard-properties:
      type: object
      x-okta-ignore-redocly-rules-for-sdk: true
      required:
        - id
        - createdBy
        - created
        - lastUpdated
        - lastUpdatedBy
      properties:
        id:
          description: Unique identifier for the object
          type: string
          minLength: 1
        createdBy:
          $ref: '#/components/schemas/created-by'
        created:
          $ref: '#/components/schemas/created'
        lastUpdated:
          $ref: '#/components/schemas/last-updated'
        lastUpdatedBy:
          $ref: '#/components/schemas/last-updated-by'
        _links:
          type: object
          description: Links to related resources
          additionalProperties:
            $ref: '#/components/schemas/link'
    request-condition-id:
      type: string
      maxLength: 20
      minLength: 20
      format: request-condition-id
      pattern: rco[0-9a-zA-Z]+
      description: The ID of the request condition
      example: rcord7d69lUIn7u5D1d5
    request-condition-status:
      type: string
      description: status indicating if this condition is active or not. Default status is INACTIVE
      x-okta-known-values:
        - ACTIVE
        - INACTIVE
        - INVALID
        - DELETED
    priority:
      type: integer
      description: The priority of the condition. The smaller the number, the higher the priority. The highest priority is 0. A new condition will default to the lowest priority.
      minimum: 0
    request-condition-links:
      type: object
      description: Links available on a single request condition representation.
      required:
        - self
      properties:
        self:
          $ref: '#/components/schemas/link'
    request-condition-read-only:
      type: object
      description: |
        Read only properties that are common to sparse and full condition representations.
      properties:
        id:
          $ref: '#/components/schemas/request-condition-id'
        status:
          $ref: '#/components/schemas/request-condition-status'
        priority:
          $ref: '#/components/schemas/priority'
        _links:
          $ref: '#/components/schemas/request-condition-links'
      required:
        - id
        - status
        - priority
        - _links
    requester-settings-type:
      type: string
      x-okta-known-values:
        - EVERYONE
        - GROUPS
        - TEAMS
    RequesterSettings:
      type: object
      description: |
        Sparse representaion of requester settings which define who may submit an access request for the related resource and access scopes.
      properties:
        type:
          $ref: '#/components/schemas/requester-settings-type'
    access-scope-settings-type:
      type: string
      x-okta-known-values:
        - RESOURCE_DEFAULT
        - ENTITLEMENT_BUNDLES
        - GROUPS
    AccessScopeSettings:
      type: object
      properties:
        type:
          $ref: '#/components/schemas/access-scope-settings-type'
    access-duration-duration:
      type: string
      format: duration
      example: PT24H
      description: |-
        The duration set by the admin for access durations. Use the [ISO 8601](https://tc39.es/proposal-temporal/docs/duration.html) duration notation for duration values.
        You can configure up to 365 days (`P365D`) or 52 weeks (`P52W`) as the maximum access duration of a request.
    access-duration-settings-admin-fixed-duration:
      type: object
      description: Settings when the access duration is specified by the admin
      additionalProperties: false
      properties:
        type:
          type: string
          enum:
            - ADMIN_FIXED_DURATION
        duration:
          $ref: '#/components/schemas/access-duration-duration'
      required:
        - type
        - duration
    access-duration-max-duration:
      type: string
      format: duration
      example: PT24H
      description: |-
        The maximum duration set by the requester for access durations. Use the [ISO 8601](https://tc39.es/proposal-temporal/docs/duration.html) duration notation for duration values.
        You can configure up to 365 days (`P365D`) or 52 weeks (`P52W`) as the maximum access duration of a request.
    access-duration-settings-requester-specified-duration:
      type: object
      description: Setting to specify the maximum duration that an end user can request access for when making a request
      additionalProperties: false
      properties:
        type:
          type: string
          enum:
            - REQUESTER_SPECIFIED_DURATION
        maximumDuration:
          $ref: '#/components/schemas/access-duration-max-duration'
      required:
        - type
        - maximumDuration
    access-duration-settings-full:
      type: object
      description: |-
        Settings that control who may specify the access duration allowed by this request condition or risk settings, as well as what duration may be requested.

        > **Note:** The resource request settings affect which access duration settings are valid. See the `validAccessDurationSettings` property.
      discriminator:
        propertyName: type
        mapping:
          ADMIN_FIXED_DURATION: '#/components/schemas/access-duration-settings-admin-fixed-duration'
          REQUESTER_SPECIFIED_DURATION: '#/components/schemas/access-duration-settings-requester-specified-duration'
      oneOf:
        - $ref: '#/components/schemas/access-duration-settings-admin-fixed-duration'
        - $ref: '#/components/schemas/access-duration-settings-requester-specified-duration'
    approval-sequence-id-read-only:
      type: string
      description: If an approval sequence was deleted, then conditions referencing it will become invalid and the approvalSequenceId will not be present.
      minLength: 24
      maxLength: 24
    request-condition-sparse:
      type: object
      description: |
        A condition delineates the criteria governing access requests, specifying the requester's identity, the permitted access scope, and the manner in which access can be requested.
      allOf:
        - $ref: '#/components/schemas/writable-standard-properties-request-condition'
        - $ref: '#/components/schemas/read-only-standard-properties'
        - $ref: '#/components/schemas/request-condition-read-only'
      properties:
        requesterSettings:
          $ref: '#/components/schemas/RequesterSettings'
        accessScopeSettings:
          $ref: '#/components/schemas/AccessScopeSettings'
        accessDurationSettings:
          $ref: '#/components/schemas/access-duration-settings-full'
        approvalSequenceId:
          $ref: '#/components/schemas/approval-sequence-id-read-only'
      required:
        - id
        - name
        - lastUpdated
        - lastUpdatedBy
        - requesterSettings
        - accessScopeSettings
        - status
        - priority
        - _links
    request-conditions-links:
      type: object
      description: Links available in request condition list response
      required:
        - self
      properties:
        self:
          $ref: '#/components/schemas/link'
        next:
          $ref: '#/components/schemas/link'
    request-conditions-list:
      type: object
      required:
        - data
        - _links
      properties:
        data:
          description: All request conditions
          type: array
          items:
            $ref: '#/components/schemas/request-condition-sparse'
        _links:
          $ref: '#/components/schemas/request-conditions-links'
    error-cause:
      type: object
      x-okta-ignore-redocly-rules-for-sdk: true
      description: A specific cause of an error
      required:
        - errorSummary
      properties:
        errorSummary:
          type: string
          description: A more specific summary for the error that contains the error cause
        reason:
          type: string
          description: An enumerated value to represent the reason why the error occurred. This enumeration allows codes to adapt to different conditions in which an error code can occur.
        location:
          type: string
          description: A value that represents the key where the error cause occurred. This is used with `locationType` to give a holistic view of where the error cause occurred. For example, if `locationType` is `body`, `location` is `username`, and the `reason` was `UNIQUE_CONSTRAINT`, you can derive that the username was already taken.
        locationType:
          type: string
          description: A value that represents where the error cause occurred. For example, in the body or header of the request. This value isn't required for cases where the request is correct, but there was another reason why the error occurred (server-side state conflict, rate limit violation, and so on).
        domain:
          type: string
          description: A value that represents the domain of the service in which the error occurs. This value is used to isolate the error cause reason.
    error:
      type: object
      description: An Error object
      required:
        - errorCode
        - errorId
        - errorSummary
      properties:
        errorCode:
          type: string
          description: An error code unique to the error
        errorId:
          type: string
          description: An error identifier useful for troubleshooting an error with support
        errorSummary:
          type: string
          description: An error code description detailing the error
        errorLink:
          type: string
          description: An indicator of where to look to troubleshoot the error
        errorCauses:
          type: array
          description: An optional array of string values that explain possible reasons for the error
          items:
            $ref: '#/components/schemas/error-cause'
    EveryoneRequesterSettings:
      type: object
      description: A requester settings indicating that access request can be submitted by anyone.
      additionalProperties: false
      properties:
        type:
          type: string
          enum:
            - EVERYONE
      required:
        - type
    group-id:
      type: string
      format: okta-group-id
      description: |
        Okta group ID.

        > **Note:** See [List all groups](https://developer.okta.com/docs/api/openapi/okta-management/management/group/listgroups) for more information on how to retrieve group IDs.
      pattern: 00g[0-9a-zA-Z]+
      maxLength: 20
      minLength: 20
    groups-array-full:
      type: array
      description: |
        A request condition may have a zero item array if it is in an INVALID state.
        Otherwise, there will be at least one item.
      items:
        type: object
        properties:
          id:
            $ref: '#/components/schemas/group-id'
        required:
          - id
        minItems: 0
        maxItems: 100
    GroupsRequesterSettings:
      type: object
      description: A requester settings indicating that access request can be submitted by specific groups.
      additionalProperties: false
      properties:
        type:
          type: string
          enum:
            - GROUPS
        groups:
          description: groups whos members can file an access request
          $ref: '#/components/schemas/groups-array-full'
      required:
        - type
        - groups
    team-id:
      type: string
      maxLength: 24
      minLength: 24
      pattern: ^[a-fA-F\d]{24}$
      format: team-id
      description: |
        Unique identifier for the access request team
    teams-array-full:
      type: array
      description: |
        A request condition may have a zero item array if it is in an INVALID state.
        Otherwise, there will be at least one item.
      items:
        type: object
        properties:
          id:
            $ref: '#/components/schemas/team-id'
        required:
          - id
        minItems: 0
        maxItems: 100
    TeamsRequesterSettings:
      type: object
      description: A requester settings indicating that access request can be submitted by specific teams.
      additionalProperties: false
      properties:
        type:
          type: string
          enum:
            - TEAMS
        teams:
          description: teams whos members can file an access request
          $ref: '#/components/schemas/teams-array-full'
      required:
        - type
        - teams
    requester-settings-full_RequesterSettings:
      type: object
      description: |
        Requester settings define who may submit an access request for the related resource and access scopes.
      discriminator:
        propertyName: type
        mapping:
          EVERYONE: '#/components/schemas/EveryoneRequesterSettings'
          GROUPS: '#/components/schemas/GroupsRequesterSettings'
          TEAMS: '#/components/schemas/TeamsRequesterSettings'
      oneOf:
        - $ref: '#/components/schemas/EveryoneRequesterSettings'
        - $ref: '#/components/schemas/GroupsRequesterSettings'
        - $ref: '#/components/schemas/TeamsRequesterSettings'
    ResourceDefaultAccessScopeSettings:
      type: object
      description: |
        Default Access scope settings associated with the condition's resource.
      additionalProperties: false
      properties:
        type:
          type: string
          enum:
            - RESOURCE_DEFAULT
      required:
        - type
    entitlement-bundle-id:
      type: string
      maxLength: 20
      minLength: 20
      format: entitlement-bundle-id
      pattern: enb[0-9a-zA-Z]+
      description: |
        The entitlement bundle `id`
    entitlement-bundles-array-full:
      type: array
      description: |
        A request condition may have a zero item array if it is in an INVALID state.
        Otherwise, there will be at least one item.
      items:
        type: object
        description: Entitlement bundle id and entitlement bundle name that is made requestable
        properties:
          id:
            $ref: '#/components/schemas/entitlement-bundle-id'
        required:
          - id
      minItems: 0
      maxItems: 100
    EntitlementBundleAccessScopeSettings:
      type: object
      description: Settings when the resource uses entitlement bundles for access scoping.
      additionalProperties: false
      properties:
        type:
          type: string
          enum:
            - ENTITLEMENT_BUNDLES
        entitlementBundles:
          $ref: '#/components/schemas/entitlement-bundles-array-full'
      required:
        - type
        - entitlementBundles
    GroupAccessScopeSettings:
      type: object
      description: Settings when the resource uses groups for access scoping.
      additionalProperties: false
      properties:
        type:
          type: string
          enum:
            - GROUPS
        groups:
          $ref: '#/components/schemas/groups-array-full'
      required:
        - type
        - groups
    access-scope-settings-full_AccessScopeSettings:
      type: object
      description: |
        Settings specifying if groups or entitlements may be used for requesting finer grained access
      discriminator:
        propertyName: type
        mapping:
          RESOURCE_DEFAULT: '#/components/schemas/ResourceDefaultAccessScopeSettings'
          ENTITLEMENT_BUNDLES: '#/components/schemas/EntitlementBundleAccessScopeSettings'
          GROUPS: '#/components/schemas/GroupAccessScopeSettings'
      oneOf:
        - $ref: '#/components/schemas/ResourceDefaultAccessScopeSettings'
        - $ref: '#/components/schemas/EntitlementBundleAccessScopeSettings'
        - $ref: '#/components/schemas/GroupAccessScopeSettings'
    request-condition-full:
      type: object
      description: |
        A condition delineates the criteria governing access requests, specifying the requester's identity, the permitted access scope, and the manner in which access can be requested.
      allOf:
        - $ref: '#/components/schemas/writable-standard-properties-request-condition'
        - $ref: '#/components/schemas/read-only-standard-properties'
        - $ref: '#/components/schemas/request-condition-read-only'
      properties:
        requesterSettings:
          $ref: '#/components/schemas/requester-settings-full_RequesterSettings'
        accessScopeSettings:
          $ref: '#/components/schemas/access-scope-settings-full_AccessScopeSettings'
        accessDurationSettings:
          $ref: '#/components/schemas/access-duration-settings-full'
        approvalSequenceId:
          $ref: '#/components/schemas/approval-sequence-id-read-only'
      required:
        - id
        - name
        - lastUpdated
        - lastUpdatedBy
        - requesterSettings
        - accessScopeSettings
        - status
        - priority
        - _links
    groups-array-requester-settings-creatable:
      type: array
      description: |-
        List of groups whose members can request access

        > **Note:** Both standard Okta groups and AD-sourced groups are supported in Access Requests.
        > Standard Okta groups have the `okta:user_group` value, whereas AD-sourced groups have the `okta:windows_security_principal` value in their `objectClass` property.
      items:
        type: object
        properties:
          id:
            $ref: '#/components/schemas/group-id'
        required:
          - id
      minItems: 1
    requester-settings-creatable_GroupsRequesterSettings:
      type: object
      description: A requester settings indicating that access request can be submitted by specific groups.
      additionalProperties: false
      properties:
        type:
          type: string
          enum:
            - GROUPS
        groups:
          description: Groups whose members can file an access request
          $ref: '#/components/schemas/groups-array-requester-settings-creatable'
      required:
        - type
        - groups
    teams-array-creatable:
      type: array
      items:
        type: object
        properties:
          id:
            $ref: '#/components/schemas/team-id'
        required:
          - id
        minItems: 1
    requester-settings-creatable_TeamsRequesterSettings:
      type: object
      description: A requester settings indicating that access request can be submitted by specific teams.
      additionalProperties: false
      properties:
        type:
          type: string
          enum:
            - TEAMS
        teams:
          description: Teams whose members can file an access request
          $ref: '#/components/schemas/teams-array-creatable'
      required:
        - type
        - teams
    requester-settings-creatable_RequesterSettings:
      type: object
      description: |
        Requester settings define who may submit an access request for the related resource and access scopes.
      discriminator:
        propertyName: type
        mapping:
          EVERYONE: '#/components/schemas/EveryoneRequesterSettings'
          GROUPS: '#/components/schemas/requester-settings-creatable_GroupsRequesterSettings'
          TEAMS: '#/components/schemas/requester-settings-creatable_TeamsRequesterSettings'
      oneOf:
        - $ref: '#/components/schemas/EveryoneRequesterSettings'
        - $ref: '#/components/schemas/requester-settings-creatable_GroupsRequesterSettings'
        - $ref: '#/components/schemas/requester-settings-creatable_TeamsRequesterSettings'
    access-scope-settings-creatable_ResourceDefaultAccessScopeSettings:
      type: object
      additionalProperties: false
      description: |
        Default access scope settings associated with the requesting resource
      properties:
        type:
          type: string
          description: Request for resource access
          enum:
            - RESOURCE_DEFAULT
      required:
        - type
    entitlement-bundles-array-creatable:
      type: array
      description: Entitlement bundles that are made requestable
      items:
        type: object
        description: Entitlement bundle ID that is made requestable
        properties:
          id:
            type: string
            description: Entitlement bundle ID
        required:
          - id
      minItems: 1
    access-scope-settings-creatable_EntitlementBundleAccessScopeSettings:
      type: object
      description: Access scope settings that resource permissions are entitlement bundles.
      additionalProperties: false
      properties:
        type:
          type: string
          description: Request for access to entitlement bundles
          enum:
            - ENTITLEMENT_BUNDLES
        entitlementBundles:
          $ref: '#/components/schemas/entitlement-bundles-array-creatable'
      required:
        - type
        - entitlementBundles
    groups-array-access-scope-creatable:
      type: array
      description: |-
        List of requestable groups

        > **Note:** You can specify a maximum of 500 groups as the access scope for each condition. Both standard Okta groups and AD-sourced groups are supported in Access Requests.
        > Standard Okta groups have the `okta:user_group` value, whereas AD-sourced groups have the `okta:windows_security_principal` value in their `objectClass` property.
      items:
        type: object
        properties:
          id:
            $ref: '#/components/schemas/group-id'
        required:
          - id
      minItems: 1
    access-scope-settings-creatable_GroupAccessScopeSettings:
      type: object
      description: Access scope settings that resource permissions are groups.
      additionalProperties: false
      properties:
        type:
          type: string
          description: Request for access to groups
          enum:
            - GROUPS
        groups:
          $ref: '#/components/schemas/groups-array-access-scope-creatable'
      required:
        - type
        - groups
    access-scope-settings-creatable_AccessScopeSettings:
      type: object
      description: Settings for the access request scope (such as groups, entitlement bundles, or default resources)
      discriminator:
        propertyName: type
        mapping:
          RESOURCE_DEFAULT: '#/components/schemas/access-scope-settings-creatable_ResourceDefaultAccessScopeSettings'
          ENTITLEMENT_BUNDLES: '#/components/schemas/access-scope-settings-creatable_EntitlementBundleAccessScopeSettings'
          GROUPS: '#/components/schemas/access-scope-settings-creatable_GroupAccessScopeSettings'
      oneOf:
        - $ref: '#/components/schemas/access-scope-settings-creatable_ResourceDefaultAccessScopeSettings'
        - $ref: '#/components/schemas/access-scope-settings-creatable_EntitlementBundleAccessScopeSettings'
        - $ref: '#/components/schemas/access-scope-settings-creatable_GroupAccessScopeSettings'
    access-duration-settings-creatable:
      type: object
      description: |
        Settings that control who may specify the access duration allowed by this request condition or risk settings, as well as what duration may be requested.

        **Note:** The resource request settings affect what access duration settings are valid. See the `validAccessDurationSettings` property.
      discriminator:
        propertyName: type
        mapping:
          ADMIN_FIXED_DURATION: '#/components/schemas/access-duration-settings-admin-fixed-duration'
          REQUESTER_SPECIFIED_DURATION: '#/components/schemas/access-duration-settings-requester-specified-duration'
      oneOf:
        - $ref: '#/components/schemas/access-duration-settings-admin-fixed-duration'
        - $ref: '#/components/schemas/access-duration-settings-requester-specified-duration'
    approval-sequence-id:
      type: string
      description: Unique identifier for the approval sequence
      minLength: 24
      maxLength: 24
    request-condition-creatable:
      type: object
      description: |
        A condition defines who can request which resource (with what resource permissions) and what is the approval process if requested.
      allOf:
        - $ref: '#/components/schemas/writable-standard-properties-request-condition'
      properties:
        requesterSettings:
          $ref: '#/components/schemas/requester-settings-creatable_RequesterSettings'
        accessScopeSettings:
          $ref: '#/components/schemas/access-scope-settings-creatable_AccessScopeSettings'
        accessDurationSettings:
          $ref: '#/components/schemas/access-duration-settings-creatable'
        approvalSequenceId:
          $ref: '#/components/schemas/approval-sequence-id'
        priority:
          $ref: '#/components/schemas/priority'
      required:
        - name
        - requesterSettings
        - approvalSequenceId
        - accessScopeSettings
    access-duration-settings-patchable:
      type: object
      nullable: true
      description: |-
        Settings that control who may specify the access duration allowed by this request condition, as well as what duration may be requested.

        > **Note:** The resource request settings affect which access duration settings are valid. See the `validAccessDurationSettings` property.
      discriminator:
        propertyName: type
        mapping:
          ADMIN_FIXED_DURATION: '#/components/schemas/access-duration-settings-admin-fixed-duration'
          REQUESTER_SPECIFIED_DURATION: '#/components/schemas/access-duration-settings-requester-specified-duration'
      oneOf:
        - $ref: '#/components/schemas/access-duration-settings-admin-fixed-duration'
        - $ref: '#/components/schemas/access-duration-settings-requester-specified-duration'
    request-condition-patchable:
      type: object
      description: |
        A condition defines who can request which resource (with what resource permissions) and what is the approval process if requested.
      allOf:
        - $ref: '#/components/schemas/writable-standard-properties-request-condition'
      properties:
        requesterSettings:
          $ref: '#/components/schemas/requester-settings-creatable_RequesterSettings'
        accessScopeSettings:
          $ref: '#/components/schemas/access-scope-settings-creatable_AccessScopeSettings'
        accessDurationSettings:
          $ref: '#/components/schemas/access-duration-settings-patchable'
        approvalSequenceId:
          $ref: '#/components/schemas/approval-sequence-id'
        priority:
          $ref: '#/components/schemas/priority'
    request-condition-service-status-enum:
      type: string
      description: status describes the request condition service status for the current org.
      x-okta-known-values:
        - READY
        - LIVE
    request-condition-service-status:
      type: object
      description: An object describes the status of request condition service.
      properties:
        status:
          $ref: '#/components/schemas/request-condition-service-status-enum'
      required:
        - status
    valid-access-detail:
      type: object
      properties:
        type:
          $ref: '#/components/schemas/access-scope-settings-type'
    valid-access-details:
      type: array
      description: Access scope settings that are eligible to be added to a request condition for the specified resource
      items:
        $ref: '#/components/schemas/valid-access-detail'
      minItems: 0
      maxItems: 3
    valid-requester-setting:
      type: object
      properties:
        type:
          $ref: '#/components/schemas/requester-settings-type'
    valid-requester-settings-details:
      type: array
      description: Request scope settings that are eligible to be added to a request condition for the specified resource
      items:
        $ref: '#/components/schemas/valid-requester-setting'
      minItems: 0
      maxItems: 3
    access-duration-type:
      type: string
      description: Identifies by whom the time settings were specified
      x-okta-known-values:
        - ADMIN_FIXED_DURATION
        - REQUESTER_SPECIFIED_DURATION
    valid-access-duration-type:
      type: object
      properties:
        type:
          $ref: '#/components/schemas/access-duration-type'
    valid-access-duration-settings-details:
      type: object
      description: Admin specified access duration settings added to a request condition or risk settings for the specified resource
      properties:
        supportedTypes:
          type: array
          description: Access duration settings that are eligible to be added to a request condition or risk settings for the specified resource.
          items:
            $ref: '#/components/schemas/valid-access-duration-type'
          minItems: 0
          maxItems: 2
        required:
          type: boolean
          description: Whether `accessDurationSetting` must be included in the request conditions or risk settings for the specified resource.
        maximumDays:
          type: number
          minimum: 1
          maximum: 365
          description: |
            The maximum number of days allowed from the `accessDurationSettings.duration` day expression for a request condition or risk settings, such as `P30D`.
            For example, if `accessDurationSettings.duration` is `P365D`, then the maximum number of days for this request is `365`.
        maximumHours:
          type: number
          minimum: 1
          maximum: 72
          description: |
            The minimum and maximum values allowed in `accessDurationSettings.duration` expression for a request condition or risk settings,
            when that expression contains hour units. For example: `P5H` is valid, and `P73H` is not.
        maximumWeeks:
          type: number
          minimum: 1
          maximum: 52
          description: |
            The maximum number of weeks allowed from the `accessDurationSettings.duration` week expression for request condition or risk settings, such as `P3W`.
            For example, if `accessDurationSettings.duration` is `P52W`, then the maximum number of weeks is `52`.
    request-on-behalf-of-type:
      type: string
      x-okta-known-values:
        - DIRECT_REPORT
    request-on-behalf-of-settings-details:
      type: object
      description: Specifies if and for whom a requester may request the resource for.
      required:
        - allowed
      properties:
        allowed:
          type: boolean
          description: Indicates that users who can request this resource could also request for another requester of the same resource
        onlyFor:
          type: array
          description: Which requesters the resource requester can request on behalf of. If onlyFor is not specified then any requester may request a resource on the behalf of any other user
          items:
            $ref: '#/components/schemas/request-on-behalf-of-type'
          minItems: 1
    valid-risk-settings-type:
      type: object
      properties:
        type:
          type: string
          enum:
            - DEFAULT_SETTING
    valid-risk-settings-details:
      type: object
      description: Risk settings that are eligible for the specified resource
      required:
        - supportedTypes
      properties:
        supportedTypes:
          type: array
          description: Risk settings that are eligible for the specified resource
          items:
            $ref: '#/components/schemas/valid-risk-settings-type'
    risk-settings-error:
      type: string
      description: |
        Error that has occurred with the risk settings. Currently, there is only error when an associated approval sequence was deleted.
      x-okta-known-values:
        - INVALID_SEQUENCE
    risk-settings-default-allowed-with-no-overrides-details:
      type: object
      description: Risk settings where request submission is allowed with no overrides.
      required:
        - requestSubmissionType
      properties:
        requestSubmissionType:
          type: string
          enum:
            - ALLOWED_WITH_NO_OVERRIDES
        error:
          type: array
          items:
            $ref: '#/components/schemas/risk-settings-error'
    risk-settings-default-allowed-with-overrides-details:
      type: object
      description: Risk settings where request submission is allowed with specified approval sequence and optional access duration settings
      required:
        - requestSubmissionType
        - approvalSequenceId
      properties:
        requestSubmissionType:
          type: string
          enum:
            - ALLOWED_WITH_OVERRIDES
        approvalSequenceId:
          $ref: '#/components/schemas/approval-sequence-id'
        accessDurationSettings:
          $ref: '#/components/schemas/access-duration-settings-full'
        error:
          type: array
          items:
            $ref: '#/components/schemas/risk-settings-error'
    risk-settings-default-restricted-details:
      type: object
      description: Risk settings where request submission is restricted. Access duration settings can only be present when there is an error.
      required:
        - requestSubmissionType
      properties:
        requestSubmissionType:
          type: string
          enum:
            - RESTRICTED
        accessDurationSettings:
          $ref: '#/components/schemas/access-duration-settings-full'
        error:
          type: array
          items:
            $ref: '#/components/schemas/risk-settings-error'
    risk-settings-default-details:
      type: object
      description: |
        Default risk settings that are valid for an access request when a risk has been detected for the resource and requesting user.
        Request submission indicates whether users are allowed or restricted to submit a request when there is any risk conflict. 
        An approval sequence must be selected with optional access duration settings here for `ALLOWED_WITH_OVERRIDES`, while the 
        settings from the matching request condition would apply for `ALLOWED_WITH_NO_OVERRIDES`. For `RESTRICTED`, access duration
        settings can only be present when there is an error.
      discriminator:
        propertyName: requestSubmissionType
        mapping:
          ALLOWED_WITH_NO_OVERRIDES: '#/components/schemas/risk-settings-default-allowed-with-no-overrides-details'
          ALLOWED_WITH_OVERRIDES: '#/components/schemas/risk-settings-default-allowed-with-overrides-details'
          RESTRICTED: '#/components/schemas/risk-settings-default-restricted-details'
      oneOf:
        - $ref: '#/components/schemas/risk-settings-default-allowed-with-no-overrides-details'
        - $ref: '#/components/schemas/risk-settings-default-allowed-with-overrides-details'
        - $ref: '#/components/schemas/risk-settings-default-restricted-details'
    risk-settings-details:
      type: object
      description: Risk settings that are valid for an access request when a risk has been detected for the resource and requesting user
      required:
        - defaultSetting
      properties:
        defaultSetting:
          $ref: '#/components/schemas/risk-settings-default-details'
    request-on-behalf-of-settings-type:
      type: string
      description: Resource that can request access on behalf of others
      x-okta-known-values:
        - EVERYONE
        - DIRECT_REPORT
    valid-request-on-behalf-of-setting:
      type: object
      properties:
        type:
          $ref: '#/components/schemas/request-on-behalf-of-settings-type'
    valid-request-on-behalf-of-settings-details:
      type: array
      description: Request on behalf of settings that are eligible to be added to a request condition for the specified resource
      items:
        $ref: '#/components/schemas/valid-request-on-behalf-of-setting'
      minItems: 0
      maxItems: 2
    request-settings:
      type: object
      description: |
        Request settings specify what conditions are valid for the given resource
      properties:
        validAccessScopeSettings:
          $ref: '#/components/schemas/valid-access-details'
        validRequesterSettings:
          $ref: '#/components/schemas/valid-requester-settings-details'
        validAccessDurationSettings:
          $ref: '#/components/schemas/valid-access-duration-settings-details'
        requestOnBehalfOfSettings:
          $ref: '#/components/schemas/request-on-behalf-of-settings-details'
        validRiskSettings:
          $ref: '#/components/schemas/valid-risk-settings-details'
        riskSettings:
          $ref: '#/components/schemas/risk-settings-details'
        validRequestOnBehalfOfSettings:
          $ref: '#/components/schemas/valid-request-on-behalf-of-settings-details'
      required:
        - validAccessScopeSettings
        - validRequesterSettings
        - validAccessDurationSettings
    request-on-behalf-of-settings-patchable:
      type: object
      nullable: true
      description: Specifies if and for whom a requester may request the resource for.
      required:
        - allowed
      properties:
        allowed:
          type: boolean
          description: Indicates that users who can request this resource could also request for another requester of the same resource. This property can only be `true`. If request on behalf of should not be allowed then `requestOnBehalfOfSettings` should be nullified.
        onlyFor:
          nullable: true
          type: array
          description: Which requesters the resource requester can request on behalf of. If onlyFor is not specified then any requester may request a resource on the behalf of any other user
          items:
            $ref: '#/components/schemas/request-on-behalf-of-type'
          minItems: 1
    risk-settings-default-allowed-with-no-overrides-patchable:
      type: object
      description: Risk settings where request submission is allowed with no overrides
      required:
        - requestSubmissionType
      properties:
        requestSubmissionType:
          type: string
          enum:
            - ALLOWED_WITH_NO_OVERRIDES
    risk-settings-default-allowed-with-overrides-patchable:
      type: object
      description: Risk settings where request submission is allowed with specified approval sequence and optional access duration settings
      required:
        - requestSubmissionType
        - approvalSequenceId
      properties:
        requestSubmissionType:
          type: string
          enum:
            - ALLOWED_WITH_OVERRIDES
        approvalSequenceId:
          $ref: '#/components/schemas/approval-sequence-id'
        accessDurationSettings:
          $ref: '#/components/schemas/access-duration-settings-patchable'
    risk-settings-default-restricted-patchable:
      type: object
      description: Risk settings where request submission is restricted
      required:
        - requestSubmissionType
      properties:
        requestSubmissionType:
          type: string
          enum:
            - RESTRICTED
    risk-settings-default-patchable:
      type: object
      description: |
        Default risk settings that are valid for an access request when a risk has been detected for the resource and requesting user.
        Request submission indicates whether users are allowed or restricted to submit a request when there is any risk conflict. 
        An approval sequence must be selected with optional access duration settings here for `ALLOWED_WITH_OVERRIDES`, while the 
        settings from the matching request condition would apply for `ALLOWED_WITH_NO_OVERRIDES`. For `RESTRICTED` and 
        `ALLOWED_WITH_NO_OVERRIDES`, access duration settings can only be present when there is an error.
      discriminator:
        propertyName: requestSubmissionType
        mapping:
          ALLOWED_WITH_NO_OVERRIDES: '#/components/schemas/risk-settings-default-allowed-with-no-overrides-patchable'
          ALLOWED_WITH_OVERRIDES: '#/components/schemas/risk-settings-default-allowed-with-overrides-patchable'
          RESTRICTED: '#/components/schemas/risk-settings-default-restricted-patchable'
      oneOf:
        - $ref: '#/components/schemas/risk-settings-default-allowed-with-no-overrides-patchable'
        - $ref: '#/components/schemas/risk-settings-default-allowed-with-overrides-patchable'
        - $ref: '#/components/schemas/risk-settings-default-restricted-patchable'
    risk-settings-patchable:
      type: object
      description: Risk settings that are valid for an access request when a risk has been detected for the resource and requesting user
      required:
        - defaultSetting
      properties:
        defaultSetting:
          $ref: '#/components/schemas/risk-settings-default-patchable'
    resource-request-settings-patchable:
      type: object
      description: |
        Resource request settings that specify various configurations and permissions at the resource level.
      properties:
        requestOnBehalfOfSettings:
          $ref: '#/components/schemas/request-on-behalf-of-settings-patchable'
        riskSettings:
          $ref: '#/components/schemas/risk-settings-patchable'
    subprocessors-acknowledged:
