      description: Whether a value to this field is required to advance the request
      example: true
      default: true
    request-field:
      type: object
      description: Fields to be filled out for a request
      required:
        - id
        - type
        - required
      properties:
        id:
          type: string
          description: |
            A `read-only` field ID.

            Useful for specifying requesterFieldValues when adding a request.
        type:
          $ref: '#/components/schemas/request-field-type'
        choices:
          type: array
          description: Valid choices when type is SELECT or MULTISELECT.
          items:
            $ref: '#/components/schemas/field-option-value'
        required:
          $ref: '#/components/schemas/field-required'
        label:
          type: string
          description: label of the requester field
        value:
          type: string
          description: An admin configured value for this field. Only applies to DURATION fields.
        maximumValue:
          type: string
          description: The maximum value allowed for this field. Only applies to DURATION fields.
        readOnly:
          type: boolean
          description: Indicates this field is immutable.
    catalog-entry-request-fields:
      type: object
      properties:
        data:
          type: array
          description: List of request fields
          items:
            $ref: '#/components/schemas/request-field'
        metadata:
          type: object
          description: Additional information about the request fields
          properties:
            riskAssessment:
              $ref: '#/components/schemas/risk-assessment'
    request-field-values-map:
      type: object
      description: Previously selected field values, keyed by field ID.
      additionalProperties:
        oneOf:
          - type: string
          - type: array
            items:
              type: string
      example:
        ASSET: rea12fzP9nuAdHd9Z0g4
    request-fields-query-body:
      type: object
      description: Request body for dynamic request field queries, providing previously selected field values.
      properties:
        fieldValues:
          $ref: '#/components/schemas/request-field-values-map'
    request-field-choices-query-body:
      type: object
