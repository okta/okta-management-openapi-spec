        status:
          operators:
            - eq
          schema:
            $ref: '#/components/schemas/task-status'
        type:
          operators:
            - eq
          schema:
            $ref: '#/components/schemas/task-type'
        assigneeId:
          operators:
            - eq
          schema:
            type: string
            maxLength: 20
            minLength: 20
