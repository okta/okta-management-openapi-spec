    requesters-member-list:
      type: array
      items:
        $ref: '#/components/schemas/requesters-member'
    requesters-replace-patch:
      type: object
      required:
        - op
        - path
        - value
      properties:
        op:
          type: string
          enum:
            - replace
          description: Operation to replace all existing members with a new set
        path:
          type: string
          pattern: ^/members$
          description: JSON Pointer path that specifies replacing the entire members array
        value:
          description: The complete list of members to replace the existing requester set
          $ref: '#/components/schemas/requesters-member-list'
    requesters-members-patch-operation:
      type: object
      oneOf:
        - $ref: '#/components/schemas/requesters-replace-patch'
        - $ref: '#/components/schemas/requesters-add-patch'
      required:
        - op
        - path
        - value
      properties:
        op:
          type: string
          enum:
            - add
            - replace
          description: The operation to perform on the requesters set
        path:
          type: string
          description: JSON Pointer path to the target location
      discriminator:
        propertyName: op
        mapping:
          add: '#/components/schemas/requesters-add-patch'
          replace: '#/components/schemas/requesters-replace-patch'
    requesters-members-patch-operations:
      type: array
      items:
        $ref: '#/components/schemas/requesters-members-patch-operation'
    requesters-full:
      type: object
      required:
        - id
        - members
      properties:
        id:
          type: string
          example: 6773596f7190a40006a1f9af
        members:
          type: array
          items:
            $ref: '#/components/schemas/requesters-member'
    task-id:
      type: string
      format: task-id
      description: The unique identifier for the task
      maxLength: 24
      minLength: 24
      pattern: ^[0-9a-f]{24}$
      example: 68b0a1576dd8db837f5ee55d
    okta-id:
      description: The Okta ID
      type: string
      maxLength: 20
      minLength: 20
    task-assignees:
      type: object
      x-okta-ignore-redocly-rules-for-sdk: true
      required:
        - externalId
        - type
      description: A task assignee that performs actions on the task.
