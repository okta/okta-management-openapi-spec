          items:
            type: object
            properties:
              name:
                type: string
                description: The name of the group
      required:
        - groups
    ApplicationOfflineModeState:
      type: object
      properties:
        state:
          type: string
          description: Indicates the offline mode state of the application
          enum:
            - ACTIVE
            - INACTIVE
            - TEST
          x-enumDescriptions:
            ACTIVE: Active offline mode means that Access Gateway uses the offline mode configuration to handle authentication and authorization when the IdP is unreachable.
            INACTIVE: Inactive offline mode means that Access Gateway doesn't use the offline mode configuration to handle authentication and authorization when the IdP is unreachable. Access Gateway uses the online mode configuration instead.
            TEST: Test offline mode means that Access Gateway simulates offline mode for an application while the IdP is still reachable. This allows you to test the offline mode configuration before activating it.
      required:
        - state
    ApplicationRequest:
      type: object
      properties:
        description:
          type: string
          description: Application description
        groups:
          type: array
          items:
            type: string
          description: Array of group IDs from your Okta org that are granted access to the application
        id:
          type: string
          format: uuid
          description: Unique identifier of the application
          readOnly: true
        idpId:
          type: string
          format: uuid
          description: IdP identifier
        label:
          type: string
          description: The name of the application, and also the tile name in your Okta tenant. The label must be unique.
        name:
          type: string
          description: Application name
          readOnly: true
        postLoginUrl:
          type: string
          format: uri
          pattern: ^https?://[a-zA-Z0-9.-]+(:[0-9]{1,5})?(?:/[A-Za-z0-9._~!$&'()*+,;=:@%/-]*)?$
