              description: Application type
              enum:
                - OAG_HEADER_BASED
                - OAG_ADMINUI
                - OAG_NOAUTH
                - OAG_SAMPLE_COOKIE
                - OAG_SAMPLE_HEADER
                - OAG_SAMPLE_POLICY
                - OAG_SAMPLE_WIKIPEDIA
                - ORACLE_ACCESSGATE
                - ORACLE_AGILE_PLM
                - ORACLE_APPLICATION_EXPRESS
