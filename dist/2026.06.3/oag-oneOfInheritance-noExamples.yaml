          OAG_ADMINUI: '#/components/schemas/HeaderBasedApplicationRequest'
          OAG_NOAUTH: '#/components/schemas/HeaderBasedApplicationRequest'
          OAG_SAMPLE_COOKIE: '#/components/schemas/HeaderBasedApplicationRequest'
          OAG_SAMPLE_HEADER: '#/components/schemas/HeaderBasedApplicationRequest'
          OAG_SAMPLE_POLICY: '#/components/schemas/HeaderBasedApplicationRequest'
          OAG_SAMPLE_WIKIPEDIA: '#/components/schemas/HeaderBasedApplicationRequest'
          ORACLE_ACCESSGATE: '#/components/schemas/HeaderBasedApplicationRequest'
          ORACLE_AGILE_PLM: '#/components/schemas/HeaderBasedApplicationRequest'
          ORACLE_APPLICATION_EXPRESS: '#/components/schemas/HeaderBasedApplicationRequest'
          ORACLE_DEMANTRA: '#/components/schemas/HeaderBasedApplicationRequest'
          ORACLE_HCM_CLOUD: '#/components/schemas/HeaderBasedApplicationRequest'
          ORACLE_HYPERION: '#/components/schemas/HeaderBasedApplicationRequest'
          ORACLE_JDE: '#/components/schemas/HeaderBasedApplicationRequest'
          ORACLE_OBIEE: '#/components/schemas/HeaderBasedApplicationRequest'
          ORACLE_PEOPLESOFT: '#/components/schemas/HeaderBasedApplicationRequest'
          ORACLE_WEBCENTER: '#/components/schemas/HeaderBasedApplicationRequest'
          ORACLE_WEBLOGIC: '#/components/schemas/HeaderBasedApplicationRequest'
          OAG_SAML: '#/components/schemas/SamlApplicationRequest'
    ApplicationResponse:
      type: object
      discriminator: *ref_3
    ApplicationType:
      description: Application type
      type: string
      enum:
        - OAG_ADMINUI
        - OAG_HEADER_BASED
        - OAG_NOAUTH
        - OAG_SAMPLE_COOKIE
        - OAG_SAMPLE_HEADER
        - OAG_SAMPLE_POLICY
        - OAG_SAMPLE_WIKIPEDIA
        - ORACLE_ACCESSGATE
        - ORACLE_AGILE_PLM
        - ORACLE_APPLICATION_EXPRESS
        - ORACLE_DEMANTRA
        - ORACLE_HCM_CLOUD
        - ORACLE_HYPERION
        - ORACLE_JDE
        - ORACLE_OBIEE
        - ORACLE_PEOPLESOFT
        - ORACLE_WEBCENTER
        - ORACLE_WEBLOGIC
        - OAG_SAML
      x-enumDescriptions:
        OAG_HEADER_BASED: Applications that use header-based authentication. Access Gateway passes user attributes in HTTP headers to the application, which uses these attributes to identify the user and manage sessions.
        OAG_ADMINUI: The Access Gateway Admin UI, which is the interface that admins use to manage Access Gateway.
        OAG_NOAUTH: Applications that don't require authentication. Use this type to manage access to public resources or to test Access Gateway functionality without authentication.
        OAG_SAMPLE_COOKIE: A sample application that demonstrates cookie-based authentication.
        OAG_SAMPLE_HEADER: A sample application that demonstrates header-based authentication.
        OAG_SAMPLE_POLICY: A sample application that demonstrates policy enforcement.
        OAG_SAMPLE_WIKIPEDIA: A sample application preconfigured to provide access to Wikipedia with header-based authentication.
        ORACLE_ACCESSGATE: Oracle Access Gateway applications.
        ORACLE_AGILE_PLM: Oracle Agile Product Lifecycle Management (PLM) applications.
        ORACLE_APPLICATION_EXPRESS: Oracle Application Express (APEX) applications.
        ORACLE_DEMANTRA: Oracle Demantra applications.
        ORACLE_HCM_CLOUD: Oracle Human Capital Management (HCM) Cloud applications.
        ORACLE_HYPERION: Oracle Hyperion applications.
        ORACLE_JDE: Oracle JD Edwards EnterpriseOne (JDE) applications.
        ORACLE_OBIEE: Oracle Business Intelligence Enterprise Edition (OBIEE) applications.
        ORACLE_PEOPLESOFT: Oracle PeopleSoft applications.
        ORACLE_WEBCENTER: Oracle WebCenter applications.
        ORACLE_WEBLOGIC: Oracle WebLogic Server applications.
        OAG_SAML: <x-lifecycle class="ea"></x-lifecycle>SAML applications that use Security Assertion Markup Language (SAML) 2.0 for single sign-on (SSO) authentication.
    ApplicationUpdateRequest:
      type: object
      properties:
        description:
          type: string
          description: Application description
        groups:
          type: array
          items:
            type: string
          description: Array of group IDs from your Okta org that are granted access to the application
        label:
          type: string
          description: The name of the application, and also the tile name in your Okta tenant. The label must be unique.
        postLoginUrl:
          type: string
          format: uri
          pattern: ^https?://[a-zA-Z0-9.-]+(:[0-9]{1,5})?(?:/[A-Za-z0-9._~!$&'()*+,;=:@%/-]*)?$
          description: The default URL that end users are directed to after they sign in
        type:
          $ref: '#/components/schemas/ApplicationType'
      discriminator: *ref_4
    Attribute:
      type: object
      properties:
        active:
          type: boolean
          default: true
          description: Indicates whether to send the attribute to a protected resource. If set to `true`, the attribute is sent.
        delimiter:
          type: string
          default: ':'
          description: The delimiter to use when `multiValueProcessor` is set to `SELECT_ALL`. This delimiter is used to concatenate multiple values into a single string.
        id:
          type: string
          format: uuid
          description: Unique identifier of the attribute
          readOnly: true
        index:
          type: integer
          default: 0
          minimum: 0
          maximum: 99
          description: |-
            The index of the `value` that's used when `multiValueProcessor` is set to `SELECT_INDEX`

            The index is zero-based, so the first value has an index of `0`, the second value has an index of `1`, and so on.
        multiValueProcessor:
          type: string
          description: |-
            Use this property to process attributes with multiple values that are returned from the source

            If the `value` that's received from the source contains multiple values separated by `,` (commas), you can use this property to specify which value to send to the protected resource.
          enum:
            - SELECT_INDEX
            - SELECT_ALL
            - RECORD_COUNT
          default: SELECT_INDEX
          x-enumDescriptions:
            SELECT_INDEX: This option allows you to select a specific value from a multi-valued attribute based on its index. The index must be specified in the `index` property.
            SELECT_ALL: This option concatenates all values of a multi-valued attribute into a single string, separated by a specified delimiter. The delimiter must be defined in the `delimiter` property.
            RECORD_COUNT: This option returns the count of values in a multi-valued attribute. It provides the total number of records present in the attribute.
        name:
          type: string
          description: The name of the attribute
          maxLength: 128
        source:
          type: string
          description: The data source for the contents of the attribute
          enum:
            - IDP
            - STATIC
            - SECRET
            - APP_CONTEXT
            - AUTH_CONTEXT
            - OID
          x-enumDescriptions:
            IDP: Selecting this data source means that the `value` that's based on this attribute is sourced from the IdP, your Okta tenant
            STATIC: Selecting this data source means that the value of the attribute is fixed and defined by the `value` property
            SECRET: Selecting this data source means that the `value` of the attribute is a static protected value. It's used as a secret key by the application to trust the headers, which originate from Access Gateway.
            APP_CONTEXT: Selecting this data source means that the `value` of the attribute is based on the application context. This means that the value is dynamically generated based on the application settings.
            AUTH_CONTEXT: Selecting this data source means that the `value` of the attribute comes from the authentication context, which includes the remote address and session ID
            OID: Selecting this data source means that the `value` of the attribute comes from the object identifier (OID) data source. The OID data source is available in the Oracle E-Business Suite and other application types that provide LDAP support. You can use it to retrieve the Oracle GUID.
        type:
          type: string
          enum:
            - HEADER
            - COOKIE
          description: The method that's used to pass attributes. You can pass attributes in a header or in a cookie.
        value:
          type: string
          description: The dynamic value of the attribute that's based on the `source`
    AttributeCreateRequest:
      allOf:
        - $ref: '#/components/schemas/Attribute'
        - type: object
          required:
            - name
            - source
            - value
            - type
    Auth0IdPRequest:
      allOf:
        - $ref: '#/components/schemas/IDPRequest'
        - type: object
          properties:
            clientId:
              type: string
              description: The client ID for the Auth0 IdP
            clientSecret:
              type: string
              description: The client secret for the Auth0 IdP
            domain:
              type: string
              description: Domain configured for Auth0 tenant. The domain must be unique per IdP. Creating another IDP with the same domain returns an error.
            tenant:
              type: string
              description: IdP tenant name
            type:
              type: string
              enum:
                - IDP_AUTH0
          required:
            - type
            - domain
            - tenant
            - clientId
            - clientSecret
      type: object
    AuthRequest:
      type: object
      properties:
        client_assertion:
          type: string
          description: Signed JWT token
          example: <jwt_token>
        client_assertion_type:
          type: string
          description: Specifies the format and type of the client assertion being sent for authentication
          enum:
            - urn:ietf:params:oauth:client-assertion-type:jwt-bearer
        grant_type:
          type: string
          description: Determines the mechanism Okta uses to authorize the creation of the tokens
          enum:
            - client_credentials
        scope:
          type: string
          description: Space-separated list of scopes
          example: okta.oag.idp.read okta.oag.app.read
          enum:
            - okta.oag.idp.read
            - okta.oag.idp.manage
            - okta.oag.app.read
            - okta.oag.app.manage
            - okta.oag.cert.read
            - okta.oag.authenticationService.manage
            - okta.oag.authenticationService.read
    AuthResponse:
      type: object
      properties:
        access_token:
          type: string
          description: An access token
        expires_in:
          type: integer
          description: The number of seconds until the access token expires
        scope:
          type: string
          description: Space-separated list of scopes
          enum:
            - okta.oag.idp.read
            - okta.oag.idp.manage
            - okta.oag.app.read
            - okta.oag.app.manage
            - okta.oag.cert.read
            - okta.oag.authenticationService.manage
            - okta.oag.authenticationService.read
        token_type:
          type: string
          description: |-
            The token type

            The value is generally `Bearer` except for a few instances of token exchange.
    AuthenticationServiceHealthCheck:
      type: object
      properties:
        details:
          type: string
          description: Additional details about the health status of the authentication service
        lastChecked:
          type: string
          format: date-time
          description: Timestamp of the last health check performed on the authentication service
        status:
          type: string
          description: Health status of the authentication service
          enum:
            - HEALTHY
            - DEGRADED
            - UNHEALTHY
            - INITIALIZING
            - UNKNOWN
          x-enumDescriptions:
            HEALTHY: The authentication service is operating normally.
            DEGRADED: The authentication service is experiencing issues that may impact performance or functionality, but it's still operational.
            UNHEALTHY: The authentication service is unhealthy and may be non-operational or have significant performance issues.
            INITIALIZING: The authentication service is in the process of starting up and isn't fully operational yet. Health checks are still being performed, but the status is unknown until the initialization process is complete.
            UNKNOWN: The health status of the authentication service can't be determined at this time. This can be due to a failure in performing health checks or insufficient data to assess the status.
    AuthenticationServiceSetting:
      type: object
      properties:
        certificateId:
          type: string
          format: uuid
          description: The ID of the certificate to use for the authentication service
        database:
          type: object
          description: The database configuration for the authentication service
          properties:
            type:
              type: string
              description: The type of database used for the authentication service
              enum:
                - mysql
            host:
              type: string
              description: The hostname of the database server
            port:
              type: integer
              description: The port number for the database server
            name:
              type: string
              description: The name of the database
            username:
              type: string
              description: The username for database authentication
              writeOnly: true
            password:
              type: string
              description: The password for database authentication
              writeOnly: true
        publicDomain:
          type: string
          description: The external domain of the authentication service where end users are authenticated. The domain must be registered with a domain registrar.
        serverNodes:
          type: array
          items:
            type: string
          description: A list of hostnames of nodes in the Access Gateway cluster where the authentication service runs
    BadGateway:
      allOf:
        - $ref: '#/components/schemas/Error'
        - type: object
          properties:
            errorCode:
              type: string
              example: BAD_GATEWAY
            message:
              type: string
              example: Received an invalid response from the upstream server
    BadRequest:
      allOf:
        - $ref: '#/components/schemas/Error'
        - type: object
          properties:
            errorCode:
              type: string
              description: Validation error code
              example: BAD_REQUEST
            message:
              type: string
              example: Request validation failed
    Behavior:
      description: Application behavior configuration
      type: object
      properties:
        customLoginUrl:
          type: string
          format: uri
          pattern: ^https?://[a-zA-Z0-9.-]+(:[0-9]{1,5})?/?$
          description: This URL is used to redirect users to a custom login page. The URL must be valid and fully qualified.
        error:
          type: string
          enum:
            - OAG_ERROR_PATH
            - APP_ERROR_PATH
            - NO_APP_ERROR_PATH
            - CUSTOM_URL
          description: Allows you to define error endpoints to call when errors occur.
          x-enumDescriptions:
            OAG_ERROR_PATH: This option lets you define an error path for an app. By default, it shows the generic Access Gateway error page
            APP_ERROR_PATH: This option displays an app-hosted error page. Set the app-hosted error page with the `errorPath` property. The `errorPath` must be a valid path in your app.
            NO_APP_ERROR_PATH: Access Gateway doesn't perform any error behavior
            CUSTOM_URL: This option redirects the user to a custom URL for error handling. Set the custom URL with the `postErrorUrl` property.
        errorManaged:
          type: boolean
          description: Indicates whether you manage error behavior in your IdP
        errorPath:
          type: string
          description: This is the path to the error endpoint URL. It can be a relative path within the application domain.
        globalTokenRevocation:
          type: boolean
          description: Indicates whether an IdP can send a logout signal in case of a security event
        inactive:
          type: string
          enum:
            - OAG_DEFAULT_PAGE
            - CUSTOM_URL
          description: Allows you to define the end-user experience when an application is inactive
          x-enumDescriptions:
            OAG_DEFAULT_PAGE: This option displays default Access Gateway "App offline" page
            CUSTOM_URL: This option redirects the user to a custom URL for inactivity. Set the custom URL with the `inactiveUrl` property.
        inactiveUrl:
          type: string
          format: uri
          pattern: ^https?://[a-zA-Z0-9.-]+(:[0-9]{1,5})?/?$
          description: If you use `CUSTOM_URL` as the `inactive` method, then `inactiveUrl` is the URL where end users are directed when an app is inactive.
        login:
          type: string
          enum:
            - OAG_LOGIN_PATH
            - APP_LOGIN_PATH
            - NO_APP_LOGIN_PATH
            - CUSTOM_URL
          description: Allows you to define login endpoints when users sign in and create user sessions
          x-enumDescriptions:
            OAG_LOGIN_PATH: This option shows the Access Gateway local authentication module (Auth Module) sign-in page. Use a valid relative path in the protected app. The **Auth module** must refer to a previously defined Auth Module.
            APP_LOGIN_PATH: This option uses the associated unprotected path to an app-hosted sign-in page. Use a valid relative path in the protected app.
            NO_APP_LOGIN_PATH: This option doesn't use a login path
            CUSTOM_URL: This option redirects the user to a custom URL after they sign in. Set the custom URL with the `loginPath` property.
        loginManaged:
          type: boolean
          description: Indicates whether you manage sign-in behavior in your IdP
        loginPath:
          type: string
          description: |-
            The path to the login endpoint URL. It can be relative or fully qualified, depending on which `login` method you use. It's executed after the user successfully signs in.

            > **Note:** The URL must be unique across the login, logout, and error behaviors. Access Gateway doesn't support using the same URL for multiple behaviors. The URL can't overlap with an existing defined policy.
        logout:
          type: string
          enum:
            - OAG_LOGOUT_PATH
            - OAG_LOGOUT_PATH2
            - APP_LOGOUT_PATH
            - NO_APP_LOGOUT_PATH
            - CUSTOM_URL
          description: Allows you to define logout endpoints that help terminate user sessions
          x-enumDescriptions:
            OAG_LOGOUT_PATH: This option signs the user out of Access Gateway and the application. Set the logout path with the `logoutPath` property.
            OAG_LOGOUT_PATH2: This option signs the user out of Access Gateway and the application, with a different path
            APP_LOGOUT_PATH: This option signs the user out of the application only
            NO_APP_LOGOUT_PATH: This option does not sign the user out of the application
            CUSTOM_URL: This option redirects the user to a custom URL for logout. Set the custom URL with the `postLogoutUrl` property
        logoutPath:
          type: string
          description: |-
            The path to the relative endpoint URL. Redirect users to this path when they sign out.

            > **Note:** The URL must be unique across the login, logout, and error behaviors. Access Gateway doesn't support using the same URL for multiple behaviors. The URL can't overlap with an existing defined policy.
        maintenance:
          type: string
          enum:
            - OAG_DEFAULT_PAGE
            - CUSTOM_URL
          description: Allows you to define the end-user experience when an application is in maintenance mode
          x-enumDescriptions:
            OAG_DEFAULT_PAGE: This option displays the default Access Gateway "App maintenance" page
            CUSTOM_URL: This option redirects the user to a custom URL for maintenance. Set the custom URL with the `maintenanceUrl` property.
        maintenanceUrl:
          type: string
          format: uri
          pattern: ^https?://[a-zA-Z0-9.-]+(:[0-9]{1,5})?/?$
          description: If you use `CUSTOM_URL` as the `maintenance` method, then `maintenanceUrl` is the URL where end users are directed when an app is in maintenance mode.
        noSession:
          type: string
          enum:
            - OAG_DEFAULT_PAGE
            - IDP_REDIRECT
            - IDP_FORCE_AUTHN
            - CUSTOM_URL
          description: Allows you to define the end-user experience when Access Gateway has no session or the current session expires for an application
          x-enumDescriptions:
            OAG_DEFAULT_PAGE: When no there's no session or an expired session, this option displays the Access Gateway "No session" page
            IDP_REDIRECT: This option redirects the end user to Okta to reauthenticate. If their Okta session is still active, the end user is silently redirected back to the app with a refreshed app session.
            IDP_FORCE_AUTHN: This option redirects the end user to Okta to reauthenticate, even if their Okta session is active
            CUSTOM_URL: This option redirects the end user to a custom URL. Set the custom URL with the `noSessionUrl` property
        noSessionUrl:
          type: string
          format: uri
          pattern: ^https?://[a-zA-Z0-9.-]+(:[0-9]{1,5})?/?$
          description: The URL where an end user is redirected when no session or a session expiry is detected
        policyDenied:
          type: string
          enum:
            - OAG_DEFAULT_PAGE
            - STATUS_CODE_403
            - CUSTOM_URL
          description: Allows you to define the end-user experience when Access Gateway denies access to a resource if the user doesn't meet the requirements of a policy
          x-enumDescriptions:
            OAG_DEFAULT_PAGE: When a policy denial is detected, this option displays the default Access Gateway policy failure page
            STATUS_CODE_403: This option returns a blank page with the HTTP 403 Forbidden error
            CUSTOM_URL: This option redirects the end user to a custom URL when the user doesn't fulfill the requirements of a policy. Set the custom URL with the `policyDeniedUrl` property.
        policyDeniedUrl:
          type: string
          format: uri
          pattern: ^https?://[a-zA-Z0-9.-]+(:[0-9]{1,5})?/?$
          description: The URL where an end user is redirected when a policy denial is detected
        postErrorUrl:
          type: string
          format: uri
          pattern: ^https?://[a-zA-Z0-9.-]+(:[0-9]{1,5})?/?$
          description: If you use `CUSTOM_URL` as the `error` method, then `postErrorUrl` is the URL where end users are directed after an error occurs. The URL must be valid and fully qualified.
        postLogoutUrl:
          type: string
          format: uri
          pattern: ^https?://[a-zA-Z0-9.-]+(:[0-9]{1,5})?/?$
          description: If you use `CUSTOM_URL` as the `logout` method, then `postLogoutUrl` is the URL where end users are directed after they sign out
        sessionIntegrityFailure:
          type: string
          enum:
            - OAG_DEFAULT_PAGE
            - IGNORE
            - IDP_FORCE_AUTHN
            - IDP_REDIRECT
            - STATUS_CODE_405
            - CUSTOM_URL
          description: |-
            Allows you to define the end-user experience when Access Gateway detects a session integrity failure.

            For example, a session integrity failure can occur when end users change networks while maintaining an active app session.
          x-enumDescriptions:
            OAG_DEFAULT_PAGE: When a session integrity failure is detected, this option displays the default Access Gateway security warning page
            IGNORE: This option means that session integrity isn't enforced
            IDP_FORCE_AUTHN: This option forces the end user to Okta so that they reauthenticate. After they sign in again, they're returned to the application.
            IDP_REDIRECT: This option redirects the end user to Okta so that they reauthenticate. If their Okta session is still active, the end user is silently redirected back to the app with a refreshed app session.
            STATUS_CODE_405: This option returns a blank page with the HTTP 405 Method Not Allowed error
            CUSTOM_URL: This option redirects the end user to a custom URL when a session integrity failure is detected. Set the custom URL with the `sessionIntegrityFailureUrl` property.
        sessionIntegrityFailureUrl:
          type: string
          format: uri
          pattern: ^https?://[a-zA-Z0-9.-]+(:[0-9]{1,5})?/?$
          description: The URL where an end user is redirected when a session integrity failure is detected
        singleLogout:
          type: boolean
          description: |-
            Indicates whether both the Access Gateway application session and IdP session are terminated when a user signs out. When `singleLogout` is `true`, both sessions are terminated.

            When it's `false`, only the Access Gateway application session is terminated.
        universalLogout:
          type: boolean
          description: |-
            Indicates whether the user's Access Gateway and application sessions are terminated when they sign out. When it's `true`, users must sign in again to use Access Gateway or their applications.

            When it's `false`, only the Access Gateway application session is terminated.

            > **Note:** Universal logout doesn't sign the user out of Okta.
    BehaviorSAML:
      description: Application behavior configuration
      type: object
      properties:
        globalTokenRevocation:
          type: boolean
          description: Indicates whether an IdP can send a logout signal in case of a security event
        globalTokenRevocationEndpoint:
          type: string
          format: uri
          pattern: ^https?://[a-zA-Z0-9.-]+(:[0-9]{1,5})?(/.*)?$
          description: The URL where Access Gateway listens for logout signals from the IdP in case of a security event. This property is required when `globalTokenRevocation` is set to `true`.
        singleLogout:
          type: boolean
          description: |-
            Indicates whether both the Access Gateway application session and IdP session are terminated when a user signs out. When `singleLogout` is `true`, both sessions are terminated.

            When it's `false`, only the Access Gateway application session is terminated.
        universalLogout:
          type: boolean
          description: |-
            Indicates whether the user's Access Gateway and application sessions are terminated when they sign out. When it's `true`, users must sign in again to use Access Gateway or their applications.

            When it's `false`, only the Access Gateway application session is terminated.

            > **Note:** Universal logout doesn't sign the user out of Okta.
