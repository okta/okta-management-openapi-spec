              description: Indicates whether the IdP is valid
            permissions:
              type: array
              description: List of permissions associated with the IdP
              items:
                type: string
    IdPOfflineModeDirectory:
      type: object
      properties:
        config:
          type: object
          description: |-
            Additional configuration settings for the directory server of the IdP.

            See [Manage your LDAP integration](https://help.okta.com/okta_help.htm?type=oie&id=ext_LDAP_Provisioning) and [What Is LDAP & How Does It Work?](https://www.okta.com/identity-101/what-is-ldap/)
          required:
            - userSearchDn
            - groupSearchDn
          properties:
            usernameLDAPAttribute:
              type: string
              description: The LDAP attribute that's used to represent usernames in the directory server of the IdP
            uniqueIdAttribute:
              type: string
              description: The LDAP attribute that's used to represent unique IDs in the directory server of the IdP
            userSearchDn:
              type: string
              description: The distinguished name (DN) in an LDAP directory that Access Gateway uses to start searching for user entries. It defines the "base" location within the directory tree to perform user lookups.
            userObjectClasses:
              type: array
              items:
                type: string
              description: |-
                The list of LDAP object classes that define what types of "user" entries exist in your directory server. An object class is a template in an LDAP schema that describes the attributes an entry must or may have.

                Object classes allow Access Gateway to identify which entries in the directory server represent user accounts. Common object classes for users include `person`, and `user`, but the specific object classes can vary based on your directory schema.
            userObjectFilter:
              type: string
              description: An LDAP filter string that defines criteria for selecting user objects during directory searches
            groupNameLDAPAttribute:
              type: string
              description: The LDAP attribute that's used to represent group names in the directory server of the IdP
            groupSearchDn:
              type: string
              description: The distinguished name (DN) in an LDAP directory that Access Gateway uses to start searching for group entries. It defines the "base" location within the directory tree to perform group lookups.
            groupObjectClasses:
              type: array
              items:
                type: string
              description: |-
                The list of LDAP object classes that define what types of "group" entries exist in your directory server. An object class is a template in an LDAP schema that describes the attributes that an entry must or may have.

                Object classes allow Access Gateway to identify which entries in the directory server represent group accounts. Common object classes for groups include `groupOfNames`, `groupOfUniqueNames`, and `group`, but the specific object classes can vary based on your directory schema.
            memberAttribute:
              type: string
              description: The LDAP attribute used to indicate the members of a group in your directory server.
            memberUserAttribute:
              type: string
              description: The LDAP attribute in user entries that's used to match or reference user accounts in group membership listings within the directory
            rdnLdapAttribute:
              type: string
              description: |-
                The LDAP attribute used for relative distinguished names (RDNs). By default, Access Gateway uses `uid` for `OPEN_LDAP` directories and `cn` for `ACTIVE_DIRECTORY` directories, but you can specify a different attribute if your directory server uses a different setup.

                In LDAP, each entry's DN is assembled from one or more RDNs, which are attribute-value pairs. The `rdnLdapAttribute` specifies which LDAP attribute forms the RDN for each entry when constructing or parsing DNs.

                If `rdnLdapAttribute` is set to `cn` (common name), then an entry DN for a user might be:
                `cn=jsmith,ou=users,dc=example,dc=com`
                Here, `cn` is the RDN attribute for this entry.
        connection:
          type: object
          description: Connection configuration settings for the directory server of the IdP
          properties:
            connectionUrl:
              type: string
              description: The connection URL for the directory server of the IdP
            bindDn:
              type: string
              description: The bind distinguished name (DN) for the directory server of the IdP
            bindCredential:
              type: string
              description: The bind credential (password) for the directory server of the IdP
              writeOnly: true
        id:
          type: string
          description: Unique identifier of the directory
          format: uuid
          readOnly: true
        type:
          type: string
          description: The directory vendor type
          enum:
            - OPEN_LDAP
            - ACTIVE_DIRECTORY
          x-enumDescriptions:
            OPEN_LDAP: OpenLDAP directory server
            ACTIVE_DIRECTORY: Microsoft Active Directory server
      required:
        - type
        - connection
        - config
    IdPOfflineModeDirectoryTestRequest:
      type: object
      properties:
        bindCredential:
          type: string
          description: The bind credential (password) for the directory server of the IdP
          writeOnly: true
        bindDn:
          type: string
          description: The bind distinguished name (DN) for the directory server of the IdP
          writeOnly: true
        connectionUrl:
          type: string
          description: The connection URL for the directory server of the IdP
          writeOnly: true
      required:
        - connectionUrl
        - bindDn
        - bindCredential
    IdPOfflineModeFailoverMode:
      type: object
      properties:
        mode:
          type: string
          description: |-
            Indicates the failover mode of the IdP when the IdP is unreachable or disconnected from Access Gateway (offline mode).

            The failover mode is the behavior of the IdP when Access Gateway can't connect to Okta. Access Gateway can automatically detect when the IdP is unreachable and can then switch to offline mode to maintain functionality.
          enum:
            - AUTOMATIC
            - DISABLED
          x-enumDescriptions:
            AUTOMATIC: In automatic failover mode, when the IdP is unreachable, Access Gateway automatically switches to offline mode.
            DISABLED: In disabled failover mode, Access Gateway doesn't switch to offline mode when the IdP is unreachable.
      required:
        - mode
    IdPOfflineModeHealthPolicy:
      type: object
      properties:
        failureThreshold:
          type: integer
          description: |-
            The number of consecutive failed health checks that must occur before marking the Okta IdP service as unhealthy.

            The Okta IdP service is considered unhealthy when Access Gateway can't connect to the IdP after a certain number of retry attempts. After the Okta IdP reaches the failure threshold, failover to offline mode (if failover is enabled) is triggered and sign in requests are redirected to the offline mode IdP.
          default: 3
          minimum: 1
          maximum: 10
        healthCheckInterval:
          type: integer
          description: The amount of time, in seconds, between health check requests
          default: 60
          minimum: 60
          maximum: 300
          enum:
            - 60
            - 120
            - 180
            - 240
            - 300
        maxRetries:
          type: integer
          description: The maximum number of retry attempts for failed health checks
          default: 3
          minimum: 0
          maximum: 5
        recoveryCooldownInterval:
          type: integer
          description: The interval, in seconds, before failback completes (Access Gateway connects to the Okta IdP and offline mode is exited). The recovery cooldown is used after the `successThreshold` is met and the Okta IdP is marked healthy again. After the recovery cooldown interval, Access Gateway attempts to connect to the Okta IdP and exit offline mode.
          default: 360
          minimum: 120
          maximum: 6000
        successThreshold:
          type: integer
          description: The number of consecutive successful health checks that must occur before marking the Okta IdP service as healthy
          default: 2
          minimum: 1
          maximum: 10
        timeout:
          type: integer
          description: The amount of time, in seconds, that a health check HTTPS request can take before it's considered a failure
          default: 3
          minimum: 1
          maximum: 10
    InternalServerError:
      allOf:
        - $ref: '#/components/schemas/Error'
        - type: object
          properties:
            errorCode:
              type: string
              example: INTERNAL_SERVER_ERROR
            message:
              type: string
              example: An unexpected error occurred on the server side
    OktaIdPRequest:
      allOf:
        - $ref: '#/components/schemas/IDPRequest'
        - type: object
