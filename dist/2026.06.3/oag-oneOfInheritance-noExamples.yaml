        acsUrl:
          type: string
          format: uri
          pattern: ^https?://[a-zA-Z0-9.-]+(:[0-9]{1,5})?(?:/[A-Za-z0-9._~!$&'()*+,;=:@%/-]*)?(?:\?[A-Za-z0-9._~!$&'()*+,;=:@%/?-]*)?(?:#[A-Za-z0-9._~!$&'()*+,;=:@%/?-]*)?$
          description: The Assertion Consumer Service (ACS) URL where the SAML assertion is sent after authentication
        binding:
          type: string
          description: The SAML binding that's used for communication between the service provider (SP) and IdP
          enum:
            - HTTP_POST
            - HTTP_REDIRECT
          default: HTTP_POST
        clientId:
          type: string
          description: The unique identifier of the SP entity
        clientSignature:
          type: boolean
          description: Indicates whether SAML requests are expected to be signed by the SP or not. When `clientSignature` is `true`, SAML requests are signed by the SP and you must provide a value for `spCertificate`. When it's `false`, SAML requests aren't signed by the SP and the `spCertificate` value is ignored.
          default: false
        encryptAssertion:
          type: boolean
          description: Indicates whether SAML assertions are required to be encrypted by the IdP or not. When `encryptAssertion` is `true`, the SAML assertion must be encrypted by the IdP before it's sent to the SP. When it's `false`, the assertion can be sent without encryption.
          default: false
        encryptionAlgorithm:
          type: string
          description: The encryption algorithm that's used for SAML assertions
          enum:
            - AES128_CBC
            - AES256_CBC
            - TRIPLE_DES_CBC
          default: AES256_CBC
        keyTransportAlgorithm:
          type: string
          description: The key transport algorithm that's used for SAML assertions
          enum:
            - RSA_OAEP
            - RSA_OAEP_256
            - RSA_V1_5
          default: RSA_OAEP_256
          x-enumDescriptions:
            RSA_OAEP: RSA Encryption Scheme (RSAES) that uses Optimal Asymmetric Encryption Padding (OAEP) using SHA-1 and Mask Generation Function 1 (MGF1) with SHA-1
            RSA_OAEP_256: RSAES that uses OAEP with SHA-256 and MGF1 with SHA-256
            RSA_V1_5: RSA v1.5 padding
        logoutUrl:
          type: string
          format: uri
          pattern: ^https?://[a-zA-Z0-9.-]+(:[0-9]{1,5})?(?:/[A-Za-z0-9._~!$&'()*+,;=:@%/-]*)?(?:\?[A-Za-z0-9._~!$&'()*+,;=:@%/?-]*)?(?:#[A-Za-z0-9._~!$&'()*+,;=:@%/?-]*)?$
          description: The single logout URL for the SAML application. This is the URL where users are redirected to initiate the logout process with the Identity Provider (IdP) when [`singleLogout`](https://developer.okta.com/docs/api/openapi/oag/oag/tag/Application-Behavior/#tag/Application-Behavior/operation/replaceBehavior!path=singleLogout&t=request) is set to `true` in the application behavior configuration.
        nameIdFormat:
          type: string
          description: The `NameID` format that's used for SAML assertions
          enum:
            - EMAIL_ADDRESS
            - PERSISTENT
            - TRANSIENT
            - UNSPECIFIED
          default: UNSPECIFIED
          x-enumDescriptions:
            EMAIL_ADDRESS: The `NameID` is in the format of an email address.
            PERSISTENT: The `NameID` is a persistent, opaque identifier that doesn't change across sessions. It's typically used when the SP needs to recognize the user across multiple sessions without revealing their actual identity.
            TRANSIENT: The `NameID` is a temporary identifier that's generated for a single session. It changes with each new session and isn't meant to be stored or reused by the SP.
            UNSPECIFIED: The `NameID` format isn't specified. The IdP and SP may use a default format or determine the format based on other factors.
        postLoginUrl:
          type: string
          format: uri
          pattern: ^https?://[a-zA-Z0-9.-]+(:[0-9]{1,5})?(?:/[A-Za-z0-9._~!$&'()*+,;=:@%/-]*)?(?:\?[A-Za-z0-9._~!$&'()*+,;=:@%/?-]*)?(?:#[A-Za-z0-9._~!$&'()*+,;=:@%/?-]*)?$
          description: Relay state URL where end users are directed after they sign in. This is typically the URL of the application dashboard or homepage.
        signAssertion:
          type: boolean
          description: Indicates whether SAML assertions are expected to be signed by the IdP or not. When `signAssertion` is `true`, SAML assertions are signed by the IdP. When it's `false`, SAML assertions are sent without a signature.
          default: true
        signDocument:
          type: boolean
          description: Indicates whether SAML responses are expected to be signed by the IdP or not. When `signDocument` is `true`, SAML responses are signed by the IdP. When it's `false`, SAML responses are sent without a signature.
          default: false
        signingAlgorithm:
          type: string
          description: The signing algorithm that's used for SAML requests and responses
          enum:
            - RSA_SHA1
            - RSA_SHA256
            - RSA_SHA256_MGF1
            - RSA_SHA512
            - RSA_SHA512_MGF1
          default: RSA_SHA256
          x-enumDescriptions:
            RSA_SHA1: RSA signature with SHA-1 hashing algorithm
            RSA_SHA256: RSA signature with SHA-256 hashing algorithm
            RSA_SHA256_MGF1: RSA signature with SHA-256 hashing algorithm and MGF1 mask generation function
            RSA_SHA512: RSA signature with SHA-512 hashing algorithm
            RSA_SHA512_MGF1: RSA signature with SHA-512 hashing algorithm and MGF1 mask generation function
        spCertificate:
          type: string
          description: The Base64-encoded public certificate of the SP. This is required when `clientSignature`, `encryptAssertion`, `signAssertion`, or `signDocument` are set to `true`.
          writeOnly: true
        type:
          type: string
          description: The application type
          enum:
            - OAG_SAML
    SamlApplicationRequest:
      x-okta-lifecycle:
        lifecycle: EA
        isGenerallyAvailable: false
        SKUs: []
      allOf:
        - $ref: '#/components/schemas/ApplicationRequest'
        - $ref: '#/components/schemas/SamlApplicationProperties'
        - type: object
          properties:
            idpMetadata:
              type: string
              description: Base64-encoded metadata about the IdP that's used to set up the SAML integration
              readOnly: true
      type: object
    SamlApplicationResponse:
      $ref: '#/components/schemas/SamlApplicationRequest'
    SamlApplicationResponseWithEmbedded:
      x-okta-lifecycle:
        lifecycle: EA
        isGenerallyAvailable: false
        SKUs: []
      allOf:
        - $ref: '#/components/schemas/SamlApplicationRequest'
        - type: object
          properties:
            _embedded:
              type: object
              description: |-
                Additional configuration settings for applications that are returned when you use the `expand` query parameter. This object returns different settings based on the application type.

                SAML applications don't use Access Gateway as a proxy. As a result, the `_embedded` object doesn't return protected resources, health checks, application policy settings, and session settings. The application session is controlled by the application itself and none of the session settings are returned in the `_embedded` object.

                For SAML applications, the `_embedded` object only returns the `behavior` and `attributes` settings. Many of the application behavior settings are related to the application session only and aren't applicable for SAML applications. `singleLogout`, `universalLogout`, `globalTokenRevocation`, and `globalTokenRevocationEndpoint` are the only applicable behavior settings for SAML applications.
              readOnly: true
              x-order: 99
              properties:
                behavior:
                  $ref: '#/components/schemas/BehaviorSAML'
                attributes:
                  type: array
                  items:
                    $ref: '#/components/schemas/Attribute'
                  description: Attributes configuration
    SamlApplicationUpdateRequest:
      allOf:
        - $ref: '#/components/schemas/ApplicationUpdateRequest'
        - $ref: '#/components/schemas/SamlApplicationProperties'
      type: object
    ServiceUnavailable:
      allOf:
        - $ref: '#/components/schemas/Error'
        - type: object
          properties:
            errorCode:
              type: string
              example: SERVICE_UNAVAILABLE
            message:
              type: string
              example: The server is currently unable to handle the request due to initializing
    Session:
      description: Application session configuration
      type: object
      properties:
        auth:
          type: string
          enum:
            - HEADER
            - NOAUTH
            - IWA
            - EBS
          description: Authentication type
        browserSessionExpiration:
          type: boolean
          description: Indicates whether app sessions expire when the browser is closed. If `browserSessionExpiration` is `true`, the app session expires when the browser is closed.
        deepLinking:
          type: boolean
          description: Indicates whether your application dynamically redirects browsers to application URIs after sign-in. If `deepLinking` is `false`, the browser redirects to the post sign-in URL after sign-in.
        enforceDeepLinkingDomain:
          type: boolean
          description: Indicates whether your application only allows deep links that share the public domain name. If a deep link domain doesn't match the public domain name, Access Gateway only uses the post login URL.
        idleSession:
          type: boolean
          description: Indicates whether app sessions can expire after a certain amount of idle time. If `idleSession` is `true`, the session expires after a period of inactivity, determined by the `idleSessionTimeout` value.
        idleSessionTimeout:
          type: integer
          description: |-
            The amount of idle time, in seconds, before an app session expires. This value is ignored if `idleSession` is `false`.
            The maximum value for this field is determined by the `maxSessionTimeout` value. The value of `idleSessionTimeout` must be less than or equal to `maxSessionTimeout`.
          minimum: 60
          default: 3600
        maxSession:
          type: boolean
          description: Indicates whether app sessions can expire after a certain amount of time, regardless of activity. If `maxSession` is `true`, the session expires after a period of time, determined by the `maxSessionTimeout` value.
        maxSessionTimeout:
          type: integer
          description: |-
            The amount of time, in seconds, before an app session expires, regardless of activity. This value is ignored if `maxSession` is `false`.
            The minimum value for this field is determined by the `idleSessionTimeout` value. The value of `maxSessionTimeout` must be greater than or equal to `idleSessionTimeout`.
            Setting `maxSessionTimeout` to `0` means that the app session never expires which is similar to setting `maxSession` to `false`.
          default: 28800
    TooManyRequests:
      allOf:
        - $ref: '#/components/schemas/Error'
        - type: object
          properties:
            errorCode:
              type: string
              example: TOO_MANY_REQUESTS
            message:
              type: string
              example: API rate limit exceeded
    Unauthorized:
      allOf:
        - $ref: '#/components/schemas/Error'
        - type: object
          properties:
            errorCode:
              type: string
              example: UNAUTHORIZED
            message:
              type: string
              example: Authentication is required or has failed
  securitySchemes:
    jwtBearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: 'Enter the JWT bearer token in the format: Bearer {token}'
x-tagGroups:
  - name: Access Tokens
    tags:
      - AccessTokens
  - name: Applications
    tags:
      - Applications
      - Application Attributes
      - Application Behavior
      - Application Health Check
      - Application Policies
      - Application Protected Resources
      - Application Session
      - Application Offline Mode
  - name: Certificates
    tags:
      - Certificates
  - name: Identity Providers
    tags:
      - IDPs
      - IDPs Offline Mode
      - IDPs Offline Mode Directory
      - IDPs Offline Mode Health Policy
  - name: Settings
    tags:
      - Settings Authentication Service
