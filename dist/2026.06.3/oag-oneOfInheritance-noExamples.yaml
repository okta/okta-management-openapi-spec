components:
  parameters:
    ApplicationID:
      name: applicationId
      in: path
      required: true
      description: Identifier of the application
      schema:
        type: string
        format: uuid
    AttributeID:
      in: path
      name: attributeId
      required: true
      description: Identifier of the attribute
      schema:
        type: string
        format: uuid
    AuthenticatorID:
      in: path
      name: authenticatorId
      required: true
      description: Identifier of the offline mode authenticator
      schema:
        type: string
        format: uuid
    CertificateID:
      in: path
      name: certificateId
      required: true
      description: Identifier of the certificate
      schema:
        type: string
        format: uuid
    DirectoryID:
      in: path
      name: directoryId
      required: true
      description: Identifier of the directory
      schema:
        type: string
        format: uuid
