    HeaderBasedApplicationRequest:
      allOf:
        - $ref: '#/components/schemas/ApplicationRequest'
        - type: object
          properties:
            certificateId:
              type: string
              format: uuid
              description: Certificate identifier
            contentRewrite:
              type: boolean
              description: Indicates whether Access Gateway attempts to rewrite redirects and URLs in an app's HTML content
            debug:
              type: boolean
              description: Indicates whether debug logging is enabled for the application
              default: false
            hostHeaderValue:
              type: string
              description: The value of the host header that's passed to the back-end protected web resources. It uses the fully qualified external name.
            loadBalanced:
              type: boolean
              description: Indicates whether the application is load balanced. If `loadBalanced` is `true`, you can distribute the request load for an application across multiple servers.
              default: false
            localNetworkAccessRestriction:
              type: boolean
              default: false
              description: Indicates whether local network access restriction is enabled. If `localNetworkAccessRestriction` is `true`, Access Gateway only allows proxy requests from local network IP addresses.
            maxFileSize:
              type: integer
              description: Maximum file upload size allowed by the application, in megabytes (MB). The default value is 1 (1 MB). Setting it to 0 (zero) allows for an unlimited file upload size.
              default: 1
            proxyReadTimeout:
              type: integer
              description: Defines a timeout in seconds for reading a response from the proxied server. The timeout counter takes effect only between two successive read operations, not for the transmission of the whole response. If the proxied server doesn't transmit anything within this time, the connection is closed.
              default: 60
              maximum: 99999999
              minimum: 1
            proxyRedirect:
              type: boolean
              description: Indicates whether the application is a proxy redirect application. If `proxyRedirect` is `true`, Access Gateway redirects the browser to the protected resource URL.
            publicDomain:
              type: string
              description: The URL of the domain that's entered by users to gain access to this application. The domain must be registered with a domain registrar.
              format: hostname
            type:
              type: string
              description: Application type
              enum:
                - OAG_HEADER_BASED
