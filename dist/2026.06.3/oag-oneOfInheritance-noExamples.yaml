            domain:
              type: string
              description: Okta org domain/custom domain (if configured). The domain must be unique per IdP. Creating another IDP with the same domain returns an error.
            type:
              type: string
              description: IdP type
              enum:
                - IDP_OKTA
          required:
            - type
            - domain
            - apiToken
      type: object
    Policy:
      type: object
      properties:
        active:
          type: boolean
          default: true
          description: Policy status
        caseSensitive:
          type: boolean
          description: Indicates whether the policy resource is case sensitive
          default: true
        customDirective:
          type: string
          format: multi-line string
          description: |-
            Custom NGINX directives that handle special requirements not covered by the policy type.
            There is no limit to the number of directives you can add, but each directive must be on its own line.
        description:
          type: string
          description: Policy description
        id:
          type: string
          format: uuid
          description: Unique identifier of the policy
          readOnly: true
        name:
          type: string
          description: Policy name
        regexRule:
          type: string
          description: |-
            Regular expression (regex) that can control authorization for the given resource

            See [Protected Rule resource-matching rule expressions](https://help.okta.com/okta_help.htm?type=oag&id=policy-protected-rule-expressions).
        resourcePath:
          type: string
          description: The path to the resource that the policy manages
        rule:
          type: string
          enum:
            - NO_AUTH
            - PROTECTED
            - PROTECTED_REGEX
            - ADAPTIVE
            - CUSTOM
          description: |-
            Policy type

            See [Policy types](https://help.okta.com/okta_help.htm?type=oag&id=ext_oag_about_pol_types)
          x-enumDescriptions:
            NO_AUTH: The resource is not protected by any policy
            PROTECTED: This policy requires a valid session (authenticated user) to access the associated resource
            PROTECTED_REGEX: This policy requires a valid session and an expression that determines who can access the resource
            ADAPTIVE: This policy extends the Not Protected policy, but passes header information to the underlying app
            CUSTOM: This policy extends the Protected Rule policy, but supports entering a regular expression as the URI
    PolicyCreateRequest:
      allOf:
        - $ref: '#/components/schemas/Policy'
        - type: object
          required:
            - name
            - resourcePath
            - rule
    ProtectedResource:
      type: object
      properties:
        active:
          type: boolean
          default: true
          description: Indicates whether the protected resource is active or not. If set to `true`, the resource is considered active and is used for routing requests.
        assignedWeight:
          type: integer
          default: 1
          minimum: 0
          maximum: 100
          description: |-
            The associated weight assigned to the protected resource. This weight is used to determine how requests are distributed among multiple protected resources.

            You can assign a value from `0` to `100`. `0` (zero) means that a host isn't in use.

            For example, a weight value of `1` routes an equal number of requests to each protected web resource.
            A weight value of `2` routes twice as many requests to protected web resources with this weight than those with a weight of `1`. If one protected web resource has a weight of `1` and the other has a weight of `2`, `66%` of the total requests are routed to the resource with a weight of `2`.
        calculatedWeight:
          type: number
          format: float
          description: The calculated weight percentage that's based on the assigned weight distribution of all resources in the application. Values are represented as decimals. For example, `1.0` equals 100% distribution and `0.5` equals 50% distribution.
          readOnly: true
        hostname:
          type: string
          format: uri
          pattern: ^https?://[a-zA-Z0-9.-]+(:[0-9]{1,5})?/?$
          description: |-
            The hostname of the protected web resource URL

            The URL must include the protocol, host, and port.
        id:
          type: string
          format: uuid
          description: Unique identifier of the protected resource
          readOnly: true
    ProtectedResourceCreateRequest:
      allOf:
        - $ref: '#/components/schemas/ProtectedResource'
        - type: object
          required:
            - hostname
    ResourceNotFound:
      allOf:
        - $ref: '#/components/schemas/Error'
        - type: object
          properties:
            errorCode:
              type: string
              example: NOT_FOUND
            message:
              type: string
              example: The requested resource could not be found
    SamlApplicationCreateRequest:
      x-okta-lifecycle:
