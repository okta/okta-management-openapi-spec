                * If it's set to `false` and `hostHeaderValue` isn't specified, Access Gateway uses the protected resource hostname as the host header value.
      type: object
    HealthCheck:
      description: |-
        A health check configuration for load balanced applications

        [`loadBalanced`](https://developer.okta.com/docs/api/openapi/oag/oag/tag/Applications/#tag/Applications/operation/createApplication!path=allOf/loadBalanced&t=request) must be set to `true` in the application configuration to enable a health check.
      type: object
      properties:
        enabled:
          type: boolean
          description: Whether health checks are allowed for protected resource URLs in load balanced applications. Health checks are allowed if `enabled` is `true`.
          default: false
        healthyThreshold:
          type: integer
          description: Number of successful responses that must be returned before a host is considered healthy
          default: 3
          minimum: 1
          maximum: 10
        interval:
          type: integer
          description: Interval between health check requests (in seconds)
          default: 10
          minimum: 2
          maximum: 300
        method:
          type: string
          enum:
            - GET
          default: GET
          description: HTTP request method for health checks. `GET` is the only supported method.
        path:
          type: string
          description: The URI path to the resource that's used in health checks
          default: /
        statusCode:
          type: integer
          description: HTTP response status code that web resources return as part of a successful health check
          default: 200
        timeout:
          type: integer
          description: The amount of time, in seconds, that a health check HTTP request can take before it's considered a failure
          default: 1
          minimum: 1
          maximum: 60
        unhealthyThreshold:
          type: integer
          description: Number of unsuccessful responses that must be returned before a host is considered unhealthy
          default: 3
          minimum: 1
          maximum: 10
    IDPRequest:
      type: object
