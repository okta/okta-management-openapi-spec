        requestStatus:
          $ref: '#/components/schemas/request-request-status'
        resolved:
          $ref: '#/components/schemas/request-resolved-date-time'
        permalinkId:
          $ref: '#/components/schemas/request-permalink-id'
        _links:
          $ref: '#/components/schemas/request-links'
      example:
        id: 61eb06a3c462d20007f0235c
        subject: request-from-service-now-xsd23432
        requestTypeId: 61eb2db568c7c300079fefd0
        requesterUserIds:
          - 00ub0oNGTSWTBKOLGLNR
        lastUpdated: '2022-05-05T14:15:22Z'
        lastUpdatedBy: 00ub0oNGTSWTBKOLGLNR
        resolved: 2022-05-05T14:15:22Z'
        requestStatus: RESOLVED
        type: ACCESS_REQUEST
        permalinkId: 1
        _links:
          requestType:
            href: https://myorg.okta.com/governance/api/v1/request-types/61eb2db568c7c300079fefd0
            type: application/json
          self:
            href: https://myorg.okta.com/governance/api/v1/requests/61eb06a3c462d20007f0235c
            type: application/json
