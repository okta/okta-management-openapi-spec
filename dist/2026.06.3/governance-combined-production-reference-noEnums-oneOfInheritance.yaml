      required:
        - status
        - approverName
        - approvalId
        - approverId
        - decision
        - decided
        - fieldValues
      properties:
        status:
          type: string
          description: The status of a completed approval
          enum:
            - COMPLETED
        approverName:
          type: string
          description: Okta username of the user which approved the request
          maxLength: 100
        approvalId:
          $ref: '#/components/schemas/request-approval-id'
        approverId:
          type: string
          format: okta-user-id
          description: Okta User.id of the user which approved the request
          maxLength: 20
          minLength: 20
          pattern: 00u[0-9a-zA-Z]+
        decision:
          type: string
          enum:
            - APPROVED
            - DENIED
        decided:
          type: string
          format: date-time
          description: The date the approver made their decision.
