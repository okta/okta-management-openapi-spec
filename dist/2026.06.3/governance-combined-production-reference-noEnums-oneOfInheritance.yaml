    campaign-status:
      type: string
      x-okta-known-values:
        - SCHEDULED
        - LAUNCHING
        - ACTIVE
        - COMPLETED
        - DELETED
        - ERROR
    campaign-read-only-fields:
      type: object
      x-okta-ignore-redocly-rules-for-sdk: true
      description: Read-only attributes
      required:
        - status
      properties:
        status:
          $ref: '#/components/schemas/campaign-status'
    schedule-type:
      type: string
      x-okta-ignore-redocly-rules-for-sdk: true
      description: The type of campaign
      x-okta-known-values:
        - ONE_OFF
        - RECURRING
    campaign-reviewer-type:
      type: string
      x-okta-ignore-redocly-rules-for-sdk: true
      description: Identifies the type of reviewer for the access certification campaign
      x-enumDescriptions:
        USER: A single reviewer reviews the campaign. The `reviewerSettings.reviewerId` property is required for this reviewer type.
        REVIEWER_EXPRESSION: Specifies an expression to derive a reviewer for the campaign. This reviewer type is typically used for the manager reviewer use case (`reviewerSettings.reviewerScopeExpression` indicates the user's manager). The `reviewerSettings.fallBackReviewerId` property is required and is used if Okta can't determine the reviewer based on the required `reviewerSettings.reviewerScopeExpression` property.
        GROUP: All the members of an Okta group specified in `reviewerSettings.reviewerGroupId` are the reviewers for the campaign. The `reviewerSettings.reviewerGroupId` property is required for this reviewer type. If the group specified in `reviewerSettings.reviewerGroupId` contains only one member, then that member is assigned as the reviewer for all reviews, and the `reviewerType` is set to `USER` for those reviews. When the campaign launches, if the group has more than 10 members, 10 members from the group are randomly set as reviewers for the campaign.
        RESOURCE_OWNER: The resource owners are the reviewers for the campaign. The `reviewerSettings.fallBackReviewerId` property is required and is set as the reviewer if resource owners aren't found or are unsupported for the resource. If resource owners are configured, the reviewers are derived from owners of the resources specified in `resourceSettings.targetResources`.<br>**Note:** For certifying AD groups, the `fallBackReviewerId` is always used because resource owners for AD groups aren't supported.
        MULTI_LEVEL: A campaign with reviews that can be reviewed and passed on from a reviewer at one level to a reviewer at the next level. This setting provides a sequence of reviewers who can decide on the final outcome of the reviews. A maximum of two reviewer levels are supported. `reviewerSettings.reviewerLevels` is required, and all other properties in `reviewerSettings` are ignored.
      x-okta-known-values:
        - USER
        - REVIEWER_EXPRESSION
        - GROUP
        - RESOURCE_OWNER
        - MULTI_LEVEL
    campaign-links:
      type: object
      x-okta-ignore-redocly-rules-for-sdk: true
      description: Links available on a single campaign representation.
      required:
