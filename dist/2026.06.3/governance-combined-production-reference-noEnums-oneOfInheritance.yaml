          nullable: true
          minLength: 1
          maxLength: 20
        reportingSettings:
          $ref: '#/components/schemas/reporting-settings-mutable'
    campaign-full:
      description: Full representation of a Campaign resource
      allOf:
        - $ref: '#/components/schemas/read-only-standard-properties'
