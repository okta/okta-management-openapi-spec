        - resourceSettings
        - reviewerSettings
        - remediationSettings
      properties:
        name:
          type: string
          description: Name of the campaign. Maintain some uniqueness when naming the campaign as it helps to identify and filter for campaigns when needed.
          minLength: 1
          maxLength: 255
        description:
          type: string
          description: Human readable description
          maxLength: 1000
        campaignType:
