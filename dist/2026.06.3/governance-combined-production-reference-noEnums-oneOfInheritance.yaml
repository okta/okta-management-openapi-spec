      description: |
        A [filter](https://developer.okta.com/docs/api/#filter) expression that returns entries based on the following properties and supported operators:
        * `id`: supports `eq`, `gt`
        * `lastUpdated`: supports `gt`, `ge`, `le`, and `lt`
        * `targetResourceOrn`: supports `eq`
        * `target.externalId`:  supports `eq`
        * `target.type`:  supports `eq`
        * `status`:  supports `eq`
        * `name`:  supports `eq` and `co`

        > **Note:** Query parameter percent encoding is required. See [Special characters](https://developer.okta.com/docs/api/#special-characters).
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/scim-filter'
      x-scim-filter:
        id:
          operators:
            - eq
            - gt
          schema:
            $ref: '#/components/schemas/entitlement-bundle-id'
        lastUpdated:
          operators:
            - gt
            - ge
            - le
            - lt
          schema:
            $ref: '#/components/schemas/last-updated'
        targetResourceOrn:
          operators:
            - eq
          schema:
            $ref: '#/components/schemas/resource-orn'
        target.externalId:
          operators:
            - eq
          schema:
            $ref: '#/components/schemas/resource-id'
        target.type:
          operators:
            - eq
          schema:
            $ref: '#/components/schemas/resource-type'
        status:
          operators:
            - eq
          schema:
            $ref: '#/components/schemas/entitlement-bundle-status'
        name:
          operators:
            - sw
            - co
          schema:
            $ref: '#/components/schemas/bundle-writable-standard-properties/properties/name'
      examples:
        FilterByLastUpdated:
          summary: Filter for results that were modified after a specific date
          value: lastUpdated gt "2022-05-24T14:15:22Z"
        FilterByLastUpdatedAndId:
          summary: Filter for results that were modified after lastUpdated and have object IDs greater than a specific value
          value: lastUpdated ge "2022-05-24T14:15:22Z" AND id gt "0bbfxqCAJWWGELFTYBBB"
        FilterByLastUpdatedOrLastUpdatedAndId:
          summary: Filter for results by the lastUpdated date or by the lastUpdated date and the object ID
          value: lastUpdated gt "2022-05-24T14:15:22Z" OR (lastUpdated ge "2022-05-24T14:15:22Z" AND id gt "0bbfxqCAJWWGELFTYBBB")
        FilterByTargetExternalIdAndTargetType:
          summary: Filter by target.externalId and target.type
          value: target.externalId eq "0oafxqCAJWWGELFTYASJ" AND target.type eq "APPLICATION"
        FilterByTargetResourceOrn:
          summary: Filter by resource ORN representing a single resource
          value: targetResourceOrn eq "orn:okta:idp:00o11edPwGqbUrsDm0g4:apps:oidc:0oafxqCAJWWGELFTYASJ"
        FilterByStatus:
          summary: Filter by status
          value: status eq "ACTIVE"
        FilterByNamePrefix:
          summary: Filter by a prefix in the name
          value: name sw "sales"
        FilterByNameContains:
          summary: Filter by a name substring
          value: name co "sales"
        FilterBySpecificBundleIds:
          summary: Filter by specific bundle IDs
          value: id eq "enbg0wqnRSOEiCqvE0g5" OR id eq "enb673d4pGgTpgmxz0g5"
