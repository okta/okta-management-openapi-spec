  parameters:
    type:
      name: type
      in: query
      required: true
      description: Type of candidate selection
      schema:
        type: string
        enum:
          - RESOURCE_OWNER
          - GROUP_MEMBER
      x-enumDescriptions:
        RESOURCE_OWNER: Find the resource owner. Specify the target resource (app, group, entitlement bundle, or entitlement value) in `entityId`.
        GROUP_MEMBER: Find members of a group. Specify the target group in `entityId`.
      example: RESOURCE_OWNER
    entity-id:
      name: entityId
      in: query
      required: true
      description: |
        For `type=RESOURCE_OWNER`: Specify the resource ID (app ID, group ID, entitlement bundle ID, or entitlement value ID)
        For `type=GROUP_MEMBER`: Specify the group ID
      schema:
        x-okta-ignore-redocly-rules-for-sdk: true
        allOf:
          - $ref: '#/components/schemas/okta-id'
      example: 0oafxqCAJWWGELFTYASJ
    skip-resolving-owning-groups-to-members:
      name: skipResolvingOwningGroupsToMembers
      in: query
      required: false
      description: |-
        Only applicable when `type=RESOURCE_OWNER` and the resource owner is a group.
        Determines whether to resolve the group to its members:
        * If `true`, returns the group without resolving to its members
        * If `false`, returns the users who are members of the group
      schema:
        type: boolean
        default: false
      example: false
    limit:
      name: limit
      in: query
      required: false
      description: Maximum number of candidates to return
      schema:
        type: integer
        minimum: 1
        maximum: 50
        default: 10
      example: 20
    skip-delegate-replacement:
      name: skipDelegateReplacement
      in: query
      required: false
      description: When `true``, returns the original candidates without replacing them with their active delegates
      schema:
        type: boolean
        default: false
      example: false
    filter:
      name: filter
      in: query
      description: |
        Filter expression for excluding specific candidates from the selection:
        * Only the `candidate.externalId` property and the `ne` operator are supported
        * Only Okta user IDs are accepted
        * A maximum of five excluded candidates is allowed in the expression
      required: false
      schema:
        type: string
        minLength: 54
        maxLength: 306
        example: candidate.externalId ne "00u10sfroCwbHQO4a0g4" AND candidate.externalId ne "00u9h8g7f6e5d4c3b2a1"
    campaigns-filter:
      name: filter
      description: |
        Apply various filters by using supported campaign filtering properties.

        **Note:** Query parameter percent encoding is required. See [Percent-encoding](https://developer.mozilla.org/en-US/docs/Glossary/Percent-encoding)
      in: query
      required: false
      schema:
        type: string
      examples:
        FilterByCampaignName:
          summary: Filter by campaign name
          value: name eq "Sales Review"
        FilterByCampaignStatus:
          summary: Filter by campaign status
          value: status eq "SCHEDULED"
        FilterByMultipleCampaignStatus:
          summary: Filter by multiple campaign status
          value: status eq "COMPLETED" OR status eq "SCHEDULED"
        FilterByStartDate:
          summary: Filter by start date
          value: startDate gt "2022-05-24T14:15:22Z"
        FilterByEndDate:
          summary: Filter by end date
          value: endDate gt "2022-05-24T14:15:22Z"
        FilterByScheduleTypeOneOff:
          value: scheduleType eq ONE_OFF
        FilterByScheduleTypeRecurring:
          value: scheduleType eq RECURRING
        FilterByReviewerTypeUser:
          value: reviewerType eq USER
        FilterByReviewerTypeGroup:
          value: reviewerType eq GROUP
        FilterByReviewerTypeGroupOwner:
          value: reviewerType eq RESOURCE_OWNER
        FilterByReviewerTypeMultiLevel:
          value: reviewerType eq MULTI_LEVEL
        FilterByRecurringCampaignId:
          value: recurringCampaignId eq "icijNW29nev6qyksD0g1"
    after:
      name: after
      description: |-
        Specifies the pagination cursor for the next page of results.
        Treat this as an opaque value obtained through the standard link headers. See [pagination](https://developer.okta.com/docs/api/#pagination).
      in: query
      required: false
      schema:
        type: string
        example: 00u68w6vzKLultXS97g6
    limit-2:
      name: limit
      description: The maximum number of records returned in a response
      in: query
      required: false
      schema:
        type: integer
        default: 20
        maximum: 200
        minimum: 1
    campaigns-order-by:
      name: orderBy
      description: |
        Apply an ordering of campaigns by specifying a supported campaign property name with `%20asc` or `%20desc` suffix.

        **Note:** Query parameter percent encoding is required. See [Percent-encoding](https://developer.mozilla.org/en-US/docs/Glossary/Percent-encoding)
      in: query
      required: false
      style: form
      explode: false
      schema:
        type: array
        uniqueItems: false
        minItems: 1
        maxItems: 1
        items:
          type: string
          description: A property of items within the collection, optionally followed by a ` asc` or ` desc` suffix.
        default:
          - created asc
      examples:
        OrderByName:
          summary: Order by name
          value: name desc
        OrderByCreated:
          summary: Order by created
          value: created desc
        OrderByStartDate:
          summary: Order by startDate
          value: startDate desc
        OrderByEndDate:
          summary: Order by endDate
          value: endDate desc
        OrderByStatus:
          summary: Order by status
          value: status desc
    campaign-id:
      name: campaignId
      description: Unique identifier for the campaign
      in: path
      required: true
      schema:
        type: string
    collections-include-param:
      name: include
      description: The `include` filter adds additional properties in the response.
      in: query
      required: false
      schema:
        type: array
        items:
          type: string
          enum:
            - counts
      examples:
        IncludeCounts:
          summary: Include resource counts and assignment counts in the response
          description: 'Query param: ?include=counts'
          value: counts
    collections-list-filter:
      name: filter
      description: |
        A [filter](https://developer.okta.com/docs/api/#filter) expression that filters data based on `id` or `name` resource collection properties.
        The `sw` and `co` [operators](https://developer.okta.com/docs/api/#operators) are supported for `name`, and the `eq` operator is supported for `id`.

        > **Note:** Query parameter percent encoding is required. See [Percent-encoding](https://developer.mozilla.org/en-US/docs/Glossary/Percent-encoding).
      in: query
      required: false
      schema:
        type: string
        format: scim-filter
        maxLength: 255
        example: name sw "Sales"
      x-scim-filter:
        name:
          operators:
            - sw
            - co
          type: String
        id:
          operators:
            - eq
          type: String
      examples:
        searchCollectionsByName:
          summary: Search for resource collections with a name that begins with "Sales"
          value: name sw "Sales"
        searchCollectionsByNameContains:
          summary: Search for resource collections with a name that contains "Sales"
          value: name co "Sales"
        searchCollectionsById:
          summary: Search for resource collections with specific IDs
          value: id eq "coljqM9a9xerZfRpp0g2" or id eq "coljrNAph4LiA2C1m0g2"
    collections-principal-list-filter:
      name: filter
      description: |
        A [filter](https://developer.okta.com/docs/api/#filter) expression that filters principals based on `principal` or `principalProfile` properties.
        The `sw` [operator](https://developer.okta.com/docs/api/#operators) is supported for these properties.

        **Note:** Query parameter percent encoding is required. See [Percent-encoding](https://developer.mozilla.org/en-US/docs/Glossary/Percent-encoding).
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/scim-filter'
      x-scim-filter:
        principalProfile.firstName:
          operators:
            - sw
          type: String
        principalProfile.lastName:
          operators:
            - sw
          type: String
        principalProfile.email:
          operators:
            - sw
          type: String
      examples:
        isPrincipalAssigned:
          summary: Search for principal assignment with specific properties
          value: principal.externalId eq "00ub0oNGTSWTBKOLGLNR" AND principal.type eq "OKTA_USER"
        searchWithName:
          summary: Search for assigned principals with a name that begins with "John"
          value: principalProfile.name sw "John"
    collection-id:
      name: collectionId
      description: Unique identifier for the collection
      in: path
      required: true
      schema:
        type: string
    collection-assignment-id:
      name: assignmentId
      description: Unique identifier for the collection assignment
      in: path
      required: true
      schema:
        type: string
    collections-catalog-user-list-filter:
      name: filter
      description: |
        A [filter](https://developer.okta.com/docs/api/#filter) expression that filters users based on `firstName`, `lastName`, or `email` properties.
        The `sw` [operator](https://developer.okta.com/docs/api/#operators) is supported for these properties.

        > **Note:** Query parameter percent encoding is required. See [Percent-encoding](https://developer.mozilla.org/en-US/docs/Glossary/Percent-encoding).
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/scim-filter'
      x-scim-filter:
        firstName:
          operators:
            - sw
          type: String
        lastName:
          operators:
            - sw
          type: String
        email:
          operators:
            - sw
          type: String
      examples:
        searchWithFirstName:
          summary: Search for unassigned users with a first name that begins with "John"
          value: firstName sw "John"
        searchWithName:
          summary: Search for unassigned users with a first name, last name, or email that begins with "John"
          value: firstName sw "John" OR lastName sw "John" OR email sw "John"
    collection-resources-include-param:
      name: include
      description: The `include` query parameter returns additional properties in the response.
