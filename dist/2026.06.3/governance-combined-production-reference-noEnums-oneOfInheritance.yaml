    request-action:
      type: object
      description: An action taken as part of this request, null if there will never be actions for this request.
      oneOf:
        - $ref: '#/components/schemas/request-action-pending'
        - $ref: '#/components/schemas/request-action-completed'
      discriminator:
        propertyName: status
        mapping:
          PENDING: '#/components/schemas/request-action-pending'
          COMPLETED: '#/components/schemas/request-action-completed'
    request-actions:
      type: array
      minItems: 1
      maxItems: 1
      description: A list of actions. Currently only supports one action per request.
      nullable: true
      items:
        $ref: '#/components/schemas/request-action'
    request-full:
      type: object
      description: A full representation of a request
      discriminator:
        propertyName: type
        mapping:
          ACCESS_REQUEST: '#/components/schemas/request-full-api-compatible'
          CUSTOM: '#/components/schemas/request-full-api-incompatible'
      oneOf:
        - $ref: '#/components/schemas/request-full-api-compatible'
        - $ref: '#/components/schemas/request-full-api-incompatible'
    request-message-message:
      type: string
      description: Message that will be created for the request. Newline can be specified by characters "\n". Message will be visible for all users who can view the request.
      minLength: 1
      maxLength: 5000
      nullable: false
    request-message-mutable:
      type: object
      required:
        - message
      properties:
        message:
          $ref: '#/components/schemas/request-message-message'
    request-message-creatable:
      type: object
      description: The properties expected in a request message create request
      allOf:
        - $ref: '#/components/schemas/request-message-mutable'
    resource-asset-type-display-name:
      type: string
      description: The display name for the resource asset type
      minLength: 1
      maxLength: 255
    resource-asset-type-links:
      type: object
      description: Links available in a resource asset type response
      required:
        - self
      properties:
        self:
          $ref: '#/components/schemas/link'
    resource-asset-type:
      description: Representation of a resource asset type
      allOf:
        - $ref: '#/components/schemas/read-only-standard-properties'
        - type: object
          properties:
            displayName:
              $ref: '#/components/schemas/resource-asset-type-display-name'
            _links:
              $ref: '#/components/schemas/resource-asset-type-links'
          required:
            - displayName
    resource-asset-types-list:
      type: object
      required:
        - data
        - _links
      properties:
        data:
          description: List of resource asset types for the resource
          type: array
          items:
            $ref: '#/components/schemas/resource-asset-type'
          minItems: 0
        _links:
          $ref: '#/components/schemas/list-links'
    resource-asset-description:
      type: string
      description: The description of a resource asset
      minLength: 1
      maxLength: 255
    resource-asset-external-id:
      type: string
      description: The external ID of a resource asset
      minLength: 1
      maxLength: 512
    resource-asset-links:
      type: object
      description: Links available in resource asset response
      required:
        - self
      properties:
        self:
          $ref: '#/components/schemas/link'
    resource-asset:
      description: Representation of a resource asset.
      allOf:
        - $ref: '#/components/schemas/read-only-standard-properties'
        - type: object
          properties:
            orn:
              $ref: '#/components/schemas/resource-orn'
            name:
              $ref: '#/components/schemas/resource-asset-name'
            description:
              $ref: '#/components/schemas/resource-asset-description'
            type:
              $ref: '#/components/schemas/resource-asset-type-sparse'
            externalId:
              $ref: '#/components/schemas/resource-asset-external-id'
            _links:
              $ref: '#/components/schemas/resource-asset-links'
          required:
            - orn
            - name
            - type
            - externalId
    resource-asset-with-hierarchy-context:
      description: Representation of a resource asset with context about its hierarchy.
      allOf:
        - $ref: '#/components/schemas/resource-asset'
        - type: object
          properties:
            hasChildren:
              type: boolean
              description: Whether this asset has any children in the hierarchy. Present only if ?include=children_info is specified
            parentId:
              type: string
              nullable: true
              description: The ID of the direct parent asset, or null if this is a root asset. Present only if ?include=ancestors is specified
    resource-asset-ancestor:
      description: An ancestor asset in the hierarchy, including its own parentId for chain traversal.
      type: object
      properties:
        id:
          description: Unique identifier for the asset
          type: string
          minLength: 1
        orn:
          $ref: '#/components/schemas/resource-orn'
        name:
          $ref: '#/components/schemas/resource-asset-name'
        type:
          $ref: '#/components/schemas/resource-asset-type-sparse'
        parentId:
          type: string
          nullable: true
          description: The ID of this ancestor's direct parent, or null if it is a root asset
        _links:
          $ref: '#/components/schemas/resource-asset-links'
      required:
        - id
        - orn
        - name
        - type
    resource-assets-links:
      type: object
      description: Links available in resource asset response
      required:
        - self
      properties:
        self:
          $ref: '#/components/schemas/link'
        next:
          $ref: '#/components/schemas/link'
        parent:
          $ref: '#/components/schemas/link'
        children:
          $ref: '#/components/schemas/link'
    resource-assets-list:
      type: object
      required:
        - data
        - _links
      properties:
        data:
          description: List of all resource assets matching the filter
          type: array
          items:
            $ref: '#/components/schemas/resource-asset-with-hierarchy-context'
          minItems: 0
        ancestors:
          description: |
            A map of all unique ancestor assets for items in `data`, keyed by asset ID. Only present if ?include=ancestors is specified. Each ancestor also includes its own `parentId` to allow full chain traversal to the root.
          type: object
          additionalProperties:
            $ref: '#/components/schemas/resource-asset-ancestor'
        _links:
          $ref: '#/components/schemas/resource-assets-links'
    resource-asset-updatable:
      description: The updatable properties of a resource asset.
      type: object
      properties:
        description:
          nullable: true
          x-explicit-null: true
          type: string
          description: The description of a resource asset
          minLength: 1
          maxLength: 255
    resource-inventory-stats:
      type: object
      required:
        - apps
        - groups
        - entitlementValues
        - entitlementBundles
        - collections
      properties:
        apps:
          type: integer
          description: The number of app resources matching the search query
          readOnly: true
        groups:
          type: integer
          description: The number of group resources matching the search query
          readOnly: true
        entitlementValues:
          type: integer
          description: The number of entitlement value resources matching the search query
          readOnly: true
        entitlementBundles:
          type: integer
          description: The number of entitlement bundle resources matching the search query
          readOnly: true
        collections:
          type: integer
          description: The number of collection resources matching the search query
          readOnly: true
    resource-type-enum:
      type: string
      description: The type of resource in the inventory
      x-okta-known-values:
        - apps
        - groups
        - entitlement-values
        - entitlement-bundles
        - collections
    resource-status-enum:
      type: string
      description: Current status of the resource
      example: active
      x-okta-known-values:
        - active
        - inactive
    resource-stats:
      type: object
      description: Statistical information about the resource. Not all properties are applicable to every resource type.
      properties:
        apps:
          type: integer
          description: Number of associated apps
          example: 42
        groups:
          type: integer
          description: Number of associated groups
          example: 5
        users:
          type: integer
          description: Number of associated users
          example: 28
        owners:
          type: integer
          description: Number of owners
          example: 1
        entitlements:
          type: integer
          description: Number of entitlements
          example: 21
        labels:
          type: integer
          description: Number of associated labels
          example: 3
      additionalProperties:
        type: integer
    embedded-item:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: string
          description: Unique identifier for the embedded resource
        name:
          type: string
          description: Display name of the embedded resource
        metadata:
          type: object
          description: Additional metadata specific to this embedded resource type
          additionalProperties: true
      additionalProperties: false
    resource:
      allOf:
        - type: object
          required:
            - type
          properties:
            type:
              $ref: '#/components/schemas/resource-type-enum'
            orn:
              type: string
              format: okta-resource-orn
              description: The `id` of the resource in [ORN format](https://developer.okta.com/docs/api/openapi/okta-management/guides/roles/#okta-resource-name-orn).
            name:
              type: string
              description: Display name of the resource
              example: My Salesforce Group
            description:
              type: string
              description: Detailed description of the resource
              example: Group description
            status:
              $ref: '#/components/schemas/resource-status-enum'
            logos:
              type: array
              items:
                type: object
                properties:
                  url:
                    type: string
                    format: uri
                    description: URL to the logo image
            stats:
              $ref: '#/components/schemas/resource-stats'
            metadata:
              type: object
              description: Additional metadata associated with the resource
              additionalProperties: true
              example:
                values:
                  - SOX
                  - PII
                color: blue
            _embedded:
              type: object
              description: Embedded related resources
              properties:
                owners:
                  type: array
                  items:
                    $ref: '#/components/schemas/embedded-item'
                apps:
                  type: array
                  items:
                    $ref: '#/components/schemas/embedded-item'
                labels:
                  type: array
                  items:
                    $ref: '#/components/schemas/embedded-item'
        - $ref: '#/components/schemas/read-only-standard-properties'
    resource-inventory-list:
      type: object
      x-okta-ignore-redocly-rules-for-sdk: true
      required:
        - data
        - _links
        - metadata
      properties:
        data:
          type: array
          description: List of resources on the current page
          items:
            $ref: '#/components/schemas/resource'
        _links:
          $ref: '#/components/schemas/list-links'
        metadata:
          $ref: '#/components/schemas/list-metadata'
    filter-type-enum:
      type: string
      description: The type of filtering options to retrieve
      x-okta-known-values:
        - apps
        - labels
        - owners
    resource-inventory-filter-option:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: string
          description: Unique identifier for the filter option. For owners, this is the Okta user ID.
          example: 0oafxqCAJWWGELFTYASJ
        name:
          type: string
          description: Display name of the filter option
          example: Salesforce
        logo:
          type: string
          format: uri
          description: URL to a logo image. Only present for app filter options.
          example: https://example.okta.com/img/salesforce-logo.png
        metadata:
          type: object
          description: |
            Additional metadata properties for the filter option. Only present for certain filter types.

            For the `labels` filter type, metadata contains:
            * `values`: array of label values, each with `id`, `name`, and `backgroundColor`
              * `backgroundColor`: [`red`, `orange`, `yellow`, `green`, `blue`, `purple`, `teal`, `beige`, `gray`]
          additionalProperties: true
    resource-inventory-filter-options-list:
      type: object
      x-okta-ignore-redocly-rules-for-sdk: true
      required:
        - data
        - _links
        - metadata
      properties:
        data:
          type: array
          description: List of filtering options on the current page
          items:
            $ref: '#/components/schemas/resource-inventory-filter-option'
        _links:
          $ref: '#/components/schemas/list-links'
        metadata:
          $ref: '#/components/schemas/list-metadata'
    external-resource-profile-parent:
      type: object
      description: A limited set of properties from the resource's parent profile
      required:
        - id
      properties:
        id:
          type: string
          description: Okta resource ID
          minLength: 20
          maxLength: 20
        name:
          type: string
          description: The display name for the resource
          minLength: 1
          maxLength: 255
    external-resource-profile:
      type: object
      description: A limited set of properties from the resource's profile
      required:
        - id
        - name
      properties:
        id:
          type: string
          description: Okta resource ID
          minLength: 20
          maxLength: 20
        name:
          type: string
          description: The display name for the resource
          minLength: 1
          maxLength: 255
        description:
          type: string
          description: The description of the resource
          minLength: 1
          maxLength: 1000
        parent:
          $ref: '#/components/schemas/external-resource-profile-parent'
        label:
          type: string
          description: The label of the Okta resource
          minLength: 1
          maxLength: 255
        logo:
          type: array
          description: List of logo resources
          items:
            $ref: '#/components/schemas/link'
    resource-label:
      type: object
      properties:
        orn:
          $ref: '#/components/schemas/resource-orn'
        profile:
          $ref: '#/components/schemas/external-resource-profile'
        labels:
          type: array
          description: List of assigned labels
          maxItems: 10
          items:
            $ref: '#/components/schemas/label'
        _links:
          $ref: '#/components/schemas/link-self'
      required:
        - _links
    list-resource-labels:
      type: object
      properties:
        data:
          description: Resources with labels
          type: array
          items:
            $ref: '#/components/schemas/resource-label'
        _links:
          $ref: '#/components/schemas/list-links'
      required:
        - data
        - _links
    resource-label-resource-orn:
      type: string
      format: okta-resource-orn
      description: |-
        The `id` of the resource in [ORN](https://developer.okta.com/docs/api/openapi/okta-management/guides/roles/#okta-resource-name-orn) format.
        The resource can be a group, an app, a collection, an entitlement bundle, or an entitlement value.
    assign-resource-labels:
      description: The properties to assign resources to labels. All resources in the `resourceOrns` list are assigned to all labels in the `labelValueIds`  list.
      required:
        - resourceOrns
        - labelValueIds
      properties:
        resourceOrns:
          type: array
          description: Resources assigned to labels (in [ORN](https://developer.okta.com/docs/api/openapi/okta-management/guides/roles/#okta-resource-name-orn) format)
          minItems: 1
          maxItems: 10
          items:
            $ref: '#/components/schemas/resource-label-resource-orn'
        labelValueIds:
          type: array
          description: Labels assigned to resources in the `resourceOrns` list
          minItems: 1
          maxItems: 10
          items:
            $ref: '#/components/schemas/label-value-id'
    assignment-resource-labels-result:
      type: object
      properties:
        data:
          description: Resources with labels
          type: array
          items:
            $ref: '#/components/schemas/resource-label'
      required:
        - data
        - _links
    resource-owner-principal-orn:
      type: string
      format: okta-principal-orn
      description: |-
        The Okta user or group `id` in [ORN](https://developer.okta.com/docs/api/openapi/okta-management/guides/roles/#okta-resource-name-orn) format.
        The resource can be an user id, or a group id.
        See [Supported resources](https://developer.okta.com/docs/api/openapi/okta-management/guides/roles/#supported-resources).
    external-principal-profile:
      type: object
      description: A limited set of properties from the principal's profile
      required:
        - id
        - name
        - _links
      properties:
        id:
          type: string
          description: Okta user `id` or Okta group `id`
          minLength: 20
          maxLength: 20
        name:
          type: string
          description: User name or group name
          minLength: 1
          maxLength: 255
        email:
          type: string
          description: Email of the resource owner, if applicable
          minLength: 1
          maxLength: 255
        metadata:
          type: object
          description: Additional metadata about the resource owner, if applicable
          properties:
            userAssignmentCount:
              type: integer
              description: Total number of users assigned to the group
        logo:
          type: array
          description: List of logo resources
          items:
            $ref: '#/components/schemas/link'
        _links:
          $ref: '#/components/schemas/link-self'
    resource-owner-principal:
      type: object
      description: Details of the principal, which can be a user or a group, that is an owner of a resource
      required:
        - id
        - type
        - orn
        - profile
      properties:
        id:
          type: string
          description: A unique identifier for the principal in Okta
          minLength: 20
          maxLength: 20
        type:
          type: string
          description: |-
            The principal type.
            This value is the `{objectType}` attribute from the [ORN](https://developer.okta.com/docs/api/openapi/okta-management/guides/roles/#okta-resource-name-orn) string.

            Examples: `groups` or `users`
        orn:
          $ref: '#/components/schemas/resource-owner-principal-orn'
        profile:
          $ref: '#/components/schemas/external-principal-profile'
    resource-owner-resource-orn:
      type: string
      format: okta-resource-orn
      description: |-
        The ID of the resource in [ORN](https://developer.okta.com/docs/api/openapi/okta-management/guides/roles/#okta-resource-name-orn) format. 
        The resource can be an app, an entitlement value, an entitlement bundle, or a collection.
        See [supported resources](https://developer.okta.com/docs/api/openapi/okta-management/guides/roles/#supported-resources).
    resource-owner-resource:
      type: object
      description: Details of a resource that are owned by the principal, such as an app, an entitlement value, an entitlement bundle, or a collection
      required:
        - id
        - type
        - orn
        - profile
      properties:
        id:
          type: string
          format: okta-resource-id
          description: A unique identifier for the resource in Okta
          minLength: 20
          maxLength: 20
        type:
          type: string
          description: |-
            The resource type.
            This value is the `{objectType}` attribute from the [ORN](https://developer.okta.com/docs/api/openapi/okta-management/guides/roles/#okta-resource-name-orn) string.

            Examples: `apps`, `entitlement-bundles`, `entitlement-values`, or `collections`
        orn:
          $ref: '#/components/schemas/resource-owner-resource-orn'
        profile:
          $ref: '#/components/schemas/external-resource-profile'
    resource-owner:
      type: object
      required:
        - resource
      properties:
        parentResourceOrn:
          $ref: '#/components/schemas/resource-orn'
        principals:
          minItems: 0
          maxItems: 5
          type: array
          description: The principals that own the resource (users or groups)
          items:
            $ref: '#/components/schemas/resource-owner-principal'
        resource:
          $ref: '#/components/schemas/resource-owner-resource'
    resource-owners-list-links:
      type: object
      description: Related links available in a list response
      required:
        - self
      properties:
        self:
          $ref: '#/components/schemas/link'
        next:
          $ref: '#/components/schemas/link'
    resource-owners-list-response:
      type: object
      properties:
        data:
          description: Resource owner details.
          type: array
          items:
            $ref: '#/components/schemas/resource-owner'
        _links:
          $ref: '#/components/schemas/resource-owners-list-links'
        metadata:
          $ref: '#/components/schemas/list-metadata'
    resource-owners-updatable:
      description: The properties expected in create or update request for a resource owner.
      required:
        - resourceOrns
      properties:
        principalOrns:
          type: array
          description: Owners of the resource. If no owners are provided (empty list), then all current owners are removed.
          minItems: 0
          maxItems: 5
          items:
            $ref: '#/components/schemas/resource-owner-principal-orn'
        resourceOrns:
          type: array
          description: The resources to assign owners
          minItems: 1
          maxItems: 10
          items:
            $ref: '#/components/schemas/resource-owner-resource-orn'
    resource-owners-response:
      type: object
      properties:
        data:
          description: Resource owner details
          type: array
          items:
            $ref: '#/components/schemas/resource-owner'
    resource-owners-patch:
      type: object
      required:
        - resourceOrn
        - data
      properties:
        resourceOrn:
          $ref: '#/components/schemas/resource-owner-resource-orn'
        data:
          minItems: 1
          maxItems: 5
          items:
            type: object
            properties:
              op:
                type: string
                description: The operation to be performed for update.
                enum:
                  - REMOVE
              path:
                type: string
                description: The path of the property being updated. Only `/principalOrn` can be updated.
              value:
                $ref: '#/components/schemas/resource-owner-principal-orn'
    resource-owners-catalog-resources-response:
      type: object
      required:
        - parentResourceOrn
        - _links
      properties:
        parentResourceOrn:
          $ref: '#/components/schemas/resource-orn'
        data:
          description: Resource owner details
          type: array
          items:
            $ref: '#/components/schemas/resource-owner-resource'
        _links:
          $ref: '#/components/schemas/resource-owners-list-links'
    note:
      type: object
      properties:
        id:
          type: string
          minLength: 1
          maxLength: 20
        note:
          type: string
          minLength: 1
          maxLength: 300
    reviewer-level-info-full:
      description: Full representation of a reviewer level. Applicable for multi level campaigns only.
      required:
        - reviewerLevel
        - decision
        - reviewerType
        - id
        - createdBy
        - created
        - lastUpdated
        - lastUpdatedBy
      x-okta-ignore-redocly-rules-for-sdk: true
      allOf:
        - $ref: '#/components/schemas/read-only-standard-properties'
      properties:
        reviewerLevel:
          description: The reviewer level.
          $ref: '#/components/schemas/reviewer-level-type'
        decision:
          description: The decision made at that reviewer level.
          $ref: '#/components/schemas/decision'
        reviewerProfile:
          description: The reviewer (user) who made the decision at that reviewer level
          $ref: '#/components/schemas/principal-profile-enriched'
        reviewerType:
          description: Specifies the type of the reviewers at that reviewer level. Reviewers can be `USER`, `GROUP`, `RESOURCE_OWNER`
          $ref: '#/components/schemas/reviewers-reviewer-type'
        reviewerGroupProfile:
          $ref: '#/components/schemas/reviewer-group-profile'
    review-read-only-fields:
      description: Additional read-only attributes for reviews
      properties:
        note:
          $ref: '#/components/schemas/note'
        reviewerGroupProfile:
          $ref: '#/components/schemas/reviewer-group-profile'
        allReviewerLevels:
          description: Applicable only for multi level campaign. Provides details about the reviewer and decisions (if any) made at each reviewer level is captured here.
          type: array
          items:
            $ref: '#/components/schemas/reviewer-level-info-full'
          minItems: 1
          maxItems: 2
    review-full:
      description: Full representation of a Review resource
      allOf:
        - $ref: '#/components/schemas/read-only-standard-properties'
        - $ref: '#/components/schemas/review-minimal-read-only-fields'
        - $ref: '#/components/schemas/review-read-only-fields'
    okta-resource-orn:
      type: string
      format: okta-resource-orn
      description: The `id` of the resource in [ORN](https://developer.okta.com/docs/api/openapi/okta-management/guides/roles/#okta-resource-name-orn) format. The resource can be a collection, a bundle, or an entitlement.
    potential-risk-assessment-request:
      type: object
      required:
        - principalOrn
      properties:
        principalOrn:
          $ref: '#/components/schemas/user-orn'
        resourceOrnList:
          type: array
          description: |-
            List of resources in ORN format. The resource can be a collection, a bundle, or an entitlement.
            The list must contain the same resource type. The maximum items in the list depends on the resource type:
            * Maximum list size for a collection is 1.
            * Maximum list size for a bundle is 1.
            * Maximum list size for entitlements is 20.
          maxItems: 20
          minItems: 1
          items:
            $ref: '#/components/schemas/okta-resource-orn'
        resourceOrn:
          $ref: '#/components/schemas/okta-resource-orn'
    criteria-value:
      type: object
      description: Criteria value
      properties:
        type:
          type: string
          nullable: false
          description: Criteria value type
          enum:
            - ENTITLEMENTS
        value:
          $ref: '#/components/schemas/entitlements-full'
    criteria:
      type: object
      properties:
        name:
          type: string
          nullable: false
          description: Name of the criteria
        attribute:
          type: string
          nullable: false
          description: Attribute that the criteria applies to
        operation:
          type: string
          nullable: false
          description: Operation performed on the criteria value
          enum:
            - CONTAINS_ONE
            - CONTAINS_ALL
