        type: string
    resource-inventory-stats-filter:
      name: filter
      description: |
        A [filter](https://developer.okta.com/docs/api/#filter) expression that returns resource statistics based on the following property:
        * `searchQuery` - Filter resources by search query text

        The `eq` operator is supported for this property.

        > **Note:** Query parameter percent encoding is required. See [Special characters](https://developer.okta.com/docs/api/#special-characters).
      in: query
      required: false
      schema:
        type: string
        format: scim-filter
        example: searchQuery eq "Salesforce"
      x-scim-filter:
        searchQuery:
          operators:
            - eq
          schema:
            type: string
            description: Search query text to filter resources
      examples:
        FilterBySalesforce:
          summary: Filter resources by Salesforce search query
          value: searchQuery eq "Salesforce"
        FilterByOkta:
          summary: Filter resources by Okta search query
          value: searchQuery eq "Okta"
    resource-type:
      name: resourceType
      description: The type of resources to retrieve
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/resource-type-enum'
      example: apps
    resource-inventory-list-after:
      name: after
      description: The [pagination](https://developer.okta.com/docs/api/#pagination) cursor that points to the last record of the previous request
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/id'
    resource-inventory-list-filter:
      name: filter
      description: |
        A [filter](https://developer.okta.com/docs/api/#filter) expression that returns resources based on the following properties:

        **Basic properties:**
        * `id` - Filter by resource ID
        * `name` - Filter by resource name (supports `eq`, `sw`, `co`)
        * `description` - Filter by resource description (supports `eq`, `sw`, `co`)
        * `type` - Filter by resource type (`APP`, `GROUP`, `ENTITLEMENT_VALUE`, `ENTITLEMENT_BUNDLE`, `COLLECTION`)
        * `status` - Filter by resource status (active, inactive, pending)

        **Embedded resource filters** (filter by associated or embedded resources):
        * `owner.id` - Filter by owner ID (all resource types)
        * `app.id` - Filter by associated app ID (groups, entitlement-values, entitlement-bundles, collections)
        * `label.id` - Filter by associated label ID (all resource types)

        **Stats properties:**
        * `stats.apps` - Filter by number of associated apps (supports `eq`, `gt`, `ge`, `lt`, `le`)
        * `stats.groups` - Filter by number of associated groups
        * `stats.users` - Filter by number of associated users
        * `stats.owners` - Filter by number of owners
        * `stats.entitlements` - Filter by number of entitlements
        * `stats.labels` - Filter by number of associated labels

        **Metadata properties:**
        * `metadata.appId` - Filter by app ID in metadata
        * `metadata.integrationName` - Filter by integration name
        * `metadata.color` - Filter by metadata color

        The following operators are supported:
        * `eq` - Equals (all properties)
        * `sw` - Starts with (string properties)
        * `co` - Contains (string properties)
        * `gt`, `ge`, `lt`, `le` - Comparison operators (numeric stats properties)

        The `AND` and `OR` logical operators are supported for combining expressions.
        To filter by multiple values of the same property, use `OR`: `group.id eq "id1" OR group.id eq "id2"`.

        > **Note:** Query parameter percent encoding is required. See [Special characters](https://developer.okta.com/docs/api/#special-characters).
      in: query
      required: false
      schema:
        type: string
        format: scim-filter
        example: owner.id eq "00ub0oNGTSWTBKOLGLNR" AND app.id eq "0oafxqCAJWWGELFTYASJ"
      x-scim-filter:
        id:
          operators:
            - eq
          schema:
            type: string
            description: Unique identifier for the resource
        name:
          operators:
            - eq
            - sw
            - co
          schema:
            type: string
            description: Display name of the resource
        description:
          operators:
            - eq
            - sw
            - co
          schema:
            type: string
            description: Description of the resource
        type:
          operators:
            - eq
          schema:
            type: string
            description: Type of the resource
            enum:
              - APP
              - GROUP
              - ENTITLEMENT_VALUE
              - ENTITLEMENT_BUNDLE
              - COLLECTION
        status:
          operators:
            - eq
          schema:
            type: string
            description: Current status of the resource
            enum:
              - active
              - inactive
              - pending
        owner.id:
          operators:
            - eq
          schema:
            type: string
            description: ID of the resource owner
        app.id:
          operators:
            - eq
          schema:
            type: string
            description: ID of an associated app (groups, entitlement-values, entitlement-bundles, collections)
        label.id:
          operators:
            - eq
          schema:
            type: string
            description: ID of an associated label (all resource types)
        stats.apps:
          operators:
            - eq
            - gt
            - ge
            - lt
            - le
          schema:
            type: integer
            description: Number of associated apps
        stats.groups:
          operators:
            - eq
            - gt
            - ge
            - lt
            - le
          schema:
            type: integer
            description: Number of associated groups
        stats.users:
          operators:
            - eq
            - gt
            - ge
            - lt
            - le
          schema:
            type: integer
            description: Number of associated users
        stats.owners:
          operators:
            - eq
            - gt
            - ge
            - lt
            - le
          schema:
            type: integer
            description: Number of owners
        stats.entitlements:
          operators:
            - eq
            - gt
            - ge
            - lt
            - le
          schema:
            type: integer
            description: Number of entitlements
        stats.labels:
          operators:
            - eq
            - gt
            - ge
            - lt
            - le
          schema:
            type: integer
            description: Number of associated labels
        metadata.appId:
          operators:
            - eq
          schema:
            type: string
            description: App ID in resource metadata
        metadata.integrationName:
          operators:
            - eq
            - sw
            - co
          schema:
            type: string
            description: Integration name in metadata
        metadata.color:
          operators:
            - eq
          schema:
            type: string
            description: Color in metadata
      examples:
        FilterByOwner:
          summary: Filter resources by owner
          value: owner.id eq "00ub0oNGTSWTBKOLGLNR"
        FilterByApp:
          summary: Filter resources by associated app
          value: app.id eq "0oafxqCAJWWGELFTYASJ"
        FilterByLabel:
          summary: Filter resources by label
          value: label.id eq "lbl49laUP3HQKXTBE0g3"
        FilterByNameAndOwner:
          summary: Filter resources by name and owner
          value: name sw "Salesforce" AND owner.id eq "00ub0oNGTSWTBKOLGLNR"
        FilterByMultipleOwners:
          summary: Filter by multiple owner IDs with status
          value: (owner.id eq "usr111" OR owner.id eq "usr222") AND status eq "active"
        FilterByStats:
          summary: Filter resources by user count
          value: stats.users gt 50 AND stats.entitlements le 100
    filter-type:
      name: filterType
      description: The type of filtering options to retrieve
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/filter-type-enum'
      example: apps
    resource-inventory-filters-filter:
      name: filter
      description: |
        A [filter](https://developer.okta.com/docs/api/#filter) expression that filters the list of filtering options based on the following properties:

        * `id` - Filter by option ID
        * `name` - Filter by option name (supports `eq`, `sw`, `co`)
        * `status` - Filter by option status (supports `eq`). Only applicable for the `apps` filtering type.
        * `type` - Filter by owner type (supports `eq`). **Required** for the `owners` filtering type. Must be `USER` or `GROUP`.

        The following operators are supported:
        * `eq` - Equals (all properties)
        * `sw` - Starts with (string properties)
        * `co` - Contains (string properties)

        The `AND` and `OR` logical operators are supported for combining expressions.

        > **Note:** Query parameter percent encoding is required. See [Special characters](https://developer.okta.com/docs/api/#special-characters).
      in: query
      required: false
      schema:
        type: string
        format: scim-filter
        example: name sw "Sales"
      x-scim-filter:
        id:
          operators:
            - eq
          schema:
            type: string
            description: Unique identifier for the filtering option
        name:
          operators:
            - eq
            - sw
            - co
          schema:
            type: string
            description: Display name of the filtering option
        status:
          operators:
            - eq
          schema:
            type: string
            description: Status of the filtering option (only applicable for `apps` filter type)
            enum:
              - active
              - inactive
        type:
          operators:
            - eq
          schema:
            type: string
            description: Owner type filter. Required for the `owners` filter type. Must be USER or GROUP.
            enum:
              - USER
              - GROUP
      examples:
        FilterByName:
          summary: Filtering options by name prefix
          value: name sw "Sales"
        FilterByNameContains:
          summary: Filtering options containing text
          value: name co "force"
        FilterById:
          summary: Filtering option by exact ID
          value: id eq "0oafxqCAJWWGELFTYASJ"
        FilterActiveApps:
          summary: Filter active apps by name
          value: name sw "Sales" AND status eq "active"
        FilterUserOwners:
          summary: Filter user owners
          value: type eq "USER"
        FilterGroupOwnersByName:
          summary: Filter group owners by name
          value: type eq "GROUP" AND name co "Admin"
    resource-labels-filter:
      name: filter
      description: |
        A [filter](https://developer.okta.com/docs/api/#filter) expression that returns entries based on the following properties and supported operators:
        * `orn`:  supports `eq`
        * `labelValueId`: supports `eq`
        * `resourceType`: supports `eq` (The `resourceType` value is taken from the `{objectType}` attribute in the resource [ORN](https://developer.okta.com/docs/api/openapi/okta-management/guides/roles/#okta-resource-name-orn). For example, `entitlement-values` for entitlement value resources.)

        > **Note:** Query parameter percent encoding is required. See [Special characters](https://developer.okta.com/docs/api/#special-characters).
      in: query
      required: true
      schema:
        $ref: '#/components/schemas/scim-filter'
      x-scim-filter:
        orn:
          operators:
            - eq
          schema:
            $ref: '#/components/schemas/resource-orn'
        labelValueId:
          operators:
            - eq
          schema:
            $ref: '#/components/schemas/label-value-id'
        resourceType:
          operators:
            - eq
          type: string
      examples:
        FilterByOrn:
          summary: Filter by resource ORN representing a single resource
          value: orn eq "orn:okta:idp:00o11edPwGqbUrsDm0g4:apps:oidc:0oafxqCAJWWGELFTYASJ"
        FilterByLabelIdAndAppsResourceType:
          summary: Filter by label value ID and app resource type
          value: labelValueId eq "lblo3v6xlwdtEX2il1d6" AND resourceType eq "apps"
        FilterByLabelIdAndGroupsResourceType:
          summary: Filter by label value ID and groups resource type
          value: labelValueId eq "lblo3v6xlwdtEX2il1d6" AND resourceType eq "groups"
        FilterByLabelIdAndEntitlementType:
          summary: Filter by label value id and entitlement-value resource type
          value: labelValueId eq "ento3v6xlwdtEX2il1d6" AND resourceType eq "entitlement-values"
        FilterByLabelIdAndCollectionType:
          summary: Filter by label value id and entitlement-value resource type
          value: labelValueId eq "ento3v6xlwdtEX2il1d6" AND resourceType eq "collections"
        FilterByMultipleLabelIdsAndAppsResourceType:
          summary: Filter by multiple label value IDs and app resource type
          value: (labelValueId eq "lblo3v6xlwdtEX2il1d6" OR labelValueId eq "lblo3v6xlwdtEX2il1d7") AND resourceType eq "apps"
        FilterByMultipleLabelIdsAndResourceTypes:
          summary: Filter by several label value ID and app resource type
          value: (labelValueId eq "lblo3v6xlwdtEX2il1d6" AND resourceType eq "apps") OR (labelValueId eq "lblo3v6xlwdtEX2il1d7" AND resourceType eq "groups")
    resource-owners-filter:
      name: filter
      description: |
        A [filter](https://developer.okta.com/docs/api/#filter) expression that returns entries based on the following properties and supported operators:
        * `parentResourceOrn`: supports `eq`
        * `resource.orn`: supports `eq`
        * `resource.type`: supports `eq`
        * `resource.profile.name`:  supports `sw` and `co` (both `parentResourceOrn` and `resource.type` filters are required for `resource.profile.name` filtering)
        * `principal.orn`: supports `eq` (must be combined with `resource.type eq "ai-agents"`)

        > **Note:** Query parameter percent encoding is required. See [Special characters](https://developer.okta.com/docs/api/#special-characters).

        > **Note:** The principal referenced by `principal.orn` must already exist as a registered resource owner in the system. If the principal has never been assigned as an owner, the API returns a `400` error rather than an empty result set.
      in: query
      required: true
      schema:
        $ref: '#/components/schemas/scim-filter'
      x-scim-filter:
        parentResourceOrn:
          operators:
            - eq
          schema:
            $ref: '#/components/schemas/resource-orn'
        resource.orn:
          operators:
            - eq
          type: string
          format: okta-resource-orn
          description: |-
            The ID of the resource in [ORN](https://developer.okta.com/docs/api/openapi/okta-management/guides/roles/#okta-resource-name-orn) format. 
            The resource can be an app, an entitlement value, an entitlement bundle, or a collection.
            See [supported resources](https://developer.okta.com/docs/api/openapi/okta-management/guides/roles/#supported-resources).
        resource.type:
          operators:
            - eq
          type: string
          description: The resource type value from the orn. Examples:- apps, entitlement-bundles, ai-agents
          x-okta-feature-flag-amends:
            IGA_ADVANCED_ENTITLEMENT_MANAGEMENT:
              description: 'The resource type value from the orn. Examples: apps, entitlement-bundles, resource-assets'
        resource.profile.name:
          operators:
            - sw
            - co
          type: string
        principal.orn:
          operators:
            - eq
          type: string
          format: okta-principal-orn
          description: |-
            The Okta user or group `id` in [ORN](https://developer.okta.com/docs/api/openapi/okta-management/guides/roles/#okta-resource-name-orn) format.
            The resource can be an user id, or a group id.
            See [Supported resources](https://developer.okta.com/docs/api/openapi/okta-management/guides/roles/#supported-resources).
      examples:
        FilterByParentResourceOrn:
          summary: Filter by parentResourceOrn
          value: parentResourceOrn eq "orn:okta:idp:00o11edPwGqbUrsDm0g4:apps:salesforce:0oafxqCAJWWGELFTYASJ"
        FilterByResourceOrn:
          summary: Filter by resource orn, which can be an app or a bundle
          value: parentResourceOrn eq "orn:okta:idp:00o11edPwGqbUrsDm0g4:apps:salesforce:0oafxqCAJWWGELFTYASJ" AND resource.orn eq "orn:okta:governance:00o11edPwGqbUrsDm0g4:entitlement-bundles:enbogpaj3XUzcM62u1d6"
        FilterByResourceOrnCollections:
          summary: Filter by resource orn, which is a collection
          value: resource.orn eq "orn:okta:governance:00o11edPwGqbUrsDm0g4:collections:colvmzzTr4xO45Ujn0g4"
        FilterByResourceType:
          summary: Filter by resource type, which can be an app or a bundle
          value: parentResourceOrn eq "orn:okta:idp:00o11edPwGqbUrsDm0g4:apps:salesforce:0oafxqCAJWWGELFTYASJ" AND resource.type eq "entitlement-bundles"
        FilterByResourceNameStartsWith:
          summary: Filter by the resource name for a specified resource type, starting with the provided prefix
          value: parentResourceOrn eq "orn:okta:idp:00o11edPwGqbUrsDm0g4:apps:salesforce:0oafxqCAJWWGELFTYASJ" AND resource.type eq "entitlement-bundles" AND resource.profile.name sw "License"
        FilterByResourceNameContains:
          summary: Filter by the resource name for a specified resource type that contains the provided substring
          value: parentResourceOrn eq "orn:okta:idp:00o11edPwGqbUrsDm0g4:apps:salesforce:0oafxqCAJWWGELFTYASJ" AND resource.type eq "entitlement-bundles" AND resource.profile.name co "License"
        FilterByResourceTypeAIAgents:
          summary: Filter by resource type ai-agents (standalone, without parentResourceOrn)
          value: resource.type eq "ai-agents"
        FilterByPrincipalOrnAndResourceType:
          summary: Filter by principal orn combined with resource type
          value: resource.type eq "ai-agents" AND principal.orn eq "orn:okta:directory:00o11edPwGqbUrsDm0g4:users:00u1tgwssMI9jYizU0g5"
        FilterByPrincipalOrnAndParentResourceOrnAIAgent:
          summary: Filter by principal orn combined with an AI agent parent resource orn
          value: resource.type eq "ai-agents" AND parentResourceOrn eq "orn:okta:directory:00o11edPwGqbUrsDm0g4:workload-principals:ai-agents:wp1234567890" AND principal.orn eq "orn:okta:directory:00o11edPwGqbUrsDm0g4:groups:00g1tgwssMI9jYizU0g5"
    resource-owners-include-param:
      name: include
      description: Adds additional properties in the response
      in: query
      required: false
      schema:
        type: array
        items:
          type: string
          enum:
            - parent_resource_owner
          x-enumDescriptions:
            parent_resource_owner: If the parent resource has an owner assigned, then the parent resource is included in the `data` array response.
      examples:
        IncludeParentResourceOwners:
          summary: Include parent resource owners in the response
          description: 'Query param: ?include=parent_resource_owner'
          value: parent_resource_owner
    resource-owners-catalog-resources-filter:
      name: filter
      description: |
        A [filter](https://developer.okta.com/docs/api/#filter) expression that returns entries based on the following properties and supported operators:
        * `parentResourceOrn`: supports `eq` (required)
        * `resource.type`: supports `eq`
        * `resource.profile.*`:  supports `sw` and `co` (both `parentResourceOrn` and `resource.type` filters are required for `resource.profile.*` filtering)

        > **Note:** Query parameter percent encoding is required. See [Special characters](https://developer.okta.com/docs/api/#special-characters).
      in: query
      required: true
      schema:
        $ref: '#/components/schemas/scim-filter'
      x-scim-filter:
        parentResourceOrn:
          operators:
            - eq
          schema:
            $ref: '#/components/schemas/resource-orn'
        resource.type:
          operators:
            - eq
          type: string
          description: The resource type value from the orn. Examples:- entitlement-bundles, entitlement-values
        resource.profile.name:
          operators:
            - sw
            - co
          type: string
      examples:
        FilterByParentResourceOrnAndResourceType:
          summary: Filter by resource type
          value: parentResourceOrn eq "orn:okta:idp:00o11edPwGqbUrsDm0g4:apps:salesforce:0oafxqCAJWWGELFTYASJ" AND resource.type eq "entitlement-bundles"
        FilterByResourceNameStartsWith:
          summary: Filter by the resource name for a specified resource type, starting with the provided prefix
          value: parentResourceOrn eq "orn:okta:idp:00o11edPwGqbUrsDm0g4:apps:salesforce:0oafxqCAJWWGELFTYASJ" AND resource.type eq "entitlement-bundles" AND resource.profile.name sw "License"
        FilterByResourceNameContains:
          summary: Filter by the resource name for a specified resource type that contains the provided substring
          value: parentResourceOrn eq "orn:okta:idp:00o11edPwGqbUrsDm0g4:apps:salesforce:0oafxqCAJWWGELFTYASJ" AND resource.type eq "entitlement-bundles" AND resource.profile.name co "License"
        FilterByParentResourceOrnAndResourceTypeForEntitlementValues:
          summary: Filter by resource type and parent ID
          value: parentResourceOrn eq "orn:okta:idp:00o11edPwGqbUrsDm0g4:apps:salesforce:0oafxqCAJWWGELFTYASJ" AND resource.type eq "entitlement-values AND resource.profile.parent.id eq "esp2lr1lavoGDYw5U8g6"
        FilterByResourceNameStartsWithForEntitlementValues:
          summary: Filter by the resource name for a specified resource type, starting with the provided prefix and parent ID
          value: parentResourceOrn eq "orn:okta:idp:00o11edPwGqbUrsDm0g4:apps:salesforce:0oafxqCAJWWGELFTYASJ" AND resource.type eq "entitlement-values" AND resource.profile.parent.id eq "esp2lr1lavoGDYw5U8g6" AND resource.profile.name sw "License"
        FilterByResourceNameContainsForEntitlementValues:
          summary: Filter by the resource name for a specified resource type that contains the provided substring and parent ID
          value: parentResourceOrn eq "orn:okta:idp:00o11edPwGqbUrsDm0g4:apps:salesforce:0oafxqCAJWWGELFTYASJ" AND resource.type eq "entitlement-values" AND resource.profile.parent.id eq "esp2lr1lavoGDYw5U8g6" AND resource.profile.name co "License"
    reviews-filter:
