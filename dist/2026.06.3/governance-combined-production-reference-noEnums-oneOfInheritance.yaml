            - eq
          schema:
            $ref: '#/components/schemas/entitlement-bundle-id'
        entitlements.id:
          operator:
            - eq
          schema:
            $ref: '#/components/schemas/entitlement-property-id'
        entitlements.values.id:
          operator:
            - eq
          schema:
            $ref: '#/components/schemas/entitlement-value-id'
        action:
          operator:
            - eq
          schema:
            $ref: '#/components/schemas/grant-action'
      examples:
        filterActiveGrants:
          summary: Filter grants for a resource and user
          value: target.externalId eq "0oafxqCAJWWGELFTYASJ" AND target.type eq "APPLICATION" AND targetPrincipal.externalId eq "00ub0oNGTSWTBKOLGLNR" AND targetPrincipal.type eq "OKTA_USER"
        filterActiveGrantsWithORN:
