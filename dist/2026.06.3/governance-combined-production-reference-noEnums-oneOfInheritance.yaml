      schema:
        $ref: '#/components/schemas/scim-filter'
      x-scim-filter:
        resource.orn:
          operators:
            - eq
          type: string
        asset.id:
          operators:
            - eq
          type: string
        asset.name:
          operators:
            - eq
            - sw
            - co
          type: string
        asset.type.id:
          operators:
            - eq
          type: string
        asset.externalId:
          operators:
            - eq
          type: string
        asset.parentId:
          operators:
            - eq
          type: string
        owner.id:
          operators:
            - eq
          type: string
        labelValue.id:
          operators:
            - eq
          type: string
      examples:
        FilterByNameStartsWith:
          summary: Filter by the resource asset name, starting with the provided prefix
          value: asset.name sw "Proj" AND resource.orn eq "orn:okta:idp:00o11rndFqmZ5rNfs0g4:apps:my-app:0oafxqCAJWWGELFTYASJ"
        FilterByNameContainsOrExternalID:
          summary: Filter by the resource asset name that contains the provided substring or by external ID
          value: (asset.name co "123" OR asset.externalId eq "123456789012") AND resource.orn eq "orn:okta:idp:00o11rndFqmZ5rNfs0g4:apps:my-app:0oafxqCAJWWGELFTYASJ"
        FilterByTypeID:
          summary: Filter by the type ID of the resource asset
          value: asset.type.id eq "retabcdefgHIJKLMNOPQ" AND resource.orn eq "orn:okta:idp:00o11rndFqmZ5rNfs0g4:apps:my-app:0oafxqCAJWWGELFTYASJ"
        FilterByParentID:
          summary: Filter by the parent ID of the resource asset
          value: asset.parentId eq "reafxqCAJWWGELFTYASJ" AND resource.orn eq "orn:okta:idp:00o11rndFqmZ5rNfs0g4:apps:my-app:0oafxqCAJWWGELFTYASJ"
        FilterByOwnerID:
          summary: Filter by the resource asset owner ID
          value: owner.id eq "00ub0oNGTSWTBKOLGLNR" AND resource.orn eq "orn:okta:idp:00o11rndFqmZ5rNfs0g4:apps:my-app:0oafxqCAJWWGELFTYASJ"
        FilterByLabelValueId:
          summary: Filter by the ID of the label value assigned to the resource asset
          value: labelValue.id eq "lblo3v6xlwdtEX2il1d6" AND resource.orn eq "orn:okta:idp:00o11rndFqmZ5rNfs0g4:apps:my-app:0oafxqCAJWWGELFTYASJ"
    resource-assets-include:
      name: include
      description: The `include` filter adds additional properties that are normally omitted from the list response.
      in: query
