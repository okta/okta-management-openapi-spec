          example: orn:okta:idp:00o1234567890:users:00u1234567890
        actor:
          type: string
          description: How the assignment was made
          enum:
            - ACCESS_REQUEST
            - ADMIN
          example: ADMIN
        assignmentType:
          type: string
          description: Type of assignment
          enum:
            - INDIVIDUAL
          example: INDIVIDUAL
        expirationTime:
          type: string
          format: date-time
          description: When the assignment expires (null for indefinite)
          nullable: true
          example: '2025-12-31T23:59:59Z'
    collection-full-v2:
      description: Full representation of a collection response (v2)
      allOf:
        - $ref: '#/components/schemas/collection-properties-writable'
        - $ref: '#/components/schemas/read-only-standard-properties'
      required:
        - id
        - name
        - orn
        - created
        - createdBy
        - lastUpdated
        - lastUpdatedBy
        - _links
      properties:
        orn:
          $ref: '#/components/schemas/okta-collection-orn'
        counts:
          $ref: '#/components/schemas/collection-counts'
        _links:
          $ref: '#/components/schemas/collection-links'
        resourceRelationship:
          $ref: '#/components/schemas/collection-resource-relationship'
        principalAssignment:
          $ref: '#/components/schemas/collection-principal-assignment'
    collections-list-v2:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/collection-full-v2'
        _links:
          $ref: '#/components/schemas/list-links'
        metadata:
          $ref: '#/components/schemas/list-metadata'
    collection-resource-orn:
      type: string
      format: okta-resource-orn
      description: |
        The ORN identifier for a collection resource (app, group, or push group).

        See the [supported-resources](https://developer.okta.com/docs/api/openapi/okta-management/guides/roles/#supported-resources) endpoint.
    collection-resource-properties-writable-v2:
      type: object
      properties:
        resourceOrn:
          $ref: '#/components/schemas/collection-resource-orn'
    collection-resource-links-v2:
      type: object
      description: Links available on a resource within a resource collection
      required:
        - resource
      properties:
        resource:
          $ref: '#/components/schemas/link'
        entitlements:
          description: Link to the entitlements endpoint for this resource in this collection. Only present for apps that are Entitlement Management enabled.
          $ref: '#/components/schemas/link'
    collection-resource-properties-read-only-v2:
      type: object
      properties:
        resourceId:
          $ref: '#/components/schemas/resource-id'
        _links:
          $ref: '#/components/schemas/collection-resource-links-v2'
    resource-profile-v2:
      type: object
      description: A limited set of properties from the resource's profile
      properties:
        id:
          type: string
          description: Okta resource instance ID
          minLength: 20
          maxLength: 20
        name:
          type: string
          description: The name of the Okta resource
          minLength: 1
          maxLength: 255
        label:
          type: string
          description: The label of the Okta app
          minLength: 1
          maxLength: 255
        description:
          type: string
          description: The description of the resource
        logo:
          type: array
          description: List of resource logo resources
          items:
            $ref: '#/components/schemas/link'
    collection-resource-counts:
      type: object
      description: Counts of related items for this resource. Only non-zero counts are included.
      properties:
        entitlements:
          type: integer
          description: The total number of entitlements included for this app resource in this collection
          minimum: 0
        pushGroups:
          type: integer
          description: The total number of push groups associated with this app resource in this collection
          minimum: 0
        labels:
          type: integer
          description: The total number of governance labels associated with this resource. Only returned when `include=labels` is specified. Not supported in LIST calls.
          minimum: 0
        relatedApps:
          type: integer
          description: The total number of related apps for this resource. Only returned when `include=relatedApps` is specified. Not supported in LIST calls.
          minimum: 0
    collection-resource-configuration:
      type: object
      description: Server-resolved configuration details for this resource within the collection
      readOnly: true
      required:
        - entitlementManagementEnabled
        - type
      properties:
        entitlementManagementEnabled:
          type: boolean
          description: Indicates whether Entitlement Management is enabled for this resource
        hasPushMapping:
          type: boolean
          description: Indicates whether this group resource has push group mappings to applications (is a push group). Only present when `type` is `GROUP`.
        type:
          type: string
          description: The type of resource
          enum:
            - APPLICATION
            - GROUP
        counts:
          $ref: '#/components/schemas/collection-resource-counts'
    push-group-id:
      type: string
      x-okta-ignore-redocly-rules-for-sdk: true
      description: The `id` property of a push group
      minLength: 20
      maxLength: 20
    push-group-name:
      type: string
      description: The name of the push group
      minLength: 1
      maxLength: 255
    push-group-description:
      type: string
      description: The description of the push group
    push-group-full:
      type: object
      description: Full representation of a push group
      properties:
        id:
          $ref: '#/components/schemas/push-group-id'
        name:
          $ref: '#/components/schemas/push-group-name'
        description:
          $ref: '#/components/schemas/push-group-description'
        logo:
          type: array
          description: List of push group logo resources
          items:
            $ref: '#/components/schemas/link'
    push-groups-full:
      type: array
      description: List of push groups with full details
      nullable: false
      items:
        $ref: '#/components/schemas/push-group-full'
    governance-labels:
      type: array
      description: The governance labels associated with this resource
      nullable: false
      items:
        $ref: '#/components/schemas/label-value'
    related-app:
      description: An app that's related to this resource
      allOf:
        - $ref: '#/components/schemas/resource-profile-v2'
        - type: object
          properties:
            inCollection:
              type: boolean
              description: Indicates whether this app is also a resource in the current collection. Only present for `GROUP` type resources.
    related-apps:
      type: array
      description: 'The apps related to this resource. For `GROUP` resources with `hasPushMapping: true`, these are apps that this group is mapped to through push group. For `GROUP` resources with `hasPushMapping: false`, these are apps assigned to this group.'
      nullable: false
      items:
        $ref: '#/components/schemas/related-app'
    collection-resource-full-v2:
      description: Full representation of a resource within a resource collection
      allOf:
        - $ref: '#/components/schemas/collection-resource-properties-writable-v2'
        - $ref: '#/components/schemas/collection-resource-properties-read-only-v2'
      required:
        - resourceOrn
        - _links
      properties:
        resourceProfile:
          $ref: '#/components/schemas/resource-profile-v2'
        resourceConfiguration:
          $ref: '#/components/schemas/collection-resource-configuration'
        entitlements:
          $ref: '#/components/schemas/entitlements-full'
        pushGroups:
          $ref: '#/components/schemas/push-groups-full'
        labels:
          $ref: '#/components/schemas/governance-labels'
        relatedApps:
          $ref: '#/components/schemas/related-apps'
    collection-resources-list-v2:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/collection-resource-full-v2'
        _links:
          $ref: '#/components/schemas/list-links'
        metadata:
          $ref: '#/components/schemas/list-metadata'
    collection-resource-creatable-v2:
      description: The properties expected when adding a new resource to a collection
      x-okta-ignore-redocly-rules-for-sdk: true
      allOf:
        - $ref: '#/components/schemas/collection-resource-properties-writable-v2'
      required:
        - resourceOrn
      properties:
        entitlements:
          $ref: '#/components/schemas/entitlements-creatable'
    collection-resource-app-with-entitlements:
      description: Representation of an EM-enabled app resource after updating entitlements
      allOf:
        - $ref: '#/components/schemas/collection-resource-properties-writable-v2'
        - $ref: '#/components/schemas/collection-resource-properties-read-only-v2'
      required:
        - resourceOrn
        - _links
      properties:
        resourceConfiguration:
          $ref: '#/components/schemas/collection-resource-configuration'
        entitlements:
          $ref: '#/components/schemas/entitlements-full'
    collection-resource-entitlements-list:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/entitlement-full'
        _links:
          $ref: '#/components/schemas/list-links'
        metadata:
          $ref: '#/components/schemas/list-metadata'
    access-duration:
      type: object
      description: Specifies the duration of access with an expiration time and timezone
      required:
        - expirationTime
        - timezone
      properties:
        expirationTime:
          type: string
          format: date-time
          description: The date and time when access expires, in ISO 8601 format
          example: '2025-12-31T23:59:59Z'
        timezone:
          type: string
          description: The timezone for the expiration time, in IANA format
          minLength: 1
          maxLength: 64
          example: America/Los_Angeles
    grant-principal-entitlement-group:
      type: object
      description: |-
        A group of entitlement values optionally scoped to a resource asset.
        When `resourceAssetOrn` is omitted, the entitlements are at the app level.
        When `resourceAssetOrn` is present, the entitlements are scoped to that specific resource asset.
      required:
        - entitlementValueOrns
      properties:
        resourceAssetOrn:
          type: string
          x-okta-ignore-redocly-rules-for-sdk: true
          format: okta-resource-orn
          description: |-
            The ORN of the resource asset to scope the entitlements to.
            Omit this field for app-level entitlements that aren't tied to a specific resource asset.
          example: orn:okta:governance:00o11edPwGqbUrsDm0g4:resource-assets:reafxqCAJWWGELFTYASJ
        entitlementValueOrns:
          type: array
          description: List of entitlement value ORNs to grant within this scope
          minItems: 1
          maxItems: 50
          items:
            type: string
            format: okta-resource-orn
            description: The ORN of an entitlement value
            example: orn:okta:governance:00o11edPwGqbUrsDm0g4:entitlement-values:env1o5jo0bHpxiDVJ0g5
    grant-principal-entitlement-data-entitlement:
      type: object
      description: |-
        Entitlement data for direct entitlement assignment.
        Entitlements can be grouped by resource asset scope. Each group contains
        one or more entitlement values to grant.
      required:
        - type
        - entitlements
      properties:
        type:
          type: string
          enum:
            - ENTITLEMENT
          description: Indicates direct entitlement assignment
        entitlements:
          type: array
          description: |-
            List of entitlement data. Each entry optionally specifies a resource asset scope.
            Entry without `resourceAssetOrn` represent app-level entitlements.
          minItems: 1
          maxItems: 5
          items:
            $ref: '#/components/schemas/grant-principal-entitlement-group'
        accessDuration:
          description: Duration of access for the entitlements. Independent of the top-level `accessDuration` that controls the app assignment duration.
          $ref: '#/components/schemas/access-duration'
    grant-principal-entitlement-data-bundle:
      type: object
      description: |-
        Entitlement data for entitlement bundle assignment.
        The server resolves the bundle contents to determine the actual entitlements to grant.
      required:
        - type
        - entitlementBundleOrn
      properties:
        type:
          type: string
          enum:
            - ENTITLEMENT_BUNDLE
          description: Indicates entitlement bundle assignment
        entitlementBundleOrn:
          type: string
          x-okta-ignore-redocly-rules-for-sdk: true
          format: okta-resource-orn
          description: The ORN of the entitlement bundle to grant
          example: orn:okta:governance:00o11edPwGqbUrsDm0g4:entitlement-bundles:enb1o5jmfBTZUCzcW0g5
        accessDuration:
          description: Duration of access for the entitlement bundle. Independent of the top-level `accessDuration` that controls the app assignment duration.
          $ref: '#/components/schemas/access-duration'
    grant-principal-entitlement-data:
      description: |-
        Specifies the entitlements to grant to the principal. Discriminated by `type`:
        - `ENTITLEMENT`: Direct entitlement assignment with grouped entitlement values
        - `ENTITLEMENT_BUNDLE`: Entitlement bundle assignment
      oneOf:
        - $ref: '#/components/schemas/grant-principal-entitlement-data-entitlement'
        - $ref: '#/components/schemas/grant-principal-entitlement-data-bundle'
      discriminator:
        propertyName: type
        mapping:
          ENTITLEMENT: '#/components/schemas/grant-principal-entitlement-data-entitlement'
          ENTITLEMENT_BUNDLE: '#/components/schemas/grant-principal-entitlement-data-bundle'
    grant-principal-access-request:
      type: object
      description: |-
        Request body for granting a principal access to a resource.
        At minimum, `principalOrn` and `resourceOrn` are required to grant app-level access.
        Optionally, specify `entitlementData` to grant specific entitlements or bundles,
        and `accessDuration` to set an expiration on the app assignment.
      required:
        - principalOrn
        - resourceOrn
      properties:
        principalOrn:
          $ref: '#/components/schemas/user-orn'
        resourceOrn:
          type: string
          x-okta-ignore-redocly-rules-for-sdk: true
          format: okta-resource-orn
          description: The ORN of the app resource to grant access to
          example: orn:okta:idp:00o11edPwGqbUrsDm0g4:apps:salesforce:0oa251e7jQHXVgg5r0g4
        actor:
          $ref: '#/components/schemas/grant-actor'
        accessDuration:
          $ref: '#/components/schemas/access-duration'
        entitlementData:
          $ref: '#/components/schemas/grant-principal-entitlement-data'
    grant-principal-access-response:
      type: object
      description: Response for a successful grant principal access request
      properties:
        _links:
          type: object
          description: Links to related resources
          properties:
            principalAccess:
              type: object
              description: Link to retrieve the principal's access
              properties:
                href:
                  type: string
                  format: uri
                  description: The URL to the principal access GET endpoint
                  example: https://{myOktaDomain}/governance/api/v1/principal-access?filter=targetPrincipalOrn eq "orn:okta:directory:00o11edPwGqbUrsDm0g4:users:00um8cshZwJhHgpvV0g4" and parentResourceOrn eq "orn:okta:idp:00o11edPwGqbUrsDm0g4:apps:salesforce:0oa251e7jQHXVgg5r0g4"
              required:
                - href
          required:
            - principalAccess
      required:
        - _links
    request-field-value:
      type: object
      required:
        - id
      properties:
        id:
          type: string
          description: |
            The ID of a `requesterField`.

            For `OKTA` request approval, this is typically the ID of an input field defined in an approval sequence.

            For `EXTERNAL` request approval, this is the ID of an input field relevant to the external approval system.

            The following are reserved identifiers:
            - `ACCESS_DURATION`: An identifier used to specify the duration of the access being requested. (**Note:**
              This identifier is to be grandfathered. The new name will be `OKTA_ACCESS_DURATION`.)
            - `OKTA_REQUESTED_FOR`: An identifier used to specify who the resource is being requested for
            - `OKTA_ACCESS_DURATION`: An identifier used to specify the duration of the requested access. If a request 
              field is included in this ID, the field value must be a `DURATION` expression in ISO format. The maximum 
              length of this value is 5 characters. For example, `P1D` represents a duration of one day.
            - Any identifiers with `OKTA_` prefix are reserved for future use.
        label:
          type: string
          description: A human-readable description of `requesterField`. It's used for display purposes and is optional
        type:
          $ref: '#/components/schemas/request-field-type'
        value:
          type: string
          minLength: 1
          maxLength: 1000
          description: |
            The value of `requesterField`, which depends on the type of the field:
            - `TEXT`: A multi-line string
            - `SELECT`: An option predefined by the approval system
            - `ISO_DATE`: An ISO formatted date string. for example, `2022-05-05T14:15:22Z`
            - `DURATION`: An ISO format duration expression with a maximum length of 5 characters. For example, 
              `P1D` indicates a duration of one day.
            - `OKTA_USER_ID`: Okta User ID

            If the field type is one of the previously listed, this property is required.
        values:
          type: array
          items:
            $ref: '#/components/schemas/field-option-value'
          description: |
            The values of `requesterField` with the type `MULTISELECT`.

            If the field type is `MULTISELECT`, this property is required.
    request-field-values:
      type: array
      description: |
        The requester input fields required by the approval system.

        **Note:** The fields required are determined by the approval system.

        For the Okta approval system, the required fields are defined in the approval sequence. Ensure that the requester
        input fields match up with this definition to avoid request approval flow failure.

        For external approval systems, the requester input fields are for recording purposes only and do not affect the approval
        process.
      items:
        $ref: '#/components/schemas/request-field-value'
    my-request-creatable:
      type: object
      description: The properties expected in an initial create request
      properties:
        requesterFieldValues:
          $ref: '#/components/schemas/request-field-values'
    request-status:
      type: string
      description: The status of the request
      x-okta-known-values:
        - SUBMITTED
        - REJECTED
        - PENDING
        - APPROVED
        - DENIED
        - CANCELED
        - EXPIRED
    request-grant-status:
      type: string
      description: The grant status of the request
      x-okta-known-values:
        - PENDING
        - GRANTED
        - FAILED
        - MANUAL_REQUIRED
    request-granted-date-time:
      type: string
      format: date-time
      nullable: true
      description: The date the approved access was granted. Only set if request.status is APPROVED.
    request-revocation-status:
      type: string
      description: The revocation status of the request
      x-okta-known-values:
        - PENDING
        - REVOKED
        - FAILED
    request-revoked-date-time:
      type: string
      format: date-time
      nullable: true
      description: The date the granted access was revoked. Only set if request.grantStatus is GRANTED and request.revocationStatus is REVOKED.
    client-credential-principal:
      type: object
      description: A representation of a principal
      required:
        - externalId
        - type
      properties:
        externalId:
          type: string
          description: The principal ID
          maxLength: 20
          minLength: 20
          pattern: (00u|pca)[0-9a-zA-Z]+
        type:
          type: string
          description: The type of principal
          enum:
            - OKTA_USER
            - UNKNOWN
          x-enumDescriptions:
            OKTA_USER: The principal is an Okta user. `externalId` has the format `00u*`.
            UNKNOWN: The principal isn't a known Okta user. `externalId` has the format `pca*`. This option is for requests not made by a known Okta user, such as requests from a service using client credentials authentication.
    resource-id-3:
      type: string
      maxLength: 20
      minLength: 20
      description: the requested resource ID
    resource-type-3:
      type: string
      description: The requested resource type
      x-okta-known-values:
        - APPLICATION
        - REQUEST_TYPE
    access-scope-id:
      type: string
      description: ID of the access scope
      minLength: 20
      maxLength: 20
    access-scope-type:
      type: string
      description: The access scope type
      x-okta-known-values:
        - ENTITLEMENT_BUNDLE
        - GROUP
        - APPLICATION
        - REQUEST_TYPE
    requested:
      type: object
      description: A representation of the resource in request
      properties:
        entryId:
          $ref: '#/components/schemas/catalog-entry-id'
        resourceId:
          $ref: '#/components/schemas/resource-id-3'
        resourceType:
          $ref: '#/components/schemas/resource-type-3'
        accessScopeId:
          $ref: '#/components/schemas/access-scope-id'
        accessScopeType:
          $ref: '#/components/schemas/access-scope-type'
    request-links-2:
      type: object
      description: Links available on a single request representation
      required:
        - self
      properties:
        catalogEntry:
          $ref: '#/components/schemas/link'
        approvalCondition:
          $ref: '#/components/schemas/link'
        approvalSequence:
          $ref: '#/components/schemas/link'
        self:
          $ref: '#/components/schemas/link'
    request-minimal-read-only-fields-2:
      type: object
      description: Properties contained by default in sparse representation
      properties:
        status:
          $ref: '#/components/schemas/request-status'
        resolved:
          $ref: '#/components/schemas/request-resolved-date-time'
        grantStatus:
          $ref: '#/components/schemas/request-grant-status'
        granted:
          $ref: '#/components/schemas/request-granted-date-time'
        revocationStatus:
          $ref: '#/components/schemas/request-revocation-status'
        revoked:
          $ref: '#/components/schemas/request-revoked-date-time'
        requestedBy:
          $ref: '#/components/schemas/client-credential-principal'
        requestedFor:
          $ref: '#/components/schemas/target-principal'
        requested:
          $ref: '#/components/schemas/requested'
        _links:
          $ref: '#/components/schemas/request-links-2'
    request-revocation-scheduled-date-time:
      type: string
      format: date-time
      nullable: true
      description: The date the granted access is scheduled for recovation. Only set if request.accessDuration exists, and request.grantStatus is GRANTED.
    approval-provider-type:
      type: string
      description: The approval system type
      x-okta-known-values:
        - OKTA
        - EXTERNAL
    approval-provider-name:
      type: string
      description: A human readable name of the request approval system, for example, Okta Access Requests or ServiceNow
      minLength: 1
      maxLength: 100
    approval-provider-description:
      type: string
      description: A description of the request approval system
      maxLength: 1000
    approval-external-request-id:
      type: string
      description: The external request `id` from a request approval system, for example, ServiceNow or JIRA
      minLength: 1
      maxLength: 200
    request-approval-status:
      type: string
      description: The approver's decision.
      x-okta-known-values:
        - APPROVED
        - DENIED
    approval-decision-date:
      type: string
      format: date-time
      description: The date the approval decision is made.
    approval-decision-enum:
      type: string
      x-okta-known-values:
        - APPROVE
        - DENY
        - CANCEL
    request-approval-decision:
      type: object
      description: A completed access request approval decision
      required:
        - deciderId
        - decision
        - decided
      properties:
        deciderId:
          $ref: '#/components/schemas/user-id'
        deciderName:
          type: string
          description: Okta username of the decider
          maxLength: 100
        decision:
          $ref: '#/components/schemas/approval-decision-enum'
        decided:
          $ref: '#/components/schemas/approval-decision-date'
        originalDeciderId:
          $ref: '#/components/schemas/user-id'
        originalDeciderFullName:
          type: string
          description: Full name of the original decider
          maxLength: 100
        originalDeciderEmail:
          type: string
          description: Email of the original decider
          format: email
        deciderDelegated:
          type: boolean
          description: Indicates if the decision was made by a delegated decider
        deciderEscalated:
          type: boolean
          description: Indicates if the decision was made by an escalated decider
    request-approval-2:
      type: object
      description: A completed access request approval
      required:
        - type
        - providerName
      properties:
        type:
          $ref: '#/components/schemas/approval-provider-type'
        providerName:
          $ref: '#/components/schemas/approval-provider-name'
        providerDescription:
          $ref: '#/components/schemas/approval-provider-description'
        externalRequestId:
          $ref: '#/components/schemas/approval-external-request-id'
        permalinkId:
          $ref: '#/components/schemas/request-permalink-id'
        status:
          $ref: '#/components/schemas/request-approval-status'
        decided:
          $ref: '#/components/schemas/approval-decision-date'
        decisions:
          type: array
          description: The approval decisions
          minItems: 0
          maxItems: 10
          items:
            $ref: '#/components/schemas/request-approval-decision'
    request-full-2:
      type: object
      x-okta-ignore-redocly-rules-for-sdk: true
      description: Full representation of a Request.
      allOf:
        - $ref: '#/components/schemas/read-only-standard-properties'
        - $ref: '#/components/schemas/request-minimal-read-only-fields-2'
        - type: object
          properties:
            accessDuration:
              $ref: '#/components/schemas/request-duration'
            revocationScheduled:
              $ref: '#/components/schemas/request-revocation-scheduled-date-time'
            requesterFieldValues:
              $ref: '#/components/schemas/request-field-values'
            requestApproval:
              $ref: '#/components/schemas/request-approval-2'
            riskAssessment:
