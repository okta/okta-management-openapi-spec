      type: object
      description: request-type-approval-description.md
      oneOf:
        - $ref: '#/components/schemas/request-type-approval-member-of-writable'
        - $ref: '#/components/schemas/request-type-approval-user-writable'
        - $ref: '#/components/schemas/request-type-approval-manager-writable'
        - $ref: '#/components/schemas/request-type-approval-resource-owner-writable'
      discriminator:
        propertyName: approverType
        mapping:
          MEMBER_OF: '#/components/schemas/request-type-approval-member-of-writable'
          USER: '#/components/schemas/request-type-approval-user-writable'
          MANAGER: '#/components/schemas/request-type-approval-manager-writable'
          RESOURCE_OWNER: '#/components/schemas/request-type-approval-resource-owner-writable'
    request-type-approvals-writable:
      description: |
        The `SERIAL` approvals required to grant access:

        * All specified approvals are considered required in order to fulfill an access request.
        * At least one approval must be specified for a request type.
        * When a request type has two approvals:
          * Only the first approval is immediately actionable by an approver in the request.
          * After an approver has made a decision for the first approval, then the second approval is actionable.
        * The approval type of `RESOURCE_OWNER` is supported for apps, entitlement bundles, and associated groups from the resource requested.
      type: array
      minItems: 1
      maxItems: 5
      items:
        $ref: '#/components/schemas/request-type-approval-writable'
