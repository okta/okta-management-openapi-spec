    collections-list-filter-v2:
      name: filter
      description: |
        A [filter](https://developer.okta.com/docs/api/#filter) expression that filters data based on `id`, `name`, `resourceOrn`, or `principalOrn` resource collection properties.
        The `sw` and `co` [operators](https://developer.okta.com/docs/api/#operators) are supported for `name`, and the `eq` operator is supported for `id`, `resourceOrn`, and `principalOrn`.

        When filtering by `resourceOrn`, Okta returns only collections that contain the specified resource.
        Each collection in the response includes a `resourceRelationship` object with details about when the resource was added.

        When filtering by `principalOrn`, Okta returns only collections assigned to the specified principal.
        Each collection in the response includes a `principalAssignment` object with assignment details.

        > **Note:** Query parameter percent encoding is required. See [Percent-encoding](https://developer.mozilla.org/en-US/docs/Glossary/Percent-encoding).
      in: query
      required: false
      schema:
        type: string
        format: scim-filter
        maxLength: 255
        example: name sw "Sales"
      x-scim-filter:
        name:
          operators:
            - sw
            - co
          type: String
        id:
          operators:
            - eq
          type: String
        resourceOrn:
          operators:
            - eq
          type: String
        principalOrn:
          operators:
            - eq
          type: String
      examples:
        searchCollectionsByName:
          summary: Search for resource collections with a name that begins with "Sales"
          value: name sw "Sales"
        searchCollectionsByNameContains:
          summary: Search for resource collections with a name that contains "Sales"
          value: name co "Sales"
        searchCollectionsById:
          summary: Search for resource collections with specific IDs
          value: id eq "coljqM9a9xerZfRpp0g2" or id eq "coljrNAph4LiA2C1m0g2"
        filterByResourceOrn:
          summary: Find collections that contain a specific resource
          value: resourceOrn eq "orn:okta:idp:00o1234567890:apps:0oa1234567890"
        filterByPrincipalOrn:
          summary: Find collections assigned to a specific principal
          value: principalOrn eq "orn:okta:idp:00o1234567890:users:00u1234567890"
