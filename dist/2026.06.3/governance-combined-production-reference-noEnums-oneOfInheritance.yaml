    campaigns-creatable-08-multi-level-reviewer-type-user:
      summary: Multi level campaign with reviewerType USER at both levels
      description: |
        Applicable when `reviewerSettings.type = MULTI_LEVEL`.
        Both the reviewer levels has `reviewerType = USER`.
        A reviewer at each level will make a decision before the final decision is made on reviews.

        In this example, the `transitionPolicy` is `APPROVED`. That means only `APPROVED` decisions at first level will go to second level.
        A `REVOKED` decision for any of the reviews in first level is updated as the final decision. Such reviews do not move to second level.
      value:
        name: Monthly access review of sales team
        description: Review access of all sales team members to a specific app
        scheduleSettings:
          type: ONE_OFF
          startDate: '2022-07-01T00:00:01.001Z'
          durationInDays: 30
          timeZone: America/Los_Angeles
        resourceSettings:
          targetTypes:
            - GROUP
          targetResources:
            - resourceId: 00gyqjxNrsh764hjs784
            - resourceId: 00gyqjxNrsh764hjs784
        principalScopeSettings:
          type: USERS
        reviewerSettings:
          type: MULTI_LEVEL
          reviewerLevels:
            - reviewerId: 00u12gpFVIth5WbxT0g4
              type: USER
              startReview:
                onDay: 0
            - reviewerId: 00u11knukTc2hYuTC0g5
              type: USER
              startReview:
                onDay: 11
                when: LOWER_LEVEL_APPROVES
        remediationSettings:
          accessApproved: NO_ACTION
          accessRevoked: DENY
          noResponse: DENY
        notificationSettings:
          notifyReviewerWhenReviewAssigned: true
          notifyReviewerAtCampaignEnd: true
          notifyReviewerWhenOverdue: true
          notifyReviewerDuringMidpointOfReview: true
          notifyReviewPeriodEnd: true
