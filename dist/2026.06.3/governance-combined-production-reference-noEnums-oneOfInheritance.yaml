        selfReviewDisabled:
          description: |
            If true, users won't be able to review their own review items.

            > **Note:** If you don't have the **Self-review for Okta admin roles** feature enabled, this property is required to be `true` for campaigns when the Okta Admin Console is one of the resources.
          type: boolean
        justificationRequired:
          type: boolean
          description: |-
            If true, a justification is required when review items are approved or revoked.

            This property must be `true` for resource campaigns that have the Okta Admin Console as one of the resources.
            > **Note:** Use the `justificationRequirement` property to control review justification for all new campaigns instead of `justificationRequired`. This property provides you with more control over your review justification settings.
        bulkDecisionDisabled:
          description: |
            If true, bulk actions are disabled for approving or revoking review items.
          type: boolean
        reassignmentDisabled:
          description: |
            If true, reassignment is disabled for reviewers.
          type: boolean
        reviewerLevels:
          description: |
            Defines the reviewer level in a campaign. A campaign can have a maximum of two reviewer levels.
          type: array
          items:
            $ref: '#/components/schemas/reviewer-level-settings-mutable'
          minItems: 2
          maxItems: 2
        justificationRequirement:
          $ref: '#/components/schemas/justification-requirement'
    notification-settings:
      type: object
      description: Settings for email notifications to be sent to the reviewers at different stages of a campaign. All properties are optional.
      properties:
        notifyReviewerWhenReviewAssigned:
          description: A Boolean value to indicate whether a notification should be sent to the reviewer when actionable reviews are assigned
          type: boolean
          default: false
        notifyReviewerAtCampaignEnd:
          type: boolean
          description: A Boolean value to indicate whether a notification should be sent to the reviewers when the campaign has come to an end
          default: false
        remindersReviewerBeforeCampaignCloseInSecs:
          type: array
          description: |-
            Specifies, in seconds, the time a reminder is sent to reviewers before the campaign closes. You can send up to three notifications
            For example, this array `[86400, 172800, 604800]` sends reminder notifications seven days, two days, and one day before the campaign closes.
            By default, reminders are sent two days and one day before the campaign closes.
          minItems: 1
          maxItems: 3
          items:
            type: integer
          default:
            - 86400
            - 172800
        notifyReviewerWhenOverdue:
          description: A Boolean value to indicate whether a notification is sent to the reviewer when reviews are overdue
          type: boolean
          nullable: true
          default: false
        notifyReviewerDuringMidpointOfReview:
          description: A Boolean value to indicate whether a notification should be sent to the reviewer during the midpoint of the review process
          type: boolean
          nullable: true
          default: false
        notifyReviewPeriodEnd:
          description: Applicable for multi-level campaigns. A Boolean value to indicate whether a notification is sent to the reviewer when a given reviewer level period is about to end
          type: boolean
          nullable: true
          default: false
    approved-remediation-action:
      type: string
      description: Specifies the action by default if the reviewer approves access. `NO_ACTION` indicates that there's no remediation action and the user retains access.
      default: NO_ACTION
      x-okta-known-values:
        - NO_ACTION
    revoked-remediation-action:
      type: string
      description: |-
        Specifies the action if the reviewer revokes access. `NO_ACTION` indicates that the user retains the same access. `DENY` indicates that the user's access is revoked as long as they aren't assigned to a group through Group Rules.
        >**Note:** If a user is assigned to a resource by way of a group and the campaign is targeted to users assigned directly to the app, the user's access isn't revoked and the review is flagged as `Manual Intervention required`. If the same campaign is configured to use the Enhanced Group Remediation, and the group the user is assigned to is included in the campaign, the user's access is revoked.
        If the user is assigned through Group Rules and a campaign attempts to remove the user from the group, the user's access isn't revoked and the review is flagged as `Manual Intervention required`.
      default: NO_ACTION
      x-okta-known-values:
        - NO_ACTION
        - DENY
    no-response-remediation-action:
      type: string
      description: |-
        Specifies the action if the reviewer doesn't respond to the request or if the campaign is closed before an action is taken. `NO_ACTION` indicates that there's no remediation action taken, and the user retains the same access. `DENY` indicates that the user's access is revoked when the campaign ends as long as they're not assigned to a group through Group Rules.
        > **Note:** If a user is assigned to a resource by way of a group, and the campaign is targeted to users assigned directly to the app, the user isn't revoked and the review is flagged as “Manual Intervention required”. If the same campaign is configured to use the Enhanced Group Remediation, and the group the user is assigned to is included in the campaign, the user is revoked.
        If the user is assigned through Group Rules and a campaign attempts to remove the user from the group, the user isn't removed and the review is flagged as “Manual Intervention required”.
      default: NO_ACTION
      x-okta-known-values:
        - NO_ACTION
        - DENY
    auto-remediation-resource-type:
      type: string
      description: The type of the resource to be automatically remediated. Only `GROUP` is supported.
      x-okta-known-values:
        - GROUP
    auto-remediation-settings:
      type: object
      description: |-
        When a group is selected to be automatically remediated, if a user is assigned to an app through this group,
        the user is automatically removed from the group if their access to the app is revoked in the Access Certification Campaign.
        `Group` is currently the only supported type of resource that can be automatically remediated.
      properties:
        includeOnly:
          type: array
          description: An array of resources to be automatically remediated
          minItems: 0
          items:
            type: object
            description: Represents a list of resources that are automatically remediated
            properties:
              resourceType:
                $ref: '#/components/schemas/auto-remediation-resource-type'
              resourceId:
                type: string
                description: |-
                  Unique identifier for the target resource.
                  When `resourceType = GROUP`, it points to the group `id`.
                minLength: 1
                maxLength: 20
        includeAllIndirectAssignments:
          type: boolean
          description: |-
            If `includeAllIndirectAssignments` is set to `true`, the user's access to all groups that can assign the user to the app(s) is removed during remediation. Only app assignments through groups can be automatically remediated.
            > **Note:** You can specify only `includeAllIndirectAssignments` or `includeOnly`.
    remediation-settings:
      type: object
      description: Specifies the action to be taken after a reviewer makes a decision to `APPROVE` or `REVOKE` the access, or if the campaign was `CLOSED` and there was no response from the reviewer
      required:
        - accessApproved
        - accessRevoked
        - noResponse
      properties:
        accessApproved:
          $ref: '#/components/schemas/approved-remediation-action'
        accessRevoked:
          $ref: '#/components/schemas/revoked-remediation-action'
        noResponse:
          $ref: '#/components/schemas/no-response-remediation-action'
        autoRemediationSettings:
          description: Specifies which resources can be automatically remediated
          $ref: '#/components/schemas/auto-remediation-settings'
    campaign-tier:
      type: string
      description: Indicates the minimum required SKU to manage the campaign
      x-okta-known-values:
        - BASIC
        - PREMIUM
    reporting-settings-mutable:
      type: object
      description: Reporting properties for processing post-completed campaigns
      properties:
        createReportingPackageEnabled:
          type: boolean
          description: If `true`, a post-campaign reporting package is created
          default: false
    campaign-mutable:
      type: object
      description: |
        There are two `campaignType` types. RESOURCE: Campaigns created focused on certain resources USER: Campaigns created focused on certain users
      required:
        - name
        - scheduleSettings
        - resourceSettings
        - reviewerSettings
        - remediationSettings
      properties:
        name:
          type: string
          description: Name of the campaign. Maintain some uniqueness when naming the campaign as it helps to identify and filter for campaigns when needed.
          minLength: 1
          maxLength: 255
        description:
          type: string
          description: Campaign description
          maxLength: 1000
        campaignType:
          $ref: '#/components/schemas/campaign-type'
        scheduleSettings:
          $ref: '#/components/schemas/schedule-settings-mutable'
        resourceSettings:
          $ref: '#/components/schemas/resource-settings-mutable'
        principalScopeSettings:
          description: An array of Okta specific resource id for which access is being reviewed.
          $ref: '#/components/schemas/principal-scope-settings-mutable'
        reviewerSettings:
          $ref: '#/components/schemas/reviewer-settings-mutable'
        notificationSettings:
          $ref: '#/components/schemas/notification-settings'
        remediationSettings:
          $ref: '#/components/schemas/remediation-settings'
        campaignTier:
          $ref: '#/components/schemas/campaign-tier'
        reportingSettings:
          $ref: '#/components/schemas/reporting-settings-mutable'
    schedule-settings-read-only:
      type: object
      description: |-
        Scheduler specific settings.
          
        A campaign can be a `ONE_OFF` or a `RECURRING` campaign.
          
        You can't provide both in the campaign definition.
      required:
        - type
        - startDate
        - durationInDays
        - timeZone
      properties:
        type:
          description: Specify the type of the campaign to be created. A campaign could one off or recurring.
          $ref: '#/components/schemas/schedule-type'
        startDate:
          type: string
          description: The date on which the campaign is supposed to start. Accepts date in ISO 8601 format.
          format: date-time
        durationInDays:
          type: number
          minimum: 0
          description: The duration (in days) that the campaign is active.
        timeZone:
          type: string
          description: The time zone, in IANA format, for the start date of the campaign.
          minLength: 1
          maxLength: 64
        endDate:
          type: string
          description: The date on which the campaign is supposed to end. Date in ISO 8601 format.
          format: date-time
          readOnly: true
        recurrence:
          $ref: '#/components/schemas/recurrence-definition-mutable'
    campaign-details-read-only:
      type: object
      required:
        - name
