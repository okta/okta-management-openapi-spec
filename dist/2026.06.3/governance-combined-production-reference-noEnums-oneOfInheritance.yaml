        lifecycle: BETA
      x-disable-permissions-audit: true
      tags:
        - My Settings
      operationId: listMyDelegateUsers
      parameters:
        - $ref: '#/components/parameters/delegates-user-list-filter'
        - $ref: '#/components/parameters/after'
        - $ref: '#/components/parameters/limit-2'
      summary: List my eligible delegates
      description: |
        Lists the users who are eligible delegates for the current authenticated user.

        The `filter` query parameter is optional when the org's delegate scope is restricted (the `onlyFor` list contains MANAGER or both MANAGER and PEERS).
        When omitted in this case, the endpoint returns all eligible delegates.

        However, if the org's delegate scope is unrestricted (the `onlyFor` list is empty), the `filter` parameter is required.
        Omitting the filter with an unrestricted scope returns a 400 error.

        Request examples:

        1. List all eligible delegates (only works with restricted delegate scope)
            ```
            /governance/api/v1/my/settings/delegates/users
            ```
        1. Filter users with a last name that starts with "Smi"
            ```
            /governance/api/v1/my/settings/delegates/users?filter=lastName%20sw%20%22Smi%22
            ```
        1. Filter for users with a first name that begins with "John"
            ```
            /governance/api/v1/my/settings/delegates/users?filter=firstName%20sw%20%22John%22
            ```
        1. Search for users with a first or last name that begins with "John"
            ```
            /governance/api/v1/my/settings/delegates/users?filter=firstName%20sw%20%22John%22%20OR%20lastName%20sw%20%22John%22
            ```
      security:
        - OAuth2:
            - okta.governance.principalSettings.read
      responses:
        '200':
          $ref: '#/components/responses/delegates-users-get-success'
        '400':
          $ref: '#/components/responses/list-bad-request'
        '401':
          $ref: '#/components/responses/authentication-error-response'
