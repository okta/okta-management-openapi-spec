    entitlement-drifts-list-filter:
      name: filter
      description: |
        A [filter](https://developer.okta.com/docs/api/#filter) expression that selects which drifts to return, using the properties and operators below.

        The filter is required and must scope the query to exactly one resource or principal, include `resourceId eq "..."` or `principalId eq "..."`, but not both. A filter with neither (`reason` `MISSING_ANCHOR_FILTER`) or both (`reason` `MULTIPLE_ANCHOR_FILTERS`) returns a `400`.

        Properties you can filter on:
        * `resourceId`: `eq` (scope)
        * `principalId`: `eq` (scope)
        * `importJobId`: `eq`
        * `status`: `eq`
        * `resolution`: `eq`
        * `driftType`: `eq`
        * `lastUpdated`: `gt`, `ge`, `le`, `lt`

        To page through results, use the `after` cursor and the `Link` header. Don't page by putting `id` in the filter.

        > **Note:** Query parameter percent encoding is required. See [Special characters](https://developer.okta.com/docs/api/#special-characters).
      in: query
      required: true
      schema:
        $ref: '#/components/schemas/scim-filter'
      x-scim-filter:
        resourceId:
          operators:
            - eq
          schema:
            $ref: '#/components/schemas/resource-id'
        principalId:
          operators:
            - eq
          schema:
            type: string
            maxLength: 20
        importJobId:
          operators:
            - eq
          schema:
            type: string
            maxLength: 64
        status:
          operators:
            - eq
          schema:
            $ref: '#/components/schemas/entitlement-drift-status'
        resolution:
          operators:
            - eq
          schema:
            $ref: '#/components/schemas/entitlement-drift-resolution'
        driftType:
          operators:
            - eq
          schema:
            $ref: '#/components/schemas/entitlement-drift-type'
        lastUpdated:
          operators:
            - gt
            - ge
            - le
            - lt
          schema:
            $ref: '#/components/schemas/last-updated'
      examples:
        AllDriftsForResource:
          summary: All drifts for a resource
          value: resourceId eq "0oafxqCAJWWGELFTYASJ"
        AllDriftsForPrincipal:
          summary: All drifts for a principal
          value: principalId eq "00uxqCAJWWGELFTYASJK"
        RejectedDriftsForResource:
          summary: Drifts a resource rejected
          value: resourceId eq "0oafxqCAJWWGELFTYASJ" AND status eq "AUTO_REJECTED"
        DriftsFromOneImportJob:
          summary: Drifts from a single import job
          value: resourceId eq "0oafxqCAJWWGELFTYASJ" AND importJobId eq "imp_2026_05_22_a1b2c3"
        RecentDriftsForResource:
          summary: Recently updated drifts for a resource
          value: resourceId eq "0oafxqCAJWWGELFTYASJ" AND lastUpdated gt "2026-05-20T00:00:00Z"
