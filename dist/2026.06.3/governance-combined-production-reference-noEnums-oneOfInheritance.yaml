        duration:
          $ref: '#/components/schemas/access-duration-duration'
      required:
        - type
        - duration
    access-duration-max-duration:
      type: string
      format: duration
      example: PT24H
      description: |-
        The maximum duration set by the requester for access durations. Use the [ISO 8601](https://tc39.es/proposal-temporal/docs/duration.html) duration notation for duration values.
        You can configure up to 365 days (`P365D`) or 52 weeks (`P52W`) as the maximum access duration of a request.
    access-duration-settings-requester-specified-duration:
      type: object
      description: Setting to specify the maximum duration that an end user can request access for when making a request
      additionalProperties: false
      properties:
        type:
