          type: boolean
          description: Indicates that users who can request this resource could also request for another requester of the same resource. This property can only be `true`. If request on behalf of should not be allowed then `requestOnBehalfOfSettings` should be nullified.
        onlyFor:
          nullable: true
          type: array
          description: Which requesters the resource requester can request on behalf of. If onlyFor is not specified then any requester may request a resource on the behalf of any other user
          items:
            $ref: '#/components/schemas/request-on-behalf-of-type'
          minItems: 1
    risk-settings-default-allowed-with-no-overrides-patchable:
      type: object
