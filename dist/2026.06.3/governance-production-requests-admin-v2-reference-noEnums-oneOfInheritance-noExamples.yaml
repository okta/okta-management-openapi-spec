          RESTRICTED: '#/components/schemas/risk-settings-default-restricted-details'
      oneOf:
        - $ref: '#/components/schemas/risk-settings-default-allowed-with-no-overrides-details'
        - $ref: '#/components/schemas/risk-settings-default-allowed-with-overrides-details'
        - $ref: '#/components/schemas/risk-settings-default-restricted-details'
    risk-settings-details:
      type: object
      description: Risk settings that are valid for an access request when a risk has been detected for the resource and requesting user
      required:
        - defaultSetting
      properties:
        defaultSetting:
          $ref: '#/components/schemas/risk-settings-default-details'
    request-on-behalf-of-settings-type:
