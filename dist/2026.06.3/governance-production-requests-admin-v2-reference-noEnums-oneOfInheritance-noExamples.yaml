      maxItems: 2
    request-settings:
      type: object
      description: |
        Request settings specify what conditions are valid for the given resource
      properties:
        validAccessScopeSettings:
          $ref: '#/components/schemas/valid-access-details'
        validRequesterSettings:
          $ref: '#/components/schemas/valid-requester-settings-details'
        validAccessDurationSettings:
          $ref: '#/components/schemas/valid-access-duration-settings-details'
        requestOnBehalfOfSettings:
          $ref: '#/components/schemas/request-on-behalf-of-settings-details'
        validRiskSettings:
          $ref: '#/components/schemas/valid-risk-settings-details'
        riskSettings:
          $ref: '#/components/schemas/risk-settings-details'
        validRequestOnBehalfOfSettings:
          $ref: '#/components/schemas/valid-request-on-behalf-of-settings-details'
      required:
        - validAccessScopeSettings
