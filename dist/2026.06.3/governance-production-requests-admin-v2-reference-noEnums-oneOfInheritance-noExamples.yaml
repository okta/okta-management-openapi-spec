          description: Whether `accessDurationSetting` must be included in the request conditions or risk settings for the specified resource.
        maximumDays:
          type: number
          minimum: 1
          maximum: 365
          description: |
            The maximum number of days allowed from the `accessDurationSettings.duration` day expression for a request condition or risk settings, such as `P30D`.
            For example, if `accessDurationSettings.duration` is `P365D`, then the maximum number of days for this request is `365`.
        maximumHours:
          type: number
          minimum: 1
          maximum: 72
          description: |
            The minimum and maximum values allowed in `accessDurationSettings.duration` expression for a request condition or risk settings,
            when that expression contains hour units. For example: `P5H` is valid, and `P73H` is not.
        maximumWeeks:
          type: number
          minimum: 1
          maximum: 52
          description: |
            The maximum number of weeks allowed from the `accessDurationSettings.duration` week expression for request condition or risk settings, such as `P3W`.
            For example, if `accessDurationSettings.duration` is `P52W`, then the maximum number of weeks is `52`.
