      required:
        - requestSubmissionType
        - approvalSequenceId
      properties:
        requestSubmissionType:
          type: string
          enum:
            - ALLOWED_WITH_OVERRIDES
        approvalSequenceId:
          $ref: '#/components/schemas/approval-sequence-id'
        accessDurationSettings:
          $ref: '#/components/schemas/access-duration-settings-full'
        error:
          type: array
          items:
            $ref: '#/components/schemas/risk-settings-error'
    risk-settings-default-restricted-details:
