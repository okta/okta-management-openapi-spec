  parameters:
    conditions-list-filter:
      name: filter
      description: |
        Apply various filters by using supported condition filtering properties.

        **Note:** Query parameter percent encoding is required. See [Percent-encoding](https://developer.mozilla.org/en-US/docs/Glossary/Percent-encoding)
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/scim-filter'
      x-scim-filter:
        approvalSequenceId:
          operators:
            - eq
          schema:
            $ref: '#/components/schemas/approval-sequence-id'
      examples:
        FilterBySequence:
          summary: Filter conditions that reference the specified sequence id
          value: approvalSequenceId eq "61eb0f06c462d20007f051ac"
    request-condition-id:
      name: requestConditionId
      description: Unique identifier for the request condition
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/request-condition-id'
    resource-id-orn-or-okta:
      name: resourceId
      description: Unique identifier for the resource in Okta instance ID format or [ORN format](https://developer.okta.com/docs/api/openapi/okta-management/guides/roles/#okta-resource-name-orn)
      in: path
      required: true
      schema:
        type: string
    sequence-id-parameter:
      name: sequenceId
      description: The `id` of the sequence
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/sequence-id'
    request-list-filter:
      name: filter
      description: |
        Apply various filters by using supported request filtering properties.

        **Note:** Query parameter percent encoding is required. See [Percent-encoding](https://developer.mozilla.org/en-US/docs/Glossary/Percent-encoding)
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/scim-filter'
      x-scim-filter:
        status:
          operators:
            - eq
          schema:
            $ref: '#/components/schemas/request-status'
        grantStatus:
          operators:
            - eq
          schema:
            $ref: '#/components/schemas/request-grant-status'
        lastUpdated:
          operators:
            - gt
          schema:
            $ref: '#/components/schemas/last-updated'
        requestedFor:
          operators:
            - eq
          schema:
            $ref: '#/components/schemas/user-id'
        resourceId:
          operators:
            - eq
          schema:
            $ref: '#/components/schemas/resource-id'
        resourceType:
          operators:
            - eq
          schema:
            $ref: '#/components/schemas/resource-type'
        accessScopeId:
          operators:
            - eq
          schema:
            $ref: '#/components/schemas/access-scope-id'
        accessScopeType:
          operators:
            - eq
          schema:
            $ref: '#/components/schemas/access-scope-type'
      examples:
        FilterByStatus:
          summary: Filter by status
          value: status eq "APPROVED"
        FilterByLastUpdated:
          summary: Filter by lastUpdated
          value: lastUpdated gt "2022-05-24T14:15:22Z"
        FilterByResourceId:
          summary: Filter by resourceId
          value: resourceId eq "0oafxqCAJWWGELFTYASJ"
        FilterByResourceType:
          summary: Filter by resourceType
          value: resourceType eq "APPLICATION"
        FilterByAccessScopeId:
          summary: Filter by accessScopeId
          value: accessScopeId eq "0oafxqCAJWWGELFTYASJ"
        FilterByAccessScopeType:
          summary: Filter by accessScopeType
          value: accessScopeType eq "APPLICATION"
        FilterByRequestedFor:
          summary: Filter by requestedFor
          value: requestedFor eq "00ub0oNGTSWTBKOLGLNR"
        FilterByStatus-ResourceId:
          summary: Filter by status, resourceId
          value: status eq "RESOLVED" AND resourceId eq "0oafxqCAJWWGELFTYASJ"
    request-list-after:
